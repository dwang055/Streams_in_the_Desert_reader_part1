        {
          "sectionId": 2,
          "heading": "March 13",
          "audio": "audio/Streams in the Desert - March 13.m4a",
          "paragraphs": [
            {
              "en": "Just and true are thy ways, thou King of saints (Rev. 15:3).",
              "zh": "万世之王啊，祢的道途义哉，诚哉。（启示录15:3）",
              "simpEn": "Your ways are just and true, King of the nations.",
              "simpZh": "你的道路是公义和真实的，万国之王。"
            },
            {
              "en": "The following incident is related by Mrs. Charles Spurgeon, who was a great sufferer for more than a quarter of a century. \"At the close of a dark and gloomy day, I lay resting on my couch as the deeper night drew on; and though all was bright within my cozy room, some of the external darkness seemed to have entered into my soul and <span class=\"vocab-trigger\" data-vocab=\"obscured\">obscured<\/span> its spiritual vision. <span class=\"vocab-trigger\" data-vocab=\"Vainly\">Vainly<\/span> I tried to see the Hand which I knew held mine, and guided my fog-<span class=\"vocab-trigger\" data-vocab=\"enveloped\">enveloped<\/span> feet along a steep and slippery path of suffering. In sorrow of heart I asked, 'Why does my Lord thus deal with His child? Why does He so often send sharp and bitter pain to visit me? Why does He permit <span class=\"vocab-trigger\" data-vocab=\"lingering weakness\">lingering weakness<\/span> to hinder the sweet service I long to render to His poor servants?'\"",
              "zh": "下面这件事是由司布真夫人所述，她曾受了四分之一世纪以上的极大苦难。「在一个阴沉幽暗的日子快完之时，我躺在榻上，夜色渐深；虽然我舒适的小屋里一切明亮，外面的一些黑暗却似乎进入了我的灵魂，蒙蔽了它的属灵视线。我徒然想要看见那只我知道正握着我的手，并在大雾笼罩中引领我那又陡又滑的受苦之路的手。我心中忧伤地问：『我的主为什么这样待祂的孩子？祂为什么常以尖锐的疼痛临到我？祂为什么容许缠绵的软弱拦阻我渴望向祂可怜仆人们献上的甜美服事？』」",
              "simpEn": "Mrs. Charles Spurgeon, who suffered for over 25 years, told this story. 'At the end of a dark, gloomy day, I lay on my couch as night deepened. Though my room was bright, some outer darkness entered my soul and clouded my spiritual vision. I tried in vain to see the Hand that I knew held mine and guided my feet through fog on a steep, slippery path of suffering. I asked sadly, \"Why does God treat me like this? Why so much sharp pain? Why does ongoing weakness stop me from serving His servants?\"'",
              "simpZh": "司布真夫人受了二十五年的苦，她讲了这个故事：‘在一个又黑又闷的日子结束时，我躺在沙发上，夜更深了。虽然房间里很明亮，外面的黑暗好像进到我的灵魂里，挡住了我的灵眼。我想看见那只我知道正握着我的手，在大雾中领我走过又陡又滑的受苦路，却看不见。我心里难过地问：“主为什么这样待我？为什么常常给我尖锐的疼痛？为什么让我一直软弱，不能去服事祂的仆人？”’"
            },
            {
              "en": "\"These <span class=\"vocab-trigger\" data-vocab=\"fretful\">fretful<\/span> questions were quickly answered, and through a strange language; no interpreter was needed save the conscious whisper of my heart. For a while silence reigned in the little room, broken only by the <span class=\"vocab-trigger\" data-vocab=\"crackling\">crackling<\/span> of the oak log burning in the fireplace. Suddenly I heard a sweet soft sound, a little, clear, musical note, like the tender <span class=\"vocab-trigger\" data-vocab=\"twitter\">twitter<\/span> of a robin beneath my window. 'What can it be? surely no bird can be singing out there at this time of the year and night.' Again came the faint <span class=\"vocab-trigger\" data-vocab=\"plaintive\">plaintive<\/span> notes, so sweet, so <span class=\"vocab-trigger\" data-vocab=\"melodious\">melodious<\/span>, yet mysterious enough to provoke our wonder. My friend exclaimed, 'It comes from the log on the fire!' The fire was letting loose the <span class=\"vocab-trigger\" data-vocab=\"imprisoned music\">imprisoned music<\/span> from the old oak's <span class=\"vocab-trigger\" data-vocab=\"inmost heart\">inmost heart<\/span>!\"",
              "zh": "「这些烦躁的问题很快得了回答，而且是通过一种奇特的语言；除了我心中清晰的低语之外，无需别的翻译。片时，小屋里静默无声，只有壁炉里橡木柴燃烧的噼啪声。忽然我听见一阵柔细的声音，一个清亮的小乐音，如同窗外知更鸟温柔的啁啾。『这是什么？这个时节、这个时辰，绝不可能有鸟儿在外面唱歌。』那微弱而哀怨的音符再次传来，那么甜美，那么悠扬，却也神秘得令人惊奇。我的朋友喊道：『是从火里的木柴发出来的！』火正从老橡树心深处释放出被囚禁的音乐！」",
              "simpEn": "'These worried questions were quickly answered, in a strange way, with only my heart's whisper to interpret. The room was silent except for the crackling oak log in the fireplace. Suddenly I heard a soft, sweet sound, a clear musical note like a robin under my window. \"What is that? No bird is singing at this time of year and night.\" The faint, sad notes came again, so sweet and musical, yet mysterious. My friend said, \"It's from the burning log!\" The fire was setting free the trapped music from deep inside the old oak!'",
              "simpZh": "'这些烦躁的问题很快有了答案，而且是用一种奇妙的方式；只有我心里轻轻的细语能解释。房间里安静了一会，只有壁炉里橡木柴烧得噼啪响。突然我听见一个又柔又甜的声音，一个清亮的小音符，像窗外知更鸟轻轻的叫声。“这是什么？这个时候，这个季节，不可能有鸟在唱歌。”那轻微、带着哀愁的音符又来了，那么甜美，那么好听，又那么神秘。我的朋友喊：“是火里的木柴发出来的！”火正在把藏在老橡树最深处的音乐释放出来！’"
            },
            {
              "en": "\"Perchance he had <span class=\"vocab-trigger\" data-vocab=\"garnered\">garnered<\/span> up this song in the days when all was well with him, when birds twittered merrily on his branches, and the soft sunlight <span class=\"vocab-trigger\" data-vocab=\"flecked\">flecked<\/span> his tender leaves with gold. But he had grown old since then, and hardened; ring after ring of <span class=\"vocab-trigger\" data-vocab=\"knotty growth\">knotty growth<\/span> had sealed up the long-forgotten melody, until the fierce tongues of the flames came to consume his <span class=\"vocab-trigger\" data-vocab=\"callousness\">callousness<\/span>, and the vehement heart of the fire <span class=\"vocab-trigger\" data-vocab=\"wrung from him\">wrung from him<\/span> at once a song and a sacrifice. 'Ah,' thought I, 'when the fire of affliction draws songs of praise from us, then indeed we are purified, and our God is glorified!'\"",
              "zh": "「或许在那些一切都美好的日子里，当鸟儿在它的枝头欢鸣，柔和的阳光将它的嫩叶镀上金色之时，它已将这歌蕴藏了起来。但此后它老了，变硬了；一圈圈木瘤般的年岁封住了那久被遗忘的旋律，直到烈焰的猛舌来烧尽它的冷漠，火的烈心才从它里面同时榨出了一首歌与一个祭。『啊，』我想，『当苦难的火从我们里面引出赞美的歌时，我们就真被洁净了，我们的神也就得了荣耀！』」",
              "simpEn": "'Maybe it stored up that song in good times, when birds sang happily on its branches and sunlight touched its leaves with gold. But it grew old and hard; ring after ring of tough growth sealed away the forgotten music, until the fierce flames came to burn away its hardness, and the intense heat pulled from it both a song and a sacrifice. \"Ah,\" I thought, \"when the fire of suffering draws songs of praise from us, we are truly purified, and God is glorified!\"'",
              "simpZh": "'也许在从前一切都好的时候，当鸟儿在它枝头快乐唱歌，柔和的太阳光照着它嫩嫩的叶子闪金光时，它就把那首歌存起来了。但它后来老了、硬了；一圈一圈坚硬的年轮封住了那首被忘记的歌，直到烈火的大舌头来烧掉它的硬壳，猛烈的火焰才从它里面拉出了一首歌，也作出了一个牺牲。“啊，”我想，“当苦难的火从我们里面引出赞美的歌时，我们就真的洁净了，神就得了荣耀！”’"
            },
            {
              "en": "\"Perhaps some of us are like this old oak log, cold, hard, <span class=\"vocab-trigger\" data-vocab=\"insensible\">insensible<\/span>; we should give forth no melodious sounds, were it not for the fire which kindles around us, and releases notes of trust in Him, and cheerful <span class=\"vocab-trigger\" data-vocab=\"compliance\">compliance<\/span> with His will. 'As I mused the fire burned,' and my soul found sweet comfort in the <span class=\"vocab-trigger\" data-vocab=\"parable\">parable<\/span> so strangely set forth before me. Singing in the fire! Yes, God helping us, if that is the only way to get harmony out of these hard <span class=\"vocab-trigger\" data-vocab=\"apathetic\">apathetic<\/span> hearts, let the furnace be heated seven times hotter than before.\"",
              "zh": "「或许我们有些人就像这根老橡木，又冷又硬又麻木；若不是那在我们周围点起的火，释放出信靠祂的音符和欢然顺从祂旨意的乐声，我们便发不出任何悠扬的声音。『我默想的时候，火就烧起』，我的灵魂就在这个如此奇特摆在我面前的比喻中得了甘甜的安慰。在火中歌唱！是的，神若帮助我们，如果这是使这些刚硬冷漠的心发出和谐之音的唯一方法，就让火窑比先前加热七倍吧。」",
              "simpEn": "'Perhaps some of us are like that old oak log—cold, hard, and unfeeling. We would make no sweet sound if the fire didn't surround us and release notes of trust in God and joyful obedience to His will. \"While I was musing, the fire burned,\" and my soul found comfort in this strange parable. Singing in the fire! Yes, with God's help, if that's the only way to bring harmony from our hard, uncaring hearts, let the furnace be made seven times hotter.'",
              "simpZh": "'也许我们有些人就像那根老橡木柴——又冷又硬又没感觉。如果没有周围的火烧起来，释放出信靠神和欢然顺服祂旨意的音调，我们什么好听的声音也发不出来。“我默想的时候，火就烧起”，我的灵魂就在这个奇妙的比喻里得了安慰。在火中唱歌！是的，如果这是让刚硬冷淡的心发出和谐声音的唯一方法，那么就让火烧得比先前热七倍吧。’"
            }

            {
              "en": "Fear not thou <span class=\"vocab-trigger\" data-vocab=\"worm\">worm<\/span> Jacob.... I will make thee a <span class=\"vocab-trigger\" data-vocab=\"threshing instrument with teeth\">threshing instrument with teeth<\/span> (Isa. 41:14,15).",
              "zh": "你这虫雅各……不要害怕……我已使你成为有齿的快齿打粮的新器具。（以赛亚书41:14-15）",
              "simpEn": "Do not be afraid, O worm Jacob.... I will make you into a threshing sledge, sharp and new, with many teeth.",

            {
              "en": "Could any two things be in greater contrast than a worm and an instrument with teeth? The worm is delicate, <span class=\"vocab-trigger\" data-vocab=\"bruised\">bruised<\/span> by a stone, crushed beneath the passing wheel; an instrument with teeth can break and not be broken; it can <span class=\"vocab-trigger\" data-vocab=\"grave its mark\">grave its mark<\/span> upon the rock. And the mighty God can convert the one into the other. He can take a man or a nation, who has all the <span class=\"vocab-trigger\" data-vocab=\"impotence\">impotence<\/span> of the worm, and by the <span class=\"vocab-trigger\" data-vocab=\"invigoration\">invigoration<\/span> of His own Spirit He can <span class=\"vocab-trigger\" data-vocab=\"endow\">endow<\/span> with strength by which a noble mark is left upon the history of the time.",
              "zh": "还有什么比一条虫和一件带齿的器具对比更强烈的呢？虫是娇嫩的，被石头擦伤，被碾过的车轮压碎；而带齿的器具能破碎而不被破碎，能在磐石上刻下自己的印记。然而大能的神能将一个变成另一个。祂能取一个人或一个国家，尽管有着虫的全然无能，却借着祂自己圣灵的激励，赋予力量，使其在当代历史上留下崇高的记号。",
              "simpEn": "What could be more opposite than a worm and a sharp-toothed instrument? The worm is fragile, hurt by a stone, crushed under a wheel; the toothed instrument can break without being broken and leave its mark on the rock. But the mighty God can change one into the other. He can take a person or nation as weak as a worm and, by the power of His Spirit, give such strength that a noble mark is left on history.",
              "simpZh": "一条虫和一件带齿的器具，还能有比这更强烈的对比吗？虫很柔弱，被石头擦伤，被车轮压碎；带齿的器具能打碎东西自己却不碎，还能在石头上留下印子。但大能的神能把虫变成器具。祂能取一个人或一个国家，虽然软得像虫，借着祂圣灵加给力量，就能在历史上留下高尚的记号。"
            },
            {
              "en": "And so the \"worm\" may take heart. The mighty God can make us stronger than our circumstances. He can bend them all to our good. In God's strength we can make them all pay <span class=\"vocab-trigger\" data-vocab=\"tribute\">tribute<\/span> to our souls. We can even take hold of a black disappointment, break it open, and extract some <span class=\"vocab-trigger\" data-vocab=\"jewel of grace\">jewel of grace<\/span>. When God gives us will like iron, we can drive through difficulties as the <span class=\"vocab-trigger\" data-vocab=\"iron share\">iron share<\/span> cuts through the toughest soil. \"I will make thee,\" and shall He not do it? —Dr. Jowett.",
              "zh": "因此「虫」可以放心。大能的神能使我们比环境更强。祂能使万事为我们效力，叫我们得益处。在神的力量中，我们能使万事为我们的灵魂效贡。我们甚至可以抓住一个极黑的失望，把它破开，从中取出恩典的珠宝。当神赐给我们钢铁般意志时，我们就能穿越困难，如同铁犁切开最硬的土壤。「我必使你」，祂岂不成就吗？——乔伊特博士",
              "simpEn": "So the 'worm' can be encouraged. The mighty God can make us stronger than our circumstances. He can bend them all for our good. In His strength we can make them all serve our souls. We can even take a deep disappointment, break it open, and find a jewel of grace inside. When God gives us an iron will, we can cut through difficulties like an iron plow cuts hard ground. 'I will make you' — and won't He do it?",
              "simpZh": "所以这条‘虫’可以放心。大能的神能叫我们比环境更强。祂能让一切环境都为我们效力。靠神的力量，我们可以让万事都为我们的灵魂效劳。我们甚至可以抓住一个极黑的失望，把它破开，从中取出恩典的珠宝。当神给我们铁一样的意志时，我们就能穿过困难，像铁犁切开最硬的土。‘我必使你’，祂难道不会做成吗？"

            {
              "en": "Christ is building His kingdom with earth's broken things. Men want only the strong, the successful, the victorious, the unbroken, in building their kingdoms; but God is the God of the unsuccessful, of those who have failed. Heaven is filling with earth's broken lives, and there is no <span class=\"vocab-trigger\" data-vocab=\"bruised reed\">bruised reed<\/span> that Christ cannot take and restore to glorious <span class=\"vocab-trigger\" data-vocab=\"blessedness\">blessedness<\/span> and beauty. He can take the life crushed by pain or sorrow and make it into a harp whose music shall be all praise. He can lift earth's saddest failure up to heaven's glory. —J. R. Miller.",
              "zh": "基督是用地上破碎之物建造祂的国度。人要建造他们的王国，只拣选那些刚强的、成功的、得胜的、未破碎的；然而神是那不成功者、失败者的神。天堂正被地上破碎的生命所充满，没有一根压伤的芦苇是基督不能取去，使它恢复荣耀福分与美丽的。祂能取一个被疼痛或忧伤压碎的生命，把它变成一架琴，其音乐尽是赞美。祂能将地上最悲哀的失败提升到天堂的荣耀里。——J. R.米勒",
              "simpEn": "Christ builds His kingdom with earth's broken things. People want only the strong, successful, and unbroken; but God is the God of the unsuccessful and those who have failed. Heaven is filling with broken lives, and there is no bruised reed that Christ can't restore to glorious blessedness and beauty. He can take a life crushed by pain or sorrow and make it into a harp that plays only praise. He can lift earth's saddest failure up to heaven's glory.",
              "simpZh": "基督用地上破碎的东西来建造祂的国度。人建自己的王国，只挑刚强的、成功的、得胜的、没破的；但神是那些不成功的人、失败的人的神。天堂正被地上破碎的生命填满，没有一根压伤的芦苇是基督不能恢复成荣耀的福分和美丽的。祂能取一个被疼痛或忧伤压碎的生命，把它变成一架只弹赞美音乐的琴。祂能把地上最悲哀的失败提升到天上的荣耀。"

              "en": "For our <span class=\"vocab-trigger\" data-vocab=\"profit\">profit<\/span> (Heb. 12:10).",

            },
            {
              "en": "In one of Ralph Conner's books he tells a story of Gwen. Gwen was a wild, <span class=\"vocab-trigger\" data-vocab=\"wilful\">wilful<\/span> lassie and one who had always been <span class=\"vocab-trigger\" data-vocab=\"accustomed to having her own way\">accustomed to having her own way<\/span>. Then one day she met with a terrible accident which <span class=\"vocab-trigger\" data-vocab=\"crippled\">crippled<\/span> her for life. She became very rebellious and in her murmuring state she was visited by the Sky Pilot, as the missionary among the mountaineers was termed. He told her the parable of the canyon. \"At first there were no canyons, but only the broad, open <span class=\"vocab-trigger\" data-vocab=\"prairie\">prairie<\/span>. One day the Master of the Prairie, walking over his great lawns, asked the Prairie, 'Where are your flowers?' and the Prairie said, 'Master, I have no seeds.'\"",
              "zh": "在拉尔夫·康纳的一本书中，他讲了一个关于格温的故事。格温是个任性、野性的姑娘，一向习惯我行我素。一天她遭遇了一场可怕的事故，终身残废。她变得十分悖逆，就在她口发怨言之际，那位在山区传道的宣教士——人称「天空引航员」——来看望她。他向她说了一个峡谷的比喻。「起初并没有峡谷，只有广阔、开敞的草原。一日，草原之主在他的大草坪上行走，问草原说：『你的花在哪里？』草原回答说：『主啊，我没有种子。』」",
              "simpEn": "Ralph Conner told a story about Gwen, a wild, stubborn girl who always got her way. After a terrible accident crippled her for life, she became very rebellious. The Sky Pilot (the missionary) visited her and told a parable of the canyon. 'At first there were no canyons, just a wide, open prairie. One day the Master of the Prairie asked, \"Where are your flowers?\" The Prairie said, \"Master, I have no seeds.\"'",
              "simpZh": "拉尔夫·康纳讲了一个叫格温的女孩的故事。格温任性、野惯了，总是我行我素。一天她出了可怕的事故，终身残废了，变得十分叛逆。那位叫‘天空引航员’的宣教士来看她，讲了一个峡谷的比喻。‘起初没有峡谷，只有宽广开阔的大草原。一天，草原的主人在草地上走，问草原：“你的花在哪里？”草原说：“主啊，我没有种子。”’"

            {
              "en": "I'll stay where You've put me; I'll work, dear Lord, <br>Though the field be narrow and small, <br>And the ground be <span class=\"vocab-trigger\" data-vocab=\"fallow\">fallow<\/span>, and the stones lie thick, <br>And there seems to be no life at all. <br>The field is Thine own, only give me the seed, <br>I'll sow it with never a fear; <br>I'll till the dry soil while I wait for the rain, <br>And rejoice when the green blades appear; <br>I'll work where You've put me.",
              "zh": "我要留在祢所安置之处作工；亲爱的救主，尽管这田地又窄又小，土地荒芜，乱石遍布，似乎全无生气。这田地是祢自己的，只求祢给我种子，我必将它撒下，毫不惧怕；我要耕这干土，一面等候雨水，当青苗出现时就欢喜；我要在祢所安置之处作工。",

              "simpZh": "我要留在祢放我的地方工作，主啊，虽然田地又窄又小，土还没耕种过，到处是石头，好像一点生命也没有。这田是祢的，只要给我种子，我就不怕地撒下去。我一面等着雨，一面耕干地，青苗出来时我就欢喜。我要在祢放我的地方作工。"

              "zh": "我要留在祢所安置之处；亲爱的救主，我愿承担日间的重担与炎热，时刻完全信靠祢；到了黄昏，我要将沉甸甸的禾捆放在祢脚前。然后，当我地上的工作完毕收工时，在永恒光辉的照耀下，一生的记录合起，我必发现，留下比离去更好；我要留在祢所安置之处。",

        {
          "sectionId": 7,
          "heading": "March 18",
          "audio": "audio/Streams in the Desert - March 18.m4a",
          "paragraphs": [
            {
              "en": "He answered nothing (Mark 15:3).",
              "zh": "祂什么都不回答。（马可福音15:3）",
              "simpEn": "He answered nothing.",
              "simpZh": "祂什么都不回答。"
            },
            {
              "en": "There is no <span class=\"vocab-trigger\" data-vocab=\"spectacle\">spectacle<\/span> in all the Bible so <span class=\"vocab-trigger\" data-vocab=\"sublime\">sublime<\/span> as the silent Savior answering not a word to the men who were <span class=\"vocab-trigger\" data-vocab=\"maligning\">maligning<\/span> Him, and whom He could have laid <span class=\"vocab-trigger\" data-vocab=\"prostrate\">prostrate<\/span> at His feet by one look of Divine power, or one word of fiery <span class=\"vocab-trigger\" data-vocab=\"rebuke\">rebuke<\/span>. But He let them say and do their worst and He stood in <span class=\"vocab-trigger\" data-vocab=\"THE POWER OF STILLNESS\">THE POWER OF STILLNESS<\/span>—God's holy silent Lamb. There is a stillness that lets God work for us, and holds our peace; the stillness that ceases from its <span class=\"vocab-trigger\" data-vocab=\"contriving\">contriving<\/span> and its <span class=\"vocab-trigger\" data-vocab=\"self-vindication\">self-vindication<\/span>, and its <span class=\"vocab-trigger\" data-vocab=\"expedients\">expedients<\/span> of wisdom and forethought, and lets God provide and answer the cruel blow, in His own unfailing, faithful love. How often we lose God's <span class=\"vocab-trigger\" data-vocab=\"interposition\">interposition<\/span> by taking up our own cause and striking for our defense. God give us this silent power, this <span class=\"vocab-trigger\" data-vocab=\"conquered spirit\">conquered spirit<\/span>! —A. B. Simpson.",
              "zh": "全本圣经中，没有比静默的救主一言不答那些毁谤祂的人更崇高的景象了；祂本可用神圣大能的一个眼神，或一句烈火般的斥责，使他们仆倒在祂脚前。但祂任凭他们肆行其恶，祂站立在「宁静的力量」之中——神之圣洁静默的羔羊。有一种宁静，能让神为我们动工，并保守我们平安；那是一种停止筹谋、停止自辩、停止那些聪明远虑之策略的宁静，让神用祂自己永不落空、信实的爱来预备并回答那残酷的打击。我们多么经常因为自行处理、自行防御，而失去了神的干预。愿神将这种静默的能力、这种得胜的灵赐给我们！——宣信",
              "simpEn": "There is no more awe-inspiring sight in the Bible than the silent Savior, answering nothing to those who insulted Him. He could have struck them down with one look of divine power or one fiery word. But He let them do their worst and stood in the power of stillness—God's holy silent Lamb. There is a stillness that lets God work for us and keeps our peace—a stillness that stops our scheming, self-defence, and clever plans, and lets God answer the cruel blow with His unfailing love. How often we miss God's help by taking up our own cause. God give us this silent power, this conquered spirit!",
              "simpZh": "圣经里最令人敬畏的景象，就是那位安静的救主，对毁谤祂的人一言不答。祂只要用神圣大能看一眼，或者说一句烈火般的话，就能把他们打倒在地。但祂任凭他们作恶，自己站在安静的力量中——神那圣洁沉默的羔羊。有一种安静能让神为我们工作，保守我们平安；这种安静停止我们自己的筹算、自辩和聪明的办法，让神用祂永不失败的信实慈爱来回答那残酷的打击。我们多少次因为自己出头、自己辩护，就失去了神的干预。求神把这安静的能力、这被征服的灵赐给我们！"
            },
            {
              "en": "The day when Jesus stood alone <br>And felt the hearts of men like stone, <br>And knew He came but to <span class=\"vocab-trigger\" data-vocab=\"atone\">atone<\/span>— <br>That day \"He held His peace.\" <br>They witnessed falsely to His word, <br>They bound Him with a cruel cord, <br>And mockingly proclaimed Him Lord; <br>\"But Jesus held His peace.\" <br>They spat upon Him in the face, <br>They dragged Him on from place to place, <br>They <span class=\"vocab-trigger\" data-vocab=\"heaped\">heaped<\/span> upon Him all disgrace; <br>\"But Jesus held His peace.\" <br>My friend, have you for far much less, <br>With rage, which you called righteousness, <br>Resented <span class=\"vocab-trigger\" data-vocab=\"slights\">slights<\/span> with great distress? <br>Your Saviour \"held His peace.\" —L. S. P.",
              "zh": "那天耶稣独自站立，感觉人心如石，知道祂来只为赎罪——那天「祂闭口不言」。他们作假见证诬蔑祂的话，他们用残忍的绳索捆绑祂，并戏弄地称祂为王；「但耶稣闭口不言。」他们吐唾沫在祂脸上，拖着祂从一处到另一处，将一切羞辱堆在祂身上；「但耶稣闭口不言。」我的朋友，你是否为着远不及此的小事，就以你称为公义的愤怒，大大恼恨那些轻慢？你的救主却「闭口不言」。——L. S. P.",
              "simpEn": "The day Jesus stood alone, feeling men's hearts like stone, knowing He came only to atone—that day He held His peace. They falsely testified, bound Him with cruel cords, and mockingly called Him Lord; but Jesus held His peace. They spat in His face, dragged Him from place to place, heaped all disgrace on Him; but Jesus held His peace. My friend, have you for much smaller things, with rage you called righteousness, resented insults with great distress? Your Saviour held His peace.",
              "simpZh": "那天耶稣独自站着，感觉人心硬如石头，知道祂来只是为赎罪——那天祂闭口不言。他们假见证冤枉祂，用残忍的绳子绑祂，戏弄地称祂为王；但耶稣闭口不言。他们吐口水在祂脸上，拖着祂走来走去，把一切羞耻堆在祂身上；但耶稣闭口不言。我的朋友，你是不是为着远远不及这些的小事，用你称为公义的发怒，大大地怨恨那些轻慢呢？你的救主却闭口不言。"
            }

            {
              "en": "Many a waiting hour was needful to enrich the harp of David, and many a waiting hour in the wilderness will gather for us a psalm of \"thanksgiving, and the voice of melody,\" to cheer the hearts of fainting ones here below, and to make glad our Father's house on high.",
              "zh": "许多等候的时辰是为丰富大卫的琴所必需的；同样，在旷野中许多等候的时辰，也要为我们谱出一首「称谢与歌唱之声」的诗篇，好在这地上鼓舞疲惫之人的心，也使高天之上我们父的家欢欣喜乐。",
              "simpEn": "Many hours of waiting were needed to make David's harp rich. Many waiting hours in the wilderness will gather for us a song of thanksgiving and melody to cheer tired hearts on earth and make God's house in heaven glad.",
              "simpZh": "许多等候的时间是为了让大卫的琴更加丰富。我们在旷野中许多等候的时间，也会为我们织成一首感谢和歌唱的歌，安慰地上疲倦的人，使天上神的家快乐。"
            },
            {
              "en": "What was the preparation of the son of Jesse for the songs like unto which none other have ever sounded on this earth? The outrage of the wicked, which brought forth cries for God's help. Then the faint hope in God's goodness blossomed into a song of rejoicing for His mighty <span class=\"vocab-trigger\" data-vocab=\"deliverances\">deliverances<\/span> and <span class=\"vocab-trigger\" data-vocab=\"manifold mercies\">manifold mercies<\/span>. Every sorrow was another string to his harp; every deliverance another theme for praise.",
              "zh": "这位耶西的儿子为这地上从未有过的诗歌所作的预备是什么呢？是恶人的凌辱，那些迫使他呼求神帮助的冤屈。然后，对神良善那微弱的盼望，因祂大能的拯救和丰盛的怜悯，绽放成了欢欣之歌。每一次忧伤都是他琴上的一根新弦；每一次拯救都是赞美的另一主题。",
              "simpEn": "How was Jesse's son prepared for songs unlike any others on earth? Through the wicked's attacks that made him cry out to God. Then his faint hope in God's goodness bloomed into joyful songs for God's mighty rescues and countless mercies. Each sorrow added a string to his harp; each rescue gave another reason for praise.",
              "simpZh": "耶西的儿子怎么能写出世上没有人能比的诗歌？是因为坏人欺负他，让他向神求救。然后他原本微弱的对神良善的信心，因为神大能的拯救和数不清的恩典，就变成了快乐歌唱。每一次忧伤都为他加了一根琴弦；每一次拯救都给了赞美的新题目。"
            },
            {
              "en": "One thrill of anguish spared, one blessing unmarked or <span class=\"vocab-trigger\" data-vocab=\"unprized\">unprized<\/span>, one difficulty or danger evaded, how great would have been our loss in that thrilling <span class=\"vocab-trigger\" data-vocab=\"Psalmody\">Psalmody<\/span> in which God's people today find the expression of their grief or praise!",
              "zh": "若少受一阵痛楚，若错过一件未留意或不珍惜的祝福，若逃避了一个困难或危险，那么今天神的子民在其中表达忧伤与赞美的这震撼人心的圣诗集中，我们将蒙受何等大的损失！",
              "simpEn": "If one moment of pain had been spared, one blessing overlooked or not valued, one difficulty or danger escaped, what a great loss it would have been for us in that powerful book of Psalms, where God's people today find words for their grief or praise!",
              "simpZh": "如果少了一次痛苦，忽略了一件没有留意的祝福，逃掉了一个困难或危险，那么我们今天的诗篇就会多么贫乏！神的子民今天在诗篇里找到表达悲伤和赞美的话语。"
            },
            {
              "en": "To wait for God, and to suffer His will, is to know Him in the <span class=\"vocab-trigger\" data-vocab=\"fellowship of His sufferings\">fellowship of His sufferings<\/span>, and to be <span class=\"vocab-trigger\" data-vocab=\"conformed to the likeness\">conformed to the likeness<\/span> of His Son. So now, if the vessel is to be enlarged for spiritual understanding, be not <span class=\"vocab-trigger\" data-vocab=\"affrighted\">affrighted<\/span> at the wider sphere of suffering that awaits you. The Divine capacity of sympathy will have a more extended sphere, for the breathing of the Holy Ghost in the new creation never made a <span class=\"vocab-trigger\" data-vocab=\"stoic\">stoic<\/span>, but left the heart's affection tender and true. —Anna Shipton. <br>\"He tested me ere He entrusted me\" (1 Tim. 1:12, Way's Trans.).",
              "zh": "等候神，顺服祂的旨意忍受苦楚，就是在与祂一同受苦的相交中认识祂，并模成祂儿子的形象。所以，如果器皿要扩大以容纳属灵的悟性，就不要因那等候你的更广苦难领域而惊惶。神圣的同情心将获得更广阔的空间，因为圣灵在新生造中运行所生的，绝不是麻木的斯多亚派，乃是留下了温柔真实的爱心。——安娜·希普顿。「祂先试验我，然后把重任托付我。」（提摩太前书1:12，韦氏译本）",
              "simpEn": "Waiting for God and suffering His will is to know Him by sharing His sufferings and to become more like His Son. So if the container must be enlarged for spiritual understanding, don't be terrified by the wider suffering ahead. Your God-given sympathy will reach further, because the Holy Spirit doesn't make us unfeeling stoics but keeps the heart tender and true. —Anna Shipton. 'He tested me before He trusted me' (1 Tim. 1:12).",
              "simpZh": "等候神，忍受祂的旨意，就是在和基督一同受苦中认识祂，并变得更像祂的儿子。所以，如果要扩大容量来明白属灵的事，就不要害怕前面更大的苦难。神给你的同情心将扩展得更广，因为圣灵不会把我们变成无情的人，而是保守我们的心又温柔又真诚。—安娜·希普顿。‘祂在把任务交给我之前，先试验了我。’"
            }

          "sectionId": 2,
          "heading": "March 20",

          "paragraphs": [
            {
              "en": "As sorrowful, yet always rejoicing (2Cor. 6:10).",
              "zh": "似乎忧愁，却是常常快乐的。（哥林多后书6:10）",
              "simpEn": "Sorrowful, yet always rejoicing.",
              "simpZh": "虽然忧愁，却总是欢喜。"
            },
            {
              "en": "The <span class=\"vocab-trigger\" data-vocab=\"stoic\">stoic<\/span> scorns to shed a tear, the Christian is not forbidden to weep. The soul may be dumb with excessive grief, as the <span class=\"vocab-trigger\" data-vocab=\"shearer's scissors\">shearer's scissors<\/span> pass over the quivering flesh; or, when the heart is on the point of breaking beneath the meeting surges of trial, the sufferer may seek relief by crying out with a loud voice. But there is something even better.",
              "zh": "斯多亚派藐视流泪，而基督徒并未被禁止哀哭。当剪毛之人的剪刀擦过颤抖的身体时，灵魂或许会因过度的忧伤而哑然；或者，当心在那扑面而来的试炼波涛下几乎碎裂时，受苦者也许会以大声呼喊寻求舒缓。然而，还有更美的事。",
              "simpEn": "The stoic is too proud to cry; a Christian is not forbidden to weep. The soul may be speechless from deep grief, like when the shearer's blades pass over trembling flesh; or when the heart is about to break under crashing waves of trial, the sufferer may cry out loudly. But there is something even better.",
              "simpZh": "斯多亚派看不起流泪的人，但基督徒是可以哭的。人在很深的悲伤里可能会哑口无言，像剪羊毛的刀擦过颤抖的身体；或者当心被接二连三的苦难击打快要碎掉时，受苦的人可能会大声喊叫来寻求解脱。但还有更好的。"
            },
            {
              "en": "They say that springs of sweet fresh water well up amid the <span class=\"vocab-trigger\" data-vocab=\"brine\">brine<\/span> of salt seas; that the fairest Alpine flowers bloom in the wildest and most rugged mountain passes; that the noblest psalms were the outcome of the profoundest agony of soul.",
              "zh": "人说，甘甜的泉源在咸海的盐水中涌流；最美的阿尔卑斯花开在最荒凉崎岖的山隘中；最崇高的诗篇乃出自最深沉的灵魂痛苦。",
              "simpEn": "They say that fresh water springs up in the salty sea; the most beautiful Alpine flowers bloom in the wildest, roughest mountain paths; and the greatest psalms came from the deepest soul agony.",
              "simpZh": "有人说，甜水泉会从咸海里涌出来；最美的阿尔卑斯花开在最荒凉崎岖的山路上；最伟大的诗篇来自最深的灵魂痛苦。"
            },
            {
              "en": "Be it so. And thus amid manifold trials, souls which love God will find reasons for bounding, leaping joy. Though deep call to deep, yet the Lord's song will be heard in silver <span class=\"vocab-trigger\" data-vocab=\"cadence\">cadence<\/span> through the night. And it is possible in the darkest hour that ever swept a human life to bless the God and Father of our Lord Jesus Christ. Have you learned this lesson yet? Not simply to endure God's will, nor only to choose it; but to rejoice in it with <span class=\"vocab-trigger\" data-vocab=\"joy unspeakable\">joy unspeakable<\/span> and full of glory. —<span class=\"vocab-trigger\" data-vocab=\"Tried as by Fire\">Tried as by Fire<\/span>.",
              "zh": "诚然如此。因此在诸般试炼中，爱神的灵魂将找到涌跃、雀跃喜乐的理由。虽然深渊与深渊相应，主的歌仍要穿过黑夜，发出银铃般的韵律。在一个压倒人生最黑暗的时刻，仍然可以称颂我们主耶稣基督的父神。你已学会这功课了吗？不单是忍受神的旨意，也不单是选择它；而是要以说不出来、满有荣光的大喜乐来在其中欢喜。——《如同火炼》",
              "simpEn": "So it is. In the midst of many trials, souls who love God will find reasons for leaping joy. Though deep calls to deep, the Lord's song will be heard in silver tones through the night. It is possible in the darkest hour of a human life to bless the God and Father of our Lord Jesus Christ. Have you learned this? Not just to endure God's will, not even just to choose it; but to rejoice in it with joy too great for words and full of glory.",
              "simpZh": "就是这样。在种种试炼中，爱神的灵魂会找到欢喜跳跃的理由。虽然深渊呼唤深渊，主的歌声仍会像银铃一样穿过黑夜。在人生最黑暗的时刻，还是可以称颂主耶稣基督的父神。你学会这个功课了吗？不只是忍受神的旨意，也不只是选择它；而是要用说不出来、充满荣耀的大喜乐来在其中欢喜。"
            }

            {
              "en": "\"<span class=\"vocab-trigger\" data-vocab=\"Praying through\">Praying through<\/span>\" might be defined as praying one's way into full faith, emerging while yet praying into the <span class=\"vocab-trigger\" data-vocab=\"assurance\">assurance<\/span> that one has been accepted and heard, so that one becomes actually aware of receiving, by <span class=\"vocab-trigger\" data-vocab=\"firmest anticipation\">firmest anticipation<\/span> and in advance of the event, the thing for which he asks.",
              "zh": "「祷告透」可定义为一路祷告进入全备信心，在还祷告着的时候就进入已被接纳并蒙垂听的把握中，以至人能以最坚定的预期，在事情发生之前就已经意识到自己正在领受所求的事。",

              "zh": "我们要记得，如果我们定睛注视神话语的不变性，而不是这变化无常世界的不可靠，那么地上就没有任何环境能拦阻祂话语的成就。神愿我们在没有其他确据时相信祂的话语，然后祂就准备照着我们的信心来赏赐我们。",

        {
          "sectionId": 4,
          "heading": "March 22",
          "audio": "audio/Streams in the Desert - March 22.m4a",
          "paragraphs": [
            {
              "en": "And when forty years were expired, there appeared to him in the wilderness of Mount Sinai an angel of the Lord in a flame of fire in a bush ... saying ... I have seen the <span class=\"vocab-trigger\" data-vocab=\"affliction\">affliction<\/span> of my people which is in Egypt, and I have heard their <span class=\"vocab-trigger\" data-vocab=\"groaning\">groaning<\/span>, and am come down to deliver them. And now come, I will send thee into Egypt (Acts 7:30, 32, 34).",
              "zh": "满了四十年，在西乃山的旷野，有一位天使从荆棘火焰中向摩西显现……说……我的百姓在埃及所受的困苦，我实在看见了；他们悲叹的声音，我也听见了；我下来要救他们。你来！我要差你往埃及去。（使徒行传7:30,32,34）",
              "simpEn": "After forty years, an angel appeared to Moses in the flames of a burning bush in the wilderness of Mount Sinai, saying, 'I have seen the misery of my people in Egypt and heard their groaning, and I have come down to rescue them. Now come, I will send you to Egypt.'",
              "simpZh": "过了四十年，在西乃山的旷野，有一位天使在烧着的荆棘火焰里向摩西显现，说：‘我已经看见我的百姓在埃及所受的苦，也听见了他们的哀声，我下来要救他们。现在你来，我要差你去埃及。’"
            },
            {
              "en": "That was a long wait in preparation for a great mission. When God delays, He is not inactive. He is getting ready His instruments, He is <span class=\"vocab-trigger\" data-vocab=\"ripening\">ripening<\/span> our powers; and at the appointed moment we shall arise equal to our task. Even Jesus of Nazareth was thirty years in <span class=\"vocab-trigger\" data-vocab=\"privacy\">privacy<\/span>, growing in wisdom before He began His work. —Dr. Jowett.",
              "zh": "那是一次漫长等候中的预备，为了一个伟大的使命。当神迟延时，祂并非无事可做。祂在预备祂的器具，在成熟我们的能力；到了指定的时刻，我们就必兴起，足以胜任任务。就连拿撒勒人耶稣也在隐居中度过三十年，在智慧中成长，然后才开始祂的工作。——乔伊特博士",
              "simpEn": "That was a long wait in preparation for a great mission. When God delays, He is not idle. He is preparing His tools, maturing our powers; and at the right time we will rise up equal to our task. Even Jesus spent thirty years in private, growing in wisdom before He began His work.",
              "simpZh": "那是为重大使命而进行的漫长预备。神延迟的时候，并不是什么都没做。祂在预备祂的器皿，使我们能力成熟；到了指定的时候，我们就能胜任我们的任务。连耶稣也是在安静中过了三十年，在智慧中成长，然后才开始工作的。"
            },
            {
              "en": "God is never in a hurry but spends years with those He expects to greatly use. He never thinks the days of preparation too long or too dull. The hardest ingredient in suffering is often time. A short, sharp pang is easily borne, but when a sorrow drags its weary way through long, <span class=\"vocab-trigger\" data-vocab=\"monotonous\">monotonous<\/span> years, and day after day returns with the same dull routine of hopeless agony, the heart loses its strength, and without the grace of God, is sure to sink into the very <span class=\"vocab-trigger\" data-vocab=\"sullenness\">sullenness<\/span> of despair.",
              "zh": "神从来不匆忙，祂会花许多年日与那些祂打算重用的人同在。祂从不认为预备的日子太长或太沉闷。苦难中最难熬的成分往往是时间。一阵短促剧烈的痛楚尚易忍受，但当一段悲伤在漫长单调的年日中拖曳前行，日复一日带着同样无望的枯燥痛苦回来时，人心就会失力，若没有神的恩典，必定沉入绝望的阴沉之中。",
              "simpEn": "God is never in a hurry; He spends years with those He intends to use greatly. He never thinks the preparation days are too long or too boring. The hardest part of suffering is often time. A short sharp pain is easy to bear, but when sorrow drags through long, monotonous years, returning each day with the same hopeless pain, the heart loses strength and, without God's grace, sinks into the gloom of despair.",
              "simpZh": "神从来不匆忙，祂会花很多年和那些祂要重用的人在一起。祂从不觉得预备的日子太长或太无聊。苦难中最难的部分常常是时间。一阵短暂剧烈的疼痛还容易忍受，但若悲伤拖过漫长单调的年月，天天带着同样无望的痛苦回来，心就会失去力量，若没有神的恩典，就一定会沉入绝望的阴沉里。"
            },
            {
              "en": "Joseph's was a long trial, and God often has to burn His lessons into the depths of our being by the fires of <span class=\"vocab-trigger\" data-vocab=\"protracted pain\">protracted pain<\/span>. \"He shall sit as a refiner and purifier of silver,\" but He knows how long, and like a true goldsmith He stops the fires the moment He sees His image in the glowing metal.",
              "zh": "约瑟的试炼是漫长的，而神常须用长久痛苦的火焰，把祂的教训烙印在我们存在的深处。「祂必坐下如炼净银子的」，但祂知道要炼多久，就像一位真正的金匠，一看见自己形象映在灼热金属中，就立刻止住火焰。",
              "simpEn": "Joseph's trial was long, and God often has to burn His lessons into the depths of our being through long-lasting pain. 'He will sit as a refiner and purifier of silver,' but He knows how long; like a true goldsmith, He stops the fire the moment He sees His image in the glowing metal.",

            }

              "en": "Out of the <span class=\"vocab-trigger\" data-vocab=\"spoils\">spoils<\/span> won in battle did they <span class=\"vocab-trigger\" data-vocab=\"dedicate\">dedicate<\/span> to maintain the house of the Lord (1Chron. 26:27).",

              "zh": "最近在英国的一场婚礼上发生了一件不寻常的事。一位出身巨富、社会地位很高的年轻人，十岁时因意外失明，虽然眼盲仍在大学里取得荣誉，他赢得了一位美丽的新娘，尽管他从未见过她的面容。婚礼前不久，他接受了一连串专家的治疗，而高潮就在他婚礼那天临到。",
              "simpEn": "A remarkable event occurred at a wedding in England. A wealthy, high-society young man, blind since age ten, had won university honors despite his blindness and had won a beautiful bride, though he had never seen her face. Shortly before the wedding, he underwent expert treatment, and the climax came on his wedding day.",
              "simpZh": "英国一场婚礼上发生了一件特别的事。一个有钱有地位的年轻人，十岁时意外失明，虽然看不见却获得大学荣誉，他赢得了一位美丽的新娘，却从未见过她的脸。婚礼前不久他接受专家治疗，高潮就在婚礼那天。"

              "simpZh": "那天到了，礼物和宾客都来了，有内阁大臣、将军、主教和许多男女宾客。新郎穿着结婚礼服，眼睛还蒙着纱布，和父亲一起坐车到教堂。那位著名的眼科医生在法衣室里迎见他们。"

              "simpEn": "As she neared the altar, with the soft wedding march playing, she saw a strange group. The father stood with his son, and the great oculist was cutting away the last bandage. The bridegroom stepped forward with the jerky uncertainty of someone who can't believe he is awake. A beam of rose light from a stained-glass window fell on his face, but he didn't seem to see it.",
              "simpZh": "当她走近圣坛，婚礼进行曲的柔和音乐飘在教堂中时，她看见一群奇怪的人。父亲和儿子站在那里，那位眼科名医正在剪开最后一条绷带。新郎向前迈出一步，脚步因不敢相信自己醒着而微微发颤。一束玫瑰色的光从彩窗照在他脸上，但他似乎没看见。"

              "en": "Did he see anything? Yes! Recovering in an instant his steadiness of <span class=\"vocab-trigger\" data-vocab=\"mien\">mien<\/span>, and with a dignity and joy never before seen in his face, he went forward to meet his bride. They looked into each other's eyes, and one would have thought that his eyes would never wander from her face. \"At last!\" she said. \"At last!\" he echoed solemnly, bowing his head. That was a scene of great dramatic power, and no doubt of great joy, and is but a mere suggestion of what will actually take place in Heaven when the Christian who has been walking through this world of trial and sorrow, shall see HIM face to face.",
              "zh": "他看见什么了吗？看见了！他瞬间恢复了从容的神态，脸上呈现出从未有过的尊贵和喜乐，向前迎向他的新娘。他们彼此注视对方的眼睛，人还以为他的眼绝不会再离开她的面庞。「终于！」她说。「终于！」他郑重地回应，低下了头。那是一幕极具冲击力、无疑也充满大喜乐的景象，而这不过是那必将发生在天上的真实情形的一个微小暗示：当那穿行在试炼与忧伤世上的基督徒，终于面对面看见祂的时候。",
              "simpEn": "Did he see? Yes! Instantly he regained his calm, and with a dignity and joy never before seen on his face, he went to meet his bride. They looked into each other's eyes, and one would have thought he'd never look away. 'At last!' she said. 'At last!' he echoed solemnly. That dramatic, joyful scene is just a hint of what will happen in heaven when the Christian who has walked through this world of trial and sorrow will see Him face to face.",
              "simpZh": "他看见了吗？看见了！他一下子恢复了平稳的神态，脸上显露出前所未有的尊贵和喜乐，向前迎向他的新娘。他们彼此注视对方的眼睛，旁人还以为他的眼睛永远不会离开她的脸。‘终于！’她说。‘终于！’他郑重地重复。那一幕充满力量和喜乐，而这不过是将来在天上真正要发生之事的一个小小暗示：那在世上走过试炼和忧伤的基督徒，有一天要面对面看见祂。"

              "en": "And it shall come to pass, as soon as the soles of the feet of the priests that bear the ark of the Lord, the Lord of all the earth, shall rest in the waters of Jordan, that the waters of Jordan shall be <span class=\"vocab-trigger\" data-vocab=\"cut off\">cut off<\/span> from the waters that come down from above; and they shall stand upon a <span class=\"vocab-trigger\" data-vocab=\"heap\">heap<\/span> (Joshua 3:13).",

              "zh": "勇敢的利未人！谁能不钦佩他们，抬着约柜直接踏入河中；因为直到他们的脚浸入水时（15节），水才分开。神未曾应许别样。神尊重信心——那「顽强的信心」，只见应许，且「单看应许」。你可以想象，众民看着这些圣洁的人向前走，旁边有人会说：「我可不敢冒那个险！伙计，约柜会被水冲走的！」并非如此；「祭司在干地上站定。」",
              "simpEn": "Brave Levites! They carried the Ark right into the river, for the waters didn't part until their feet touched the water (v. 15). God hadn't promised anything else. God honors faith—the kind of stubborn faith that sees the promise and looks only to that. Imagine the people watching; some might say, 'You wouldn't catch me risking that! The ark will be swept away!' Not so; 'the priests stood firm on dry ground.'",
              "simpZh": "勇敢的利未人！他们抬着约柜直接踏入河中，因为水直到他们的脚踩进水里才分开。神没有应许别的。神尊重信心——那种顽固的信心，只看见应许，只仰望应许。你可以想象百姓看着这些圣洁的人往前走，旁边有人说：‘我可不敢冒那个险！约柜会被冲走的！’不是这样；‘祭司稳稳站在干地上。’"
            },
            {
              "en": "We must not overlook the fact that faith on our part helps God to carry out His plans. \"Come up to the help of the Lord.\" The Ark had <span class=\"vocab-trigger\" data-vocab=\"staves\">staves<\/span> for the shoulders. Even the Ark did not move itself; it was carried. When God is the architect, men are the masons and laborers. Faith <span class=\"vocab-trigger\" data-vocab=\"assists\">assists<\/span> God. It can stop the mouth of the lions and <span class=\"vocab-trigger\" data-vocab=\"quench\">quench<\/span> the violence of fire. It yet honors God, and God honors it. Oh, for this faith that will go on, leaving God to fulfill His promise when He sees fit! Fellow Levites, let us shoulder our load, and do not let us look as if we were carrying God's coffin. It is the Ark of the living God! Sing as you march towards the flood! —Thomas Champness.",
              "zh": "我们不可忽略，我们这一面的信心有助于神实行祂的计划。「上去帮助耶和华。」约柜有穿杠的环。连约柜也不能自己移动，必须被抬着。当神是建筑师时，人就是石匠和工人。信心协助神。它能封住狮子的口，熄灭烈火的猛势。它尊重神，神也尊重它。哦，求赐这种继续前行、让神在祂看为合宜时成就应许的信心！利未的同伴们，让我们扛起担子，不要让我们看似在抬神的棺木。这是永生神的约柜！向洪水前进时放声歌唱吧！——托马斯·钱普尼斯",
              "simpEn": "Don't overlook that our faith helps God carry out His plans. 'Come up to the help of the Lord.' The Ark had poles for shoulders; even the Ark didn't move itself—it was carried. When God is the architect, people are the builders. Faith assists God. It can shut lions' mouths and put out raging fire. It honors God, and God honors it. Oh, for this faith that keeps going, leaving God to fulfill His promise when He sees fit! Let's shoulder our load and not look like we're carrying God's coffin. It's the Ark of the living God! Sing as you march toward the flood!",
              "simpZh": "不要忽略，我们的信心能帮助神实现祂的计划。‘上去帮助耶和华。’约柜有杠让人扛抬，连约柜也不能自己移动，必须被抬。当神是设计师时，人是建筑工人。信心协助神。它能封住狮子的口，熄灭猛火。它尊重神，神也尊重它。哦，求赐这样的信心，继续向前，让神在祂看为好时成就应许！利未的同伴们，让我们扛起担子，不要看起来像在抬神的棺材。这是永生神的约柜！向洪水前进时放声歌唱吧！"

          "paragraphs": [
            {
              "en": "Consider the lilies, how they grow (Matt. 6:28).",
              "zh": "你想野地里的百合花，怎么长起来。（马太福音6:28）",
              "simpEn": "Think about the lilies and how they grow.",
              "simpZh": "想想野地里的百合花是怎样生长的。"
            },
            {
              "en": "\"I need oil,\" said an ancient monk; so he planted an olive <span class=\"vocab-trigger\" data-vocab=\"sapling\">sapling<\/span>. \"Lord,\" he prayed, \"it needs rain that its tender roots may drink and swell. Send gentle showers.\" And the Lord sent gentle showers. \"Lord,\" prayed the monk, \"my tree needs sun. Send sun, I pray Thee.\" And the sun shone, <span class=\"vocab-trigger\" data-vocab=\"gilding\">gilding<\/span> the dripping clouds. \"Now frost, my Lord, to <span class=\"vocab-trigger\" data-vocab=\"brace its tissues\">brace its tissues<\/span>,\" cried the monk. And behold, the little tree stood sparkling with frost, but at evening it died.",
              "zh": "「我需要油，」一位古代修士说；于是他栽了一棵橄榄树苗。「主啊，」他祷告说，「它需要雨水，使嫩根得饮而膨胀。求赐柔和的阵雨。」主便赐下柔和的阵雨。「主啊，」修士又祷告说，「我的树需要阳光。求祢赐下阳光。」于是阳光照耀，给滴水的云层镀上金辉。「主啊，现在赐下霜，好强壮它的组织，」修士喊道。看哪，小树披着冰霜闪闪发光，但到了晚上，它死了。",
              "simpEn": "'I need oil,' said an ancient monk, so he planted an olive sapling. He prayed, 'Lord, it needs rain so its tender roots can drink and grow. Send gentle showers,' and the Lord did. Then he prayed, 'Lord, my tree needs sun,' and the sun shone, gilding the dripping clouds. 'Now frost, my Lord, to strengthen its fibers,' the monk cried. The little tree stood sparkling with frost, but by evening it had died.",
              "simpZh": "一位古修士说‘我需要油’，就种了一棵橄榄树苗。他祷告说：‘主啊，它需要雨水让嫩根喝饱长大，求赐柔和的阵雨。’主就给了。他又祷告：‘主啊，我的树需要阳光。’太阳就照耀，给云彩镀上金光。他喊说：‘主啊，现在求霜来强壮它的组织。’小树披着霜闪闪发光，但到晚上就死了。"
            },
            {
              "en": "Then the monk sought the cell of a brother monk, and told his strange experience. \"I, too, planted a little tree,\" he said, \"and see! it <span class=\"vocab-trigger\" data-vocab=\"thrives\">thrives<\/span> well. But I <span class=\"vocab-trigger\" data-vocab=\"entrust\">entrust<\/span> my tree to its God. He who made it knows better what it needs than a man like me. I laid no condition. I fixed not ways or means. 'Lord, send what it needs,' I prayed, 'storm or sunshine, wind, rain, or frost. Thou hast made it and Thou dost know.'\"",
              "zh": "于是那修士去了一位弟兄的静室，讲述他那奇特的经历。「我也栽了一棵小树，」那位弟兄说，「你看，它长得何等茂盛。但我将我的树交托给它的神。造它的那位比我这样的人更知道它需要什么。我不设条件，也不限定方式方法。我祷告说：『主啊，差它所需的来吧，风暴或阳光，风、雨或霜。祢造了它，祢知道。』」",
              "simpEn": "Then the monk went to a brother monk's cell and told his strange story. 'I also planted a little tree,' the brother said, 'and see, it thrives well. But I entrust my tree to its God. He who made it knows better what it needs than a man like me. I set no conditions. I didn't fix the ways or means. I prayed, \"Lord, send what it needs—storm or sunshine, wind, rain, or frost. You made it and You know.\"'",
              "simpZh": "那修士又去找一位弟兄，把奇怪经历告诉他。弟兄说：‘我也种了一棵小树，你看它长得多好。但我把我的树交给它的神。造它的那位比我知道它需要什么。我不设条件，不规定方法。我祷告说：“主啊，差它需要的一切来——风暴或阳光，风、雨或霜。是祢造的，祢知道。”’"
            },
            {
              "en": "Yes, leave it with Him, <br>The lilies all do, <br>And they grow— <br>They grow in the rain, <br>And they grow in the dew— <br>Yes, they grow: <br>They grow in the darkness, all hid in the night— <br>They grow in the sunshine, revealed by the light— <br>Still they grow. <br>Yes, leave it with Him, <br>'Tis more dear to His heart, <br>You will know, <br>Than the lilies that bloom, <br>Or the flowers that start <br>'Neath the snow: <br>Whatever you need, if you seek it in prayer, <br>You can leave it with Him—for you are His care. <br>You, you know.",
              "zh": "是的，交给祂吧，百合花都如此，它们便生长——在雨中生长，在露中生长——是的，它们生长：在黑暗中生长，全藏在夜里——在阳光下生长，被光线显明——它们仍在生长。是的，交给祂吧，你比盛开的百合花或雪下探头的花朵在祂心中更珍贵，你要知道：无论你需要什么，只要在祷告中寻求，就可以交给祂——因为你是祂所顾念的。你，你知道。",
              "simpEn": "Yes, leave it with Him, as the lilies do, and they grow—in rain, in dew, in darkness hidden by night, in sunshine revealed by light—still they grow. Yes, leave it with Him; you are dearer to His heart than blooming lilies or flowers under the snow. Whatever you need, if you seek it in prayer, you can leave it with Him—for you are His care. You know this.",
              "simpZh": "是的，交给祂吧，像百合花一样，它们就长——在雨中长，在露中长——是的，它们长：在黑暗中长，藏在夜里——在阳光下长，被光显明——它们一直在长。是的，交给祂吧，你在祂心里比盛开的百合花、比雪下冒出的花朵更珍贵。无论你需要什么，只要在祷告中寻求，就可以交给祂——因为你是祂所顾念的。你，你知道。"

  (function() {
    const errorBox = document.getElementById("error-message");
    function showError(msg) {
      errorBox.textContent = "❌ " + msg;
      errorBox.style.display = "block";
    }
    const dataEl = document.getElementById("bookDataScript");
    if (!dataEl) { showError("bookDataScript element not found"); return; }
    let bookData;
    try {
      bookData = JSON.parse(dataEl.textContent);
    } catch (e) {
      showError("JSON parse error: " + e.message);
      return;
    }
    if (!bookData.chapters || !Array.isArray(bookData.chapters)) {
      showError("Chapters data missing.");
      return;
    }

    let currentChapterIndex = null;
    let currentChapter = null;
    let currentSection = 0;
    let currentPage = 0;
    let isSimplified = false;
    let readingMode = 'sections';
    let currentVocabTrigger = null;
    let mobileLang = 'en'; // EN/ZH toggle state for mobile
    const READING_MODE_KEY = bookData.title + "_readingMode";
    const PROGRESS_KEY = bookData.title + "_progress";
    const PAGE_SIZE = 6;
    const placeholderQuiz = [{ text: "This section has no quiz yet.", answer: true, rationale: "" }];

    function detectReadingMode(ch) {
      const stored = localStorage.getItem(READING_MODE_KEY);
      if (stored && ['sections','full','pages'].includes(stored)) readingMode = stored;
      else if (ch.sections && ch.sections.length > 0) readingMode = 'sections';
      else readingMode = 'full';
    }

    const readingModeSelect = document.getElementById('readingModeSelect');
    readingModeSelect.addEventListener('change', () => {
      stopSpeaking();
      readingMode = readingModeSelect.value;
      currentPage = 0;
      localStorage.setItem(READING_MODE_KEY, readingMode);
      if (currentChapter) renderWithMode();
    });

    function populateChapterSelector() {
      const select = document.getElementById("chapterSelect");
      select.innerHTML = "";
      bookData.chapters.forEach((ch, idx) => {
        const opt = document.createElement("option");
        opt.value = idx;
        opt.textContent = "Week " + ch.id + ": " + ch.title;
        select.appendChild(opt);
      });
      select.addEventListener("change", (e) => loadChapter(parseInt(e.target.value)));
    }

    function loadChapter(index) {
      stopSpeaking();
      currentChapterIndex = index;
      currentChapter = bookData.chapters[index];
      currentSection = 0;
      currentPage = 0;
      document.querySelector(".title").textContent = "📖 " + bookData.title + " – Week " + currentChapter.id;
      detectReadingMode(currentChapter);
      readingModeSelect.value = readingMode;
      setupAudioForChapter(currentChapter);
      renderWithMode();
      saveFullProgress();
    }

    function renderWithMode() {
      const ch = currentChapter;
      if (!ch) return;
      if (readingMode === 'sections' && ch.sections && ch.sections.length > 0) {
        renderSectionsMode();
      } else if (readingMode === 'pages') {
        renderPagesMode();
      } else {
        renderFullMode();
      }
    }

    function renderFullMode() {
      document.getElementById('sectionTabs').innerHTML = '';
      document.getElementById('sectionProgress').textContent = '';
      const paragraphs = currentChapter.paragraphs || (currentChapter.sections ? currentChapter.sections.flatMap(s => s.paragraphs) : []);
      renderParagraphs(paragraphs);
      renderQuiz(currentChapter.quiz || []);
      applyMobileLang(mobileLang);
    }

    function renderPagesMode() {
      document.getElementById('sectionTabs').innerHTML = '';
      const allParagraphs = currentChapter.paragraphs || (currentChapter.sections ? currentChapter.sections.flatMap(s => s.paragraphs) : []);
      const totalPages = Math.max(1, Math.ceil(allParagraphs.length / PAGE_SIZE));
      if (currentPage >= totalPages) currentPage = totalPages - 1;
      if (currentPage < 0) currentPage = 0;
      const pageParagraphs = allParagraphs.slice(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE);
      renderParagraphs(pageParagraphs);

      const progress = document.getElementById('sectionProgress');
      progress.innerHTML = '';
      const prevBtn = document.createElement('button');
      prevBtn.className = 'page-nav-btn'; prevBtn.textContent = '⬅ 上一页';
      prevBtn.disabled = currentPage === 0;
      prevBtn.addEventListener('click', () => { stopSpeaking(); currentPage--; renderPagesMode(); saveFullProgress(); });
      const label = document.createElement('span');
      label.className = 'page-nav-label';
      label.textContent = '📄 Page ' + (currentPage + 1) + ' of ' + totalPages;
      const nextBtn = document.createElement('button');
      nextBtn.className = 'page-nav-btn'; nextBtn.textContent = '下一页 ➡';
      nextBtn.disabled = currentPage >= totalPages - 1;
      nextBtn.addEventListener('click', () => { stopSpeaking(); currentPage++; renderPagesMode(); saveFullProgress(); });
      progress.appendChild(prevBtn);
      progress.appendChild(label);
      progress.appendChild(nextBtn);

      renderQuiz(currentChapter.quiz || []);
      applyMobileLang(mobileLang);
    }

    function renderSectionsMode() {
      const sections = currentChapter.sections;
      if (!sections || sections.length === 0) { renderFullMode(); return; }
      const tabContainer = document.getElementById('sectionTabs');
      tabContainer.innerHTML = '';
      sections.forEach((sec, idx) => {
        const tab = document.createElement('button');
        tab.className = 'section-tab'; if (idx === currentSection) tab.classList.add('active');
        tab.textContent = (idx+1) + '. ' + sec.heading;
        tab.addEventListener('click', () => {
          stopSpeaking();
          currentSection = idx;
          renderSectionsMode();
          saveFullProgress();
        });
        tabContainer.appendChild(tab);
      });
      document.getElementById('sectionProgress').textContent = 'Section ' + (currentSection+1) + ' of ' + sections.length;
      renderParagraphs(sections[currentSection].paragraphs);
      renderQuiz(sections[currentSection].quiz || []);
      loadSectionAudio(sections[currentSection]);
      applyMobileLang(mobileLang);
    }

    // ----- KEY FIX: renderParagraphs now handles "image" field -----
    function renderParagraphs(paragraphs) {
      const enDiv = document.getElementById('enContent');
      const zhDiv = document.getElementById('zhContent');
      enDiv.innerHTML = ''; zhDiv.innerHTML = '';
      paragraphs.forEach(p => {
        // If there is an image property, show it before the English text
        if (p.image) {
          const imgDiv = document.createElement('div');
          imgDiv.className = 'paragraph-image';
          imgDiv.innerHTML = '<img src="' + p.image + '" alt="illustration">';
          enDiv.appendChild(imgDiv);
        }
        const enContent = isSimplified ? ((() => { const d = document.createElement('div'); d.innerHTML = p.simpEn || ''; return d.textContent; })()) : p.en;
        const enP = document.createElement('p'); enP.innerHTML = enContent;
        enDiv.appendChild(enP);
        const zhP = document.createElement('p'); zhP.textContent = isSimplified ? p.simpZh : p.zh;
        zhDiv.appendChild(zhP);
      });
    }

    // ----- Quiz rendering (unchanged, includes rationale) -----
    function renderQuiz(quizArr) {
      const tfContainer = document.getElementById('tfQuestions');
      tfContainer.innerHTML = '';
      const quizToUse = (quizArr && quizArr.length) ? quizArr : placeholderQuiz;
      quizToUse.forEach((q, i) => {
        const div = document.createElement('div'); div.className = 'quiz-item-wrapper';
        div.innerHTML = `
          <div><strong>${i+1}.</strong> ${q.text}
            <select class='tf-sel' style='width:auto; display:inline-block; margin-left:0.5rem; padding:0.2rem 0.5rem;'>
              <option value=''>--</option><option value='true'>True</option><option value='false'>False</option>
            </select>
          </div>
          <div class='rationale-container'></div>
        `;
        tfContainer.appendChild(div);
      });
      document.getElementById('tfFeedback').textContent = '';
    }

    // ... rest of reader JS unchanged (simplify, speak, check quiz, progress) ...
    document.getElementById('simplifyToggle').addEventListener('click', () => {
      stopSpeaking();
      isSimplified = !isSimplified;
      document.getElementById('simpActiveLabel').classList.toggle('active', isSimplified);
      if (currentChapter) renderWithMode();
      document.getElementById('simplifyToggle').textContent = isSimplified ? '📖 Switch back to Original' : '📖 Switch to Simplified';
      hidePopup();
    });

    const popup = document.getElementById('vocabPopup');
    function showPopup(trigger, vocabKey) {
      const def = vocabDefinitions[vocabKey];
      if (!def) return;
      document.getElementById('popupZh').textContent = def.zh;
      document.getElementById('popupExplain').textContent = '📘 ' + def.explain;
      document.getElementById('popupSimple').textContent = '💬 Simple: ' + def.simple;
      if (window.innerWidth <= 640) {
        // Mobile: pin to bottom of viewport via CSS class (CSS handles position)
        popup.style.top = ''; popup.style.left = '';
        popup.style.bottom = '1rem'; popup.style.left = '1rem'; popup.style.right = '1rem'; popup.style.width = 'auto'; popup.style.maxWidth = 'none';
      } else {
        popup.style.bottom = ''; popup.style.right = ''; popup.style.width = ''; popup.style.maxWidth = '';
        const rect = trigger.getBoundingClientRect();
        let top = rect.bottom + 8, left = rect.left;
        if (left + 320 > window.innerWidth) left = window.innerWidth - 330;
        if (top + 180 > window.innerHeight) top = rect.top - 180;
        popup.style.top = top + 'px'; popup.style.left = left + 'px';
      }
      popup.classList.add('show'); currentVocabTrigger = trigger;
    }
    function hidePopup() { popup.classList.remove('show'); currentVocabTrigger = null; }
    document.addEventListener('click', function(e) {
      const trig = e.target.closest('.vocab-trigger');
      if (trig && trig !== currentVocabTrigger) { e.stopPropagation(); showPopup(trig, trig.getAttribute('data-vocab')); }
      else if (trig === currentVocabTrigger) hidePopup();
      else if (!e.target.closest('#vocabPopup')) hidePopup();
    });
    document.getElementById('closePopup').addEventListener('click', (e) => { e.stopPropagation(); hidePopup(); });
    window.addEventListener('scroll', () => { if (currentVocabTrigger) hidePopup(); });

    // ----- Per-Section Audio Player -----
    const sectionAudio = document.getElementById('sectionAudio');
    const sectionAudioBar = document.getElementById('sectionAudioBar');
    const audioSectionLabel = document.getElementById('audioSectionLabel');

    function loadSectionAudio(sec) {
      if (sec && sec.audio) {
        const src = sec.audio;
        if (sectionAudio.getAttribute('src') !== src) {
          sectionAudio.pause();
          sectionAudio.src = src;
          sectionAudio.load();
        }
        audioSectionLabel.textContent = sec.heading || '';
        sectionAudioBar.style.display = 'flex';
      } else {
        sectionAudio.pause();
        sectionAudio.removeAttribute('src');
        sectionAudioBar.style.display = 'none';
        audioSectionLabel.textContent = '';
      }
    }

    function setupAudioForChapter(ch) {
      // Called on chapter load — clear player; section audio loaded when section is rendered
      sectionAudio.pause();
      sectionAudio.removeAttribute('src');
      sectionAudioBar.style.display = 'none';
      audioSectionLabel.textContent = '';
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) sectionAudio.pause();
    });

    // ----- EN/ZH Mobile Toggle & Swipe -----
    function applyMobileLang(lang) {
      mobileLang = lang;
      const enCol = document.getElementById('enCol');
      const zhCol = document.getElementById('zhCol');
      const btnEn = document.getElementById('toggleEnBtn');
      const btnZh = document.getElementById('toggleZhBtn');
      if (window.innerWidth <= 640) {
        enCol.classList.toggle('mobile-visible', lang === 'en');
        zhCol.classList.toggle('mobile-visible', lang === 'zh');
      } else {
        enCol.classList.add('mobile-visible');
        zhCol.classList.add('mobile-visible');
      }
      if (btnEn) btnEn.classList.toggle('active', lang === 'en');
      if (btnZh) btnZh.classList.toggle('active', lang === 'zh');
    }

    document.getElementById('toggleEnBtn').addEventListener('click', () => applyMobileLang('en'));
    document.getElementById('toggleZhBtn').addEventListener('click', () => applyMobileLang('zh'));
    window.addEventListener('resize', () => applyMobileLang(mobileLang));

    // Swipe left = show Chinese, swipe right = show English
    // Only triggers if horizontal movement clearly dominates vertical (not a scroll)
    let swipeStartX = 0;
    let swipeStartY = 0;
    const colsContainer = document.getElementById('colsContainer');
    colsContainer.addEventListener('touchstart', e => {
      swipeStartX = e.touches[0].clientX;
      swipeStartY = e.touches[0].clientY;
    }, { passive: true });
    colsContainer.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - swipeStartX;
      const dy = e.changedTouches[0].clientY - swipeStartY;
      const isHorizontalSwipe = Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 2;
      if (isHorizontalSwipe && window.innerWidth <= 640) {
        applyMobileLang(dx < 0 ? 'zh' : 'en');
      }
    }, { passive: true });

    // stub — called in simplify toggle and chapter load
    function stopSpeaking() {}

    document.getElementById('checkTfBtn').addEventListener('click', () => {
      const quizArr = currentChapter.sections && readingMode==='sections' ? (currentChapter.sections[currentSection]?.quiz || []) : (currentChapter.quiz || []);
      const quizToUse = quizArr.length ? quizArr : placeholderQuiz;
      let correct = 0;
      document.querySelectorAll('.tf-sel').forEach((sel, i) => {
        const val = sel.value;
        const currentItem = quizToUse[i];
        const wrapper = sel.closest('.quiz-item-wrapper');
        const ratBox = wrapper.querySelector('.rationale-container');
        if (val === '') { sel.style.border = '1px solid #ccc'; ratBox.style.display = 'none'; return; }
        const userTrue = (val === 'true');
        const correctChoice = (userTrue === currentItem.answer);
        ratBox.style.display = 'block';
        if (correctChoice) {
          sel.style.border = '2px solid green';
          correct++;
          ratBox.style.borderLeft = '4px solid green';
          ratBox.innerHTML = '<span style="color:green; font-weight:bold;">✓ Correct.</span> ' + (currentItem.rationale || '');
        } else {
          sel.style.border = '2px solid red';
          ratBox.style.borderLeft = '4px solid red';
          ratBox.innerHTML = '<span style="color:red; font-weight:bold;">✗ Incorrect.</span> ' + (currentItem.rationale || '');
        }
      });
      document.getElementById('tfFeedback').textContent = 'Score: ' + correct + ' / ' + quizToUse.length;
    });

    function saveFullProgress() {
      const state = { chapterIndex: currentChapterIndex, sectionIndex: (readingMode==='sections' && currentChapter.sections) ? currentSection : 0, pageIndex: (readingMode==='pages') ? currentPage : 0, readingMode };
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(state));
      updateProgressIndicator();
    }

    function updateProgressIndicator() {
      const saved = localStorage.getItem(PROGRESS_KEY);
      if (saved) {
        try {
          const state = JSON.parse(saved);
          const ch = bookData.chapters[state.chapterIndex];
          if (ch) {
            let info = '📌 Last read: Ch. ' + ch.id;
            if (ch.sections && state.sectionIndex) info += ' · ' + ch.sections[state.sectionIndex].heading;
            info += ' | ' + (state.chapterIndex+1) + '/' + bookData.chapters.length + ' chapters';
            document.getElementById('progressBox').textContent = info;
          }
        } catch(e) {}
      }
    }

    function restoreProgress() {
      const saved = localStorage.getItem(PROGRESS_KEY);
      if (saved) {
        try {
          const state = JSON.parse(saved);
          if (state.chapterIndex >= 0 && state.chapterIndex < bookData.chapters.length) {
            document.getElementById('chapterSelect').value = state.chapterIndex;
            readingMode = state.readingMode || 'sections';
            readingModeSelect.value = readingMode;
            loadChapter(state.chapterIndex);
            if (readingMode === 'sections' && bookData.chapters[state.chapterIndex].sections) {
              currentSection = state.sectionIndex || 0;
              renderSectionsMode();
            } else if (readingMode === 'pages') {
              currentPage = state.pageIndex || 0;
              renderPagesMode();
            }
            return;
          }
        } catch(e) {}
      }
      loadChapter(0);
    }

    populateChapterSelector();
    restoreProgress();
    updateProgressIndicator();
  })();
</script>
