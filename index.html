<script id="bookDataScript" type="application/json">{
  "title": "荒漠甘泉",
  "author": "考门夫人",
  "chapters": [
    {
      "id": 1,
      "title": "January 1–7",
      "sections": [
        {
          "sectionId": 1,
          "heading": "January 1",
          "audio": "audio/Streams in the Desert - January 1.m4a",
          "paragraphs": [
            {
              "en": "The land whither ye <span class=\"vocab-trigger\" data-vocab=\"go to possess it\">go to possess it<\/span> is a land of hills and valleys and <span class=\"vocab-trigger\" data-vocab=\"drinketh water\">drinketh water<\/span> of the <span class=\"vocab-trigger\" data-vocab=\"rain of heaven\">rain of heaven<\/span>: a land which the Lord thy God <span class=\"vocab-trigger\" data-vocab=\"careth for\">careth for<\/span>: the eyes of the Lord are always upon it, from the <span class=\"vocab-trigger\" data-vocab=\"beginning of the year\">beginning of the year<\/span> even unto the <span class=\"vocab-trigger\" data-vocab=\"end of the year\">end of the year<\/span>. (Deut.11:11,12)",
              "zh": "你们要过去得为业的那地，乃是有山有谷、雨水滋润之地，是耶和华你神所眷顾的；从岁首到年终，耶和华你神的眼目时常看顾那地。（申命记11:11-12）",
              "simpEn": "The land you are going to take as your own has hills and valleys and drinks rain from the sky. The Lord your God takes care of it all the time, from the start of the year to the finish.",
              "simpZh": "你们要去的那片土地，有山有谷，有天上来的雨水。耶和华你们的神从年头到年尾都看顾那片地。"
            },
            {
              "en": "Today, dear friends, we stand upon the <span class=\"vocab-trigger\" data-vocab=\"verge of the unknown\">verge of the unknown<\/span>. There lies before us the new year and we are going forth to possess it. Who can tell what we shall find? What new experiences, what changes shall come, what new needs shall arise? But here is the cheering, comforting, <span class=\"vocab-trigger\" data-vocab=\"gladdening message\">gladdening message<\/span> from our Heavenly Father, \"The Lord thy God <span class=\"vocab-trigger\" data-vocab=\"careth for\">careth for<\/span> it.\" \"His eyes are upon it away to the ending of the year.\"",
              "zh": "亲爱的朋友们，今天，我们站在未知的边缘。新的一年摆在我们面前，我们要前进并得着它。谁能知道我们会遇见什么？会有什么新的经历、什么改变、什么新的需要出现？但这里有一个从天父而来令人鼓舞、安慰、喜乐的信息：「耶和华你的神眷顾那地。」「祂的眼目从岁首到年终都看顾那地。」",
              "simpEn": "Today we are standing right at the edge of the unknown. The new year is before us. We do not know what we will find—new things, changes, needs. But God gives us a happy message: He cares for the land all year long.",
              "simpZh": "今天我们正站在未知的边界上。新的一年就在前面。我们不知道会发现什么——新的事、改变、需要。但神给了我们一个开心的消息：祂整年看顾。"
            },
            {
              "en": "All our <span class=\"vocab-trigger\" data-vocab=\"supply\">supply<\/span> is to come from the Lord. Here are springs that shall never dry; here are fountains and streams that shall never be <span class=\"vocab-trigger\" data-vocab=\"cut off\">cut off<\/span>. Here, anxious one, is the <span class=\"vocab-trigger\" data-vocab=\"gracious pledge\">gracious pledge<\/span> of the Heavenly Father. If He be the <span class=\"vocab-trigger\" data-vocab=\"Source of our mercies\">Source of our mercies<\/span> they can never fail us. No heat, no <span class=\"vocab-trigger\" data-vocab=\"drought\">drought<\/span> can <span class=\"vocab-trigger\" data-vocab=\"parch\">parch<\/span> that river, \"the streams whereof make glad the city of God.\"",
              "zh": "我们一切的供应都从主而来。这里有永不干涸的泉源；有永不被切断的溪流与江河。焦虑的人哪，这是天父恩典的保证。若祂是我们怜悯的源头，它们就永不会使我们失望。没有酷热、没有干旱，能叫那「使神的城欢喜」的河干涸。",
              "simpEn": "Everything we need comes from the Lord. There are springs that never run out, and streams that never stop. God's kind promise is sure. If He is the one who gives us all good things, we will never lack. Even great heat or a long dry time cannot dry up that river.",
              "simpZh": "我们所需要的一切都从神来。有永不枯干的泉源，有永不停歇的溪流。神仁慈的承诺是可靠的。如果祂是赐我们一切美好的源头，我们永远都不会缺乏。就算大热天、长旱期也不会让那条河干涸。"
            },
            {
              "en": "The land is a land of hills and valleys. It is not all <span class=\"vocab-trigger\" data-vocab=\"smooth\">smooth<\/span> nor all <span class=\"vocab-trigger\" data-vocab=\"down hill\">down hill<\/span>. If life were all one <span class=\"vocab-trigger\" data-vocab=\"dead level\">dead level<\/span> of <span class=\"vocab-trigger\" data-vocab=\"dull sameness\">dull sameness<\/span> it would <span class=\"vocab-trigger\" data-vocab=\"oppress\">oppress<\/span> us; we want the hills and the valleys. The hills collect the rain for a hundred <span class=\"vocab-trigger\" data-vocab=\"fruitful valleys\">fruitful valleys<\/span>. Ah, so it is with us! It is the <span class=\"vocab-trigger\" data-vocab=\"hill difficulty\">hill difficulty<\/span> that drives us to the <span class=\"vocab-trigger\" data-vocab=\"throne of grace\">throne of grace<\/span> and brings down the <span class=\"vocab-trigger\" data-vocab=\"shower\">shower<\/span> of blessing; the hills, the <span class=\"vocab-trigger\" data-vocab=\"bleak hills\">bleak hills<\/span> of life that we wonder at and perhaps <span class=\"vocab-trigger\" data-vocab=\"grumble at\">grumble at<\/span>, bring down the showers.",
              "zh": "那地是有山有谷之地。并不全是一马平川，也不全是下坡路。如果人生只有单调沉闷的一成不变，就会让人窒息；我们需要山和谷。山聚集雨水，浇灌上百个丰饶的山谷。啊，我们也是如此！正是那山一样的难处催逼我们来到恩典的宝座前，降下属灵的甘雨；那些令我们诧异、甚至抱怨的荒凉之山，正是带来沛雨的。",
              "simpEn": "The land has hills and valleys. It is not completely flat or all easy. Life with no change would feel heavy and boring. We need hills and valleys. The hills catch rain for many rich valleys. In the same way, hard times push us to God, who then sends blessings. Even the cold, bare hills we complain about bring rain.",
              "simpZh": "那片地有山也有谷。不是完全平的，也不是一路轻松。一成不变的生活会让人又闷又累。我们需要山和谷。山接了雨水，滋润许多肥沃的谷。同样的，困难会把人推到神面前，然后神就降下祝福。就连我们抱怨的荒凉山头，也带来了雨水。"
            },
            {
              "en": "How many have <span class=\"vocab-trigger\" data-vocab=\"perished\">perished<\/span> in the <span class=\"vocab-trigger\" data-vocab=\"wilderness\">wilderness<\/span>, buried under its golden sands, who would have lived and <span class=\"vocab-trigger\" data-vocab=\"thriven\">thriven<\/span> in the <span class=\"vocab-trigger\" data-vocab=\"hill-country\">hill-country<\/span>; how many would have been killed by the frost, <span class=\"vocab-trigger\" data-vocab=\"blighted\">blighted<\/span> with winds, swept <span class=\"vocab-trigger\" data-vocab=\"desolate\">desolate<\/span> of tree and fruit but for the hill‑stem, hard, <span class=\"vocab-trigger\" data-vocab=\"rugged\">rugged<\/span>, so steep to climb. God's hills are a <span class=\"vocab-trigger\" data-vocab=\"gracious protection\">gracious protection<\/span> for His people against their foes!",
              "zh": "多少人在旷野灭亡，埋在金黄的沙下，他们本可以在山地存活、兴旺；多少人会被霜冻杀死、被风摧残、被扫荡得失去树木与果实，若不是有那山脊——坚硬、崎岖、难以攀爬。神的众山是祂子民面对仇敌时恩典的保障！",
              "simpEn": "Many people died in the desert, buried in sand, though they could have lived well in the hills. Some would have been killed by cold, wind, and loss of trees and fruit, but the tough, hard hills protected them. God's hills are a kind shelter for His people from enemies.",
              "simpZh": "很多人死在旷野，埋在沙子里，其实他们可以在山地好好活着。有些人本来会被寒冷、狂风和失去树木果实而毁掉，但那又硬又难爬的山保护了他们。神的山是祂子民面对仇敌时慈爱的保障。"
            },
            {
              "en": "We cannot tell what loss and sorrow and trial are doing. Trust only. The Father comes near to take our hand and lead us on our way today. It shall be a good, a blessed new year! <br>He leads us on by paths we did not know; <br>Upward He leads us, though our steps be slow, <br>Though oft we <span class=\"vocab-trigger\" data-vocab=\"faint\">faint<\/span> and <span class=\"vocab-trigger\" data-vocab=\"falter\">falter<\/span> on the way, <br>Though storms and darkness oft <span class=\"vocab-trigger\" data-vocab=\"obscure\">obscure<\/span> the day; <br>Yet when the clouds are gone, We know He leads us on. <br>He leads us on through all the <span class=\"vocab-trigger\" data-vocab=\"unquiet years\">unquiet years<\/span>; <br>Past all our <span class=\"vocab-trigger\" data-vocab=\"dreamland hopes\">dreamland hopes<\/span>, and doubts and fears, <br>He guides our steps, through all the <span class=\"vocab-trigger\" data-vocab=\"tangled maze\">tangled maze<\/span> of losses, sorrows and <span class=\"vocab-trigger\" data-vocab=\"o'erclouded days\">o'erclouded days<\/span>; <br>We know His will is done; <br>And still He leads us on. <br>N. L. Zinzendorf.",
              "zh": "我们无法知道眼前的损失、忧伤和试炼正在成就什么。只要信靠。天父亲自来握住我们的手，引领我们今天当走的路。这将是一个美好、蒙福的新年！祂领我们走我们未曾知晓的路；祂引领我们向上，即使脚步迟缓，即使我们常在路上疲惫、蹒跚，即使风暴与黑暗常遮蔽白昼；但当云消雾散，我们知道祂仍在引领。祂引领我们度过所有不安的岁月；越过一切梦中的盼望、疑虑与恐惧，祂引导我们的脚步穿过一切迷惘、损失、悲伤和阴云密布的日子；我们知道祂的旨意成就；祂依然引领我们前行。——亲岑道夫",
              "simpEn": "We do not understand why we suffer or lose things right now. Just trust God. He comes close to hold our hand and show us the way today. This year will be good and full of blessing. He leads us on roads we did not know. Even when we are slow, tired, and almost fall, when storms and dark times hide the daylight—when the clouds clear, we know He is still leading. He leads us through restless years, past dreams, doubts, and fears. He guides our steps through confusing losses, sadness, and cloudy days. We know His plan is working, and He keeps leading us.",
              "simpZh": "我们现在不明白为什么受苦、失去和经历试炼。只要信靠神。祂亲自来拉我们的手，带我们走今天的路。今年会是美好、有福的一年。祂领我们走我们不知道的路。就算我们走得慢、很累、快跌倒了，就算暴风雨和黑暗遮住了白天——当云雾散开，我们知道祂仍然在带领。祂带领我们度过不安的岁月，穿过那些美梦、怀疑和惧怕。祂引导我们走过糊涂的失落、悲伤和阴天。我们知道祂的旨意正在进行，祂继续带领我们。"
            }
          ],

          "sectionId": 2,
          "heading": "January 2",
          "audio": "audio/Streams in the Desert - January 2.m4a",
          "paragraphs": [
            {
              "en": "\"And there was an <span class=\"vocab-trigger\" data-vocab=\"enlarging\">enlarging<\/span>, and a <span class=\"vocab-trigger\" data-vocab=\"winding about\">winding about<\/span> still upward to the side chambers: for the <span class=\"vocab-trigger\" data-vocab=\"winding about\">winding about<\/span> of the house went still upward round about the house: therefore the breadth of the house was still upward and so increased from the lowest chamber to the highest by the midst.\" (Ezek.41:7).",
              "zh": "「又有扩宽，环绕而上的旁屋；因为殿的旁屋环绕而转，越上越宽，所以从下层到上层，由中层才能到上层。」（以西结书41:7）",
              "simpEn": "The building got wider as it went up, with a path winding upward around it. The house became larger from the lowest room to the highest.",
              "simpZh": "那座建筑物越往上越宽，有一条路绕着它盘旋上升。从最低的房间到最高的房间，房子越来越大。"
            },
            {
              "en": "Still upward be thine <span class=\"vocab-trigger\" data-vocab=\"onward course\">onward course<\/span>: For this I pray today; Still upward as the years go by, And seasons pass away. Still upward in this coming year, Thy path is all <span class=\"vocab-trigger\" data-vocab=\"untried\">untried<\/span>; Still upward mayst thou journey on, Close by thy Savior's side. Still upward e'en though sorrow come, And trials crush thine heart; Still upward may they draw thy soul, With Christ to walk <span class=\"vocab-trigger\" data-vocab=\"apart\">apart<\/span>. Still upward till the day shall break, And shadows all have flown; Still upward till in Heaven you wake, And stand before the throne.",
              "zh": "愿你继续向上的路程：这是我今日的祈祷；岁月流逝，季节更迭，仍旧向上。在来年中，你的道路全然陌生；仍要向上前行，紧靠你救主的身旁。即便忧伤来临，试炼压碎你的心，仍要向上；愿这些试炼牵引你的灵魂，与基督单独同行。仍要向上，直到天亮，暗影全都消散；仍要向上，直到你在天国醒来，站立在宝座之前。",
              "simpEn": "I pray that you will keep going up and forward. As time passes, keep going upward. This year the path is new and unknown. Keep walking upward, staying close to Jesus. Even when sadness and hard times press on your heart, let them pull you closer to God, spending time alone with Christ. Keep going up until the new day begins and darkness is gone—keep going up until you wake up in heaven and stand before God's throne.",
              "simpZh": "我祷告你能一直向上走。时间过去，季节变化，也要向上走。今年你的路是新的、没有走过的。要继续向上走，紧紧靠着耶稣。就算难过和困难压碎你的心，也要向上，让这些把你拉近神，单独与基督同行。一直向上，直到天亮，黑影全都不见——一直向上，直到你在天堂醒过来，站在神的宝座前。"
            },
            {
              "en": "We ought not to rest <span class=\"vocab-trigger\" data-vocab=\"content\">content<\/span> in the <span class=\"vocab-trigger\" data-vocab=\"mists of the valley\">mists of the valley<\/span> when the <span class=\"vocab-trigger\" data-vocab=\"summit of Tabor\">summit of Tabor<\/span> awaits us. How pure are the <span class=\"vocab-trigger\" data-vocab=\"dews of the hills\">dews of the hills<\/span>, how fresh is the mountain air, how rich the fare of the <span class=\"vocab-trigger\" data-vocab=\"dwellers aloft\">dwellers aloft<\/span>, whose windows look into the New Jerusalem! Many saints are <span class=\"vocab-trigger\" data-vocab=\"content\">content<\/span> to live like men in <span class=\"vocab-trigger\" data-vocab=\"coal mines\">coal mines<\/span>, who see not the sun. Tears mar their faces when they might <span class=\"vocab-trigger\" data-vocab=\"anoint them with celestial oil\">anoint them with celestial oil<\/span>. Satisfied I am that many a believer <span class=\"vocab-trigger\" data-vocab=\"pines in a dungeon\">pines in a dungeon<\/span> when he might walk on the palace roof, and view the goodly land and Lebanon. Rouse thee, O believer, from thy low condition! Cast away thy <span class=\"vocab-trigger\" data-vocab=\"sloth\">sloth<\/span>, thy <span class=\"vocab-trigger\" data-vocab=\"lethargy\">lethargy<\/span>, thy <span class=\"vocab-trigger\" data-vocab=\"coldness\">coldness<\/span>, or whatever interferes with thy <span class=\"vocab-trigger\" data-vocab=\"chaste love\">chaste and pure love<\/span> to Christ. Make Him the source, the center, and the <span class=\"vocab-trigger\" data-vocab=\"circumference\">circumference<\/span> of all thy soul's <span class=\"vocab-trigger\" data-vocab=\"range of delight\">range of delight<\/span>. Rest no longer satisfied with thy <span class=\"vocab-trigger\" data-vocab=\"dwarfish attainments\">dwarfish attainments<\/span>. Aspire to a higher, a nobler, a fuller life. Upward to heaven! Nearer to God!",
              "zh": "当他泊山的顶峰等候着我们时，我们不当满足于山谷里的迷雾。山岭的露珠何其纯净，山间的空气何其清新，那些窗户望向新耶路撒冷的高处居民的筵席何等丰盛！许多圣徒甘愿像煤矿工人一样生活，看不见阳光。泪水沾污了他们的脸，他们本可以用属天的膏油抹脸。我确知许多信徒在土牢里日渐消沉，他们本可以行走在宫殿的屋顶，眺望佳美之地和黎巴嫩山。哦，信徒哪，从你的卑微光景中兴起吧！丢掉你的懒惰、昏沉、冷淡，以及任何拦阻你对基督贞洁纯净之爱的事物。让祂成为你灵魂喜乐范围的源头、中心与圆周。不要再满足于你那侏儒般的成就。向往更高、更尊贵、更丰盛的生命。向上到天国！更近于神！",
              "simpEn": "We should not be happy staying in the foggy low valleys when a high, beautiful mountain waits for us. The mountain dew is clean, the air is fresh, and the food for those who live high up is rich—they can even see the New Jerusalem from their windows. Too many Christians live in the dark like coal miners, with tears on their faces when they could have joy from God. I am sure some believers are sad in a dark prison when they could be walking on a palace roof, seeing a wonderful land. Wake up, believer! Throw away laziness, dullness, cold feelings, and anything that stops your pure love for Christ. Make Him the center and edge of everything you enjoy. Don't settle for small growth. Aim for a higher, greater, fuller life. Up to heaven! Closer to God!",
              "simpZh": "我们不该安于住在雾气重重的低谷，因为一座又高又美的山正在等着我们。山上的露水很干净，空气很新鲜，住在高处的人食物很丰富，他们能从窗户望见新耶路撒冷。很多基督徒活得就像煤矿工人，看不见太阳，脸上挂着眼泪，其实他们本可以用属天的油抹脸。我相信有些信徒被困在黑暗的地牢里愁苦，其实他们可以走在宫殿的屋顶上，看见美好的土地。醒来吧，信徒！丢掉你的懒惰、沉闷、冷淡，和任何拦阻你单纯爱基督的东西。让祂成为你一切喜乐的起点、中心与边界。别再满足于小小的成长，要向往更高、更尊贵、更丰盛的生命。向上到天堂！更靠近神！"
            },
            {
              "en": "I want to <span class=\"vocab-trigger\" data-vocab=\"scale the utmost height\">scale the utmost height<\/span>, And catch a gleam of glory bright; But still I'll pray, till heaven I've found, Lord, lead me on to higher ground! Not many of us are living at our best. We linger in the lowlands because we are afraid to climb the mountains. The <span class=\"vocab-trigger\" data-vocab=\"steepness\">steepness<\/span> and <span class=\"vocab-trigger\" data-vocab=\"ruggedness\">ruggedness<\/span> dismay us, and so we stay in the misty valleys and do not learn the <span class=\"vocab-trigger\" data-vocab=\"mystery of the hills\">mystery of the hills<\/span>. We do not know what we lose in our <span class=\"vocab-trigger\" data-vocab=\"self-indulgence\">self-indulgence<\/span>, what glory awaits us if only we had courage for the mountain climb, what blessing we should find if only we would move to the <span class=\"vocab-trigger\" data-vocab=\"uplands of God\">uplands of God<\/span>. Too low they build who build beneath the stars.",
              "zh": "我要攀登至极高之处，瞥见一线灿烂的荣光；但我仍要祈祷，直到我寻见天国：主啊，领我进入更高之地！我们并没有太多人活出最好的自己。我们在低地徘徊，因为害怕爬山。陡峭与崎岖令我们丧胆，于是我们待在迷雾的山谷中，不学山岭的奥秘。我们不知道自己在自我放纵中失去了什么，只要我们有勇气登山，就有何等的荣耀等候我们；只要肯迁到神的高原，我们将会发现何等的祝福。凡只在星辰之下建造的人，都造得太低。",
              "simpEn": "I want to climb the very top and see a bright flash of glory. But I will keep praying until I reach heaven: Lord, lead me to a higher place! Most of us do not live our best life. We stay in the low places because we are scared to climb. The steep, rough ground frightens us, so we remain in the foggy valleys and never learn the secret of the hills. We miss so much when we are soft with ourselves. Real glory waits if we dare to climb; real blessing is found if we move up to God's high country. People who build only under the stars build too low.",
              "simpZh": "我想爬到最高的地方，看见荣耀的亮光。但我会一直祷告，直到我到了天堂：主啊，带我上到更高的地方！我们大多数人都没活出最好的样子。我们待在低处，因为害怕爬山。陡峭崎岖的地面吓倒我们，我们就留在雾蒙蒙的山谷里，不知道山的秘密。对自己太宽松会让我们失去很多。如果我们敢爬，荣耀就在等着；如果我们搬到神的高原，祝福就在那里。只在星星下面盖房子的人，盖得太低了。"
            }

          "sectionId": 3,

          "audio": "audio/Streams in the Desert - January 3.m4a",
          "paragraphs": [
            {
              "en": "I will <span class=\"vocab-trigger\" data-vocab=\"lead on softly\">lead on softly<\/span>, <span class=\"vocab-trigger\" data-vocab=\"according as the cattle that goeth before me and the children be able to endure\">according as the cattle that goeth before me and the children be able to endure<\/span>. (Gen.33:14).",
              "zh": "我要按着在我前面行的牲畜和孩子们的脚步慢慢地前行，照着他们所能承受的。（创世记33:14）",
              "simpEn": "I will lead gently, going only as fast as the animals and children can handle.",
              "simpZh": "我会温柔地带领，只走牲畜和小孩子能承受的速度。"
            },
            {
              "en": "What a beautiful picture of Jacob's thoughtfulness for the cattle and the children! He would not allow them to be <span class=\"vocab-trigger\" data-vocab=\"overdriven\">overdriven<\/span> even for one day. He would not lead on according to what a strong man like Esau could do and expected them to do, but only according to what they were able to endure. He knew exactly how far they could go in a day; and he made that his only consideration in arranging the marches. He had gone the same <span class=\"vocab-trigger\" data-vocab=\"wilderness\">wilderness<\/span> journey years before, and knew all about its roughness and heat and length, by personal experience. And so he said, \"I will <span class=\"vocab-trigger\" data-vocab=\"lead on softly\">lead on softly<\/span>.\" \"For ye have not passed this way <span class=\"vocab-trigger\" data-vocab=\"heretofore\">heretofore<\/span>\" (Josh.3:4).",
              "zh": "这是一幅多么美丽的画面——雅各体贴牲畜和孩子们！他甚至不许他们一天之内被驱赶过度。他不照以扫那样强壮的人所能行、所期望的步伐带领他们，只照他们能承受的程度而行。他确切知道他们一天能走多远，他在安排行程时，只考量这一点。多年前他曾走过同样的旷野路，亲身经历过那里的崎岖、炎热和遥远。因此他说：「我要慢慢地前行。」「因为这条路你们向来没有走过。」（约书亚记3:4）",
              "simpEn": "Jacob was so kind to the animals and children. He did not push them too hard, even for a day. He did not lead them like a strong man such as Esau would, but only as fast as they could go. He knew how far they could travel in a day because he had traveled that desert before and knew how rough, hot, and long it was. That's why he said, 'I will lead gently.' 'You have never been this way before.'",
              "simpZh": "雅各对动物和孩子们真好。他不催赶他们，连一天也不勉强。他不像以扫那样的强人期待的速度来带领，只按他们能承受的来走。他知道他们一天能走多远，因为他以前走过那片旷野，知道有多难走、多热、多远。所以他说：'我会轻轻地带路。' '这条路你们以前没走过。'"
            },
            {
              "en": "We have not passed this way <span class=\"vocab-trigger\" data-vocab=\"heretofore\">heretofore<\/span>, but the Lord Jesus has. It is all <span class=\"vocab-trigger\" data-vocab=\"untrodden\">untrodden<\/span> and unknown ground to us, but He knows it all by personal experience. The <span class=\"vocab-trigger\" data-vocab=\"steep bits\">steep bits<\/span> that take away our breath, the <span class=\"vocab-trigger\" data-vocab=\"stony bits\">stony bits<\/span> that make our feet ache so, the hot <span class=\"vocab-trigger\" data-vocab=\"shadeless stretches\">shadeless stretches<\/span> that make us feel so exhausted, the rushing rivers that we have to pass through—Jesus has gone through it all before us. \"He was <span class=\"vocab-trigger\" data-vocab=\"wearied with his journey\">wearied with his journey<\/span>.\" Not some, but all the many waters went over Him, and yet did not quench His love. He was made a perfect Leader by the things which He suffered. \"He <span class=\"vocab-trigger\" data-vocab=\"knoweth\">knoweth<\/span> our <span class=\"vocab-trigger\" data-vocab=\"frame\">frame<\/span>; he remembereth that we are <span class=\"vocab-trigger\" data-vocab=\"dust\">dust<\/span>.\" Think of that when you are tempted to question the gentleness of His leading. He is remembering all the time; and not one step will He make you take beyond what your foot is able to endure. Never mind if you think it will not be able for the step that seems to come next either He will so strengthen it that it shall be able, or He will call a sudden halt, and you shall not have to take it at all.",
              "zh": "这条路我们向来没有走过，但主耶稣走过。对我们来说这是全然陌生、无人踏足之地，但祂因亲身经历而知晓一切。那些让我们喘不过气来的陡坡，令我们脚板疼痛的石头路，使我们疲惫不堪的炎热无荫之地，必须穿过的湍急河水——耶稣都已先我们一步走过。「祂因行路困乏。」并非一些，而是所有的深水漫过祂，却没有浇灭祂的爱。祂因所受的苦成为完美的领路者。「祂知道我们的本体，思念我们不过是尘土。」每当你想要质疑祂带领的温柔时，当思想这一点。祂一直记念着；祂不会让你走超过你脚力所能承受的一步。不要担心你觉得自己无法应付眼前似乎将要来临的那一步——祂要么加给你力量，使你能够承受，要么祂会忽然叫停，让你完全不必走那一步。",
              "simpEn": "We haven't walked this path before, but Jesus has. The way is new to us, but He knows every part by experience. The steep climbs that leave us out of breath, the rocky ground that hurts our feet, the hot open areas with no shade that make us tired, the fast rivers we must cross—Jesus went through all of it before us. He became tired from His own trip. All the deep waters went over Him, but His love stayed strong. His suffering made Him the perfect guide. He knows we are weak, just dust. So when you wonder if He is being gentle, remember that He never forgets. He won't make you take one step more than you can handle. If you think you can't take the next step, He will either give you the power or stop the journey so you don't have to take it.",
              "simpZh": "我们没走过这条路，但耶稣走过。对我们来说是全新的，但祂亲身经历过所以知道每一段。那些陡得让人喘不过气的坡，扎脚的石子路，热得没有树荫的开阔地，必须走过的急流——耶稣都在我们前面走过了。他自己赶路的时候也很累。所有的深水都淹过了祂，但祂的爱没有熄灭。祂因为受苦成了完美的领路人。祂知道我们软弱，不过是尘土。所以当你怀疑祂是不是够温柔时，记得祂从没忘记。祂不会让你多走一步你受不住的路。如果你觉得下一步走不动了，祂要么加给你力量，要么就停下，让你不用走。"
            },
            {
              "en": "In \"pastures green\"? Not always; sometimes He Who knowest best, in kindness leadeth me In weary ways, where heavy shadows be. So, whether on the hill-tops high and fair I dwell, or in the sunless valleys, where The shadows lie, what matter? He is there. —Barry.",
              "zh": "在「青草地上」？并不总是如此；有时那位至善者，以慈爱领我走疲乏的路，那里有浓重的阴影。所以，无论我是住在高耸晴朗的山顶，还是住在幽暗无光的山谷，阴影遍地，又有什么关系？祂在那里。—巴里",
              "simpEn": "Not always in green fields. Sometimes the One who knows best kindly leads me on tired roads full of dark shadows. So whether I am on bright hilltops or in dark valleys where shadows lie, it doesn't matter. He is there.",
              "simpZh": "不总是在绿草地上。有时候那位最懂我的神，温柔地领我走上很累的路，那里有大片的阴影。所以无论是在明亮的山顶，还是充满阴影的黑暗山谷，都没关系。祂在那里。"

        {
          "sectionId": 4,
          "heading": "January 4",
          "audio": "audio/Streams in the Desert - January 4.m4a",
          "paragraphs": [
            {
              "en": "Jesus saith unto him, Go thy way; thy son liveth. And the man believed the word that Jesus had spoken unto him, and he went his way (John 4:50). When ye pray, <span class=\"vocab-trigger\" data-vocab=\"believe\">believe<\/span> (Mark 11:24).",
              "zh": "耶稣对他说：「回去吧，你的儿子活了。」那人信耶稣所说的话，就回去了。（约翰福音4:50）你们祷告的时候，只要信。（马可福音11:24）",
              "simpEn": "Jesus said, 'Go home; your son will live.' The man believed what Jesus said and left. When you pray, believe.",
              "simpZh": "耶稣说：'回家吧，你的儿子活了。'那人相信了耶稣的话就回去了。你祷告的时候，要相信。"
            },
            {
              "en": "When there is a matter that requires <span class=\"vocab-trigger\" data-vocab=\"definite prayer\">definite prayer<\/span>, pray till you <span class=\"vocab-trigger\" data-vocab=\"believe\">believe<\/span> God, until with <span class=\"vocab-trigger\" data-vocab=\"unfeigned lips\">unfeigned lips<\/span> you can thank Him for the answer. If the answer still <span class=\"vocab-trigger\" data-vocab=\"tarries\">tarries<\/span> outwardly, do not pray for it in such a way that it is evident that you are not definitely believing for it. Such a prayer in place of being a help will be a <span class=\"vocab-trigger\" data-vocab=\"hindrance\">hindrance<\/span>; and when you are finished praying, you will find that your faith has weakened or has entirely gone. The urgency that you felt to offer this kind of prayer is clearly from self and Satan. It may not be wrong to mention the matter in question to the Lord again, if He is keeping you waiting, but be sure you do so in such a way that it <span class=\"vocab-trigger\" data-vocab=\"implies faith\">implies faith<\/span>. Do not pray yourself out of faith. You may tell Him that you are waiting and that you are still believing Him and therefore praise Him for the answer. There is nothing that so fully <span class=\"vocab-trigger\" data-vocab=\"clinches faith\">clinches faith<\/span> as to be so sure of the answer that you can thank God for it.",
              "zh": "当有需要明确祷告的事情时，要祷告直到你相信神，直到能以不虚伪的嘴唇为应允感谢祂。如果答复在外面迟迟未到，不要用那种明显缺乏信心的方式祷告。那样的祷告不但无益，反而有碍；等你祷告完，会发觉自己的信心已经软弱或完全消失。催逼你那样祷告的冲动，显然出自自我和撒但。如果神要你等候，再把那件事向主提起也许并无不可，但要确保你的祷告带着信心。不要把自己祷告出信心之外。你可以告诉祂你在等候，并且依然相信祂，因此为答复赞美祂。没有什么比确信答复必然来到而为此感谢神，更能将信心牢牢钉稳。",
              "simpEn": "When you need to pray about something clearly, pray until you really trust God and can thank Him for the answer with honest lips. If the answer still hasn't come, don't pray as if you don't really believe. That kind of praying doesn't help; it actually weakens your faith, and after you pray you may find your faith smaller or gone. That strong urge to pray without faith comes from yourself or the devil. It might be okay to mention the matter to God again if He makes you wait, but be sure your prayer shows you are still believing. Never pray yourself out of faith. You can tell Him you are waiting, still trusting, and so you praise Him for the answer. Nothing locks faith in place more than being so sure of the answer that you can thank God for it.",
              "simpZh": "当你有件事需要清楚祷告时，要一直祷告到你真的相信神，能用真诚的嘴唇感谢祂会回应。如果答案还没来，别用不信的方式祷告。那种祷告帮不上忙，反而会削弱信心，祷告完你可能发现自己信心更小或没有了。那种强烈的冲动来自自己和撒但。如果神让你等，再提那件事也许没关系，但要确保你的祷告显出信心。千万别把自己祷告到不信。你可以告诉祂你在等，仍然相信，所以为答案赞美祂。没有什么比确信答案会来而感谢神更能把信心钉稳。"
            },
            {
              "en": "Prayers that pray us out of faith deny both God's promise in His Word and also His whisper \"Yes,\" that He gave us in our hearts. Such prayers are but the expression of the <span class=\"vocab-trigger\" data-vocab=\"unrest\">unrest<\/span> of one's heart and <span class=\"vocab-trigger\" data-vocab=\"unrest\">unrest<\/span> implies <span class=\"vocab-trigger\" data-vocab=\"unbelief\">unbelief<\/span> in reference to the answer to prayer. \"For we which have believed do enter into rest\" (Heb. 4:3). This prayer that prays ourselves out of faith frequently arises from centering our thoughts on the difficulty rather than on God's promise. Abraham \"<span class=\"vocab-trigger\" data-vocab=\"considered not his own body\">considered not his own body<\/span>,\" \"he <span class=\"vocab-trigger\" data-vocab=\"staggered not\">staggered not<\/span> at the promise of God\" (Rom. 4:19, 20). May we watch and pray that we enter not into <span class=\"vocab-trigger\" data-vocab=\"temptation of praying ourselves out of faith\">temptation of praying ourselves out of faith<\/span>.",
              "zh": "把自己祷告出信心的祷告，既否定了神话语中的应许，也否定了祂在心中赐下的「是的」微声。那样的祷告不过是内心不安的表达，不安意味着对祷告的回应存有不信。「但我们已经相信的人，得以进入那安息」（来4:3）。这种使自己丧失信心的祷告，常常是因为我们专注于困难，而非神的应许。亚伯拉罕「不考虑自己的身体」，「他对神的应许没有动摇」（罗4:19-20）。愿我们警醒祷告，免得入了「把自己祷告出信心」的试探。",
              "simpEn": "Prayer that makes us lose faith says 'no' to God's promise in the Bible and to the quiet 'yes' He put in our hearts. Such prayer is just a sign of a restless heart, and restlessness means we don't really believe God will answer. 'We who have believed enter into rest.' This kind of faith‑destroying prayer usually happens when we think about the problem more than God's promise. Abraham did not focus on his weak body; he did not doubt God's promise. Let us be careful not to fall into the trap of praying ourselves out of faith.",
              "simpZh": "会让自己失去信心的祷告，等于否认圣经里神的应许，也否认祂放在我们心里轻声说的'是的'。那种祷告只是内心不安的表现，不安就表示我们不太相信神会回应。'我们这些相信的人已经进入安息。'这种破坏信心的祷告，通常是因为我们一直想着困难，而不是神的应许。亚伯拉罕没有一直想着自己身体软弱；他没有怀疑神的应许。我们要小心，不要掉进'把自己祷告出信心'的陷阱。"
            },
            {
              "en": "Faith is not a sense, nor sight nor reason, but a taking God at His Word. <br>—Evans. <br>The beginning of anxiety is the end of faith, and the beginning of true faith is the end of anxiety. <br>—George Mueller. <br>You will never learn faith in comfortable surroundings. God gives us the promises in a quiet hour; God seals our covenants with great and gracious words, then He steps back and waits to see how much we <span class=\"vocab-trigger\" data-vocab=\"believe\">believe<\/span>; then He lets the <span class=\"vocab-trigger\" data-vocab=\"tempter\">tempter<\/span> come, and the test seems to contradict all that He has spoken. It is then that faith wins its crown. That is the time to look up through the storm, and among the trembling, frightened seamen cry, \"I <span class=\"vocab-trigger\" data-vocab=\"believe\">believe<\/span> God that it shall be even as it was told me.\" <br><span class=\"vocab-trigger\" data-vocab=\"believe\">Believe<\/span> and trust; through stars and suns, <br>Through life and death, through soul and sense, <br>His wise, <span class=\"vocab-trigger\" data-vocab=\"paternal purpose\">paternal purpose<\/span> runs; <br>The darkness of His Providence <br>Is starlit with Divine intents.",
              "zh": "信心不是感觉，不是眼见，也不是理性，而是单纯地接受神的话。—埃文斯。焦虑的开始就是信心的结束，真信心的开始就是焦虑的终结。—乔治·穆勒。你在舒适的环境中永远学不会信心。神在宁静的时刻把应许赐给我们；神用伟大、恩惠的话语与我们立约，然后祂后退一步，等着看我们究竟相信多少；接着祂容许试探者来到，而试炼似乎与祂所说的一切相矛盾。就在那时，信心赢得冠冕。那就是透过风暴仰望的时刻，在战栗、惊恐的船员中间呼喊：「我信神，事情必要照祂告诉我的成就。」相信和信任吧；穿越星辰与太阳，穿越生死、灵魂与感官，祂智慧、慈父般的旨意运行着；祂护理之工的黑暗，满布神圣意旨的星光。",
              "simpEn": "Faith is not a feeling, not something you see, not logic—it is simply trusting what God says. Worry kills faith; true faith kills worry. You won't learn faith in easy times. God gives His promises in quiet moments and seals them with strong, kind words. Then He steps back to see if we really believe. Then He allows the tempter to come, and the test makes it look like God's promise is broken. That's when faith wins its crown. That is the time to look up through the storm and, when everyone is afraid, say: 'I believe God will do exactly what He told me.' Trust Him. Through everything—life, death, soul, senses—God's fatherly plan runs. Even the dark parts of His guidance are lit with stars of His purpose.",
              "simpZh": "信心不是感觉，不是看见，不是推理，只是单纯相信神说的话。忧虑一来，信心就没了；真信心一来，忧虑就没了。在舒服的环境里你学不会信心。神在安静的时候给我们应许，用伟大、恩慈的话语和我们立约，然后祂退后一步，看我们有多相信。接着祂允许试探者来，试炼看起来好像和祂说过的话相反。那时信心就得着奖赏。那就是在风暴中抬起头，在害怕的人中间大声说：'我信神，事情一定会像祂告诉我的那样发生。'信靠祂吧。穿过生死、灵魂感觉一切，神那父亲般的计划在运行。祂引导中的黑暗处，也满布神圣旨意的星光。"
            }
          ],

        {
          "sectionId": 5,
          "heading": "January 5",
          "audio": "audio/Streams in the Desert - January 5.m4a",
          "paragraphs": [
            {
              "en": "Lord, there is none beside Thee to help (2 Chron.14:11, R. V.). <span class=\"vocab-trigger\" data-vocab=\"Remind God of His entire responsibility\">Remind God of His entire responsibility<\/span>. \"There is none beside thee to help.\" The odds against Asa were <span class=\"vocab-trigger\" data-vocab=\"enormous\">enormous<\/span>. There was a million of men in arms against him, besides three hundred chariots. It seemed <span class=\"vocab-trigger\" data-vocab=\"impossible to hold his own\">impossible to hold his own<\/span> against that vast <span class=\"vocab-trigger\" data-vocab=\"multitude\">multitude<\/span>. There were no allies who would come to his help; his only hope, therefore, was in God.",
              "zh": "耶和华啊，除祢以外，没有帮助我们的。（历代志下14:11，修订译本）当提醒神，祂全然负责。「除祢以外，没有帮助我们的。」亚撒面对的力量悬殊极大。有一百万士兵，外加三百辆战车攻击他。抵挡那样庞大的军队似乎绝无可能。没有盟友前来相助；因此，他唯一的盼望在于神。",
              "simpEn": "Lord, there is no one besides You to help us. Remind God that He alone is responsible. The enemy against Asa was huge—a million soldiers and three hundred chariots. It looked impossible to stand against such a large force. No one else would help; so his only hope was God.",
              "simpZh": "主啊，除了你，没有人能帮我们。提醒神，只有祂能负责。亚撒的敌人非常多——一百万个士兵，还有三百辆战车。要抵抗这么大的军队看起来不可能。没有别人会帮忙，所以他唯一的希望就是神。"
            },
            {
              "en": "It may be that your difficulties have been allowed to come to so <span class=\"vocab-trigger\" data-vocab=\"alarming a pitch\">alarming a pitch<\/span> that you may be compelled to <span class=\"vocab-trigger\" data-vocab=\"renounce all creature aid\">renounce all creature aid<\/span>, to which in lesser trials you have had <span class=\"vocab-trigger\" data-vocab=\"recourse\">recourse<\/span>, and cast yourself back on your Almighty Friend. Put God between yourself and the foe. To Asa's faith, Jehovah seemed to stand between the might of Zerah and himself, as one who had no strength. Nor was he mistaken. We are told that the Ethiopians were destroyed before the Lord and before His host, as though <span class=\"vocab-trigger\" data-vocab=\"celestial combatants\">celestial combatants<\/span> flung themselves against the foe in Israel's behalf, and put the large host to <span class=\"vocab-trigger\" data-vocab=\"rout\">rout<\/span> so that Israel had only to follow up and gather the <span class=\"vocab-trigger\" data-vocab=\"spoil\">spoil<\/span>. Our God is Jehovah of hosts, who can summon unexpected <span class=\"vocab-trigger\" data-vocab=\"reinforcements\">reinforcements<\/span> at any moment to aid His people. <span class=\"vocab-trigger\" data-vocab=\"believe\">Believe<\/span> that He is there between you and your difficulty, and what baffles you will flee before Him, as clouds before the <span class=\"vocab-trigger\" data-vocab=\"gale\">gale<\/span>.",
              "zh": "你的困难或许被容许达到如此惊人的地步，以致你不得不放弃一切人的帮助——那种你在较小的试炼中所曾依赖的——转而全心投靠你全能的挚友。把神放在你自己和仇敌之间。在亚撒的信心看来，耶和华似乎站在谢拉的权势与他——一个毫无力量的人——之间。他没有看错。圣经告诉我们，埃塞俄比亚人在耶和华和祂的天军面前被摧毁，仿佛有天上的战士为以色列猛扑敌军，使那庞大的军队溃败，以色列人只需跟上去收取战利品。我们的神是万军之耶和华，祂随时都能召唤意想不到的援兵来帮助祂的子民。相信祂就在你和你的困难之间，那使你困惑的障碍必在祂面前逃跑，如同乌云被烈风驱散。",
              "simpEn": "Perhaps God let your troubles grow very big on purpose, so that you would stop depending on people and things (which you used in smaller problems) and instead throw yourself completely on God, your all‑powerful Friend. Put God between you and the problem. Asa saw God standing between himself and the huge army, even though Asa was weak. And he was right. The Bible says the enemy was beaten before the Lord and His army, as if heavenly soldiers fought for Israel and scattered the great army so Israel only had to follow and pick up the goods. Our God is the Lord of armies; He can send surprise help at any moment. Trust that He stands between you and your trouble, and the thing that confuses you will run away, like clouds blown by a strong wind.",
              "simpZh": "也许神让你的困难变得非常大，是故意的，让你不再依靠人和其他东西（你在小麻烦中靠过的那些），而是完全投向神这位全能的朋友。把神放在你和问题中间。亚撒看见神站在他和那庞大的敌军中间，即使亚撒自己很弱。他没看错。圣经说敌人在耶和华和祂的天军面前被打败，好像有天兵为以色列打仗，把那大军冲散，以色列人只需要跟在后面收取战利品。我们的神是万军之主，祂随时能派来意外的帮助。相信祂站在你和困难中间，那让你头痛的事就会跑掉，像乌云被大风刮走。"
            },
            {
              "en": "When nothing whereon to lean remains, <br>When <span class=\"vocab-trigger\" data-vocab=\"strongholds crumble to dust\">strongholds crumble to dust<\/span>; <br>When nothing is sure but that God still reigns, <br>That is just the time to trust. <br>'Tis better to walk by faith than sight, <br>In this path of yours and mine; <br>And the <span class=\"vocab-trigger\" data-vocab=\"pitch-black night\">pitch-black night<\/span>, when there's no outer light <br>Is the time for faith to shine. <br>Abraham believed God, and said to sight, \"Stand back!\" and to the laws of nature, \"Hold your peace!\" and to a <span class=\"vocab-trigger\" data-vocab=\"misgiving heart\">misgiving heart<\/span> \"Silence, thou lying <span class=\"vocab-trigger\" data-vocab=\"tempter\">tempter<\/span>!\" He believed God. —Joseph Parker",
              "zh": "当一切可依靠的都消失殆尽，当坚固堡垒化为尘土；当万事都不可确定，唯独神仍然掌权，那就是该信靠的时候。凭信心行路比凭眼见更好，在你我的这条路上；在墨黑的夜晚，外无亮光之时，正是信心闪亮的时刻。亚伯拉罕信神，对眼见说：「退后！」对自然法则说：「静默！」对疑虑的心说：「住口，你这说谎的试探者！」他信神。—约瑟夫·帕克",
              "simpEn": "When there is nothing left to lean on, when even strong forts turn to dust, and only one thing is certain—God still rules—that's the moment to trust. It is better to walk by faith than by what we see. In the pitch‑black night, with no light outside, faith shines brightest. Abraham believed God. He said to his eyes, 'Step back!', to the rules of nature, 'Be quiet!', and to his doubting heart, 'Silence, lying tempter!' He just believed God.",
              "simpZh": "当没有东西能依靠了，坚固的堡垒也碎成了灰，只有一件事是确定的——神仍然掌管——那就是该信靠的时候。凭信心走路比凭眼见走路更好。在漆黑的夜晚，外面没有灯光，正是信心发光的时刻。亚伯拉罕相信神。他对眼睛说：'退后！' 对自然规律说：'安静！' 对自己怀疑的心说：'闭嘴，说谎的试探者！' 他就这样相信神。"
            }

        {
          "sectionId": 6,
          "heading": "January 6",
          "audio": "audio/Streams in the Desert - January 6.m4a",
          "paragraphs": [
            {
              "en": "When thou <span class=\"vocab-trigger\" data-vocab=\"passest through the waters\">passest through the waters<\/span> ... they shall not <span class=\"vocab-trigger\" data-vocab=\"overflow thee\">overflow thee<\/span> (Isa.43:2).",
              "zh": "你从水中经过……水必不漫过你。（以赛亚书43:2）",
              "simpEn": "When you go through deep waters, they will not cover you or drown you.",
              "simpZh": "当你走过深水的时候，水不会淹没你。"
            },
            {
              "en": "God does not open paths for us in advance of our coming. He does not promise help before help is needed. He does not remove <span class=\"vocab-trigger\" data-vocab=\"Obstacles\">obstacles<\/span> out of our way before we reach them. Yet when we are on the edge of our need, God's hand is stretched out. Many people forget this, and are forever worrying about difficulties which they <span class=\"vocab-trigger\" data-vocab=\"foresee\">foresee<\/span> in the future. They expect that God is going to make the way plain and open before them, miles and miles ahead; whereas He has promised to do it only <span class=\"vocab-trigger\" data-vocab=\"step by step\">step by step<\/span> as they may need. You must get to the waters and into their floods before you can <span class=\"vocab-trigger\" data-vocab=\"claim the promise\">claim the promise<\/span>. Many people <span class=\"vocab-trigger\" data-vocab=\"dread death\">dread death<\/span>, and <span class=\"vocab-trigger\" data-vocab=\"lament\">lament<\/span> that they have not \"<span class=\"vocab-trigger\" data-vocab=\"dying grace\">dying grace<\/span>.\" Of course, they will not have <span class=\"vocab-trigger\" data-vocab=\"dying grace\">dying grace<\/span> when they are in good health, in the midst of life's duties, with death far in advance. Why should they have it then? Grace for duty is what they need then, living grace; then <span class=\"vocab-trigger\" data-vocab=\"dying grace\">dying grace<\/span> when they come to die.",
              "zh": "神不会在我们到达之前就开通道路。祂不在我们需要帮助之前就预先应许帮助。祂不提前挪开我们路上的障碍。然而，当我们到了急需的边缘时，神的手就伸出来。许多人忘了这一点，总是为将来预见到的困难忧虑。他们期望神在几英里之外就把道路铺平、开通；但神所应许的，只是他们需要的时候一步一步地成全。你必须到了水边，且进入水浪之中，才能领受这应许。许多人害怕死亡，哀叹自己没有「临终的恩典」。当然，他们在身体健康、忙于生活本分、离死亡尚远的时候，并不会有临终的恩典。那时他们为何要有呢？那时他们需要的是尽职的恩典，是生的恩典；临死时才需要临终的恩典。",
              "simpEn": "God does not clear the road before we get there. He doesn't promise to help before we actually need it. He doesn't remove the block from our path before we reach it. But just when we are about to need something, He reaches out His hand. Many people forget this and worry about problems they see coming in the future. They think God will make everything smooth miles ahead, but He only promised to help step by step as we go. You have to reach the water and feel its flood before you can grab hold of the promise. Some people are afraid of dying and are sad because they don't have 'grace for dying' right now. Of course they don't—they're healthy and busy with life, death is far away. Why would they need that grace now? They need grace for daily tasks, living grace. Dying grace comes when it's time to die.",
              "simpZh": "神不会在我们还没到之前就把路弄干净。祂不会在我们真的需要帮助之前就应许帮忙。祂不会提前把路上的石头搬开。但就在我们快要需要的时候，祂会伸手。很多人忘记这一点，为将来会发生的困难担心。他们以为神会在好几里外就把路弄平，但神只应许一边走一边帮助。你必须走到水边，进到水里，才能得到那个应许。有人怕死，又难过自己没有'临终的恩典'。当然没有——他们还健康、忙着过日子，死亡还很远。那时候为什么要有呢？他们需要的是每天做事的恩典，生活的恩典。临终的恩典到了临终时才会来。"
            },
            {

              "zh": "「你从水中经过的时候」波浪或许又深又冷，但耶和华是我们的避难所，祂的应许是我们所持守的；因为主亲口说过，这位信实、真实的上帝：「你来到水边的时候，必不下沉，而是穿过。」悲伤的海洋、试炼的汪洋，最苦的剧痛、最烈的折磨，滚滚的试探巨浪扫过心灵和脑海——它们绝不能漫过我们，因为我们知道祂的话是真的；祂所有的波浪、所有的洪涛，祂都必引导我们安然渡过。毁灭性的危险拍岸之浪，疑惑那阴险的暗流，都不能使我们沉没，不能把我们拖进哀伤的大洋深处；因为祂的应许要扶持我们。赞美主，祂的话是真实的！我们必不下沉，也不被淹没，因为祂说：「你必穿过。」——安妮·约翰逊·弗林特",

            {
              "en": "What is thy season this morning? Is it a season of <span class=\"vocab-trigger\" data-vocab=\"drought\">drought<\/span>? Then that is the season for showers. Is it a season of great <span class=\"vocab-trigger\" data-vocab=\"heaviness\">heaviness<\/span> and black clouds? Then that is the season for showers. \"As thy day so shall thy strength be.\" \"I will give thee <span class=\"vocab-trigger\" data-vocab=\"showers of blessing\">showers of blessing<\/span>.\" The word is in the plural. All kinds of blessings God will send. All God's blessings go together, like links in a golden chain. If He gives <span class=\"vocab-trigger\" data-vocab=\"converting grace\">converting grace<\/span>, He will also give <span class=\"vocab-trigger\" data-vocab=\"comforting grace\">comforting grace<\/span>. He will send \"showers of blessings.\" Look up today, O <span class=\"vocab-trigger\" data-vocab=\"parched plant\">parched plant<\/span>, and open thy leaves and flowers for a <span class=\"vocab-trigger\" data-vocab=\"heavenly watering\">heavenly watering<\/span>. —Spurgeon.",
              "zh": "今早你的时令是什么？是干旱的季节吗？那正是需要阵雨的时候。是深重阴霾、黑云密布的季节吗？那正是阵雨要来的时节。「你的日子如何，你的力量也必如何。」「我必赐福雨给你。」这个词是复数。神要赐下各样的祝福。神一切的祝福如同一根金链上的环节，联合在一起。祂若赐下使人悔改的恩典，也必赐下安慰的恩典。祂必赐下「祝福的甘霖」。哦，枯干的植物啊，今日向上仰望吧，张开你的叶子和花朵，迎接属天的浇灌。——司布真",
              "simpEn": "What is your season right now? Is it dry? That's the time for showers. Is it dark and heavy? That's the time for showers. 'Your strength will equal your days.' 'I will give you showers of blessing.' The word 'showers' means many. God sends all kinds of blessings, all connected like a gold chain. If He gives grace to turn you to Him, He will also give grace to comfort you. Look up, dry plant, and open your leaves for water from heaven.",
              "simpZh": "你现在的季节是什么？是干旱期吗？那就是该下雨的时候。是很沉重、黑云密布的时候吗？那也是该下雨的时候。'你的日子怎样，你的力量就怎样。' '我会赐给你祝福的阵雨。' '阵雨'是复数，意思是很多。神赐下各种各样的祝福，它们像金链子一样连在一起。如果祂赐恩典让你转向祂，祂也会赐恩典安慰你。枯干的植物啊，向上看，张开叶子，迎接天上的雨水吧。"

              "en": "Let but thy heart become a <span class=\"vocab-trigger\" data-vocab=\"valley low\">valley low<\/span>, And God will rain on it till it will overflow. <br>Thou, O Lord, canst <span class=\"vocab-trigger\" data-vocab=\"transform my thorn into a flower\">transform my thorn into a flower<\/span>. And I want my thorn transformed into a flower. Job got the sunshine after the rain, but has the rain been all waste? Job wants to know, I want to know, if the <span class=\"vocab-trigger\" data-vocab=\"shower\">shower<\/span> had nothing to do with the shining. And Thou canst tell me—Thy Cross can tell me. Thou hast crowned Thy sorrow. Be this my crown, O Lord. I only triumph In Thee when I have learned the <span class=\"vocab-trigger\" data-vocab=\"radiance of the rain\">radiance of the rain<\/span>. —George Matheson.",

            {
              "en": "The fruitful life seeks showers as well as sunshine. <br>The landscape, brown and <span class=\"vocab-trigger\" data-vocab=\"sere\">sere<\/span> beneath the sun, <br>Needs but the cloud to lift it into life; <br>The dews may damp the leaves of tree and flower, <br>But it requires the cloud-distilled <span class=\"vocab-trigger\" data-vocab=\"shower\">shower<\/span> <br>To bring rich <span class=\"vocab-trigger\" data-vocab=\"verdure\">verdure<\/span> to the lifeless life. <br>Ah, how like this, the landscape of a life: <br>Dews of trial fall like incense, rich and sweet; <br>But bearing little in the crystal tray— <br>Like <span class=\"vocab-trigger\" data-vocab=\"nymphs of night\">nymphs of night<\/span>, dews lift at break of day <br>And <span class=\"vocab-trigger\" data-vocab=\"transient impress\">transient impress<\/span> leave, like lips that meet. <br>But clouds of trials, bearing burdens rare, <br>Leave in the soul, a moisture settled deep: <br>Life kindles by the magic law of God; <br>And where before the thirsty camel trod, <br>There richest beauties to life's landscape leap. <br>Then read thou in each cloud that comes to thee <br>The words of Paul, in letters large and clear: <br>So shall those clouds thy soul with blessing feed, <br>And with a constant trust as thou dost read, <br>All things together work for good. <span class=\"vocab-trigger\" data-vocab=\"fret\">Fret<\/span> not, nor fear!",
              "zh": "丰盛的生命既寻求阳光，也寻求阵雨。棕黄枯萎的大地，只需云彩就能注入生机；露珠可以打湿树叶和花朵，却需要云间降下的阵雨，才能给无生命之物带来丰润的青绿。啊，生命的景象何尝不是如此：试炼的露珠如馨香之祭落下，甜美丰盈；但在水晶盘中却留不下什么——如同夜间的仙女，天一亮就消散，只留下短暂痕迹，像双唇的轻触。但试炼的乌云，携带着珍贵的负载，在灵魂深处留下持久滋润；生命因神奥妙的律法点旺；从前干渴骆驼踏过之处，生命美景中最丰饶的佳物骤然跃出。因此，要在每一朵临到你的云中读出保罗的话，字迹又大又清楚：这样，那些云就能用祝福喂养你的灵魂，当你以持久的信心诵读，就知道万事互相效力，叫爱神的人得益处。不要烦躁，也不要惧怕！",
              "simpEn": "A good life needs both sunshine and rain. The dry brown land just needs a cloud to come alive. Dew wets the leaves, but a real shower from the clouds brings deep green to dead plants. This is a picture of life: trials are like dew—rich and sweet, but they disappear quickly, leaving only a light mark. But trial clouds bring heavy loads; they leave deep wetness in the soul. Then life grows by God's magic. Where thirsty camels walked, now beautiful things leap up. So in every cloud, read Paul's words big and clear: everything works for good. Don't worry or be afraid!",

              "en": "I kept for nearly a year the flask-shaped <span class=\"vocab-trigger\" data-vocab=\"cocoon\">cocoon<\/span> of an emperor moth. It is very peculiar in its construction. A narrow opening is left in the neck of the flask, through which the perfect insect forces its way, so that a forsaken <span class=\"vocab-trigger\" data-vocab=\"cocoon\">cocoon<\/span> is as entire as one still <span class=\"vocab-trigger\" data-vocab=\"tenanted\">tenanted<\/span>, no <span class=\"vocab-trigger\" data-vocab=\"rupture\">rupture<\/span> of the interlacing fibers having taken place. The great <span class=\"vocab-trigger\" data-vocab=\"disproportion\">disproportion<\/span> between the means of <span class=\"vocab-trigger\" data-vocab=\"egress\">egress<\/span> and the size of the imprisoned insect makes one wonder how the exit is ever accomplished at all—and it never is without great labor and difficulty. It is supposed that the pressure to which the moth's body is subjected in passing through such a narrow opening is a provision of nature for forcing the juices into the vessels of the wings, these being less developed at the period of emerging from the <span class=\"vocab-trigger\" data-vocab=\"chrysalis\">chrysalis<\/span> than they are in other insects.",
              "zh": "我曾将一个帝王蛾的瓶状茧保存了近一年。它的构造非常特别。瓶颈处留有一个狭窄的出口，那完全成形的昆虫必须由此挤出，因此被弃的茧仍像有虫居住时一样完整，交织的纤维丝毫无损。出口之小与被囚昆虫身体之大，悬殊得令人惊奇，怎能出来？不经过极大的辛劳和艰难，绝无可能。据说，蛾身挤过如此狭窄出口时所受的压力，是自然界迫使体液进入翅脉的安排；这种昆虫在刚脱离蛹的时期，翅翼发育远不如其他昆虫。",
              "simpEn": "I kept an emperor moth's cocoon for almost a year. It was shaped like a bottle with a tiny opening. The moth must squeeze through that small hole, and the cocoon stays whole, not torn. The opening is very small compared to the insect's size. It seems impossible to get out except through hard struggle. It's thought that the tight squeeze pushes juices into the wings, because the wings are not fully grown when it leaves the chrysalis.",
              "simpZh": "我保存了一个帝王蛾的茧将近一年。它像个瓶子，瓶口很小。蛾子必须从那个小孔挤出来，茧还是完整的，纤维没有破。出口很小，虫子很大，让人奇怪它怎么出得来——不经过很大的挣扎根本出不来。人们认为，挤过窄口时身体受压，迫使体液进入翅膀，因为蛾子刚离开蛹的时候，翅膀还没长好。"
            },
            {
              "en": "I happened to witness the first efforts of my prisoned moth to escape from its long confinement. During a whole forenoon, from time to time, I watched it patiently <span class=\"vocab-trigger\" data-vocab=\"striving and struggling\">striving and struggling<\/span> to get out. It never seemed able to get beyond a certain point, and at last my patience was exhausted. Very probably the <span class=\"vocab-trigger\" data-vocab=\"confining fibers\">confining fibers<\/span> were drier and less elastic than if the <span class=\"vocab-trigger\" data-vocab=\"cocoon\">cocoon<\/span> had been left all winter on its native heather, as nature meant it to be. At all events I thought I was wiser and more compassionate than its Maker, and I resolved to give it a helping hand. With the point of my scissors I <span class=\"vocab-trigger\" data-vocab=\"snipped\">snipped<\/span> the confining threads to make the exit just a very little easier, and lo! immediately, and with perfect ease, out crawled my moth dragging a huge swollen body and little <span class=\"vocab-trigger\" data-vocab=\"shrivelled\">shrivelled<\/span> wings.",
              "zh": "我恰巧见证了被囚的蛾首次奋力脱离长期幽禁的情形。整个上午，我不时耐心地观察它挣扎着往外挤。它似乎永远无法越过来一地点，最后我不耐烦了。很可能那束缚的纤维比我设想的情形更干更硬，不如将茧留在野地石南丛中过冬时那样有弹性——那才是自然的原意。无论如何，我以为自己比造物主更智慧、更慈悲，决定帮它一把。我用剪刀尖端剪断束缚的丝线，让出口稍微容易些。看哪！立刻，它毫不费力就爬了出来，拖着臃肿的身体和小而干瘪的翅膀。",
              "simpEn": "I saw my moth trying to get out of its long prison. All morning I watched it struggle. It seemed stuck at one spot, and I got tired of waiting. Maybe the cocoon threads were too dry and stiff because I kept it inside instead of leaving it outside in the cold. I thought I knew better than God, so I decided to help. With small scissors I cut the threads just a little to make the hole bigger. Immediately the moth came out easily, but it had a fat body and tiny wrinkled wings.",
              "simpZh": "我看见被关的蛾子第一次想从长久关押中逃出来。整个上午我都在看它拼命挣扎往外挤。它好像卡在一个地方过不去，最后我失去了耐心。可能是我把茧留在屋里，那些丝线太干太硬，不如在野外过冬那么有弹性。我觉得自己比造它的神更聪明更慈悲，就决定帮忙。我拿剪刀尖剪断了一些线，让出口大一点。马上，它轻松爬出来，可它拖着大大的身体，翅膀又小又皱。"
            },
            {
              "en": "In vain I watched to see that <span class=\"vocab-trigger\" data-vocab=\"marvelous process of expansion\">marvelous process of expansion<\/span> in which these silently and swiftly develop before one's eyes; and as I traced the <span class=\"vocab-trigger\" data-vocab=\"exquisite spots and markings\">exquisite spots and markings<\/span> of <span class=\"vocab-trigger\" data-vocab=\"divers colors\">divers colors<\/span> which were all there in miniature, I longed to see these assume their due proportions and the creature appear in all its perfect beauty, as it is, in truth, one of the loveliest of its kind. But I looked in vain. My false <span class=\"vocab-trigger\" data-vocab=\"tenderness\">tenderness<\/span> had proved its ruin. It never was anything but a <span class=\"vocab-trigger\" data-vocab=\"stunted abortion\">stunted abortion<\/span>, crawling painfully through that brief life which it should have spent flying through the air on <span class=\"vocab-trigger\" data-vocab=\"rainbow wings\">rainbow wings<\/span>.",
              "zh": "我徒然等候着那奇妙舒展的过程——在眼前静静而迅速地展开。我端详着那些精巧的斑点和多种色彩的纹路，它们都以微型形式俱在；我渴望看到它们长成应有的比例，这只生物能以全然完美的美丽出现，它的确是同族中最可爱的种类之一。但我白等了。我虚伪的温柔毁了它。它始终不过是一只发育不全的畸形儿，痛苦地爬行度过那短暂一生，这本该是它用虹彩翅膀飞翔于空中的时光。",
              "simpEn": "I waited in vain to see the wings grow big and beautiful, which normally happens silently and quickly. I saw the lovely tiny patterns and colors on the small wings and hoped they'd become full size, because this moth is one of the most beautiful kinds. But I looked for nothing. My false kindness had ruined it. It remained a weak, deformed creature crawling painfully through a short life instead of flying on rainbow-colored wings.",
              "simpZh": "我等着看翅膀奇迹般变大，可是没等到。正常情况翅膀会静静地很快展开。我看见小翅膀上那些精巧的斑点和多种颜色，很想看见它们变成正常大小，因为这蛾子是最漂亮的种类之一。但我没等到。我假装的好心害了它。它一直是一只发育不全的畸形儿，痛苦地爬着过了短短的一生，本来它应该用彩虹般的翅膀在空中飞翔。"
            },
            {
              "en": "I have thought of it often, often, when watching with pitiful eyes those who were struggling with sorrow, suffering, and distress; and I would <span class=\"vocab-trigger\" data-vocab=\"fain\">fain<\/span> cut short the discipline and give <span class=\"vocab-trigger\" data-vocab=\"deliverance\">deliverance<\/span>. <span class=\"vocab-trigger\" data-vocab=\"Shortsighted man\">Shortsighted man<\/span>! How know I that one of these pangs or groans could be spared? The far-sighted, perfect love that seeks the <span class=\"vocab-trigger\" data-vocab=\"perfection\">perfection<\/span> of its object does not weakly shrink from present <span class=\"vocab-trigger\" data-vocab=\"transient suffering\">transient suffering<\/span>. Our Father's love is too true to be weak. Because He loves His children, He <span class=\"vocab-trigger\" data-vocab=\"chastises\">chastises<\/span> them that they may be <span class=\"vocab-trigger\" data-vocab=\"partakers of His holiness\">partakers of His holiness<\/span>. With this glorious end in view, He spares not for their crying. Made perfect through sufferings, as the Elder Brother was, the sons of God are trained up to obedience and brought to glory through much <span class=\"vocab-trigger\" data-vocab=\"tribulation\">tribulation<\/span>.",
              "zh": "我后来常常想起这事，每当我怀着怜悯的眼光看着那些在忧伤、苦难和困窘中挣扎的人，就想缩短那管教的过程，赐下解救。目光短浅的人哪！我怎知这些痛苦呻吟中有哪一个可以免除？那为要使对象得以完全的深远、完美之爱，不会因眼前短暂的苦难而软弱退缩。我们父神的爱太真实了，绝不软弱。正因祂爱儿女，才管教他们，使他们可以在祂的圣洁上有份。为着这荣耀的终点，祂并不顾惜他们的哭泣。神的众子，像长兄一样，因受苦得以完全，经过许多患难被训练顺服，被带进荣耀。",
              "simpEn": "I often remember that moth when I see people suffering and want to help them escape too quickly. How short‑sighted I am! How do I know any of their pain could be skipped? God's love is far‑seeing; it wants us to become perfect, so it doesn't weakly stop today's short pain. Our Father's love is too real to be weak. Because He loves His children, He disciplines them so they can share His holy character. With this wonderful goal in view, He doesn't spare their crying. God's sons, like Jesus the Older Brother, are made perfect through suffering and are trained to obey and brought to glory through many troubles.",
              "simpZh": "我后来常常想起那只蛾子。当我看见别人在受苦，想赶快帮他们解脱，我就想到这件事。我真是目光短浅！我怎么知道他们的痛苦中有哪一个可以省去？神的爱看得远，要让我们成为完全，所以不会因今天短暂的苦就心软退缩。天父的爱太真实了，不会软弱。正因祂爱儿女，祂才管教他们，让他们能分享祂的圣洁。为了这个荣耀的目标，祂不听他们的哭喊。神的儿子们像长兄耶稣一样，通过受苦变得完全，经过很多患难被训练顺服，被带进荣耀里。"
            }
          ],

        {
          "sectionId": 3,
          "heading": "January 10",
          "audio": "audio/Streams in the Desert - January 10.m4a",
          "paragraphs": [
            {
              "en": "They were <span class=\"vocab-trigger\" data-vocab=\"forbidden of the Holy Ghost\">forbidden of the Holy Ghost<\/span> to preach the word in Asia (Acts 16:6).",
              "zh": "他们被圣灵禁止在亚细亚传讲这道。（使徒行传16:6）",
              "simpEn": "The Holy Spirit did not allow them to preach in Asia.",
              "simpZh": "圣灵不让他们在亚细亚讲道。"
            },
            {
              "en": "It is interesting to study the methods of His guidance as it was extended towards these early <span class=\"vocab-trigger\" data-vocab=\"heralds of the Cross\">heralds of the Cross<\/span>. It consisted largely in <span class=\"vocab-trigger\" data-vocab=\"prohibitions\">prohibitions<\/span>, when they attempted to take another course than the right. When they would turn to the left to Asia, He stayed them. When they sought to turn to the right to Bithynia, again He stayed them. In after years Paul would do some of the greatest work of his life in that very region; but just now the door was closed against him by the Holy Spirit. The time was not yet ripe for the attack on these apparently <span class=\"vocab-trigger\" data-vocab=\"impregnable bastions\">impregnable bastions<\/span> of the kingdom of Satan. Apollos must come there for <span class=\"vocab-trigger\" data-vocab=\"pioneer work\">pioneer work<\/span>. Paul and Barnabas are needed yet more urgently elsewhere, and must receive further training before undertaking this responsible task.",
              "zh": "研究祂在这些早期十架先锋身上引导的方式，极为有趣。其中多由「禁止」构成。当他们试图走错方向时，祂就阻止。他们想向左往亚细亚去，祂就拦阻；他们想向右往庇推尼去，祂又拦阻。多年后，保罗将在这同一地区完成一生最伟大的工作；但当时圣灵却将那扇门向他关闭。攻击撒但王国那些似乎坚不可摧堡垒的时机尚未成熟。亚波罗必先去作开拓工作。保罗和巴拿巴在别处更为急需，必须在承接这项重任之前接受更多训练。",
              "simpEn": "It is interesting to see how God guided those early preachers. He often stopped them when they tried to go the wrong way. When they wanted to turn left to Asia, He stopped them. When they tried to turn right to Bithynia, He stopped them again. Years later Paul would do great work in that area, but at that moment the Holy Spirit closed the door. The time was not right to attack Satan's strong cities. Apollos needed to go first as a pioneer. Paul and Barnabas were needed more urgently somewhere else and had to be trained more before that big task.",
              "simpZh": "看神怎样引导早期传道人很有趣。祂常用'禁止'的方式。他们想往左去亚细亚，神就拦阻；想往右去庇推尼，神又拦阻。后来保罗会在那里做很大的工作，但那时圣灵关上了门。进攻撒但坚固堡垒的时机还没到。亚波罗必须先去开荒。保罗和巴拿巴在别处更急需，也要先接受更多训练才能担起重任。"
            },
            {
              "en": "Beloved, whenever you are doubtful as to your course, <span class=\"vocab-trigger\" data-vocab=\"submit your judgment absolutely\">submit your judgment absolutely<\/span> to the Spirit of God, and ask Him to shut against you every door but the right one. Say, \"Blessed Spirit, I cast on Thee the entire responsibility of closing against my steps any and every course which is not of God. Let me hear Thy voice behind me whenever I turn to the right hand or the left.\" In the meanwhile, continue along the path which you have been already treading. <span class=\"vocab-trigger\" data-vocab=\"Abide in the calling\">Abide in the calling<\/span> in which you are called, unless you are clearly told to do something else. The Spirit of Jesus waits to be to you, O pilgrim, what He was to Paul. Only be careful to obey His least prohibition; and where after believing prayer, there are no apparent hindrances, go forward with enlarged heart. Do not be surprised if the answer comes in closed doors. But when doors are shut right and left, an open road is sure to lead to <span class=\"vocab-trigger\" data-vocab=\"Troas\">Troas<\/span>. There Luke awaits, and <span class=\"vocab-trigger\" data-vocab=\"visions\">visions<\/span> will point the way, where vast opportunities stand open, and faithful friends are waiting.",
              "zh": "亲爱的，每当你对前路迷茫时，就将你的判断全然降服于神的灵，求祂为你关上一切不正确的门，只留下正路。说：「圣灵啊，我将全部的责任交托给你，求你关闭我脚步前一切不是出于神的途径。无论我何时偏左偏右，求让我听见你在后边的声音。」与此同时，继续走你已在行的路。持守你蒙召时的本分，除非你清楚蒙指示做别的事。客旅啊，耶稣的灵等候为你成就祂在保罗身上所成就的。只要谨慎遵行祂最小的禁令；在凭着信心祷告后，若没有明显的拦阻，就当放胆前行。如果答案以关闭的门呈现，不要惊奇。但当左右的门都关上，一条敞开的路必定通往特罗亚。路加在那里等候，异象将指明路径，广阔的机遇敞开，忠心的朋友正在等待。",
              "simpEn": "Dear friend, when you are not sure which way to go, give up your own thinking completely to God's Spirit and ask Him to close every door except the right one. Pray: 'Holy Spirit, I trust You fully to block any path that is not from God. Let me hear Your voice warning me when I turn the wrong way.' Keep walking the path you're already on. Stay in the job you have unless God clearly tells you otherwise. The Spirit of Jesus wants to guide you just as He guided Paul. Obey even His smallest 'no', and if after praying in faith there is no block, move ahead boldly. Don't be shocked if the answer is a closed door. When doors are shut on both sides, a clear road will open to Troas. There Luke waits, visions will show the way, big chances are open, and faithful friends are there.",
              "simpZh": "亲爱的，当你不知道该走哪条路时，把你的想法完全交给神的灵，求祂关掉所有不对的门，只留下对的那扇。祷告说：'圣灵啊，我完全信靠你，求你挡住我脚步前一切不出于神的路。无论我往左或往右，让我听见你后面的声音。' 继续走你现在走的路。守住你现在的本分，除非神清楚告诉你要做别的事。耶稣的灵要对你像对保罗一样。小心听祂最小的'不'，如果祷告信靠后没有拦阻，就大胆向前。别奇怪答案是关上的门。当左右的门都关了，一条开路一定通往特罗亚。那里路加在等，异象会指路，大机会开着，忠实的朋友都在等。"
            },
            {
              "en": "Is there some problem in your life to solve, <br>Some passage seeming full of mystery? <br>God knows, who brings the hidden things to light. <br>He keeps the key. <br>Is there some door closed by the Father's hand <br>Which widely opened you had hoped to see? <br>Trust God and wait—for when He shuts the door <br>He keeps the key. <br>Is there some earnest prayer unanswered yet, <br>Or answered NOT as you had thought 'twould be? <br>God will make clear His purpose by-and-by. <br>He keeps the key. <br>Have patience with your God, your patient God, <br>All wise, all knowing, no long <span class=\"vocab-trigger\" data-vocab=\"tarrier\">tarrier<\/span> He, <br>And of the door of all thy future life <br>He keeps the key. <br>Unfailing comfort, sweet and blessed rest, <br>To know of EVERY door <br>He keeps the key. <br>That He at last when just HE sees 'tis best, <br>Will give it THEE.",
              "zh": "你的生命中是否有什么难题待解，有什么经文似乎奥秘难明？神知道，祂使隐藏的事显明。祂握着钥匙。是否有扇门被父的手关上，你曾盼望它大大敞开？信靠神，等候——因为当祂关门时，祂握着钥匙。是否有个恳切的祷告尚未蒙允，或应允完全不如你所想？神将来必显明祂的旨意。祂握着钥匙。对你的神，那位忍耐的神存心忍耐，祂全智全知，绝不长久迟延；你未来人生的每一扇门，钥匙都在祂手中。无尽的安慰，甘甜蒙福的安息，乃在于知道——每一扇门祂都握着钥匙。至终，在祂看为最善的时候，祂会把钥匙交给你。",
              "simpEn": "Do you have a problem you can't solve or a situation full of mystery? God knows; He brings hidden things to light. He keeps the key. Is there a door the Father closed, though you wanted it wide open? Trust God and wait—when He shuts a door, He keeps the key. Is there a prayer not yet answered, or answered differently than you expected? God will make His plan clear later. He keeps the key. Be patient with your God, who is patient and wise; He does not delay long. For every door of your future, He keeps the key. What comfort! To know that He holds the key to every door, and at the right time He will give it to you.",
              "simpZh": "你生命中有难题解不开，有事情很神秘吗？神知道，祂能让隐藏的事显明。祂拿着钥匙。有一扇门被父神关上了，你本来想让它大开吗？信靠神，等候——因为祂关了门，但祂拿着钥匙。有诚恳的祷告还没回应，或者回应跟你期待的不同吗？神以后会显明祂的计划。祂拿着钥匙。对你的神要有耐心，祂是忍耐的神，满有智慧，不会耽误太久。你未来生活的每扇门，祂都拿着钥匙。这是何等的安慰！知道每扇门的钥匙在祂手里，到了最好的时候祂会给你。"

              "en": "Store up comfort. This was the prophet's mission. The world is full of <span class=\"vocab-trigger\" data-vocab=\"comfortless\">comfortless<\/span> hearts, and ere thou are sufficient for this lofty ministry, thou must be trained. And thy training is costly in the extreme; for, to render it perfect thou too must pass through the same afflictions as are wringing countless hearts of tears and blood. Thus thy own life becomes the <span class=\"vocab-trigger\" data-vocab=\"hospital ward\">hospital ward<\/span> where thou art taught the Divine art of comfort. Thou art wounded, that in the <span class=\"vocab-trigger\" data-vocab=\"binding up of thy wounds\">binding up of thy wounds<\/span> by the Great Physician, thou mayest learn how to render first aid to the wounded everywhere. Dost thou wonder why thou art passing through some special sorrow? Wait till ten years are passed, and thou wilt find many others <span class=\"vocab-trigger\" data-vocab=\"afflicted\">afflicted<\/span> as thou art. Thou wilt tell them how thou hast suffered and hast been comforted; then as the tale is unfolded, and the <span class=\"vocab-trigger\" data-vocab=\"anodynes\">anodynes<\/span> applied which once thy God wrapped around thee, in the eager look and the gleam of hope that shall chase the shadow of despair across the soul, thou shalt know why thou wast <span class=\"vocab-trigger\" data-vocab=\"afflicted\">afflicted<\/span>, and bless God for the discipline that stored thy life with such a fund of experience and helpfulness.",
              "zh": "积存安慰。这是先知的使命。这世界充满了不得安慰的心，而你在足以担起这崇高职事之前，必须受训。你的训练极其昂贵；因为若要训练得完备，你必须经历同样使无数人心淌血流泪的苦难。这样，你的生命就成了病房，在那里你被教导那神圣的安慰之道。你受伤，好叫那位大医生在包扎你的伤口时，你能学会为各处的伤者提供急救。你是否不明白为何正经历某种特殊的忧伤？等到十年之后，你必发现许多人与你受同样的苦。你要告诉他们自己曾如何受苦并得了安慰；当你将故事陈明，将从前神包裹你的止痛油膏敷上时，在那热切的眼神与那道将绝望阴影赶出灵魂的希望之光中，你就会知道自己为何受苦，并因那将如此丰富的经历与助人之力储藏在你生命中的管教而称颂神。",
              "simpEn": "Save up comfort. This was the prophet's job. The world is full of sad hearts, but before you can do this high task, you must be trained. The training is very costly. To be perfect, you must go through the same troubles that bring tears and blood to many others. Your own life becomes a hospital room where you learn God's way of comforting. You are hurt so that when the Great Doctor bandages your wounds, you can learn how to help other wounded people. Do you wonder why you have some special sadness? Wait ten years, and you'll find many others with the same pain. You'll tell them how you suffered and were comforted. As you share your story and use the same soothing medicine God once gave you, you will see hope chase away despair in their eyes, and then you'll know why you were troubled and thank God for the training that filled your life with experience and the power to help.",
              "simpZh": "积存安慰。这是先知的工作。世界充满伤心人，但你要能做这件高尚工作，必须先受训练。训练代价很大；为了完全，你必须经历同样的苦难——那些让别人流血流泪的苦难。这样你的生命就成了病房，在那里学习神安慰人的方法。你受伤，是为了当那位大医生包扎你伤口时，你能学会怎样急救其他受伤的人。你想不通为什么经历特别的悲伤吗？等十年，你会发现很多人和你有一样的苦。你会告诉他们你怎样受苦又怎样得了安慰。当你把故事讲出来，把神曾给你敷的止痛药敷在他们身上，看见希望赶走绝望，你就知道当初为什么受苦，并感谢神用管教让你的生命装满了经验和帮助人的能力。"
            },
            {
              "en": "God does not comfort us to make us comfortable, but to make us comforters. —Dr. Jowett.",
              "zh": "神安慰我们，不是要让我们舒适，而是要让我们成为安慰者。——乔伊特博士",
              "simpEn": "God doesn't comfort us just to make us feel good, but to make us people who can comfort others.",
              "simpZh": "神安慰我们，不是只让我们舒服，而是要把我们变成能安慰别人的人。"
            },
            {
              "en": "They tell me I must <span class=\"vocab-trigger\" data-vocab=\"bruise\">bruise<\/span> <br>The rose's leaf, <br>Ere I can keep and use <br>Its fragrance brief. <br>They tell me I must break <br>The skylark's heart, <br>Ere her cage song will make <br>The silence start. <br>They tell me love must bleed, <br>And friendship weep, <br>Ere in my deepest need <br>I touch that deep. <br>Must it be always so <br>With precious things? <br>Must they be bruised and go <br>With beaten wings? <br>Ah, yes! by crushing days, <br>By caging nights, by scar <br>Of thorn and stony ways, <br>These blessings are!",
              "zh": "他们告诉我，我必须揉碎玫瑰的叶子，才能保存和享用它短暂的芬芳。他们告诉我，我必须打破云雀的心，它才能在笼中歌唱，打破寂静。他们告诉我，爱必须流血，友谊必须哭泣，然后在我最深的困苦中，才能触及那份深邃。宝贵的事物是否总要如此？它们是否总要被压伤，带着残损的翅膀前行？啊，是的！借着破碎的日子，借着囚笼般的黑夜，借着荆棘和石路上的伤痕，这些祝福方得以成形！",
              "simpEn": "They say I must crush the rose leaf before I can keep its sweet smell. They say I must break the skylark's heart before her cage song can break the silence. They say love must bleed and friendship must cry before I can touch the deepest things. Must everything precious be treated this way? Must they be hurt and fly with broken wings? Yes! Through crushing days, nights like cages, scars from thorns and stony paths—these are how blessings come!",
              "simpZh": "他们说，我必须揉碎玫瑰花瓣，才能留住它短暂的香气。我必须打破云雀的心，它关在笼里的歌声才能打破寂静。爱必须流血，友谊必须流泪，然后我在最深的困苦中才能触到那深处。宝贵的东西是不是总要这样？它们是不是总要被压伤，拖着受伤的翅膀前行？是的！借着破碎的日子，像笼子一样的夜晚，荆棘和石头路上的伤疤——祝福就是这样来的！"
            }

        {
          "sectionId": 5,
          "heading": "January 12",
          "audio": "audio/Streams in the Desert - January 12.m4a",
          "paragraphs": [
            {
              "en": "Reckon it nothing but joy ... whenever you find yourselves <span class=\"vocab-trigger\" data-vocab=\"hedged in\">hedged in<\/span> by the various trials, be assured that the testing of your faith leads to power of endurance (James 1:2,3, Weymouth).",
              "zh": "每逢你们被各种试炼包围，都要算为喜乐……因为知道你们的信心经过试验，就生忍耐。（雅各书1:2-3，韦默思译本）",
              "simpEn": "Think of it as pure joy when you are surrounded by many kinds of troubles, because you know the testing of your faith makes you stronger to endure.",
              "simpZh": "当你被各种困难围住时，要当作完全的喜乐，因为你知道信心经过考验会生出耐力。"
            },
            {
              "en": "God <span class=\"vocab-trigger\" data-vocab=\"hedges in\">hedges in<\/span> His own that He may preserve them, but oftentimes they only see the wrong side of the hedge, and so misunderstand His dealings. It was so with Job (Job 3:23). Ah, but Satan knew the value of that hedge! See his testimony in chapter 1:10. Through the leaves of every trial there are <span class=\"vocab-trigger\" data-vocab=\"chinks of light\">chinks of light<\/span> to shine through. Thorns do not prick you unless you lean against them, and not one touches without His knowledge. The words that hurt you, the letter which gave you pain, the cruel wound of your dearest friend, <span class=\"vocab-trigger\" data-vocab=\"shortness of money\">shortness of money<\/span>—are all known to Him, who sympathizes as none else can and watches to see, if, through all, you will dare to trust Him wholly.",
              "zh": "神圈护属祂的人，为要保全他们；但他们常常只看见篱笆不对的一面，因此误解了祂的作为。约伯也是如此（伯3:23）。啊，但撒但知道那篱笆的价值！看他在约伯记1:10的证词。每一片试炼的叶子中间都有光线透入的缝隙。你若不靠向荆棘，刺不会扎你；没有一根刺能在祂不知情下触碰你。伤你的言语、令你痛苦的信函、挚友残酷的伤害、金钱的短缺——祂全都知道，祂的同情无与伦比，祂正观看，要看你是否在这一切中间仍敢全然信靠祂。",
              "simpEn": "God puts a fence around His people to protect them, but often they only see the wrong side of the fence and misunderstand His ways. Job did the same. Yet Satan knew the fence's value! In every trial, there are cracks where light shines through. Thorns only hurt if you lean on them, and none touches you without God knowing. The words that hurt, the painful letter, the wound from a close friend, not having enough money—God knows it all. He cares like no one else and watches to see if you will still trust Him completely through everything.",
              "simpZh": "神用篱笆把祂的子民围起来保护他们，但他们常只看到篱笆不好的一面，误解神的作为。约伯就是这样。可是撒但知道那道篱笆的价值！每一个试炼的叶子里都有光线透进来。荆棘你不靠上去不会扎你，没有一根刺碰到你神不知道。伤人的话、痛苦的信、好朋友的伤害、缺钱——神全都知道，祂比谁都同情你，祂在看你是否在这一切当中还敢完全信靠祂。"
            },
            {
              "en": "The <span class=\"vocab-trigger\" data-vocab=\"hawthorn hedge\">hawthorn hedge<\/span> that keeps us from intruding, <br>Looks very fierce and bare <br>When stripped by winter, every branch protruding <br>Its thorns that would wound and tear. <br>But spring-time comes; and like the <span class=\"vocab-trigger\" data-vocab=\"rod that budded\">rod that budded<\/span>, <br>Each twig breaks out in green; <br>And cushions soft of tender leaves are studded, <br>Where spines alone were seen. <br>The sorrows, that to us seem so perplexing, <br>Are mercies kindly sent <br>To guard our <span class=\"vocab-trigger\" data-vocab=\"wayward\">wayward<\/span> souls from sadder vexing, <br>And greater ills prevent. <br>To save us from the pit, no screen of roses <br>Would serve for our defense, <br>The <span class=\"vocab-trigger\" data-vocab=\"hindrance\">hindrance<\/span> that completely <span class=\"vocab-trigger\" data-vocab=\"interposes\">interposes<\/span> <br>Stings back like thorny fence. <br>At first when smarting from the shock, complaining <br>Of wounds that freely bleed, <br>God's hedges of severity us paining, <br>May seem severe indeed. <br>But afterwards, God's blessed spring-time cometh, <br>And bitter murmurs cease; <br>The sharp severity that pierced us bloometh, <br>And yields the fruits of peace. <br>Then let us sing, our guarded way thus wending <br>Life's hidden <span class=\"vocab-trigger\" data-vocab=\"snares\">snares<\/span> among, <br>Of mercy and of judgment sweetly blending; <br>Earth's sad, but lovely song.",
              "zh": "那阻止我们擅闯的山楂树篱，冬天光秃时显得狰狞可怖，每根枝子突出，满布能伤能扯的尖刺。但春天一到；如同那发了芽的杖，每根嫩枝都迸发绿意；从前只看见尖刺之处，如今镶嵌着嫩叶的软垫。那看似令人困惑的忧伤，原是慈爱赐下的怜悯，为保守我们偏执的灵魂免于更深的烦恼，并防止更大的恶事。为救我们脱离深坑，玫瑰花屏无法用作防御，那彻底挡道的阻碍，像多刺的篱笆一样令人刺痛。起初在震痛中抱怨流血不止的伤口，神严厉的篱笆使我们疼痛，当时的确显得苛刻。但后来，神所赐的春天来到，一切苦毒怨言止息；从前刺透我们的锋利之痛绽放花朵，结出平安的果实。因此，当我们行走在这守护之路，穿过生命隐藏的网罗时，让我们歌唱：怜悯与审判甜美交融；这是地上忧伤而可爱的歌。",
              "simpEn": "The thorny hedge that keeps us out looks fierce and bare in winter, with sharp branches. But spring comes; like Aaron's rod that budded, each twig turns green and soft leaves appear where there were only thorns. The sorrows that puzzle us are really mercies sent to guard our wandering souls from worse trouble. A soft rose screen could not protect us from the pit; we need a thorny fence that stings. At first we hurt and complain about bleeding wounds; God's strict hedges feel severe. But later, God's spring comes and bitter complaints stop. The sharp pain blooms and gives peaceful fruit. So let us sing as we walk the guarded path among life's hidden traps: mercy and judgment sweetly mixed—earth's sad but lovely song.",
              "simpZh": "冬天山楂树篱看起来又凶又光秃，每根枝子都有刺。春天一到，就像亚伦的杖发了芽，每根嫩枝变绿，长出了软叶，从前只有刺的地方有了垫子。让我们困惑的忧伤，其实是神仁慈赐下的保护，免得我们任性偏行的灵魂遇上更糟的事。要救我们脱离陷阱，软玫瑰花屏没用，我们需要会刺痛的多刺篱笆。一开始我们疼得抱怨流血，觉得神严厉的篱笆太苛刻。但后来，神的春天来到，苦毒的怨言停了。那刺透我们的锋利痛苦开了花，结出平安的果子。所以，当我们在生命隐藏的网罗中走在被守护的路上，让我们歌唱：怜悯和审判甜美地混在一起——这是地上忧伤却可爱的歌。"
            }
