          "paragraphs": [
            {
              "en": "I have begun to give; … begin to possess (Deut.2:31).",
              "zh": "我已开始将这地赐给你……你起来，开始去得吧。（申命记2:31）",
              "simpEn": "I have begun to give; begin to take possession.",
              "simpZh": "我已经开始赐给你；你要开始去得着。"
            },
            {
              "en": "A great deal is said in the Bible about waiting for God. The lesson cannot be too strongly <span class=\"vocab-trigger\" data-vocab=\"enforced\">enforced<\/span>. We easily grow impatient of God's delays. Much of our trouble in life comes out of our restless, sometimes reckless, <span class=\"vocab-trigger\" data-vocab=\"haste\">haste<\/span>. We cannot wait for the fruit to ripen, but insist on <span class=\"vocab-trigger\" data-vocab=\"plucking it while it is green\">plucking it while it is green<\/span>. We cannot wait for the answers to our prayers, although the things we ask for may require long years in their preparation for us. We are <span class=\"vocab-trigger\" data-vocab=\"exhorted\">exhorted<\/span> to <span class=\"vocab-trigger\" data-vocab=\"WALK WITH GOD\">walk with God<\/span>; but ofttimes God walks very slowly. But there is another phase of the lesson. God often waits for us.",
              "zh": "圣经中有许多关于等候神的话。这个功课怎么强调都不过分。我们很容易对神的迟延失去耐心。人生许多麻烦，都出于我们那焦躁、有时甚至鲁莽的急躁。我们不能等候果子成熟，却坚持青涩时就摘下来。我们不能等候祷告的答复，尽管我们所求的可能需要漫长的年日来为我们预备。我们被劝勉要与神同行；但神往往走得很慢。然而，这功课还有另一面。神常等候我们。",
              "simpEn": "The Bible says much about waiting for God. We easily get impatient with His delays. Many troubles come from our restless, hasty rushing. We can't wait for fruit to ripen but pick it green. We can't wait for prayer answers, though they may need years to prepare. We're told to walk with God, but He often walks slowly. Yet there's another side: God often waits for us.",
              "simpZh": "圣经讲了很多等候神。我们容易对神的延迟不耐烦。很多麻烦来自性急、莽撞。我们不等果子熟就摘青的；不等祷告回应，虽然可能需要多年预备。我们被劝要与神同行，但神常走得慢。不过还有另一面：神常等我们。"
            },
            {
              "en": "We fail many times to receive the blessing He has ready for us, because we do not go forward with Him. While we miss much good through not waiting for God, we also miss much through <span class=\"vocab-trigger\" data-vocab=\"over-waiting\">over-waiting<\/span>. There are times when our strength is to <span class=\"vocab-trigger\" data-vocab=\"Sit still\">sit still<\/span>, but there are also times when we are to go forward with a firm step.",
              "zh": "我们多次未能得着祂早已为我们预备好的福分，因为我们没有与祂一同前行。我们既因不等候神而失去许多好处，也因过度的等候而失去许多。有时我们的力量在于静坐不动，但也有时我们必须以坚定的步伐向前迈进。",
              "simpEn": "Often we miss the blessing He has ready because we don't move forward with Him. While we lose much by not waiting, we also lose much by waiting too long. There are times to sit still, but also times to step forward firmly.",
              "simpZh": "我们常因不与神一同前进，而错过祂预备好的祝福。不等候会失去很多，但等太久也会失去。有时要静坐，但也有时要坚定向前。"
            },
            {
              "en": "There are many Divine promises which are conditioned upon the beginning of some action on our part. When we begin to obey, God will begin to bless us. Great things were promised to Abraham, but not one of them could have been obtained by waiting in <span class=\"vocab-trigger\" data-vocab=\"Chaldea\">Chaldea<\/span>. He must leave home, friends, and country, and go out into unknown paths and press on in <span class=\"vocab-trigger\" data-vocab=\"unfaltering obedience\">unfaltering obedience<\/span> in order to receive the promises. The ten lepers were told to show themselves to the priest, and \"as they went they were <span class=\"vocab-trigger\" data-vocab=\"cleansed\">cleansed<\/span>.\" If they had waited to see the cleansing come in their flesh before they would start, they would never have seen it. God was waiting to cleanse them; and the moment their faith began to work, the blessing came.",
              "zh": "有许多属天的应许，是以我们开始采取某种行动为条件的。我们一顺服，神就开始赐福。神曾向亚伯拉罕应许大事，但若他一直在迦勒底等候，就得不到其中任何一件。他必须离开家乡、朋友和本土，进入未知之路，以毫不动摇的顺服向前，才能承受应许。那十个麻疯病人被吩咐去把身体给祭司察看，他们「去的时候就洁净了」。倘若他们非要先看见身上的洁净才肯动身，就永远也看不见。神正等候要洁净他们；他们的信心一开始行动，祝福就临到了。",
              "simpEn": "Many of God's promises depend on our first step of action. When we obey, He blesses. Great promises were given to Abraham, but none would have come if he stayed in Chaldea. He had to leave home and press on in unwavering obedience. The ten lepers were told to go show themselves to the priest, and 'as they went, they were cleansed.' If they had waited to see healing first, they'd never have seen it. God was waiting to heal; the moment their faith moved, the blessing came.",
              "simpZh": "许多神的应许需要我们开始行动。我们顺服，祂就赐福。亚伯拉罕若留在迦勒底等候，就无法得到应许；他必须离开家，以不动摇的顺服前行。十个麻疯病人被吩咐去给祭司看，‘去的时候就洁净了’。如果等看见洁净再动身，永远看不到。神正等着洁净他们；信心一行动，祝福就来了。"
            },
            {
              "en": "When the Israelites were shut in by a pursuing army at the Red Sea, they were commanded to \"Go forward.\" Their duty was no longer one of waiting, but of rising up from bended knees and going forward in the way of <span class=\"vocab-trigger\" data-vocab=\"heroic faith\">heroic faith<\/span>. They were commanded to show their faith at another time by beginning their march over the Jordan while the river ran to its widest banks. The key to unlock the gate into the <span class=\"vocab-trigger\" data-vocab=\"land of promise\">Land of Promise<\/span> they held in their own hands, and the gate would not turn on its hinges until they had approached it and unlocked it. That key was faith. We are set to fight certain battles. We say we can never be victorious; that we never can conquer these enemies; but as we enter the conflict One comes and fights by our side, and through Him we are <span class=\"vocab-trigger\" data-vocab=\"more than conquerors\">more than conquerors<\/span>. If we had waited, trembling and fearing, for our Helper to come before we would join the battle, we should have waited in vain. This would have been the <span class=\"vocab-trigger\" data-vocab=\"over-waiting of unbelief\">over-waiting of unbelief<\/span>. God is waiting to pour richest blessings upon you. Press forward with bold confidence and take what is yours. \"I have begun to give, begin to possess.\" —J.R. Miller.",
              "zh": "以色列人在红海边被追兵围困时，被吩咐「向前走」。他们的本分不再是等候，乃是从屈膝中起来，以英勇的信心前行。另一次，他们被吩咐在约旦河水涨过两岸时开始渡河，以显明信心。开启应许地之门的钥匙就在他们手中；若不前去开锁，门就不会转动。那把钥匙就是信心。我们被派定要打某些仗。我们说我们绝不可能得胜，绝不可能征服这些仇敌；但我们进入战阵时，就有一位来与我们并肩作战，靠着祂，我们就得胜有余。如果我们战栗惧怕，等候帮助者先来到才肯参战，那就是徒然等候了。那是不信的过度等候。神正等着将最丰盛的福分倾注于你。以勇敢的信心向前，得着属于你的。「我已开始赐给，你开始去得吧。」——J.R.米勒",
              "simpEn": "At the Red Sea, with the enemy behind, Israel was told 'Go forward.' They had to rise from kneeling and move ahead in heroic faith. Later they were to step into the flooded Jordan, trusting God. The key to the Promised Land was faith, and they held it; the gate would not open until they approached and unlocked it. We are called to fight battles. We think we can't win, but when we step into the fight, One comes alongside and makes us more than conquerors. If we wait in fear for the Helper before joining, we wait in vain—that's the over-waiting of unbelief. God is ready to pour blessings. Press forward boldly and take what is yours. 'I have begun to give, begin to possess.'",
              "simpZh": "以色列人在红海被追兵困住时，神说‘向前走’。他们要从跪下中起来，以勇敢的信心前行。后来又要他们在约旦河涨水时踏进去。打开应许地门的钥匙是信心，钥匙在他们手里；不前去开锁，门不会转动。我们奉命打一些仗。我们觉得不会赢，但一进入战斗，就有一位来并肩作战，使我们得胜有余。如果害怕等待帮助者先来才参战，那就是不信的过度等候。神正等着倾福给你。勇敢向前，拿取属于你的。‘我已开始赐给，你开始去得吧。’"
            }

          "paragraphs": [
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Stablish, strengthen, settle\">Stablish, strengthen, settle<\/span> you (1Peter 5:10).",
              "zh": "那赐诸般恩典的神……必要亲自成全你们，坚固你们，赐力量给你们。（彼得前书5:10）",
              "simpEn": "God will make you stable, strong, and settled.",
              "simpZh": "神要使你稳固、刚强、安定。"
            },
            {
              "en": "In taking Christ in any new relationship, we must first have sufficient <span class=\"vocab-trigger\" data-vocab=\"intellectual light\">intellectual light<\/span> to satisfy our mind that we are entitled to stand in this relationship. The shadow of a question here will wreck our confidence. Then, having seen this, we must make the <span class=\"vocab-trigger\" data-vocab=\"venture\">venture<\/span>, the <span class=\"vocab-trigger\" data-vocab=\"committal\">committal<\/span>, the choice, and take the place just as definitely as the tree is planted in the soil, or the bride gives herself away at the marriage altar. It must be once for all, without reserve, without recall.",
              "zh": "每当我们在基督里接受任何新的关系时，首先必须有足够的心思亮光，使我们的悟性满意，知道我们有资格站在这关系中。任何一丝疑问的阴影都会摧毁我们的信心。看清了这一点之后，我们就必须冒险、交托、作出选择，并像树栽于土中、或新娘在婚礼坛前献出自己那样，明确地站定地位。这必须是一劳永逸的，毫无保留，绝不反悔。",
              "simpEn": "When we take a new relationship with Christ, we need enough mental clarity to know we have a right to stand there; any doubt will wreck confidence. Then we must make the venture, commitment, and choice—definite like planting a tree or a bride giving herself away at the altar. It must be once and for all, with no holding back and no taking back.",
              "simpZh": "在基督里接受新关系时，我们要有足够心思亮光，确信自己有权站在这关系里；任何疑问都会破坏信心。看清后就要冒险、交托、选择，像树栽下或新娘在坛前献上自己一样明确。要一次永远，毫无保留，不反悔。"

            {
              "en": "Then there is a season of establishing, settling and testing, during which we must \"stay put\" until the new relationship gets so <span class=\"vocab-trigger\" data-vocab=\"fixed\">fixed<\/span> as to become a permanent habit. It is just the same as when the surgeon sets the broken arm. He puts it in <span class=\"vocab-trigger\" data-vocab=\"splints\">splints<\/span> to keep it from <span class=\"vocab-trigger\" data-vocab=\"vibration\">vibration<\/span>. So God has His spiritual <span class=\"vocab-trigger\" data-vocab=\"splints\">splints<\/span> that He wants to put upon His children and keep them quiet and unmoved until they pass the first stage of faith. It is not always easy work for us, \"but the God of all grace, who hath called us unto his eternal glory by Jesus Christ, after that ye have suffered awhile, <span class=\"vocab-trigger\" data-vocab=\"Stablish, strengthen, settle\">stablish, strengthen, settle<\/span> you.\" —A.B. Simpson.",
              "zh": "然后有一段建立、安定和试验的时期，其间我们须「留在原处」，直到那新的关系深深固定，成为永久的习惯。正像外科医生接好断臂，用夹板固定，防止震动。照样，神有祂属灵的夹板，要加在祂儿女身上，保守他们安静不动，直到他们度过信心的初阶。这对我们未必总是容易的，「但那赐诸般恩典的神，曾在基督里召你们，得享祂永远的荣耀，等你们暂受苦难之后，必要亲自成全你们，坚固你们，赐力量给你们。」——宣信",
              "simpEn": "Then comes a time of being established, settled, and tested, where we must stay put until the new relationship becomes a permanent habit, like a surgeon setting a broken arm with splints to keep it still. God has spiritual splints to keep His children quiet and unmoved until they pass through early faith. It's not easy, but 'the God of all grace, after you have suffered a little while, will Himself establish, strengthen, and settle you.'",
              "simpZh": "然后有一个被建立、安定和试验的时期，我们必须留在原处，直到新关系成为固定习惯，就像医生用夹板固定断臂，不让震动。神有属灵的夹板，要把祂的儿女稳住不动，直到度过信心初阶。这不总是容易的，但‘那赐诸般恩典的神，等你们暂受苦难之后，必亲自成全、坚固、赐力量给你们。’"
            },
            {
              "en": "There is a natural law in sin and sickness; and if we just let ourselves go and sink into the trend of circumstances, we shall go down and sink under the power of the <span class=\"vocab-trigger\" data-vocab=\"tempter\">tempter<\/span>. But there is another law of spiritual life and of physical life in Christ Jesus to which we can rise, and through which we can <span class=\"vocab-trigger\" data-vocab=\"counterpoise\">counterpoise<\/span> and overcome the other law that bears us down. But to do this requires real spiritual energy and <span class=\"vocab-trigger\" data-vocab=\"fixed\">fixed<\/span> purpose and a settled posture and habit of faith. It is just the same as when we use the power in our factory. We must turn on the belt and keep it on. The power is there, but we must keep the connection; and while we do so, the higher power will work and all the machinery will be in operation. There is a spiritual law of choosing, believing, <span class=\"vocab-trigger\" data-vocab=\"abiding\">abiding<\/span>, and holding steady in our <span class=\"vocab-trigger\" data-vocab=\"WALK WITH GOD\">walk with God<\/span>, which is essential to the working of the Holy Ghost either in our <span class=\"vocab-trigger\" data-vocab=\"sanctification\">sanctification<\/span> or healing.",
              "zh": "在罪与疾病中有一种自然的律；我们若放任自己、沉溺于环境趋势，就会下沉，被试探者的权势压倒。但在基督耶稣里另有一种属灵生命与肉身生命的律，我们可以上升到其中，借此抗衡并胜过那把我们往下拖的律。然而，这需要真实的属灵精力、坚定的志向，以及固定的信心姿态和习惯。正如我们使用工厂里的动力：必须接上皮带并保持连接。动力固然存在，但我们必须保持连结；这样，更高的动力就运行，一切机器都会运转。在与神同行中，有一条选择、相信、常住和持守稳定的属灵定律，这对于圣灵在我们成圣或医治中的工作都是不可或缺的。",
              "simpEn": "Sin and sickness have a downward pull; if we just drift, we sink under the tempter. But there is a higher law of life in Christ that can counterbalance and overcome the downward law. This requires real spiritual energy, a fixed purpose, and a steady habit of faith. It's like using power in a factory: you must engage the belt and keep it connected. The power is there, but you must maintain the connection; then the higher power works and all machinery runs. There is a spiritual law of choosing, believing, abiding, and holding steady, which is essential for the Holy Spirit's work in making us holy or healing us.",
              "simpZh": "罪和疾病有往下拉的自然律；如果我们随波逐流，就会沉在试探者手下。但在基督里有更高的生命律，能抗衡并胜过下坠的律。这需要真实的属灵力量、坚定的目标和固定的信心习惯。就像工厂用电，必须接上皮带并保持连接。动力在，但要保持连接，然后更高的动力就运行，机器就工作。有一条属灵定律：选择、相信、住在主里、站稳，这对圣灵使我们成圣或医治的工作很关键。"

              "zh": "老琴师是何等钟爱他的琴瑟！他如何像怀抱婴孩般抚弄亲昵它。他的生命与它相连。但你看他调音的时候：他紧紧握住它，用一记锐利快速的拨动弹响一根弦；当它疼痛似的颤动时，他俯身专注地捕捉那升起的第一个音。那音，正如他所担心的，是假涩的。他用那折磨人的拇指弦钮拉紧琴弦；尽管张力大得似乎随时会绷断，他还是再次拨弹，像先前那样弯腰柔声倾听，终于，当第一个真实的音调颤动着升起时，你看见他脸上浮现了笑容。",
              "simpEn": "How an old harper loves his harp! He caresses it like a child on his chest. His life is tied to it. But watch him tune it: he grips it, strikes a string with a sharp blow; as it shivers as if in pain, he bends close to hear the first sound. It's false and harsh. He tightens the string with a painful thumb-screw until it seems about to break, strikes again, listens softly, and at last a smile comes as the first true tone rises.",
              "simpZh": "老琴师多么爱他的琴！像抱婴孩一样抚弄它。他的生命与它相连。但看他调音：他抓紧琴，用力拨一根弦；琴弦像疼痛般颤动，他俯身贴近听第一个音。那音又假又粗。他用折磨人的弦钮拉紧弦，紧得快断了，再拨，再俯身轻听，终于微笑，因第一个真纯的音颤动着升上来。"

              "en": "Oh, the sweetness that dwells in a harp of many strings, <br>While each, all <span class=\"vocab-trigger\" data-vocab=\"vocal\">vocal<\/span> with love in a tuneful harmony rings! <br>But, oh, the wail and discord, when one and another is <span class=\"vocab-trigger\" data-vocab=\"rent\">rent<\/span>, <br><span class=\"vocab-trigger\" data-vocab=\"Tensionless\">Tensionless<\/span>, broken and lost, from the cherished instrument. <br>For <span class=\"vocab-trigger\" data-vocab=\"rapture of love\">rapture of love<\/span> is linked with the pain or fear of loss, <br>And the hand that takes the crown, must ache with many a cross; <br>Yet he who hath never a conflict, hath never a <span class=\"vocab-trigger\" data-vocab=\"victor\">victor<\/span>'s palm, <br>And only the <span class=\"vocab-trigger\" data-vocab=\"toilers\">toilers<\/span> know the sweetness of rest and calm. <br>Only between the storms can the Alpine traveller know <br><span class=\"vocab-trigger\" data-vocab=\"Transcendent glory\">Transcendent glory<\/span> of clearness, marvels of gleam and glow; <br>Had he the brightness unbroken of cloudless summer days, <br>This had been dimmed by the <span class=\"vocab-trigger\" data-vocab=\"dust\">dust<\/span> and the veil of <span class=\"vocab-trigger\" data-vocab=\"brooding haze\">brooding haze<\/span>. <br>Who would dare the choice, neither or both to know, <br>The finest <span class=\"vocab-trigger\" data-vocab=\"quiver\">quiver<\/span> of joy or the agony thrill of woe! <br>Never the <span class=\"vocab-trigger\" data-vocab=\"exquisite pain\">exquisite pain<\/span>, then never the exquisite bliss, <br>For the heart that is dull to that can never be strung to this.",
              "zh": "哦，那充盈在多弦琴瑟中的甘甜，当每一根弦都因爱而呜响，奏出和谐的乐音！但，当其中一根、再一根被撕裂，失去张力、断折、从心爱的乐器上失落时，便发出哀哭与不协之音。因为爱的狂喜总是与失丧的苦痛或惧怕相连，而拿起冠冕的手，必因许多十字架而酸痛；然而，从未经过争战的人，永得不到得胜的棕枝，唯有劳苦者才知道安息与平静的甘甜。只有在风暴之间，那攀登阿尔卑斯的旅人才能领略那超凡的清澈荣光，以及闪烁辉耀的奇景；倘若他拥有无云夏日那不间断的晴明，这光彩也会被尘埃和笼罩的雾霾所昏暗。谁敢作出选择，既不愿尝那极乐的微颤，也不愿受那极悲的剧痛？没有那精粹的痛楚，就永不会有那精粹的极乐，因为对前者麻木的心，永不能被拨动去感受后者。",
              "simpEn": "Sweetness fills a many-stringed harp when each string sings with love in harmony. But wail and discord come when a string is torn, slack, broken, and lost. Love's rapture is linked with pain and fear of loss; the hand that takes the crown must ache with crosses. He who never fights never wins the victor's palm; only workers know sweet rest. Only between storms can the Alpine traveler know transcendent clearness and marvels of light; constant cloudless summer would be dimmed by dust and haze. Who would choose to know neither the finest quiver of joy nor the agony of woe? Without exquisite pain, no exquisite bliss; a heart dull to one can never be tuned to the other.",

              "en": "God is in the midst of her; she <span class=\"vocab-trigger\" data-vocab=\"Shall not be moved\">shall not be moved<\/span>: God shall help her, and that right early (Psalm 46:2,3,5).",
              "zh": "神在其中，城必不动摇；到天一亮，神必帮助这城。（诗篇46:2,3,5）",
              "simpEn": "God is in the middle of her; she will not be shaken. God will help her at the break of dawn.",
              "simpZh": "神在她中间，她就不会动摇。天刚亮，神就帮助她。"
            },
            {
              "en": "\"<span class=\"vocab-trigger\" data-vocab=\"Shall not be moved\">Shall not be moved<\/span>\"—what an inspiring <span class=\"vocab-trigger\" data-vocab=\"declaration\">declaration<\/span>! Can it be possible that we, who are so easily moved by the things of earth, can arrive at a place where nothing can upset us or disturb our calm? Yes, it is possible; and the Apostle Paul knew it. When he was on his way to Jerusalem where he foresaw that \"<span class=\"vocab-trigger\" data-vocab=\"bonds and afflictions\">bonds and afflictions<\/span>\" awaited him, he could say triumphantly, \"But <span class=\"vocab-trigger\" data-vocab=\"none of these things move me\">none of these things move me<\/span>.\" Everything in Paul's life and experience that could be shaken had been shaken, and he no longer counted his life, or any of life's possessions, dear to him. And we, if we will but let God, neither the <span class=\"vocab-trigger\" data-vocab=\"fret and tear\">fret and tear<\/span> of little things of life, nor the great and heavy trials, can have power to move us from the <span class=\"vocab-trigger\" data-vocab=\"peace that passeth understanding\">peace that passeth understanding<\/span>, which is declared to be the <span class=\"vocab-trigger\" data-vocab=\"portion\">portion<\/span> of those who have learned to rest only on God.",
              "zh": "「必不动摇」——何等鼓舞人的宣告！我们这些如此容易被属地事物摇动的人，真的能到达一个没有任何事情能扰乱我们宁静的地步吗？是的，那是可能的；使徒保罗就知道这一点。当他前往耶路撒冷，预见那里有「捆锁与患难」等着他时，他却能凯旋般说：「我却不以性命为念。」保罗生命中一切能震动的事物都已被震动了，他不再看重自己的性命或生命中任何所有物。而我们，只要愿意让神作工，无论是日常琐事的焦躁与磨损，还是巨大沉重的试炼，都不能使我们从那「出人意外的平安」中被摇动；这平安正是那些学会单单安息在神里面之人的份。",
              "simpEn": "'Shall not be moved'—what a powerful statement! Can we, who are easily shaken by earthly things, really reach a place where nothing disturbs our peace? Yes, and Paul knew it. On his way to Jerusalem, knowing chains and troubles waited, he said 'None of these things move me.' His life had been shaken, but he no longer held anything dear. If we let God work, neither small daily worries nor big trials can shake us from the peace beyond understanding, which belongs to those who rest only in God.",
              "simpZh": "‘必不动摇’——多给人力量的话！我们这么容易被地上的事摇动，真能到一个什么事都不打扰内心平静的地方吗？能，保罗就知道。他去耶路撒冷，知道有捆锁和苦难等着，却说‘这些事都不动摇我’。他生命中一切能震动的都被震动了，他不再看重性命和东西。我们若让神作工，日常琐碎的烦躁和大试炼都不能让我们失去那超越理解的平安，这平安是那些学会只安息在神里面的人特有的。"
            },
            {
              "en": "\"<span class=\"vocab-trigger\" data-vocab=\"Him that overcometh\">Him that overcometh<\/span> will I make a <span class=\"vocab-trigger\" data-vocab=\"pillar\">pillar<\/span> in the temple of my God; and he shall go no more out.\" To be as <span class=\"vocab-trigger\" data-vocab=\"immovable\">immovable<\/span> as a <span class=\"vocab-trigger\" data-vocab=\"pillar\">pillar<\/span> in the house of our God, is an end for which one would gladly endure all the <span class=\"vocab-trigger\" data-vocab=\"shakings\">shakings<\/span> that may be necessary to bring us there! —Hannah Whitall Smith.",
              "zh": "「那得胜的，我要叫他在我神殿中作柱子，他也必不再从那里出去。」在神的家中如柱子般不可摇动，这样的结局实在值得人甘愿忍受一切必要的震动以抵达那里！——哈拿·维托·史密斯",
              "simpEn": "'The one who overcomes I will make a pillar in the temple of My God; he will never leave it again.' To be as unmovable as a pillar in God's house is worth enduring all the shakings needed to get there!",
              "simpZh": "‘得胜的人，我要让他在我神的殿中作柱子，他永不再出去。’成为神殿中一根不能动摇的柱子，太值得忍受一切必要的震动了！"
            },
            {
              "en": "When God is in the midst of a kingdom or city He makes it as firm as Mount Zion, that cannot be removed. When He is in the midst of a soul, though <span class=\"vocab-trigger\" data-vocab=\"calamities\">calamities<\/span> <span class=\"vocab-trigger\" data-vocab=\"throng\">throng<\/span> about it on all hands, and roar like the <span class=\"vocab-trigger\" data-vocab=\"billows\">billows<\/span> of the sea, yet there is a constant calm within, such a peace as the world can neither give nor take away. What is it but <span class=\"vocab-trigger\" data-vocab=\"want of lodging God\">want of lodging God<\/span> in the soul, and that in His stead the world is in men's hearts, that make them shake like leaves at every <span class=\"vocab-trigger\" data-vocab=\"blast\">blast<\/span> of danger? —Archbishop Leighton.",
              "zh": "当神在国中、在城里，祂就使它们如同锡安山那样坚固，永不动摇。当神在灵魂之中，虽四方灾祸簇拥，如海涛般咆哮，内心却有一份恒久的宁静，是世人不能赐予也无法夺去的平安。人之所以在每次危险的暴风中像叶子般颤抖，无非是因为没有让神安居在灵魂中，反而让世界占据了人的心。——莱顿大主教",
              "simpEn": "When God is in a kingdom or city, He makes it firm as Mount Zion. When He is in a soul, though troubles crowd around and roar like ocean waves, there is a steady calm inside, a peace the world can't give or take. What makes people shake like leaves at every danger? Not having God settled in the soul, but instead having the world in their hearts.",
              "simpZh": "当神在国中或城里，祂使那地像锡安山稳固不可摇动。当神在灵魂里，即使灾难四面八方像海浪咆哮，里面仍有不变的平静，是这世界无法给也不能夺去的平安。人为什么在每次危险中像叶子一样抖？就是没有让神住在灵魂里，反倒让世界占据了心。"
            },
            {
              "en": "\"They that trust in the Lord shall be as Mount Zion, which cannot be removed, but abideth forever.\" There is a quaint old Scottish version that puts iron into our blood: <br>Who <span class=\"vocab-trigger\" data-vocab=\"sticketh to God\">sticketh to God<\/span> in <span class=\"vocab-trigger\" data-vocab=\"stable trust\">stable trust<\/span> <br>As Zion's mount he stands full just, <br>Which <span class=\"vocab-trigger\" data-vocab=\"moveth no whit\">moveth no whit<\/span>, nor yet doth reel, <br>But standeth forever as <span class=\"vocab-trigger\" data-vocab=\"stiff as steel\">stiff as steel<\/span>!",
              "zh": "「倚靠耶和华的人好像锡安山，永不动摇，长存不息。」有一古雅苏格兰译本，将铁一般的力量注入我们的血脉：紧贴于神，信靠安稳，如锡安山完全正直，毫不动摇，永不倾斜，却如钢铁般永远坚固！",
              "simpEn": "'Those who trust in the Lord are like Mount Zion, which cannot be shaken but stands forever.' An old Scottish version adds iron to our blood: He who holds to God in steady trust stands like Zion's hill, not moving or swaying, but forever as strong as steel!",
              "simpZh": "‘倚靠耶和华的人如锡安山，不能摇动，永远长存。’古苏格兰版让人热血沸腾：紧紧贴住神，信心稳固，就像锡安山直立，毫不动摇，永不倾斜，像钢铁一样永远坚硬！"
            }
          ],

        {
          "sectionId": 2,
          "heading": "January 30",
          "audio": "audio/Streams in the Desert - January 30.m4a",
          "paragraphs": [
            {
              "en": "I will be as the <span class=\"vocab-trigger\" data-vocab=\"dew\">dew<\/span> unto Israel (Hosea 14:5).",
              "zh": "我必向以色列如甘露。（何西阿书14:5）",
              "simpEn": "I will be like the dew to Israel.",
              "simpZh": "我要像露水一样对以色列。"
            },
            {
              "en": "The <span class=\"vocab-trigger\" data-vocab=\"dew\">dew<\/span> is a source of freshness. It is nature's provision for renewing the face of the earth. It falls at night, and without it the vegetation would die. It is this great value of the <span class=\"vocab-trigger\" data-vocab=\"dew\">dew<\/span> which is so often recognized in the Scriptures. It is used as the symbol of spiritual refreshing. Just as nature is <span class=\"vocab-trigger\" data-vocab=\"bathed in dew\">bathed in dew<\/span>, so the Lord renews His people. In Titus 3:5 the same thought of spiritual refreshing is connected with the <span class=\"vocab-trigger\" data-vocab=\"ministry of the Holy Ghost\">ministry of the Holy Ghost<\/span> renewing the Holy Ghost.",
              "zh": "甘露是清新的来源。它是自然更新大地面容的供应。它在夜间降落，没有它，植物就要枯死。圣经中常常认可甘露的重大价值，并以它为属灵更新的象征。正如大自然沐浴在甘露中，主也照样更新祂的百姓。在提多书3:5中，属灵更新的同样思想与圣灵更新的职事连在一起。",
              "simpEn": "Dew brings freshness. It is nature's way of renewing the earth. It falls at night; without it plants die. The Bible often uses dew as a picture of spiritual refreshment. Just as nature is covered with dew, the Lord renews His people. Titus 3:5 connects spiritual refreshing with the Holy Spirit's work.",
              "simpZh": "露水带来清新。它是大自然更新大地的方式。夜间降下，没有它植物就枯死。圣经常用露水作属灵更新的象征。就像大自然被露水滋润，主也这样更新祂的百姓。提多书3:5把属灵更新和圣灵的工作连在一起。"
            },
            {
              "en": "Many Christian workers do not recognize the importance of the heavenly <span class=\"vocab-trigger\" data-vocab=\"dew\">dew<\/span> in their lives, and as a result they lack freshness and <span class=\"vocab-trigger\" data-vocab=\"vigor\">vigor<\/span>. Their spirits are <span class=\"vocab-trigger\" data-vocab=\"drooping\">drooping<\/span> for lack of <span class=\"vocab-trigger\" data-vocab=\"dew\">dew<\/span>. Beloved fellow-worker, you recognize the <span class=\"vocab-trigger\" data-vocab=\"folly\">folly<\/span> of a laboring man attempting to do his day's work without eating. Do you recognize the <span class=\"vocab-trigger\" data-vocab=\"folly\">folly<\/span> of a servant of God attempting to minister without eating of the heavenly manna? Nor will it suffice to have spiritual nourishment occasionally. Every day you must receive the renewing of the Holy Ghost. You know when your whole being is <span class=\"vocab-trigger\" data-vocab=\"pulsating\">pulsating<\/span> with the <span class=\"vocab-trigger\" data-vocab=\"vigor\">vigor<\/span> and freshness of Divine life and when you feel <span class=\"vocab-trigger\" data-vocab=\"jaded\">jaded<\/span> and worn. Quietness and absorption bring the <span class=\"vocab-trigger\" data-vocab=\"dew\">dew<\/span>.",
              "zh": "许多基督徒工人未意识到属天甘露对他们生命的重要性，因此他们缺乏清新与活力。他们的灵因缺乏甘露而低垂。亲爱的同工，你必知道一个工人不吃东西就试图干一天活是何等愚昧。但你可知神的仆人想要事奉却不吃天上的吗哪，也是同样愚昧？偶尔的属灵喂养并不够。你必须每天领受圣灵的更新。你知道何时全人因神的生命而搏动着活力与清新，何时感觉疲惫枯竭。安静与吸收带来甘露。",
              "simpEn": "Many Christian workers overlook the need for heavenly dew, so they lack freshness and energy. Their spirits droop without it. You know a worker can't do a day's labor without eating; do you see that serving God without spiritual food is just as foolish? Occasional feeding won't do. You must receive the Holy Spirit's renewing daily. You know when you're pulsing with divine vigor and when you're tired and worn. Quietness and soaking in God bring the dew.",
              "simpZh": "许多基督徒工人忽略了天上露水的重要性，所以缺乏清新和活力。没有露水，他们的灵就垂下去了。你知道一个工人不吃饭就干活多蠢。你可知神的仆人不吃天上的吗哪就去服事也一样蠢吗？偶尔的灵粮不够，必须每天领受圣灵的更新。你知道什么时候全身充满神圣命的活力，什么时候又累又枯干。安静和吸收能带来露水。"
            },
            {
              "en": "At night when the leaf and blade are still, the vegetable pores are open to receive the refreshing and invigorating bath; so spiritual <span class=\"vocab-trigger\" data-vocab=\"dew\">dew<\/span> comes from quiet lingering in the Master's presence. Get still before Him. <span class=\"vocab-trigger\" data-vocab=\"haste\">Haste<\/span> will prevent your receiving the <span class=\"vocab-trigger\" data-vocab=\"dew\">dew<\/span>. Wait before God until you feel <span class=\"vocab-trigger\" data-vocab=\"saturated\">saturated<\/span> with His presence; then go forth to your next duty with the conscious freshness and <span class=\"vocab-trigger\" data-vocab=\"vigor\">vigor<\/span> of Christ. —Dr. Pardington.",
              "zh": "夜间，当叶子和叶片静止不动时，植物的毛孔就敞开，接受那清新振奋的沐浴；同样，属灵的甘露来自安静地停留在主面前。要在祂面前静默。匆忙会拦阻你领受甘露。等候神，直到你感觉被祂的同在浸透；然后带着基督那自觉的清新与活力去尽下一份本分。——帕丁顿博士",
              "simpEn": "At night, when leaves are still, plant pores open to receive the refreshing bath; so spiritual dew comes from quietly staying in Jesus' presence. Be still before Him. Hurry will stop you from receiving it. Wait before God until you feel soaked with His presence, then go to your next task with Christ's freshness and energy.",
              "simpZh": "夜里叶子安静不动，植物的毛孔就张开接受清新振奋的沐浴；属灵露水也来自安静停留在主面前。在祂面前静下来。匆忙会让你得不着露水。等候神直到感到被祂同在浸透，然后带着基督的清新活力去做下一件事。"
            },
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"dew\">Dew<\/span> will never gather while there is either heat or wind. The temperature must fall, and the wind cease, and the air come to a point of coolness and rest—absolute rest so to speak—before it can yield up its invisible particles of moisture to <span class=\"vocab-trigger\" data-vocab=\"bedew\">bedew<\/span> either herb or flower. So the grace of God does not come forth to rest the soul of man until the still point is fairly and fully reached. <br>Drop Thy still dews of quietness, <br>Till all our strivings cease: <br>Take from our souls the strain and stress; <br>And let our ordered lives confess <br>The beauty of Thy peace. <br>Breathe through the pulses of desire <br>Thy coolness and Thy balm; <br>Let sense be dumb, its beats expire: <br>Speak through the earthquake, wind and fire, <br>O still small voice of calm!",
              "zh": "一有热气和风，露珠就绝不凝结。温度必须降下，风必须停止，空气达到冷静的地步——可说是绝对的静止——然后才能释出它那看不见的水汽微粒，滋润草木花朵。照样，神的恩典不会临到以安息人的灵魂，直到那完全静止的一点真实临到。求祢降下安静的露滴，直到我们一切挣扎止息；从我们灵魂中拿去紧张与压力；让我们有序的生命承认祢平安的美丽。求祢透过欲望的脉搏吹入祢的清凉与膏油；让感官哑默，脉搏停息；在震、风与火中说话的，哦，那微小的平静声音！",
              "simpEn": "Dew never forms while there's heat or wind. The temperature must drop, wind stop, and the air become cool and still—absolutely still—before it releases invisible moisture to wet plants. So God's grace doesn't come to rest the soul until the still point is truly reached. Drop Your quiet dew until all our struggles stop; take from our souls the stress; let our ordered lives show the beauty of Your peace. Breathe Your coolness and healing through our desires; silence our senses; speak through earthquake, wind, and fire, O still small voice of calm!",
              "simpZh": "热气和风没停，露水就不凝结。温度要降下，风要停止，空气要冷到完全静止，才能放出看不见的水汽滋润花草。同样，神的恩典要在我们完全静止时才临到并安抚灵魂。降下祢安静的露滴，直到我们一切挣扎停止；拿去我们灵魂里的紧张和压力；让我们有序的生活显出祢平安的美丽。通过欲望的脉动吹入祢的清凉和膏油；让感官安静，脉搏止息；在地震、风和火中说话的那微小平静的声音啊！"
            }
          ],

        {
          "sectionId": 3,
          "heading": "January 31",
          "audio": "audio/Streams in the Desert - January 31.m4a",
          "paragraphs": [
            {
              "en": "He giveth quietness (Job 34:29).",
              "zh": "祂使人安静。（约伯记34:29）",
              "simpEn": "He gives quietness.",
              "simpZh": "祂赐下安静。"
            },
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Quietness amid the dash of the storm\">Quietness amid the dash of the storm<\/span>. We sail the lake with Him still; and as we reach its middle waters, far from land, under midnight skies, suddenly a great storm sweeps down. Earth and hell seem arrayed against us, and each billow threatens to overwhelm. Then He arises from His sleep, and <span class=\"vocab-trigger\" data-vocab=\"rebukes the winds\">rebukes the winds<\/span> and the waves, His hand waves <span class=\"vocab-trigger\" data-vocab=\"benediction\">benediction<\/span> and <span class=\"vocab-trigger\" data-vocab=\"repose\">repose<\/span> over the rage of the <span class=\"vocab-trigger\" data-vocab=\"tempestuous\">tempestuous<\/span> elements. His voice is heard above the scream of the wind in the <span class=\"vocab-trigger\" data-vocab=\"cordage\">cordage<\/span> and the conflict of the <span class=\"vocab-trigger\" data-vocab=\"billows\">billows<\/span>, \"Peace, <span class=\"vocab-trigger\" data-vocab=\"Be still\">be still<\/span>!\" Can you not hear it? And there is instantly a great calm. \"He giveth quietness.\"",
              "zh": "在风暴的冲击中仍有安静。我们同祂航行在湖上；当我们到了湖心，远离陆地，午夜星空下，忽然暴风骤降。似乎天地与地狱都列阵攻击我们，每个巨浪都威胁着要吞没。然后祂从睡梦中起来，斥责风和浪，祂的手向狂暴翻腾的风浪挥出祝福与安宁。祂的声音高过绳索间风的尖啸和波涛的撞打：「住了吧！静了吧！」你听不见吗？立刻就大大平静了。「祂使人安静。」",
              "simpEn": "Quietness in the middle of a storm. We sail with Jesus on the lake; in the deep water, far from shore, under midnight sky, a storm hits. Everything seems against us, and huge waves threaten to swallow us. Then He wakes up, commands the wind and waves, and waves His hand of peace over the raging storm. His voice rises above the shrieking wind and crashing waves: 'Peace, be still!' Can you hear it? Immediately there is a great calm. 'He gives quietness.'",
              "simpZh": "在风暴的冲击中仍有安静。我们和耶稣一起在湖上航行；到了湖心，远离岸边，午夜星空下，突然起了大风暴。好像一切都在攻击我们，巨浪要淹没我们。然后祂醒来，斥责风和浪，伸手把安宁和平静洒在狂怒的风暴上。祂的声音盖过绳索间尖叫的风和浪的碰撞：‘住了吧！静了吧！’你听见了吗？立刻就大大平静了。‘祂赐下安静。’"
            },
            {
              "en": "Quietness amid the loss of <span class=\"vocab-trigger\" data-vocab=\"inward consolations\">inward consolations<\/span>. He sometimes withdraws these, because we make too much of them. We are tempted to look at our joy, our <span class=\"vocab-trigger\" data-vocab=\"ecstasies\">ecstasies<\/span>, our <span class=\"vocab-trigger\" data-vocab=\"transports\">transports<\/span>, or our <span class=\"vocab-trigger\" data-vocab=\"visions\">visions<\/span>, with too great <span class=\"vocab-trigger\" data-vocab=\"complacency\">complacency<\/span>. Then love for love's sake, withdraws them. But by His grace, He leads us to distinguish between them and Himself. He draws nigh, and whispers the assurance of His presence. Thus an <span class=\"vocab-trigger\" data-vocab=\"infinite calm\">infinite calm<\/span> comes to keep our heart and mind. \"He giveth quietness.\"",
              "zh": "在失去内在安慰时的安静。祂有时会收回这些，因为我们太过看重它们。我们容易以极大的自满来看待自己的喜乐、狂喜、激动或异象。于是，爱因爱本身的缘故收回了它们。但祂借着恩典，引导我们分辨它们与祂自己。祂亲近前来，低声确保祂的同在。如此，一种无限的宁静就来保守我们的心怀意念。「祂使人安静。」",
              "simpEn": "Quietness when inner comforts are gone. Sometimes God takes these away because we cling to them too much. We are tempted to look at our joy, excitement, and spiritual experiences with too much pride. Then love, for love's sake, removes them. But by His grace, He helps us tell the difference between the gifts and Himself. He comes close and whispers His presence. Then a deep, endless calm guards our hearts. 'He gives quietness.'",
              "simpZh": "内在安慰被拿走时的安静。神有时收走这些，因为我们太看重它们了。我们容易对自己的喜乐、狂热、激动和异象太过自满。于是爱因为爱的缘故收走了它们。但祂用恩典帮我们分清它们和祂自己。祂走近，低声让我们知道祂同在。然后一种无限的平静保守我们的心。‘祂赐下安静。’"
            },
            {
              "en": "\"He giveth quietness.\" O Elder Brother, <br>Whose homeless feet have pressed our path of pain, <br>Whose hands have borne the burden of our sorrow, <br>That in our losses we might find our gain. <br>Of all Thy gifts and infinite consolings, <br>I ask but this: in every troubled hour <br>To hear Thy voice through all the <span class=\"vocab-trigger\" data-vocab=\"tumults\">tumults<\/span> stealing, <br>And rest <span class=\"vocab-trigger\" data-vocab=\"serene\">serene<\/span> beneath its tranquil power. <br>Cares cannot <span class=\"vocab-trigger\" data-vocab=\"fret\">fret<\/span> me if my soul be dwelling <br>In the still air of faith's untroubled day; <br>Grief cannot shake me if I walk beside thee, <br>My hand in Thine along the darkening way. <br><span class=\"vocab-trigger\" data-vocab=\"content\">Content<\/span> to know there comes a <span class=\"vocab-trigger\" data-vocab=\"radiant morning\">radiant morning<\/span> <br>When from all shadows I shall find release; <br><span class=\"vocab-trigger\" data-vocab=\"serene\">Serene<\/span> to wait the <span class=\"vocab-trigger\" data-vocab=\"rapture\">rapture<\/span> of its dawning— <br>Who can make trouble when Thou sendest peace?",
              "zh": "「祂使人安静。」哦，长兄，祢无家可归的脚踪走过我们痛苦的路途，祢的双手担过我们忧伤的重负，好叫我们能在损失中寻得益处。在祢所有的恩赐和无限的安慰中，我只求一事：在每一愁烦的时刻听见祢的声音穿透一切喧嚣，并在它平静的大能下安稳休息。若我的灵魂居住于信心无扰之日的宁静空气中，忧虑便不能使我烦躁；若我手拉着祢，与祢同行在暗路上，忧伤便不能摇动我。我心满足，知道那灿烂的早晨必将临到，那时我从一切阴影中得释放；安然等候它黎明时的狂喜——当祢赐下平安，谁还能制造烦恼？",
              "simpEn": "'He gives quietness.' O Elder Brother, whose homeless feet walked our painful path and whose hands carried our sorrows so we could gain in our losses. Of all Your gifts, I ask only this: in every troubled hour, to hear Your voice through all the noise, and rest calmly under its quiet power. Worries can't upset me if my soul lives in the calm of faith's untroubled day. Grief can't shake me if I walk beside You, my hand in Yours on the dark path. I'm content knowing a bright morning will come, freeing me from all shadows; I wait calmly for its sunrise joy. Who can make trouble when You send peace?",
              "simpZh": "‘祂赐下安静。’长兄啊，祢无家的脚走过了我们疼痛的路，祢的手担过我们的忧伤，让我们在损失中得益处。祢所有的恩赐里，我只求一件事：在每一个烦愁时刻，听见祢的声音穿过一切吵闹，在它平静的能力下安然休息。如果我的灵魂住在信心无扰的平静日子里，忧虑不能烦我；如果我手拉祢手，和祢一起走在黑暗路上，忧伤不能摇动我。我心满足，知道光亮的早晨必来，那时我会从一切阴影中得释放；安然等候黎明时的喜乐——祢赐下平安，谁还能制造麻烦？"
            }
          ],

        {
          "sectionId": 4,

          "paragraphs": [
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"This thing is from ME\">This thing is from me<\/span> (1 Kings 12:24).",
              "zh": "这事出于我。（列王纪上12:24）",
              "simpEn": "This thing is from Me.",
              "simpZh": "这事是从我来的。"
            },
            {
              "en": "Life's disappointments are <span class=\"vocab-trigger\" data-vocab=\"veiled love's appointments\">veiled love's appointments<\/span>. —Rev. C.A. Fox",
              "zh": "人生的失望原是蒙着面纱的爱之安排。——C.A.福克斯牧师",
              "simpEn": "Life's disappointments are actually love's plans hidden behind a veil.",
              "simpZh": "人生中的失望，其实是爱躲在面纱后面的安排。"
            },
            {
              "en": "My child, I have a message for you today; let me whisper it in your ear, that it may <span class=\"vocab-trigger\" data-vocab=\"gild\">gild<\/span> with glory any storm clouds which may arise, and <span class=\"vocab-trigger\" data-vocab=\"smooth\">smooth<\/span> the rough places upon which you may have to <span class=\"vocab-trigger\" data-vocab=\"tread\">tread<\/span>. It is short, only five words, but let them <span class=\"vocab-trigger\" data-vocab=\"sink into your inmost soul\">sink into your inmost soul<\/span>; use them as a pillow upon which to rest your weary head. <span class=\"vocab-trigger\" data-vocab=\"This thing is from ME\">This thing is from ME<\/span>.",
              "zh": "我的孩子，今天我有一句话要告诉你；让我将它低语在你耳中，好叫它能以荣耀镀亮一切可能兴起的风暴云层，并抚平你所需踏过的崎岖之地。这话很短，只有五个字，但要让它沉入你灵魂的最深处；用它作枕，安放你疲倦的头。这事是出于我。",
              "simpEn": "My child, I have a message today; let me whisper it in your ear to cover any storm clouds with glory and smooth the rough road ahead. It's short—only five words—but let them sink deep into your soul; use them as a pillow for your tired head. This thing is from Me.",
              "simpZh": "我的孩子，今天我有一句话给你；让我悄悄告诉你，让它给一切风暴乌云镀上荣耀，把你前面的崎岖路弄平。这话很短，只有五个字，但要让它深深沉入你的灵魂；把它当枕头，让你疲倦的头休息。这事是出于我。"
            },
            {
              "en": "Have you ever thought that all that concerns you concerns Me too? For, \"he that toucheth you, toucheth the <span class=\"vocab-trigger\" data-vocab=\"apple of mine eye\">apple of mine eye<\/span>\" (Zech. 2:8). You are very precious in My sight (Isa. 43:4). Therefore, it is My special delight to educate you. I would have you learn when <span class=\"vocab-trigger\" data-vocab=\"temptations assail\">temptations assail<\/span> you, and the \"enemy comes in like a flood,\" that <span class=\"vocab-trigger\" data-vocab=\"This thing is from ME\">this thing is from Me<\/span>, that your weakness needs My might, and your safety lies in letting Me fight for you.",
              "zh": "你可曾想过，凡与你有关的事也与我有关？因为「摸你们的，就是摸我眼中的瞳人」（亚2:8）。你们在我眼中看为宝贵（赛43:4）。因此，我以教养你们为我的特别乐事。我要你们在试探攻击你、「仇敌如洪水般冲来」的时候，知道这事是出于我，你的软弱需要我的能力，你的安全在于让我为你争战。",
              "simpEn": "Have you thought that everything concerning you also concerns Me? 'He who touches you touches the apple of My eye.' You are precious to Me. So I delight in teaching you. Learn when temptations hit and the enemy floods in, that this is from Me: your weakness needs My strength, and your safety is in letting Me fight for you.",
              "simpZh": "你有没有想过，所有和你有关的事也和我有关？‘摸你们的，就是摸我眼中的瞳人。’你在我眼中很宝贵。所以我乐意教导你。你要学会，当试探攻击你，‘仇敌如洪水冲来’时，知道这事是出于我：你的软弱需要我的力量，你的安全在于让我为你争战。"
            },
            {
              "en": "Are you in difficult circumstances, surrounded by people who do not understand you, who never consult your taste, who put you in the background? <span class=\"vocab-trigger\" data-vocab=\"This thing is from ME\">This thing is from Me<\/span>. I am the God of circumstances. Thou camest not to thy place by accident; it is the very place God meant for thee. Have you not asked to be made humble? See then, I have placed you in the very school where this lesson is taught; your surroundings and companions are only working out My will.",
              "zh": "你是否处境困难，被不了解你的人包围，他们从不征询你的意见，将你置于背后？这事是出于我。我是安排环境的神。你来到现今的地位绝非偶然，这正是神为你预备之处。你岂没有求过要变得谦卑吗？看哪，我已将你放在那教导此功课的学校中；你的环境和同伴都不过是成就我旨意的工具。",
              "simpEn": "Are you in difficult circumstances, surrounded by people who don't understand you, who ignore your preferences and push you aside? This is from Me. I am the God of circumstances. You didn't end up here by chance; it's the very place God intended. Didn't you ask to be made humble? See, I have put you in the school where that lesson is taught; your surroundings are working out My will.",
              "simpZh": "你是否处境艰难，周围人不理解你，不问你的意见，把你放在后面？这事出于我。我是掌管环境的神。你到这个地方不是偶然，正是神为你定的。你岂不是求过要谦卑吗？看，我已把你放在教这功课的学校里；你的环境和同伴都在成就我的旨意。"
            },
            {
              "en": "Are you in money difficulties? Is it hard to make both ends meet? <span class=\"vocab-trigger\" data-vocab=\"This thing is from ME\">This thing is from Me<\/span>, for I am your <span class=\"vocab-trigger\" data-vocab=\"purse-bearer\">purse-bearer<\/span> and would have you draw from and depend upon Me. My supplies are limitless (Phil. 4:19). I would have you prove my promises. Let it not be said of you, \"In this thing ye did not <span class=\"vocab-trigger\" data-vocab=\"believe\">believe<\/span> the Lord your God\" (Deut.1:32). Are you passing through a night of sorrow? <span class=\"vocab-trigger\" data-vocab=\"This thing is from ME\">This thing is from Me<\/span>. I am the Man of Sorrows and acquainted with grief. I have let earthly comforters fail you, that by turning to Me you may obtain <span class=\"vocab-trigger\" data-vocab=\"everlasting consolation\">everlasting consolation<\/span> (2Thess.2:16,17).",
              "zh": "你正遇到经济困难吗？收支难以相抵吗？这事是出于我，因为我是你的钱包保管者，要你支取并倚靠我。我的供应没有限量（腓4:19）。我要你验证我的应许。不要让人论你说：「在这事上你们竟不信耶和华你们的神」（申1:32）。你正经过忧愁之夜吗？这事是出于我。我是忧患之子，常经忧患。我让地上的安慰者使你失望，为要叫你转向我，得着永远的安慰（帖后2:16-17）。",
              "simpEn": "Struggling with money? Hard to make ends meet? This is from Me, because I hold your purse and want you to depend on Me. My supplies are endless. I want you to test My promises. Don't let it be said, 'In this you did not believe the Lord your God.' Passing through a night of sorrow? This is from Me. I am the Man of Sorrows. I let earthly comforters fail so you would turn to Me for eternal comfort.",
              "simpZh": "经济困难？入不敷出？这事出于我，因为我是管你钱包的，要你倚靠我。我的供应无限。我要你验证我的应许。不要让人说‘在这事上你们竟不信耶和华你们的神’。正经历悲伤之夜？这事出于我。我是忧患之子，常经忧患。我让地上的安慰者让你失望，好叫你转向我得永远的安慰。"
            },
            {
              "en": "Have you longed to do some great work for Me and instead have been <span class=\"vocab-trigger\" data-vocab=\"laid aside\">laid aside<\/span> on a bed of pain and weakness? <span class=\"vocab-trigger\" data-vocab=\"This thing is from ME\">This thing is from Me<\/span>. I could not get your attention in your busy days and I want to teach you some of my deepest lessons. \"They also serve who only stand and wait.\" Some of My greatest workers are those shut out from active service, that they may learn to wield the weapon of all—prayer. This day I place in your hand this pot of <span class=\"vocab-trigger\" data-vocab=\"holy oil\">holy oil<\/span>. Make use of it freely, my child. Let every circumstance that arises, every word that pains you, every interruption that would make you impatient, every <span class=\"vocab-trigger\" data-vocab=\"revelation of your weakness\">revelation of your weakness<\/span> be <span class=\"vocab-trigger\" data-vocab=\"anointed\">anointed<\/span> with it. The sting will go as you learn to see Me in all things. —Laura A. Barter Snow.",
              "zh": "你是否渴望为我做一番大事，反却因病痛软弱被搁置在床？这事是出于我。你在忙碌的日子里不肯注意我，我要教你一些最深的功课。「那仅站立等候的人也在服事。」我最伟大的工人中，有些正是被关在活跃事奉之外，好学习运用那万能的武器——祷告。今天我把这瓶圣膏油放在你手中。我的孩子，随意使用它吧。让所临到的每一境遇、每一句刺痛你的话、每一个令你不耐烦的打扰、每一次对你软弱的暴露，都被这油膏抹。当你学会在凡事上看见我时，刺痛就会消失。——劳拉·巴特·斯诺",
              "simpEn": "Longed to do great work for Me but instead are laid aside in pain and weakness? This is from Me. I couldn't get your attention when you were busy, and I want to teach you deep lessons. 'They also serve who only stand and wait.' Some of My best workers are those shut out from active service to learn the weapon of prayer. Today I give you this pot of holy oil. Use it freely: anoint every circumstance, every hurting word, every interruption that tests your patience, every revelation of your weakness. The sting will go as you learn to see Me in everything.",
              "simpZh": "想为我做大事却被放在病痛软弱中搁置？这事出于我。你忙碌时我无法引起你的注意，我想教你最深的功课。‘那些只站着等候的人也在服事。’我最伟大的工人有些就是被关在活动事奉之外，好学习运用万能武器——祷告。今天我把这瓶圣膏油放你手里，随意用吧。用膏油涂抹每一个临到你的境遇，每一句刺痛你的话，每一个让你不耐烦的打岔，每一个显露你软弱的时刻。当你在一切事上看见我，刺痛就会消失。"
            },
            {
              "en": "\"This is from Me,\" the Saviour said, <br>As bending low He kissed my brow, <br>\"For One who loves you thus has led. <br>Just rest in Me, be patient now, <br>Your Father knows you have need of this, <br>Though why <span class=\"vocab-trigger\" data-vocab=\"perchance\">perchance<\/span> you cannot see— <br>Grieve not for things you've seemed to miss. <br>The thing I send is best for thee.\" <br>Then, looking through my tears, I plead, <br>\"Dear Lord, forgive, I did not know, <br>'Twill not be hard since Thou dost <span class=\"vocab-trigger\" data-vocab=\"tread\">tread<\/span>, <br>Each path before me here below. <br>And for my good this thing must be, <br>His grace sufficient for each test. <br>So still I'll sing, 'Whatever be <br>God's way for me is always best.\"",
              "zh": "「这是出于我，」救主说，祂俯身亲吻我的额头：「因那位爱你如此之深的神已如此引领。只要在我里面安息，现在存心忍耐，你的父知道你需此经历，虽然或许你尚不明其因——不要为似乎错过的事忧伤。我所赐予你的，对你最善。」于是，我透过眼泪恳求：「亲爱的主，赦免我，我本不知情，既知祢已在前头走过我下面的每一步路，就不会再艰难。此事必对我有益，祂的恩典够我应付每个试炼。因此我仍歌唱：『无论遭遇何事，神为我定的道路总是最好的。』",
              "simpEn": "'This is from Me,' the Saviour said, bending to kiss my brow. 'The One who loves you led you here. Rest in Me, be patient; your Father knows you need this, though you may not see why. Don't grieve over what you seem to have missed. What I send is best for you.' Then through tears I plead, 'Forgive me, Lord, I didn't know. It won't be hard since You walk every path before me. This is for my good; His grace is enough for each test. So I'll still sing: Whatever is, God's way for me is always best.'",
              "simpZh": "‘这是出于我，’救主弯下腰亲我的额头说，‘那爱你的已这样引领你。就在我里面安息，现在忍耐；你的父知道你需此经历，虽然你或许看不出为什么。不要为错过的事忧伤。我所给你的，对你最好。’我哭着恳求：‘主啊，饶恕我，我先前不知道；既然祢在前面走每一步，就不会太艰难。这事对我有益，祂的恩典够每个试验用。所以我仍唱：无论是什么，神为我定的路总是最好。’"

        {
          "sectionId": 5,

          "paragraphs": [
            {
              "en": "In the <span class=\"vocab-trigger\" data-vocab=\"shadow of his hand\">shadow of his hand<\/span> hath he hid me, and made me a <span class=\"vocab-trigger\" data-vocab=\"polished shaft\">polished shaft<\/span>: in his <span class=\"vocab-trigger\" data-vocab=\"quiver\">quiver<\/span> hath he hid me (Isa. 49:2).",
              "zh": "祂又使我成为磨亮的箭，将我藏在祂的箭囊之中；在祂手荫之下将我隐藏。（以赛亚书49:2）",
              "simpEn": "In the shadow of His hand He hid me; He made me a polished arrow and hid me in His quiver.",
              "simpZh": "祂把我藏在手荫下，使我成为磨亮的箭，藏在祂的箭袋里。"
            },
            {
              "en": "\"In the shadow.\" We must all go there sometimes. The <span class=\"vocab-trigger\" data-vocab=\"glare\">glare<\/span> of the daylight is too brilliant; our eyes become injured, and unable to <span class=\"vocab-trigger\" data-vocab=\"discern\">discern<\/span> the delicate shades of color, or appreciate <span class=\"vocab-trigger\" data-vocab=\"neutral tints\">neutral tints<\/span>—the shadowed chamber of sickness, the shadowed house of mourning, the shadowed life from which the sunlight has gone. But fear not! It is the shadow of God's hand. He is leading thee. There are lessons that can be learned only there. The photograph of His face can only be <span class=\"vocab-trigger\" data-vocab=\"fixed\">fixed<\/span> in the dark chamber. But do not suppose that He has <span class=\"vocab-trigger\" data-vocab=\"cast thee aside\">cast thee aside<\/span>. Thou art still in His <span class=\"vocab-trigger\" data-vocab=\"quiver\">quiver<\/span>; He has not flung thee away as a <span class=\"vocab-trigger\" data-vocab=\"worthless thing\">worthless thing<\/span>. He is only keeping thee close till the moment comes when He can send thee most swiftly and surely on some <span class=\"vocab-trigger\" data-vocab=\"errand\">errand<\/span> in which He will be glorified. Oh, shadowed, solitary ones, remember how closely the <span class=\"vocab-trigger\" data-vocab=\"quiver\">quiver<\/span> is bound to the warrior, within easy reach of the hand, and guarded <span class=\"vocab-trigger\" data-vocab=\"jealously\">jealously<\/span>. —Christ in Isaiah, Meyer.",
              "zh": "「在荫下。」我们都有必须去那里的时候。白日的强光太耀眼；我们的眼睛受伤，不能分辨细致的色彩层次，也无法体会中性的色调——那是疾病的阴影内室、居丧的阴影之家、阳光已逝的阴影人生。但不要惧怕！那是神的手荫。祂在引领你。有些功课只有在其中才能学会。祂面容的相片只有在暗房中才能定影。但不要以为祂已把你丢在一边。你仍在祂的箭囊中；祂并未将你当作无用之物抛弃。祂只是将你紧藏，直到祂能最迅捷、最准确地差遣你去完成某项使祂得荣耀的使命。哦，幽暗孤独的人，要记住箭囊与战士何等贴近，就在手边，且被嫉妒地守护着。——迈耶《以赛亚书中的基督》",
              "simpEn": "'In the shadow.' We all must go there sometimes. The bright glare of day hurts our eyes so we can't see delicate colors or appreciate soft shades—the shadowed room of sickness, the shadowed house of grief, the shadowed life where sunlight is gone. But don't fear! It's the shadow of God's hand. He is leading you. Some lessons can only be learned there. His face can only be photographed in the dark room. Don't think He has thrown you away. You are still in His quiver; He hasn't tossed you out as worthless. He is just keeping you close until He can send you swiftly on a mission that will glorify Him. The quiver is tied close to the warrior, within easy reach, and guarded carefully.",
              "simpZh": "‘在荫下。’我们都有必须去那里的时候。白天太亮的光刺眼，让我们无法看清细腻的颜色或享受柔和的色调——那是病房的阴影、居丧之家的阴影、阳光消失了的阴影人生。别怕！那是神手荫。祂在带领你。有些功课只有在阴影里才学得会。祂面容的照片只能在暗房里冲洗。别以为祂已丢掉你。你仍在祂箭袋里；祂没把你当废物扔掉。祂只是把你藏近，等到祂能最快、最准地派你去做荣耀祂的事。箭袋紧贴战士，就在手边，被小心守护着。"
            },
            {
              "en": "In some spheres the shadow condition is the condition of greatest growth. The beautiful Indian corn never grows more rapidly than in the shadow of a warm summer night. The sun curls the leaves in the <span class=\"vocab-trigger\" data-vocab=\"sultry\">sultry<\/span> noon light, but they quickly unfold, if a cloud slips over the sky. There is a service in the shadow that is not in the shine. The world of <span class=\"vocab-trigger\" data-vocab=\"stellar beauty\">stellar beauty<\/span> is never seen at its best till the shadows of night slip over the sky. There are beauties that bloom in the shade that will not bloom in the sun. There is much greenery in lands of fog and clouds and shadow. The florist has \"evening glories\" now, as well as \"morning glories.\" The \"evening glory\" will not shine in the noon's splendor, but comes to its best as the shadows of evening deepen.",
              "zh": "在某些领域，阴影的状态正是生长最迅速的状态。美丽的印第安玉米在温暖夏夜的阴影下生长最快。正午闷热的日光卷起叶子，但只要一片云飘过天空，叶子就迅速舒展。在阴影中有一种阳光中所无的服事。那星光璀璨的世界，直到夜幕降临才显出最绚丽的景象。有些美丽只在阴处绽放，而不在日光下开放。在多雾多云多荫蔽的地方，有许多绿意。如今花匠不但有「牵牛花」（早晨的荣耀），也有「晚间的荣耀」。「晚间的荣耀」不会在正午的辉煌中发光，却在夜色加深时达到最美的状态。",
              "simpEn": "In some areas, the shadow is where most growth happens. Beautiful Indian corn grows fastest in the shade of a warm summer night. The sun curls leaves at hot noon, but they unfold when a cloud covers the sky. There's a kind of work in the shadow that can't happen in the sunshine. The starry sky is seen best only after night falls. Some beauties bloom only in shade, not in sunlight. There's much green in foggy, cloudy, shadowy lands. Florists now have 'evening glories' as well as 'morning glories.' The 'evening glory' won't shine at noon but becomes most beautiful as evening shadows deepen.",
              "simpZh": "有些领域里，阴影正是生长最快的地方。美丽的印第安玉米在温暖夏夜的阴影中长得最快。正午酷热让叶子卷起，但只要一片云遮住太阳，叶子就很快展开。阴影里有日照下所没有的功用。星星最美的样子，要等夜幕降临才看得见。有些花只在荫处开，不在太阳下开。在多雾多云多阴影的地方有很多翠绿。花匠现在不但有‘早晨的荣耀’（牵牛花），也有‘晚上的荣耀’。‘晚上的荣耀’不在正午发光，而在夜色更深时达到最美的样子。"
            },
            {
              "en": "If all of life were sunshine, <br>Our faces would be <span class=\"vocab-trigger\" data-vocab=\"fain\">fain<\/span> <br>To feel once more upon them <br>The cooling splash of rain. <br>—Henry Van Dyke.",
              "zh": "若生命尽是阳光，我们的脸会渴望再次感受那清凉雨水的飞溅。——亨利·范·戴克",
              "simpEn": "If all of life were sunshine, our faces would long to feel the cooling splash of rain once more.",
              "simpZh": "如果人生全是阳光，我们的脸会盼着再感受到清凉的雨水飞溅。"
            }
          ],

        {
          "sectionId": 6,
          "heading": "February 3",
          "audio": "audio/Streams in the Desert - February 3.m4a",
          "paragraphs": [
            {
              "en": "And immediately the Spirit <span class=\"vocab-trigger\" data-vocab=\"driveth him\">driveth him<\/span> into the <span class=\"vocab-trigger\" data-vocab=\"wilderness\">wilderness<\/span> (Mark 1:12).",
              "zh": "圣灵立刻把耶稣催到旷野里去。（马可福音1:12）",
              "simpEn": "Immediately the Spirit drove Him into the wilderness.",
              "simpZh": "圣灵马上把祂催赶到旷野。"
            },
            {
              "en": "It seemed a strange proof of Divine favor. \"Immediately.\" Immediately after what? After the opened heavens and the dove-like peace and voice of the Father's blessing, \"Thou art my beloved Son, in whom I am well pleased.\" It is no <span class=\"vocab-trigger\" data-vocab=\"abnormal\">abnormal<\/span> experience. Thou, too, hast passed through it, O my soul. Are not the times of thy deepest <span class=\"vocab-trigger\" data-vocab=\"depression\">depression<\/span> just the moments that follow thy <span class=\"vocab-trigger\" data-vocab=\"loftiest flight\">loftiest flight<\/span>? Yesterday thou wert <span class=\"vocab-trigger\" data-vocab=\"soaring\">soaring<\/span> far in the firmament and singing in the radiance of the morn; today thy wings are folded and thy song silent. At noon thou wert <span class=\"vocab-trigger\" data-vocab=\"basking\">basking<\/span> in the sunshine of a Father's smile; at eve thou art saying in the <span class=\"vocab-trigger\" data-vocab=\"wilderness\">wilderness<\/span>, \"My way is hid from the Lord.\"",
              "zh": "这似乎是对神恩宠的一个奇特证明。「立刻」——立刻在什么事之后？在诸天敞开、鸽子般的平安和父神祝福的声音——「你是我的爱子，我喜悦你」——之后。这并非反常的经历。我的灵啊，你岂非也经过？你最深沉的沮丧时刻，岂非紧接在你最高飞翔之后？昨日你在穹苍高飞，在晨光中歌唱；今日你的翅膀却收拢，歌声静默。正午你沐浴在父神笑脸的阳光中；黄昏你却在旷野中说：「我的道路向耶和华隐藏。」",
              "simpEn": "This seemed a strange proof of God's favor. 'Immediately'—after what? After the heavens opened, the dove-like peace, and the Father's voice: 'You are My beloved Son, with whom I am well pleased.' This is not abnormal. Haven't you been through it, my soul? Your deepest depression often comes right after your highest flight. Yesterday you soared high in the sky, singing in the morning light; today your wings are folded and silent. At noon you basked in the Father's smile; at evening you cry in the wilderness, 'My way is hidden from the Lord.'",
              "simpZh": "这看起来是神恩待的奇怪证据。‘立刻’——在什么之后？在天开了、鸽子般的平安和父的声音——‘你是我的爱子，我喜悦你’——之后。这不是反常经历。我的灵魂啊，你不是也经历过吗？你最深的沮丧，不是常常紧跟着你最高飞的时候吗？昨天你在高空飞，在晨光中唱歌；今天翅膀收起来，歌也静了。中午你还在父的微笑阳光里享受；黄昏你却在旷野说：‘我的路向耶和华隐藏了。’"
            },
            {
              "en": "Nay, but my soul, the very suddenness of the change is a proof that it is not <span class=\"vocab-trigger\" data-vocab=\"revolutionary\">revolutionary<\/span>. Hast thou weighed the comfort of that word \"Immediately\"? Why does it come so soon after the blessing? Just to show that it is the <span class=\"vocab-trigger\" data-vocab=\"sequel\">sequel<\/span> to the blessing. God shines on thee to make thee fit for life's desert-places—for its <span class=\"vocab-trigger\" data-vocab=\"Gethsemanes\">Gethsemanes<\/span>, for its <span class=\"vocab-trigger\" data-vocab=\"Calvaries\">Calvaries<\/span>. He lifts thee up that He may give thee strength to go further down; He <span class=\"vocab-trigger\" data-vocab=\"illuminates\">illuminates<\/span> thee that He may send thee into the night that He may make thee a help to the helpless. Not at all times art thou worthy of the <span class=\"vocab-trigger\" data-vocab=\"wilderness\">wilderness<\/span>; thou art only worthy of the <span class=\"vocab-trigger\" data-vocab=\"wilderness\">wilderness<\/span> after the splendors of Jordan. Nothing but the Son's vision can fit thee for the Spirit's burden; only the glory of the baptism can support the hunger of the desert. —George Matheson.",
              "zh": "不，我的灵魂，这转变的突然性恰恰证明它不是革命性的。你可曾思量过「立刻」这个词带来的安慰？它为何在祝福之后来得这么快？正是要显明它是祝福的续篇。神使你沐浴光辉，为要让你适合生命的旷野——适合客西马尼，适合各各他。祂抬举你，为要给你力量走更深的低谷；祂照亮你，为要差你进入黑夜，好叫你成为无助之人的帮助。你并非时时刻刻都配得旷野；你唯有在约旦河的荣光之后，才配得旷野。唯有圣子的异象才能使你预备好承担圣灵的重担；唯有洗礼的荣耀能支撑旷野的饥饿。——乔治·马西森",
              "simpEn": "No, my soul, the suddenness of the change proves it is not a revolution. Have you considered the comfort of 'Immediately'? Why does it come right after blessing? To show it is the sequel. God shines on you to prepare you for life's deserts—its Gethsemanes and Calvaries. He lifts you up to give strength to go further down; He lights you to send you into night, making you a help to the helpless. You are only ready for the wilderness after Jordan's splendors. Only the vision of the Son can prepare you for the Spirit's burden; only baptism's glory can sustain the desert's hunger.",
              "simpZh": "不，我的灵魂，变化这么快证明它不是一场革命。你有没有想过‘立刻’这词的安慰？为什么在祝福之后马上来？正是要显明它是祝福的续集。神让你沐浴光辉，是为预备你适合人生的旷野——适合客西马尼和各各他。祂抬举你，是给你力量走更深的低谷；祂照亮你，是要差你进入黑夜，让你能帮助无助的人。你不是任何时候都配得旷野；你只有在约旦河的辉煌之后才配得旷野。只有看见了圣子，才能担起圣灵的重担；只有洗礼的荣耀才能支撑旷野的饥饿。"
            },
            {
              "en": "After <span class=\"vocab-trigger\" data-vocab=\"benediction\">benediction<\/span> comes battle. The time of testing that marks and mightily enriches a soul's spiritual career is no ordinary one, but a period when all hell seems let loose, a period when we realize our souls are brought into a net, when we know that God is permitting us to be in the devil's hand. But it is a period which always ends in certain triumph for those who have committed the keeping of their souls to Him, a period of marvelous \"nevertheless afterward\" of abundant usefulness, the sixty-fold that surely follows. —Aphra White.",
              "zh": "祝福之后随即是争战。那种深刻塑造并大大丰富灵魂属灵生涯的试验时期，绝非平凡，而是仿佛一切地狱权势都被释放的时期，一个我们意识到自己的灵魂被网罗困住，并知道神正容许我们被交在魔鬼手中的时期。但这时期对于那些已将灵魂交托祂保守的人来说，总是以确定的凯旋告终，是奇妙的「然而后来」、丰盛有用的一生，那必定随之而来的六十倍结实。——阿夫拉·怀特",
              "simpEn": "After blessing comes battle. The time of testing that marks and richly deepens a soul's spiritual life is no ordinary time, but a season when all hell seems loose, when we realize our soul is caught in a net and God is allowing us to be in the devil's hand. Yet it always ends in certain victory for those who have trusted Him with their souls—a marvelous 'nevertheless afterward' of abundant fruitfulness, the sixty-fold that surely follows.",
              "simpZh": "祝福过后就有争战。那深刻塑造并大大丰富灵魂属灵生命的试验期不是普通时候，而是好像整个地狱都被释放的时候，我们意识到自己的灵魂被网罗抓住，神正容许我们被交在魔鬼手中。但对那些已将灵魂交托祂保守的人来说，这段时期总是以确定的胜利告终，是奇妙的‘然而后来’，丰盛有用的一生，那必定随后的六十倍收成。"
            }
          ],

        {
          "sectionId": 7,
          "heading": "February 4",
          "audio": "audio/Streams in the Desert - February 4.m4a",
          "paragraphs": [
            {
              "en": "I will cause thee to <span class=\"vocab-trigger\" data-vocab=\"ride upon the high places\">ride upon the high places<\/span> of the earth (Isa. 58:14).",
              "zh": "我要使你乘驾地的高处。（以赛亚书58:14）",
              "simpEn": "I will make you ride on the heights of the earth.",
              "simpZh": "我要让你骑在地的高处。"
            },
            {
              "en": "Those who fly through the air in <span class=\"vocab-trigger\" data-vocab=\"airships\">airships<\/span> tell us that one of the first rules they learn is to turn their ship toward the wind, and fly against it. The wind lifts the ship up to higher heights. Where did they learn that? They learned it from the birds. If a bird is flying for pleasure, it goes with the wind. But if the bird meets danger, it turns right around and faces the wind, in order that it may rise higher, and it flies away towards the very sun. Sufferings are God's winds, His <span class=\"vocab-trigger\" data-vocab=\"contrary winds\">contrary winds<\/span>, sometimes His strong winds. They are God's <span class=\"vocab-trigger\" data-vocab=\"hurricanes\">hurricanes<\/span>, but they take human life and lift it to higher levels and toward God's heavens.",
              "zh": "那些乘坐飞船飞行的人告诉我们，他们学到的首要规则之一，就是将飞船转向迎风面，逆风飞行。风将飞船提升到更高之处。他们从哪里学到的呢？是从飞鸟学来的。鸟若为愉乐而飞，就顺风而行；但鸟若遇见危险，就立刻转身面向风，好让自己能飞得更高，并且它朝着太阳的方向飞去。苦难就是神的风，是祂的逆风，有时甚至是祂的烈风。它们是神的飓风，却能把人的生命提升到更高的境界，向着神的诸天而去。",
              "simpEn": "Aviators say one of the first rules they learn is to turn the plane into the wind and fly against it. The wind lifts the plane higher. They learned this from birds. A bird flying for fun goes with the wind, but when in danger, it turns to face the wind so it can rise higher and fly toward the sun. Sufferings are God's winds—His contrary winds, sometimes strong winds. They are His hurricanes, but they lift human life to higher levels, toward God's heavens.",
              "simpZh": "开飞机的人说，他们最先学的规则之一，就是把飞机转向风，迎着风飞。风会把飞机抬到更高。他们从鸟那里学来的。鸟为好玩顺风飞，但遇到危险，它就转过来迎着风，让自己升得更高，朝着太阳飞去。苦难就是神的风——是祂的逆风，有时是强风。它们是神的飓风，却能把人的生命提升到更高，朝向神的诸天。"
            },
            {
              "en": "You have seen in the summer time a day when the atmosphere was so <span class=\"vocab-trigger\" data-vocab=\"oppressive\">oppressive<\/span> that you could hardly breathe? But a cloud appeared on the western horizon and that cloud grew larger and threw out rich blessing for the world. The storm rose, lightning flashed and thunder pealed. The storm covered the world, and the atmosphere was <span class=\"vocab-trigger\" data-vocab=\"cleansed\">cleansed<\/span>; new life was in the air, and the world was changed. Human life is worked out according to exactly the same principle. When the storm breaks the atmosphere is changed, clarified, filled with new life; and a part of heaven is brought down to earth.",
              "zh": "你曾在夏日见过那种闷热得几乎令人窒息的日子吗？但一片云出现在西方地平在线，那云越扩越大，为世界投下丰盛的祝福。风暴骤起，电闪雷鸣。风暴笼罩了世界，空气得以洁净；新的生命进入空中，世界为之一变。人生的运作遵循完全相同的原理。当风暴崩裂，空气就被改变、净化，充满新生命；并且一部分天堂被带到了地上。",
              "simpEn": "Have you experienced a summer day so heavy you could hardly breathe? Then a cloud appears on the horizon, growing larger and releasing rich blessing. The storm rises with lightning and thunder; the air is cleansed, filled with new life, and the world is changed. Human life works the same way. When the storm breaks, the atmosphere changes, becomes clear and full of life; a piece of heaven is brought down to earth.",
              "simpZh": "你经历过夏天闷得几乎没法呼吸的日子吗？然后西边地平在线出现一片云，越来越大，降下丰盛的祝福。风暴起来，闪电打雷。风暴覆盖世界，空气被洁净，充满新生命，世界改变了。人生也是同样原理。风暴爆发，空气改变，变清新，充满新生命；一部分天堂被带到了地上。"
            },
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Obstacles\">Obstacles<\/span> ought to set us singing. The wind finds voice, not when rushing across the open sea, but when hindered by the outstretched arms of the pine trees, or broken by the fine strings of an <span class=\"vocab-trigger\" data-vocab=\"Aeolian harp\">Aeolian harp<\/span>. Then it has songs of power and beauty. Set your freed soul sweeping across the <span class=\"vocab-trigger\" data-vocab=\"Obstacles\">obstacles<\/span> of life, through grim forests of pain, against even the tiny hindrances and frets that love uses, and it too, will find its singing voice. <br>Be like a bird that, <span class=\"vocab-trigger\" data-vocab=\"halting\">halting<\/span> in its flight, <br><span class=\"vocab-trigger\" data-vocab=\"rests\">Rests<\/span> on a <span class=\"vocab-trigger\" data-vocab=\"bough too slight\">bough too slight<\/span>. <br>And feeling it give way beneath him sings, <br>Knowing he hath wings.",
              "zh": "障碍应当使我们歌唱。风发出歌声，不是在吹过空旷海面之时，而是在被松树伸展的枝干阻挡，或被风弦琴的细弦拨断之时。那时它才奏出力量与美丽的歌章。让你那得了释放的灵魂扫过生命的障碍，穿过沉郁的痛楚森林，甚至迎向那爱所使用的小小阻挠与磨擦，它也会寻见自己歌唱的声音。要像那飞鸟，在飞行中暂停，歇息在一根太细的枝头；感觉枝子下沉时，它却歌唱，因它知道自己有翅膀。",
              "simpEn": "Obstacles should make us sing. The wind finds its voice not over the open sea, but when blocked by pine branches or broken by the strings of an Aeolian harp. Then it makes songs of power and beauty. Let your freed soul sweep across life's obstacles, through dark forests of pain, against every tiny hindrance that love uses, and it too will find its singing voice. Be like a bird that pauses in flight, resting on a branch too thin, and when it feels the branch give way, it sings, knowing it has wings.",
              "simpZh": "障碍应该让我们唱起歌来。风发出声音，不是吹过开阔海面时，而是被松树枝挡住，或被风琴弦拨断时。那时它才奏出有力量又美丽的歌。让你得释放的灵魂扫过人生的障碍，穿过痛苦的漆黑森林，迎向爱所使用的一切小阻拦和磨擦，它也会找到自己歌唱的声音。要像那飞鸟，飞的时候暂停，歇在一根太细的枝子上；感觉枝子往下沉时，它却唱歌，因为它知道自己有翅膀。"
            }

              "zh": "可曾有任何理由应当忧闷？只有两个原因，且仅有两个。如果我们尚未悔改归正，就有理由忧闷；或者我们虽已归正却仍活在罪中，那忧闷也是合理的。但除了这两件事之外，再没有理由忧闷，因为其他一切都可以借着祷告、祈求和感谢带到神面前。并且对于我们所需要的一切、一切困难和试炼，我们可以操练对神的能力与神之爱的信心。",

              "simpZh": "有什么理由该低沉吗？只有两个：还没悔改信主，或者信了主却活在罪中。除此以外没有理由低沉，因为其他一切都可以藉着祷告、祈求和感谢带到神面前。对所有需要、困难和试炼，我们可以相信神的能力和慈爱。"
            },
            {
              "en": "\"Hope thou in God.\" Oh, remember this: There is never a time when we may not hope in God. Whatever our necessities, however great our difficulties, and though to all appearance help is impossible, yet our business is to hope in God, and it will be found that it is not in vain. In the Lord's own time help will come. Oh, the hundreds, yea, the thousands of times that I have found it thus within the past seventy years and four months! When it seemed impossible that help could come, help did come; for God has His own resources. He is not confined. In ten thousand different ways, and at ten thousand different times God may help us.",
              "zh": "「你当仰望神。」哦，要记住：任何时候我们都可以仰望神。无论我们有何等的需要，无论困难多大，即使从一切表象看帮助已不可能，我们却仍当仰望神，并且必将发现这绝非徒然。到了主自己的时候，帮助就必临到。哦，在过去七十四个月里，我发现这事实何止成百上千次！当帮助似乎不可能来到之时，帮助却真来到了；因为神有祂自己的资源，祂不受限制。神可以用一万种不同的方式，在一万个不同的时刻帮助我们。",
              "simpEn": "'Hope in God.' Remember: there is never a time when we cannot hope in God. Whatever our needs, however huge our troubles, and though help seems impossible, our job is to hope in God, and it will not be in vain. In His time, help will come. Over the past seventy-four months, I have found this true hundreds, even thousands of times. When help seemed impossible, it came, because God has His own resources and is not limited. He can help us in ten thousand ways at ten thousand times.",
              "simpZh": "'仰望神。' 记住：任何时候我们都可以仰望神。无论需要什么，困难多大，就算看起来帮助已经不可能，我们的本分仍是仰望神，而且不会徒然。到神自己的时候，帮助就来。过去的七十四个月里，我经历了几百几千次：当帮助似乎不可能时，帮助却来了，因为神有祂自己的资源，不受限制。神可以用一万种方式、在一万个时候帮助我们。"
            },
            {
              "en": "Our business is to spread our cases before the Lord, in child-like simplicity to pour out all our heart before God, saying, \"I do not deserve that Thou shouldst hear me and answer my requests, but for the sake of my precious Lord Jesus; for His sake answer my prayer, and give me grace quietly to wait till it please Thee to answer my prayer. For I <span class=\"vocab-trigger\" data-vocab=\"believe\">believe<\/span> Thou wilt do it in Thine own time and way.\" <br>\"For I shall yet praise him.\" More prayer, more exercise of faith, more patient waiting, and the result will be blessing, abundant blessing. Thus I have found it many hundreds of times, and therefore I continually say to myself, \"Hope thou in God.\" —George Mueller.",
              "zh": "我们的本分是把自己的事情陈明在主面前，以孩子般的单纯将我们的心向神倾吐，说：「我本不配让你垂听并应允我的祈求，但因着我宝贵的主耶稣；求你为祂的缘故应允我的祷告，并赐恩使我安静等候，直到你喜悦应允我。因我相信你必在你自己的时候、用你自己的方式成就。」「我还要称赞祂。」更多祷告，更多操练信心，更多忍耐等候，结果便是祝福，丰盛的祝福。我已如此经历千百次，因此我不住地对自己说：「你当仰望神。」——乔治·穆勒",
              "simpEn": "We are to lay our cases before the Lord, pouring out our hearts with childlike simplicity, saying: 'I don't deserve You to hear and answer, but for the sake of my precious Lord Jesus, please answer my prayer and give me grace to wait quietly until You are pleased to answer. I believe You will do it in Your own time and way.' 'I shall yet praise Him.' More prayer, more faith, more patient waiting—the result is blessing, abundant blessing. I have found this hundreds of times, so I keep telling myself: 'Hope in God.'",
              "simpZh": "我们应把自己的事摆在主面前，像孩子单纯地把心倾吐出来，说：'我不配让你垂听和应允，但因着我亲爱的主耶稣，求你为祂的缘故应允我的祷告，赐我恩典安静等候，直到你喜悦应允。我相信你会在你自己的时候、用自己的方式成就。' '我还要赞美祂。' 更多祷告，更多信心，更耐心等候，结果就是祝福，丰盛的祝福。我已这样经历了几百次，所以我不断对自己说：'仰望神。'"

            {

              "zh": "耶和华是我的牧者。不是过去是，不或许是，也不是将来是。「耶和华是我的牧者」——在星期天是，在星期一是，在一周每一天都是；在一月是，在十二月是，在一年每个月都是；在家中是，在中国也是；在平安中是在战争中也；在富足中在缺乏中也。——戴德生",

              "simpZh": "耶和华是我的牧者。不是过去是，不是可能是，也不是将来是。'耶和华是我的牧者'在星期天是，星期一是，一周每一天都是；一月是，十二月是，一年每个月都是；在家是，在中国也是；平安中是，战争中也是；富足中是，贫穷中也是。"

            {

              "zh": "祂要静默地为你筹划，你这蒙全知看顾的对象；神亲自担当你领航的职责，穿越每处暗伏的网罗。祂必定静默地为你筹划，如此确定，祂永不失信！安息在神的信实上吧，在祂里面你必得胜。祂要静默地为你筹划，预备些关于爱奇妙的惊喜。眼睛未曾看见，耳朵未曾听见，却为你存留在天上。祂要静默地为你筹划，祂的旨意必将全然展开；那纠缠的线团终必放出光彩，成为述说不尽的巧艺杰作。祂要静默地为你筹划，蒙父看顾的快乐孩子，仿佛再无别人赢得祂的爱，惟独你为祂所珍爱。——E.玛丽·格莱姆斯。不论我们的信心说神是怎样，祂就是那样。",
              "simpEn": "He will silently plan for you, you who are the object of all-knowing care. God Himself will pilot you through every hidden trap. He certainly won't fail. Rest on His faithfulness; you will win. He'll silently plan wonderful love-surprises for you—things no eye has seen or ear heard, kept for you above. His plans will all unfold; the tangled mess will shine as a masterpiece. He plans for you, happy child of the Father, as if no one else claimed His love—you alone are dear to Him. Whatever our faith says God is, He will be.",
              "simpZh": "祂会默默为你筹划，你是全知看顾的对象。神亲自作你的导航者，带你穿越每一个隐藏的陷阱。祂肯定不会失败。安息在神的信实里吧，你必得胜。祂默默为你预备爱的奇妙惊喜——眼睛没看过、耳朵没听过的，为你存留在天上。祂的计划都要展开；乱成一团的线会发光，成为说不出的巧艺杰作。祂默默为你筹划，你蒙父看顾的快乐孩子，好像没有别人得到祂的爱，只有你是祂宝贵的。无论信心说神是怎样，祂就是怎样。"

          "paragraphs": [
            {

              "zh": "耶稣却一言不答。（马太福音15:23）祂在爱中默然。（西番雅书3:17）",
              "simpEn": "He didn't answer her a word. He will be silent in His love.",
              "simpZh": "耶稣一句话也不回答。祂在爱中静默。"
