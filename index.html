            },
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Left alone\">Left alone<\/span>! What different sensations those words <span class=\"vocab-trigger\" data-vocab=\"conjure up\">conjure up<\/span> to each of us. To some they spell <span class=\"vocab-trigger\" data-vocab=\"loneliness and desolation\">loneliness and desolation<\/span>, to others rest and quiet. To be left alone without God would be too awful for words, but to be left alone with Him is a <span class=\"vocab-trigger\" data-vocab=\"foretaste\">foretaste<\/span> of Heaven! If His followers spent more time alone with Him, we should have <span class=\"vocab-trigger\" data-vocab=\"spiritual giants\">spiritual giants<\/span> again.",
              "zh": "「只剩下一个人」！这几个字对我们各人唤起何等不同的感受。对有些人意味着孤寂与凄凉，对另一些人却是安息与宁静。若是没有神而独自一人，实在可怕得难以言宣；但若是与祂一同独处，那是天堂的预尝！若祂的门徒更多花时间单独与祂同在，我们就会再出现属灵的伟人。",
              "simpEn": "Left alone! Those words bring different feelings to each of us. To some they mean loneliness and emptiness, to others rest and quiet. To be alone without God is too terrible for words, but to be alone with Him is a taste of heaven. If His followers spent more time alone with Him, we'd see spiritual giants again.",
              "simpZh": "‘只剩一个人’！这几个字对不同的人唤起不同的感觉。有的觉得孤单凄凉，有的觉得安静休息。没有神独自一人太可怕了，但与祂单独同在却是天堂的预尝。如果跟从祂的人多花时间和祂独处，我们就会再看到属灵的巨人。"
            },
            {
              "en": "The Master set us an example. Note how often He went to be alone with God; and He had a mighty purpose behind the command, \"When thou prayest, enter into thy <span class=\"vocab-trigger\" data-vocab=\"closet\">closet<\/span> and when thou hast shut thy door, pray.\" The greatest miracles of Elijah and Elisha took place when they were alone with God. It was alone with God that Jacob became a <span class=\"vocab-trigger\" data-vocab=\"prince\">prince<\/span>; and just there that we, too, may become princes—\"men (aye, and women too!) wondered at\" (Zech. 3:8). Joshua was alone when the Lord came to him. (Josh. 1:1). Gideon and Jephthah were by themselves when <span class=\"vocab-trigger\" data-vocab=\"commissioned\">commissioned<\/span> to save Israel (Judges 6:11 and 11:29). Moses was by himself at the wilderness bush (Exodus 3:1-5). Cornelius was praying by himself when the angel came to him (Acts 10:2). No one was with Peter on the house top, when he was instructed to go to the Gentiles (Acts 10:9). John the Baptist was alone in the wilderness (Luke 1:80), and John the Beloved alone in <span class=\"vocab-trigger\" data-vocab=\"Patmos\">Patmos<\/span>, when nearest to God (Rev. 1:9).",
              "zh": "主给我们立了榜样。留意祂多少次独自去与神同在；而且祂在命令「你祷告的时候，要进你的内屋，关上门，祷告」背后，有一个大能的旨意。以利亚和以利沙最大的神迹是在他们单独与神同在时发生的。雅各是单独与神同在时成为王子；也正是在那里，我们也能成为王子——「令人惊奇的」（亚3:8）。约书亚是单独时主来寻他（书1:1）。基甸和耶弗他独自时受差遣拯救以色列（士6:11, 11:29）。摩西独自在旷野的荆棘前（出3:1-5）。哥尼流独自祷告时天使来到他面前（徒10:2）。彼得在房顶上时没有人同在他身边，那时他受指示去外邦人中（徒10:9）。施洗约翰独自在旷野（路1:80），蒙爱的约翰独自在拔摩岛上，那时他最亲近神（启1:9）。",
              "simpEn": "Jesus set the example. He often went to be alone with God. He commanded, 'When you pray, go into your room, shut the door, and pray.' Elijah and Elisha did their greatest miracles when alone with God. Jacob became a prince when alone with God; we can become princes too. Joshua, Gideon, Jephthah, Moses, Cornelius, Peter, John the Baptist, and John the Beloved were all alone when God met them powerfully.",
              "simpZh": "耶稣是我们的榜样。祂常常独自去与神同在。祂吩咐说，‘你祷告时要进内屋，关上门，祷告。’以利亚和以利沙最大的神迹都是单独与神同在时发生的。雅各单独与神同在时成了王子；我们也可以成为王子。约书亚、基甸、耶弗他、摩西、哥尼流、彼得、施洗约翰、蒙爱的约翰，都是单独时神大能地遇见他们。"
            },
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Covet\">Covet<\/span> to get alone with God. If we neglect it we not only rob ourselves, but others too, of blessing, since when we are blessed we are able to pass on blessing to others. It may mean less outside work; it must mean more depth and power, and the consequence, too, will be \"<span class=\"vocab-trigger\" data-vocab=\"they saw no man save Jesus only\">they saw no man save Jesus only<\/span>.\" To be alone with God in prayer cannot be <span class=\"vocab-trigger\" data-vocab=\"over-emphasized\">over-emphasized<\/span>. <br>If chosen men had never been alone, <br>In deepest silence open-doored to God, <br>No greatness ever had been dreamed or done.",
              "zh": "要渴慕单独与神同在。我们若忽略这事，不仅剥夺自己，也剥夺了别人的祝福，因为我们蒙福后才能将祝福传递给他人。这可能意味着更少的外在工作；却必定意味着更深的深度与能力，而结果也将是「他们不见一人，只见耶稣」。单独在祷告中与神同在，怎样强调都不为过。若蒙拣选的人从未单独，在最深的静默中向神敞开心门，就永远不会有伟大的梦想与成就。",
              "simpEn": "Desire earnestly to be alone with God. If we neglect this, we rob ourselves and others of blessing, because when we are blessed we can bless others. It may mean less outward work, but it will mean more depth and power, and the result will be 'they saw no one except Jesus.' Being alone with God in prayer cannot be stressed too much. If chosen people had never been alone, in deep silence open to God, no greatness would have been dreamed or done.",
              "simpZh": "要渴想单独与神同在。忽略这事，不仅自己受亏损，别人也受亏损，因为我们蒙福了才能把祝福传给别人。这可能意味着外面的工作更少，但必定意味着更深的深度和能力，结果就是‘他们不见一人，只见耶稣’。独自在祷告中与神同在，再强调也不过分。如果蒙拣选的人从未单独，在最深的安静中向神敞开心门，就不会有伟大的梦想和成就。"
            }
          ],

        {
          "sectionId": 2,
          "heading": "February 28",
          "audio": "audio/Streams in the Desert - February 28.m4a",
          "paragraphs": [
            {
              "en": "Let us offer the <span class=\"vocab-trigger\" data-vocab=\"sacrifice of praise\">sacrifice of praise<\/span> to God continually (Heb. 13:15).",
              "zh": "我们应当靠着耶稣，常常以颂赞为祭献给神。（希伯来书13:15）",
              "simpEn": "Let us continually offer a sacrifice of praise to God.",
              "simpZh": "我们应当常常向神献上赞美的祭。"
            },
            {
              "en": "A city missionary, stumbling through the dirt of a dark entry, heard a voice say, \"Who's there, Honey?\" Striking a match, he caught a vision of earthly want and suffering, of saintly trust and peace, \"cut in <span class=\"vocab-trigger\" data-vocab=\"ebony\">ebony<\/span>\"—calm, appealing eyes set amid the wrinkles of a <span class=\"vocab-trigger\" data-vocab=\"pinched\">pinched<\/span>, black face that lay on a <span class=\"vocab-trigger\" data-vocab=\"tattered\">tattered<\/span> bed. It was a bitter night in February, and she had no fire, no fuel, no light. She had had no supper, no dinner, no breakfast. She seemed to have nothing at all but <span class=\"vocab-trigger\" data-vocab=\"rheumatism\">rheumatism<\/span> and faith in God. One could not well be more completely exiled from all pleasantness of circumstances, yet the favorite song of this old creature ran:",
              "zh": "一位城市宣教士在黑暗入口的污秽中摸索前行，听见一个声音说：「亲爱的，谁在那里？」他划了一根火柴，瞥见了一幅尘世穷困与受苦，以及圣徒般信靠与平安的景象，如同「刻在乌木上」——一双平静、恳求的眼睛镶嵌在满是皱纹、消瘦的黑人面孔上，她躺在破旧的床上。那是二月一个寒苦的夜晚，她没有火，没有柴，没有灯。她没有晚餐、午餐、早餐。似乎除了风湿病和对神的信心，她一无所有。没有什么能比这更完全地被放逐于舒适环境之外了，然而这位老妇最喜爱的歌谣唱着：",
              "simpEn": "A city missionary, walking through a dark, dirty hallway, heard a voice: 'Who's there, Honey?' He struck a match and saw a scene of poverty and suffering, but also of holy trust and peace. An old black woman, her face thin and wrinkled, lay on a ragged bed. It was a bitter February night, and she had no fire, no food, no light—only rheumatism and faith in God. She was completely cut off from all comfort, yet her favorite song went:",
              "simpZh": "一位城市宣教士走进一个又黑又脏的过道，听见声音说：‘亲爱的，谁在那里？’他划了一根火柴，看见一个贫穷痛苦的景象，但也看见圣洁的倚靠和平安。一个年老黑人妇女，脸又瘦又皱，躺在破床上。二月寒夜，她没有火，没有食物，没有灯——只有风湿病和对神的信心。她完全被隔绝在一切舒适之外，但她最喜欢的歌是这样唱的："
            },
            {
              "en": "Nobody knows de trouble I see, <br>Nobody knows but Jesus; <br>Nobody knows de trouble I see— <br>Sing Glory <span class=\"vocab-trigger\" data-vocab=\"Hallelu\">Hallelu<\/span>! <br>Sometimes I'm up, sometimes I'm down, <br>Sometimes I'm level on the groun', <br>Sometimes the glory shines aroun'— <br>Sing Glory Hallelu! <br>...the constant <span class=\"vocab-trigger\" data-vocab=\"refrain\">refrain<\/span> being the \"Glory Hallelu!\" until the last verse rose: <br>Nobody knows de joys I has, <br>Nobody knows but Jesus!",
              "zh": "「无人知道我所见的苦，无人知道，只有耶稣；无人知道我所见的苦——唱荣耀哈利路！有时我高昂，有时我低落，有时我与地齐平，有时荣光四面照耀——唱荣耀哈利路！」……那不断重复的副歌就是「荣耀哈利路」，直到最后一节唱道：「无人知道我所拥有的喜乐，无人知道，只有耶稣！」",
              "simpEn": "'Nobody knows the trouble I see, nobody knows but Jesus; nobody knows the trouble I see—Sing Glory Hallelu! Sometimes I'm up, sometimes I'm down, sometimes I'm level on the ground, sometimes the glory shines around—Sing Glory Hallelu!' The constant refrain was 'Glory Hallelu!' until the last verse: 'Nobody knows the joys I have, nobody knows but Jesus!'",
              "simpZh": "‘没有人知道我所见的苦，没有人知道，只有耶稣；没有人知道我所见的苦——唱荣耀哈利路！有时我高，有时我低，有时我平平贴着地，有时荣耀四面照——唱荣耀哈利路！’副歌一直是‘荣耀哈利路’，直到最后一节：‘没有人知道我所拥有的喜乐，没有人知道，只有耶稣！’"
            },
            {
              "en": "\"Troubled on every side, yet not distressed; perplexed, but not in despair; persecuted, but not forsaken; cast down, but not destroyed.\" It takes great Bible words to tell the cheer of the old negro auntie. Remember Luther on his sick-bed. Between his groans he managed to preach on this wise: \"These pains and trouble here are like the <span class=\"vocab-trigger\" data-vocab=\"type\">type<\/span> which the printers set; as they look now, we have to read them backwards, and they seem to have no sense or meaning in them; but up yonder, when the Lord God prints us off in the life to come, we shall find they make brave reading.\" Only we do not need to wait till then. Remember Paul walking the <span class=\"vocab-trigger\" data-vocab=\"hurricane deck\">hurricane deck<\/span> amid a boiling sea, bidding the frightened crew \"Be of good cheer,\" Luther, the old negro auntie—all of them human <span class=\"vocab-trigger\" data-vocab=\"sun-flowers\">sun-flowers<\/span>. —Wm. C. Gannett.",
              "zh": "「四面受敌，却不被困住；心里作难，却不至失望；遭逼迫，却不被丢弃；打倒了，却不至死亡。」只有圣经伟大的话才能说出这位老黑人姨妈的欢欣。记得路德在病榻上，在呻吟之间，他设法这样讲道：「这些疼痛和患难就像印刷工人排的铅字；现在看起来，我们得倒着读，似乎毫无意义；但在天上，当主神在来生把我们印出来的时候，我们将发现它们读起来是勇敢的事迹。」不过我们不必等到那时。记得保罗在翻腾海面的狂风甲板上行走，吩咐受惊的船员「放心」，路德，那位老黑人姨妈——他们都是人类的向日葵。——Wm. C.甘内特",
              "simpEn": "'Troubled on every side, yet not crushed; perplexed, but not in despair; persecuted, but not abandoned; struck down, but not destroyed.' Only great Bible words can describe the cheer of that old black auntie. Luther on his sickbed, between groans, preached: 'These pains are like printer's type; now we read them backwards and they make no sense, but when God prints us off in the life to come, they'll read bravely.' And Paul on the stormy deck told the frightened crew, 'Be of good cheer.' Luther, the old auntie—all human sunflowers.",
              "simpZh": "‘四面受敌，却不被困住；心里作难，却不至失望；遭逼迫，却不被丢弃；打倒了，却不至死亡。’只有圣经宏大的话才能描绘那位老黑人姨妈的欢欣。路德在病床上，在呻吟中间讲道说：‘这些疼痛就像印刷工人排的铅字，现在看要倒着读，没有意义，但将来神把我们印出来时，就会读起来很勇敢。’保罗在风浪甲板上对受惊的船员说‘放心’。路德、老黑人姨妈——都是人类的向日葵。"
            }

        {
          "sectionId": 3,
          "heading": "February 29",

          "paragraphs": [
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Launch out into the deep\">Launch out into the deep<\/span> (Luke 5:4).",
              "zh": "把船开到水深之处。（路加福音5:4）",
              "simpEn": "Go out into deep water.",
              "simpZh": "开到水深的地方去。"
            },
            {
              "en": "How deep He does not say. The depth into which we launch will depend upon how perfectly we have given up the shore, and the greatness of our need, and the <span class=\"vocab-trigger\" data-vocab=\"apprehension\">apprehension<\/span> of our possibilities. The fish were to be found in the deep, not in the shallow water. So with us; our needs are to be met in the deep things of God. We are to launch out into the deep of God's Word, which the Spirit can open up to us in such crystal <span class=\"vocab-trigger\" data-vocab=\"fathomless\">fathomless<\/span> meaning that the same words we have accepted in times past will have an ocean meaning in them, which renders their first meaning to us very shallow.",
              "zh": "祂没有说明多深。我们下到多深，取决于我们放弃岸边有多彻底，我们需要的程度，以及我们对自己潜能的认识。鱼是在水深之处，不在浅水里。我们也是如此；我们的需要必须在神深奥的事物中得满足。我们当开往神话语的深处，圣灵能将其开启，显出如水晶般深不可测的含义，使从前我们接受过的同样话语，如今有了海洋般的意思，相形之下最初的理解便显得极为肤浅。",
              "simpEn": "How deep? He doesn't say. It depends on how completely we leave the shore, how great our need, and how much we grasp our possibilities. Fish are in deep water, not shallow. So our needs are met in the deep things of God. We are to launch into the deep of God's Word; the Spirit can open it up with such crystal, endless meaning that words we once accepted will have an ocean meaning, making our first understanding seem very shallow.",
              "simpZh": "多深呢？祂没有说。那要看我们离开岸边有多彻底，我们的需要有多大，以及我们对自己的可能性能领会多少。鱼在水深处，不在浅水里。我们也是这样；我们的需要要在神深奥的事情里得到满足。我们要开到神话语的深处去，圣灵能把它开启出水晶般深不可测的意思，让我们从前接受的话有了海洋般的含义，叫最初的理解显得很浅。"
            },
            {
              "en": "Into the deep of the <span class=\"vocab-trigger\" data-vocab=\"Atonement\">Atonement<\/span> until Christ's precious blood is so illuminated by the Spirit that it becomes an <span class=\"vocab-trigger\" data-vocab=\"omnipotent balm\">omnipotent balm<\/span>, and food and medicine for the soul and body. Into the deep of the Father's will, until we apprehend it in its infinite <span class=\"vocab-trigger\" data-vocab=\"minuteness\">minuteness<\/span> and goodness, and its far-sweeping provision and care for us. Into the deep of the Holy Spirit until He becomes a bright dazzling, sweet fathomless summer sea, in which we bathe and <span class=\"vocab-trigger\" data-vocab=\"bask\">bask<\/span> and breathe, and lose ourselves and our sorrows in the calmness and peace of His everlasting presence.",
              "zh": "开到赎罪祭的深处，直到基督的宝血被圣灵如此光照，成为全能的良药，作灵魂与身体的食物与医治。开到父神旨意的深处，直到我们领悟其无限的精细与美善，以及祂对我们深远周全的供应与眷顾。开到圣灵的深处，直到祂成为一个明亮耀眼、甜美无垠的夏日海洋，我们在其中沐浴、享受、呼吸，并在祂永远同在的宁静平安中失去自己与愁苦。",
              "simpEn": "Launch into the deep of the Atonement until Christ's blood is so lit by the Spirit that it becomes an all-powerful healing balm, food and medicine for soul and body. Into the deep of the Father's will, until we grasp its infinite detail and goodness, and His far-reaching care for us. Into the deep of the Holy Spirit until He becomes a bright, sweet, endless summer sea where we bathe, soak, and breathe, losing ourselves and our sorrows in His calm presence.",
              "simpZh": "开到赎罪的深处，直到基督的宝血被圣灵照亮，成为全能的良药，作灵魂和身体的食物和医治。开到父神旨意的深处，直到我们领会它无限的精细和美善，以及祂对我们长远周详的供应和照顾。开到圣灵的深处，直到祂成为明亮耀眼、甜美无垠的夏日大海，我们在里面沐浴、享受、呼吸，在祂永远同在的平静安宁里忘记自己和忧愁。"
            },
            {
              "en": "Into the deep of the Holy Spirit until He becomes a bright marvelous answer to prayer, the most careful and tender guidance, the most thoughtful anticipation of our needs, the most accurate and supernatural shaping of our events. Into the deep of God's purposes and coming kingdom, until the Lord's coming and His <span class=\"vocab-trigger\" data-vocab=\"millennial reign\">millennial reign<\/span> are opened up to us; and beyond these the bright <span class=\"vocab-trigger\" data-vocab=\"entrancing\">entrancing<\/span> ages on ages unfold themselves, until the mental eye is <span class=\"vocab-trigger\" data-vocab=\"dazed\">dazed<\/span> with light and the heart flutters with inexpressible anticipations of its joy with Jesus and the glory to be revealed.",
              "zh": "开到圣灵的深处，直到祂成为祷告奇妙明亮的答复，最仔细温柔的引导，对我们需要最体贴的预知，对我们周遭事件最精确超然的塑造。开到神的旨意和将来国度的深处，直到主的再来和祂的千年国度向我们开启；更越过这些，那光明迷人的世世代代展开，直到心灵的眼目因荣光而眩惑，内心因与耶稣同在之喜乐并那将要显现之荣耀难以言宣的期待而悸动。",
              "simpEn": "Into the deep of the Holy Spirit until He becomes the wonderful answer to prayer, the most careful and tender guidance, the most thoughtful anticipation of our needs, the most accurate and supernatural shaping of our events. Into the deep of God's purposes and coming kingdom, until the Lord's return and His millennial reign are opened to us, and beyond, bright entrancing ages unfold until our mind is dazed with light and our heart flutters with inexpressible joy with Jesus and the glory to come.",
              "simpZh": "开到圣灵的深处，直到祂成为祷告奇妙的答复，最细心温柔的引导，对我们需要最体贴的预知，对我们遭遇最精确超然的安排。开到神的旨意和将来国度的深处，直到主的再来和千年国度向我们开启，再往前，光明迷人的世世代代展开，直到心灵的眼目被光耀得眼花，心因与耶稣同在的喜乐和将要显现的荣耀而怦怦直跳。"
            },
            {

            {
              "en": "The deep waters of the Holy Spirit are always <span class=\"vocab-trigger\" data-vocab=\"accessible\">accessible<\/span>, because they are always proceeding. Will you not this day claim afresh to be <span class=\"vocab-trigger\" data-vocab=\"immersed\">immersed<\/span> and drenched in these waters of life? The waters in Ezekiel's vision first of all <span class=\"vocab-trigger\" data-vocab=\"oozed\">oozed<\/span> from under the doors of the temple. Then the man with the measuring line measured and found the waters to the ankles. Still further measurement and they were waters to the knees. Once again they were measured and the waters to the loins. Then they became waters to swim in—a river that could not be passed over. How far have we advanced into this river of life? The Holy Spirit would have a complete self-<span class=\"vocab-trigger\" data-vocab=\"effacement\">effacement<\/span>. Not merely ankle-deep, knee-deep, loin-deep, but self-deep. We ourselves hidden out of sight and bathed in this life-giving stream. Let go the shore-lines and launch out into the deep. Never forget, the Man with the measuring line is with us today. —J.G.M.",
              "zh": "圣灵的深水永远是可行的，因为它们永远在涌流。今天你是否愿重新宣告要浸没并畅饮在这生命水中呢？在以西结的异象中，水起初从圣殿的门槛下渗出。然后那拿准绳的人量了，水到踝子骨。再量，水到膝。又量，水到腰。然后水成了可游的水——一条不可越过的河。我们在这生命河中进展了多少？圣灵要我们有完全的自己消失。不单是到踝、到膝、到腰，而是自己全没。我们自己隐藏不见，沐浴在这赐生命的洪流中。放开岸边的绳索，开往水深之处。永不要忘记，那拿准绳的人今日与我们同在。——J.G.M.",
              "simpEn": "The deep waters of the Holy Spirit are always available because they are always flowing. Claim today to be fully immersed in these waters of life. In Ezekiel's vision, water first trickled from the temple, then rose to ankles, knees, and loins, and finally became a river to swim in. How far have we gone into this river of life? The Spirit wants complete self-effacement—not just ankle-deep, knee-deep, or waist-deep, but self-deep. We are hidden and bathed in the life-giving stream. Let go the shorelines and launch into the deep. The Man with the measuring line is with us today.",
              "simpZh": "圣灵的深水总是可以得到的，因为它们一直在涌流。今天你要不要重新宣告，要浸在这些生命水里，被它们湿透？以西结的异象中，水先从圣殿门槛下渗出，量了到踝子骨，又量到膝，再到腰，最后成了可游的水——不能越过的河。我们进入这生命河有多深了？圣灵要我们完全隐藏自己，不单是踝深、膝深、腰深，而是自己全没。我们本身隐藏不见，浸在这赐生命的水流里。放开岸边的绳子，开到水深之处。别忘记，那拿准绳的人今天和我们同在。"

            {
              "en": "Consider the work of God: for who can make that straight, which he hath made <span class=\"vocab-trigger\" data-vocab=\"crooked\">crooked<\/span> (Eccl. 7:13).",
              "zh": "你要察看神的作为，因神使为曲的，谁能变为直呢？（传道书7:13）",

            {
              "en": "Often God seems to place His children in positions of profound difficulty, leading them into a <span class=\"vocab-trigger\" data-vocab=\"wedge\">wedge<\/span> from which there is no escape; <span class=\"vocab-trigger\" data-vocab=\"contriving\">contriving<\/span> a situation which no human judgment would have permitted, had it been previously consulted. The very cloud conducts them thither. You may be thus involved at this very hour. It does seem <span class=\"vocab-trigger\" data-vocab=\"perplexing\">perplexing<\/span> and very serious to that degree, but it is perfectly right. The issue will more than justify Him who has brought you hither. It is a <span class=\"vocab-trigger\" data-vocab=\"platform\">platform<\/span> for the display of His almighty grace and power.",
              "zh": "神常常将祂的儿女置于极深的困境中，将他们引入一个无法逃脱的楔形绝境，安排出一种若人事先得知绝不会允许的处境。正是那云彩引领他们到那里。此时你可能正陷于此。这事看起来确实令人困惑，且到了极其严重的地步，然而这全然正确。其结果必将远远证实那位领你至此之主的作为。这是彰显祂全能恩典与能力的舞台。",
              "simpEn": "God often places His children in very hard positions, leading them into a tight corner with no escape, arranging situations that no human mind would have allowed if asked beforehand. The very cloud leads them there. You may be in such a place right now. It seems very confusing and serious, but it is perfectly right. The outcome will prove that God was right to bring you there. It's a stage to show His almighty grace and power.",
              "simpZh": "神常把祂的儿女放在极难的境地，领进一个出不来的死角，安排出人事先绝不会同意的局面。正是那云彩领他们到那里。你现在可能正陷在这样的处境里。看起来很令人困惑，也非常严重，但这是完全对的。结果会证明神领你到那里是对的。这是彰显祂全能的恩典和能力的舞台。"

            {
              "en": "He will not only deliver you; but in doing so, He will give you a lesson that you will never forget and to which, in many a psalm and song, in after days, you will <span class=\"vocab-trigger\" data-vocab=\"revert\">revert<\/span>. You will never be able to thank God enough for having done just as He has. <br>We may wait till He explains, <br>Because we know that Jesus reigns. <br>It puzzles me; but, Lord, Thou understandest, <br>And wilt one day explain this crooked thing. <br>Meanwhile, I know that it has worked out Thy best— <br>Its very crookedness taught me to cling. <br>Thou hast fenced up my ways, made my paths crooked, <br>To keep my wand'ring eyes fixed on Thee, <br>To make me what I was not, humble, patient; <br>To draw my heart from earthly love to Thee. <br>So I will thank and praise Thee for this puzzle, <br>And trust where I cannot understand. <br>Rejoicing Thou dost hold me worth such testing, <br>I cling the closer to Thy guiding hand. —F. E. M. I.",
              "zh": "祂不仅要拯救你；在拯救之中，祂还要给你一个永不会忘记的功课，在往后的日子，你会在许多诗章和颂歌中重提这功课。你永远无法为祂所作的一切充分感谢祂。我们可以等到祂解释的时候，因我们深知耶稣掌权。这事令我困惑；但主啊，祢是明白的，有一天必解释这弯曲的事。同时，我知道这已成就了祢最好的旨意——正是其弯曲教导我紧紧抓住。祢用篱笆拦挡我的道路，使我的路径弯曲，好叫我游移的眼目专注祢；使我成为我所不是的——谦卑、忍耐；将我的心从属地之爱吸引到祢那里。所以我要为这难解之事感谢赞美祢，在不能明白之处仍信靠。欢然知道祢看我为配得如此试炼，我便更紧紧抓住祢引导的手。",
              "simpEn": "He will not only deliver you; He will teach you a lesson you'll never forget, and in future songs and psalms you'll return to it. You'll never thank God enough for what He has done. We can wait for His explanation, knowing Jesus reigns. It puzzles me, but Lord, You understand, and will one day explain this crooked thing. Meanwhile, I know it has worked out Your best—its very crookedness taught me to cling. You have fenced my ways, made my paths crooked, to fix my wandering eyes on You, to make me humble and patient, to draw my heart from earthly love to You. So I will thank and praise You for this puzzle, and trust where I cannot understand. Rejoicing that You count me worthy of such testing, I cling closer to Your guiding hand.",
              "simpZh": "祂不仅要救你；在救你的过程中，祂要给你一个永远忘不了的功课，日后你会在许多诗歌里回想起它。你永远感谢不够神所做的。我们可以等到祂解释的时候，因为我们知道耶稣掌权。这事使我不解；但主啊，祢明白，有一天会解释这弯曲的事。同时，我知道这已成就了祢最好的旨意——正是它的弯曲教会我紧紧抓住。祢用篱笆拦阻我的路，把我的路弄弯，好让我流浪的眼目固定在祢身上，把我变成我原本不是的——谦卑、忍耐；把我的心从地上的爱吸引到祢那里。所以我要为这难解的事感谢赞美祢，在不能明白时仍然信靠。欢喜知道祢算我配得这样的试炼，我便更紧紧抓住祢引导的手。"

        {
          "sectionId": 5,

          "paragraphs": [
            {
              "en": "Be ready in the morning, and come up ... present thyself there to me in the top of the mount. And no man shall come up with thee (Exo.34:2,3).",
              "zh": "早晨，你要预备好了，上……到山顶上，到我这里来。谁也不可和你一同上来。（出埃及记34:2-3）",
              "simpEn": "Be ready in the morning, and come up to Me on the mountaintop. No one shall come with you.",
              "simpZh": "早晨要预备好，上山到我这里来。谁也不可和你一同上来。"
            },
            {
              "en": "The <span class=\"vocab-trigger\" data-vocab=\"morning watch\">morning watch<\/span> is essential. You must not face the day until you have faced God, nor look into the face of others until you have looked into His. You cannot expect to be victorious, if the day begins only in your own strength. Face the work of every day with the influence of a few thoughtful, quiet moments with your heart and God. Do not meet other people, even those of your own home, until you have first met the great Guest and honored Companion of your life—Jesus Christ. Meet Him alone. Meet Him regularly. Meet Him with His open Book of counsel before you; and face the regular and the irregular duties of each day with the influence of His personality definitely controlling your every act.",
              "zh": "晨更乃是必须的。你不可在未见神之前面对这一天，也不可在未仰望祂之前去见人的面。若一天只靠自己的力量开始，你就别想能得胜。要以你心与神相交的片时沉思安静之影响力，去面对每一天的工作。在遇见你人生那位伟大的贵宾与尊荣的同伴——耶稣基督——之前，不要去面对其他人，甚至家中的人。独自会见祂。定期会见祂。会见祂时把祂敞开的训言书放在面前；然后以祂的位格明确掌控你每个行动的影响力，去面对每一天常例与非常例的本分。",
              "simpEn": "The morning watch is essential. Don't face the day until you have faced God, or look at others until you have looked at Him. You can't be victorious if the day starts only in your own strength. Spend a few quiet moments with God before you begin your day. Don't meet others, even family, until you have met Jesus Christ. Meet Him alone, regularly, with His Book open before you. Then let His presence guide every act of your day.",
              "simpZh": "晨更非常重要。在见神之前不要面对一天，在仰望祂之前不要见别人的面。如果一天只靠自己的力量开始，你就不能得胜。用几刻安静默想的时间与神相交，再去面对一天的工作。在没有遇见耶稣基督这位伟大的贵宾和尊荣的同伴之前，不要见别人，甚至家人。独自见祂，定期见祂，见祂时把祂敞开的圣经放在面前；让祂的位格影响并掌管你每一个行动，去面对一天常规和非常规的责任。"

            {
              "en": "Begin the day with God! <br>He is thy Sun and Day! <br>His is the radiance of thy dawn; <br>To Him address thy <span class=\"vocab-trigger\" data-vocab=\"lay\">lay<\/span>. <br>Sing a new song at morn! <br>Join the glad woods and hills; <br>Join the fresh winds and seas and plains, <br>Join the bright flowers and <span class=\"vocab-trigger\" data-vocab=\"rills\">rills<\/span>. <br>Sing thy first song to God! <br>Not to thy fellow men; <br>Not to the creatures of His hand, <br>But to the glorious One. <br>Take thy first walk with God! <br>Let Him go forth with thee; <br>By stream, or sea, or mountain path, <br>Seek still His company. <br>Thy first <span class=\"vocab-trigger\" data-vocab=\"transaction\">transaction<\/span> be <br>With God Himself above; <br>So shall thy business prosper well, <br>All the day be love. —Horatius Bonar.",
              "zh": "以神开始你的一天！祂是你的太阳和白昼！你黎明的光辉属于祂；向祂献上你的诗歌。清晨唱一首新歌！加入欢乐的树林和山岗；加入清新的风、海洋和平原，加入明丽的花儿和溪流。将你的第一首歌献给神！不是献给同胞；不是献给祂手所造之物，乃是献给那荣耀的主。与神同行你的第一步！让祂与你一同前行；在溪边、海边，或山径上，仍要寻求祂的同在。你第一件要办的事，当是与在高天之上的神办理；如此你的工作必兴盛，终日都是爱。——赫雷修斯·波纳",
              "simpEn": "Begin your day with God! He is your Sun and Day. His is the brightness of your dawn; sing to Him. Sing a new song in the morning! Join the happy woods and hills, fresh winds, seas, plains, bright flowers, and streams. Sing your first song to God, not to people or created things, but to the glorious One. Take your first walk with God; let Him go with you by stream, sea, or mountain path, always seeking His company. Let your first business be with God above; then your work will prosper and the whole day will be love.",
              "simpZh": "以神开始你的一天！祂是你的太阳和白日。你黎明的光辉是祂的；向祂唱歌吧。清晨唱首新歌！和快乐的树木山岗一起，和清风、大海、平原一起，和明亮的花和溪流一起。把你的第一首歌献给神！不是给人，不是给受造之物，而是给那荣耀的主。和神同行你的第一步！让祂和你一起出去；在溪边、海边或山路上，一直寻求祂的同在。你第一件要办的事，是和天上的神办；这样你的事业就兴旺，整天都是爱。"
            },
            {
              "en": "The men who have done the most for God in this world have been <span class=\"vocab-trigger\" data-vocab=\"early upon their knees\">early upon their knees<\/span>. Matthew Henry used to be in his study at four, and remain there till eight; then, after breakfast and family prayer, he used to be there again till noon; after dinner, he resumed his book or pen till four, and spent the rest of the day in visiting friends. Doddridge himself alludes to his \"Family Expositor\" as an example of the difference of rising between five and seven, which, in forty years, is nearly equivalent to ten years more of life. Dr. Adam Clarke's \"<span class=\"vocab-trigger\" data-vocab=\"Commentary\">Commentary<\/span>\" was chiefly prepared very early in the morning. Barnes' popular and useful \"Commentary\" has been also the fruit of \"early morning hours.\" Simeon's \"Sketches\" were chiefly worked out between four and eight.",
              "zh": "这世上为神成就最多的人都是清早就跪下的。马太·亨利常在四点进入书房，一直待到八点；然后在早餐和家庭祷告之后，又在那里直到中午；午饭后，他再拾起书笔直到四点，其余时间用来探访朋友。多德里奇自己提到他的《家庭释经》作为早起与否的例子——五点起床和七点起床的差别，在四十年间几乎等于多活了十年。亚当·克拉克博士的《注释》主要是在清早预备的。巴恩斯广受欢迎且大有用的《注释》也是「清晨时分」的果子。西缅的《素描》主要是在四点到八点之间完成的。",
              "simpEn": "The men who have done the most for God were early on their knees. Matthew Henry was in his study from 4 to 8 a.m., and again after breakfast until noon, then from after dinner until 4 p.m. Doddridge noted that rising at 5 instead of 7 over forty years adds almost ten years of life. Adam Clarke's Commentary was mostly prepared early in the morning. Barnes' popular Commentary was also the fruit of early morning hours. Simeon's Sketches were worked out between 4 and 8 a.m.",
              "simpZh": "为神成就最多的人都是清晨就跪下的。马太·亨利清晨四点到八点在书房，早餐和家庭祷告后又待到中午，午饭后到下午四点，其余时间探访朋友。多德里奇提到五点起床和七点起床的差别，四十年间几乎相当于多活十年。亚当·克拉克的《注释》主要是在清早预备的。巴恩斯广受欢迎的《注释》也是清晨时分的果子。西缅的《素描》主要是在四点到八点之间完成的。"

        {

          "audio": "audio/Streams in the Desert - March 3.m4a",
          "paragraphs": [
            {
              "en": "And the spirit cried, and <span class=\"vocab-trigger\" data-vocab=\"rent him sore\">rent him sore<\/span>, and came out of him (Mark 9:26).",
              "zh": "那鬼喊叫，使他大大的抽了一阵疯，就出来了。（马可福音9:26）",
              "simpEn": "The spirit cried out, convulsed him terribly, and came out.",
              "simpZh": "那鬼大喊，让他剧烈抽疯，就出来了。"
            },
            {
              "en": "Evil never surrenders its hold without a <span class=\"vocab-trigger\" data-vocab=\"sore fight\">sore fight<\/span>. We never pass into any <span class=\"vocab-trigger\" data-vocab=\"spiritual inheritance\">spiritual inheritance<\/span> through the delightful exercises of a picnic, but always through the <span class=\"vocab-trigger\" data-vocab=\"grim contentions\">grim contentions<\/span> of the battlefield. It is so in the secret realm of the soul. Every faculty which wins its spiritual freedom does so at the price of blood. <span class=\"vocab-trigger\" data-vocab=\"Apollyon\">Apollyon<\/span> is not put to flight by a courteous request; he <span class=\"vocab-trigger\" data-vocab=\"straddles\">straddles<\/span> across the full breadth of the way, and our progress has to be registered in blood and tears. This we must remember or we shall add to all the other burdens of life the <span class=\"vocab-trigger\" data-vocab=\"gall\">gall<\/span> of <span class=\"vocab-trigger\" data-vocab=\"misinterpretation\">misinterpretation<\/span>. We are not \"born again\" into soft and protected nurseries, but in the open country where we suck strength from the very terror of the <span class=\"vocab-trigger\" data-vocab=\"tempest\">tempest<\/span>. \"We must through much <span class=\"vocab-trigger\" data-vocab=\"tribulation\">tribulation<\/span> enter into the kingdom of God.\" —Dr. J. H. Jowett.",
              "zh": "邪恶不经过一场苦斗，绝不会放弃它的地盘。我们进入任何属灵的产业，都不是经由野餐般愉快的操练，而是经由战场上严酷的争战。在灵魂的隐秘领域也是如此。每一项获得属灵自由的官能，都要付上血的代价。亚玻伦不会因客气的请求就逃遁；他两脚跨立在路的全宽上，我们的前进只能用血与泪来记录。这一点我们必须牢记，否则我们就会在人生其他一切重担之外，再加上误解的苦毒。我们并非「重生」在柔软受保护的育儿室中，而是在旷野里，从暴风的恐怖中吸取力量。「我们进入神的国，必须经历许多艰难。」——J. H. 乔伊特博士",
              "simpEn": "Evil never gives up without a hard fight. We never come into spiritual inheritance through a picnic, but always through grim battles. In the soul, every part that gains spiritual freedom does so at the price of blood. Apollyon is not scared off by a polite request; he stands blocking the whole way, and our progress is marked by blood and tears. We must remember this, or we'll add the bitterness of misunderstanding to our burdens. We aren't born again into soft nurseries, but in the open field, drawing strength from the terror of the storm. 'We must through much tribulation enter the kingdom of God.'",
              "simpZh": "邪恶不经过苦斗绝不放手。我们进入属灵的产业，从来不是通过野餐般的轻松练习，而是通过战场上严酷的争战。在灵魂深处，每一个获得属灵自由的官能，都付上了血的代价。亚玻伦不会被礼貌的请求赶跑；他两脚跨在整个路上，我们的前进只能用血和泪来记录。我们必须记住这点，否则就会在生活的其他重担之外，再加上误解的苦毒。我们不是重生在柔软受保护的育婴室里，而是在旷野，从暴风的恐怖中吸取力量。‘我们进入神的国，必须经历许多艰难。’"
            },
            {
              "en": "Faith of our Fathers! living still, <br>In spite of <span class=\"vocab-trigger\" data-vocab=\"dungeon\">dungeon<\/span>, fire and sword: <br>O how our hearts beat high with joy <br>Whene'er we hear that glorious word. <br>Faith of our Fathers! Holy Faith! <br>We will be true to Thee till death! <br>Our fathers, chained in prisons dark, <br>Were still in heart of conscience free; <br>How sweet would be their children's fate, <br>If they, like them, could die for Thee!",
              "zh": "我们祖先的信心！依然活着，不顾地牢、烈火与刀剑：哦，每当我们听见那荣耀的字句，我们的心何等欢跃。我们祖先的信心！圣洁的信心！我们至死忠贞于祢！我们的祖先，被锁在黑暗牢狱，心灵与良心仍得自由；他们的子孙若能像他们一样为祢而死，那命运是何等甘美！",
              "simpEn": "Faith of our fathers, still living despite dungeon, fire, and sword! Our hearts beat high with joy when we hear that glorious word. Holy faith, we will be true to you till death! Our fathers, chained in dark prisons, were free in heart and conscience. How sweet it would be if we, their children, could die for You like them!",
              "simpZh": "我们祖先的信心！仍然活着，不顾地牢、烈火和刀剑。我们听见那荣耀的字句，心就高兴得怦怦跳。圣洁的信心！我们至死忠于你！我们的祖先被锁在黑暗牢狱，内心和良心仍是自由。如果他们的子孙能像他们一样为祢而死，那将是多美的命运！"
            }

            {
              "en": "Followers of them who through faith and patience <span class=\"vocab-trigger\" data-vocab=\"inherit the promises\">inherit the promises<\/span> (Heb. 6:12).",
              "zh": "那些凭信心和忍耐承受应许的人。（希伯来书6:12）",

            {
              "en": "\"There is only one thing,\" said a village <span class=\"vocab-trigger\" data-vocab=\"blacksmith\">blacksmith<\/span>, \"that I fear, and that is to be thrown on the <span class=\"vocab-trigger\" data-vocab=\"scrap heap\">scrap heap<\/span>. When I am <span class=\"vocab-trigger\" data-vocab=\"tempering\">tempering<\/span> a piece of steel, I first heat it, hammer it and then suddenly plunge it into the bucket of cold water. I very soon find whether it will take temper or go to pieces in the process. When I discover after one or two tests that it is not going to allow itself to be tempered, I throw it on the scrap heap and sell it for a cent a pound when the <span class=\"vocab-trigger\" data-vocab=\"junk man\">junk man<\/span> comes around. So I find the Lord tests me, too, by fire and water and heavy blows of His heavy hammer, and if I am not willing to stand the test, or am not going to prove a fit subject for His tempering process, I am afraid He may throw me on the scrap heap.\"",
              "zh": "一位乡村铁匠说：「我只有一件事害怕，就是被丢在废料堆上。我在炼一块钢时，先把它烧热、锤打，然后突然浸入冷水桶里。我很快就知道它承受得住锻炼，还是会在过程中碎裂。经过一两次试验，如果我发现它不容自己受锻炼，就把它丢在废料堆上，等收破烂的人来时，以一分钱一磅卖掉。我发现主也是这样试验我，借着火、水和祂大锤的重击；如果我不愿意忍受试验，或不能证明自己是适合祂锻炼过程的材料，我怕祂可能把我丢在废料堆上。」",
              "simpEn": "A village blacksmith said, 'I fear only one thing: being thrown on the scrap heap. When tempering steel, I heat it, hammer it, then plunge it into cold water. I quickly find if it will take the temper or break. If after a test or two it won't be tempered, I throw it on the scrap heap to sell for a penny a pound. So the Lord tests me with fire, water, and heavy hammer blows. If I won't stand the test or prove fit for His tempering, I'm afraid He might throw me on the scrap heap.'",
              "simpZh": "一个乡下铁匠说：‘我只怕一件事，就是被丢在废料堆上。我炼钢的时候，先把它烧热，锤打，然后突然浸到冷水里。我很快就知道它承受得住锻炼，还是会在过程中碎裂。经过一两次试验，如果发现它不肯被锻炼，就把它丢在废料堆上，等收破烂的人来时一分钱一磅卖掉。我发现主也这样试验我，用火、水和祂大锤的重击。如果我不愿意忍受试验，或不能证明自己是适合祂锻炼的材料，我怕祂可能把我丢在废料堆上。’"
            },
            {
              "en": "When the fire is hottest hold still, for there will be a blessed \"<span class=\"vocab-trigger\" data-vocab=\"afterward\">afterward<\/span>\"; and with Job we may be able to say, \"When he hath tried me I shall come forth as gold.\" —Selected. <br><span class=\"vocab-trigger\" data-vocab=\"Sainthood\">Sainthood<\/span> springs out of suffering. It takes eleven tons of pressure on a piano to tune it. God will tune you to harmonize with Heaven's <span class=\"vocab-trigger\" data-vocab=\"key-note\">key-note<\/span> if you can stand the strain. <br>Things that hurt and things that <span class=\"vocab-trigger\" data-vocab=\"mar\">mar<\/span> <br>Shape the man for perfect praise; <br>Shock and strain and ruin are <br>Friendlier than the smiling days.",
              "zh": "在最炽热的火中要稳住，因为必有蒙福的「后来」；并且我们可以与约伯同说：「祂试炼我之后，我必如精金。」——选。圣徒生命出自苦难。为钢琴调音需要十一吨的压力。你若能承受张力，神就会将你调好，与天上的主音和谐。伤痛之事与毁损之事，塑造人作完美的赞美；震撼、紧张与破碎，比欢笑的日子更友好。",

              "simpZh": "火最热的时候，要稳住，因为必有蒙福的‘后来’；我们可以和约伯一起说：‘祂试炼我之后，我必如精金。’圣徒身份出自苦难。调一台钢琴需要十一吨的压力。如果你能承受张力，神会将你调好，与天上的主音和谐。伤害你的东西和毁坏你的东西，塑造人来完美赞美；震撼、紧张和破碎，比欢笑的日子更友好。"

              "zh": "得胜的乃是最后一步；在天路客的行程中，再没有比紧挨天城门户的区域潜伏更多危险的了。疑惑城就建在那里。迷魂地也在那里引诱疲惫的旅客陷入致命的沉睡。当天堂的高处全然在望时，地狱之门便最为顽固且充满死险。“我们行善，不可丧志；若不灰心，到了时候就要收成。你们也当这样跑，好叫你们得着奖赏。”",

              "simpZh": "最后一步才得胜。天路客的旅程中，最危险的地方就在天城门口附近。那里有疑惑城，有迷魂地引诱疲倦的旅客睡着。天堂就在眼前时，地狱的门最顽固危险。行善不要丧志，若不灰心，时候到了就要收成。要跑得奖赏。"

              "zh": "在悲苦的巨浪中，被从荒凉疑惑岸上吹来的阴风击打抛掷，信心所抛的锚正在暴风中拖曳，我却安静地紧握着那些永不失落的锚链。无论恶魔如何凶猛争战，无论天使隐藏多久，我深知真理与正义拥有整个宇宙为后盾；在群星之外的某个地方，有一种比命运更美的爱。当黑夜打开她的门闩，我必看见祂——我愿等候。——华盛顿·格拉登",

            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"We trusted\">We trusted<\/span> (Luke 24:21).",

              "simpZh": "我们曾经盼望。"
            },
            {
              "en": "I have always felt so sorry that in that walk to <span class=\"vocab-trigger\" data-vocab=\"Emmaus\">Emmaus<\/span> the disciples had not said to Jesus, \"We still trust\"; instead of \"We trusted.\" That is so sad—something that is all over. If they had only said, \"Everything is against our hope; it looks as if our trust was <span class=\"vocab-trigger\" data-vocab=\"vain\">vain<\/span>, but we do not give up; we believe we shall see Him again.\" But no, they walked by His side declaring their lost faith, and He had to say to them, \"O fools, and slow of heart to believe!\"",

              "simpEn": "I feel sad that on the Emmaus road the disciples said 'we were hoping' instead of 'we are still hoping.' That sounds so final. If they had said, 'Everything looks against hope, but we won't give up; we believe we'll see Him again,' it would have been better. Instead, they walked with Jesus declaring their lost faith, and He called them foolish and slow to believe.",
              "simpZh": "我感到难过，往以马忤斯的路上，门徒说‘我们素来盼望’而不是‘我们仍在盼望’，听起来好像完全结束了。他们若说‘一切看似没有希望，但我们不放弃，我们相信必再看见祂’就好了。但他们却在耶稣身旁宣告失去信心，耶稣称他们为无知、信得太迟钝。"
            },
            {
              "en": "Are we not in the same danger of having these words said to us? We can afford to lose anything and everything if we do not lose our faith in the God of truth and love. Let us never put our faith, as these disciples did, in a <span class=\"vocab-trigger\" data-vocab=\"past tense\">past tense<\/span>—\"We trusted\"—but let us ever say, \"I am trusting.\" —<span class=\"vocab-trigger\" data-vocab=\"Crumbs\">Crumbs<\/span>.",
              "zh": "我们岂不同样有被主这样说的危险吗？只要我们不失去对那位真理与爱之神的信心，失去任何东西、一切东西我们都承受得起。让我们绝不要像那些门徒一样，把信心放在过去式里——「我们曾信」——而是永远说：「我正在信。」——《碎渣》",
              "simpEn": "Aren't we in the same danger? We can lose everything as long as we don't lose faith in the God of truth and love. Let's never put our faith in the past tense—'we trusted'—but always say 'I am trusting.'",
              "simpZh": "我们不是也有同样的危险吗？只要不失去对真理和慈爱之神的信心，失去一切都无妨。绝不要把信心放在过去式——‘我曾信’——而要永远说‘我正在信’。"
            },
            {
              "en": "The soft, sweet summer was warm and glowing, <br>Bright were the blossoms on every <span class=\"vocab-trigger\" data-vocab=\"bough\">bough<\/span>: <br>I trusted Him when the roses were blooming; <br>I trust Him now.... <br>Small were my faith should it weakly <span class=\"vocab-trigger\" data-vocab=\"falter\">falter<\/span> <br>Now that the roses have ceased to blow; <br><span class=\"vocab-trigger\" data-vocab=\"Frail\">Frail<\/span> were the trust that now should alter, <br>Doubting His love when storm clouds grow. <br>—The Song of a Bird in a Winter Storm.",
              "zh": "柔和甜美的夏日温暖而明亮，每根枝条上花朵灿烂：玫瑰盛开时我信靠祂，如今我仍信靠祂……若因玫瑰凋谢，我的信心就软弱动摇，那是何等微小的信心；若因风暴密云便怀疑祂的爱，那改变的信赖是何等脆弱。——《冬日风暴中鸟的歌》",
              "simpEn": "Sweet summer was warm and bright, blossoms on every branch. I trusted Him when roses bloomed; I trust Him now. My faith would be small if it faltered now that roses have stopped blooming. Frail trust would change, doubting His love when storm clouds grow.",
              "simpZh": "甜美的夏天温暖明亮，满枝花朵。玫瑰开时我信祂，现在也信祂。如果玫瑰不开了我的信心就软弱摇动，那是多么小的信心；风暴乌云一来就改变、怀疑祂的爱，那是多么脆弱的信赖。"

          "paragraphs": [
            {
              "en": "We are troubled on every side (2Cor. 7:5).",
              "zh": "我们四面受敌。（哥林多后书7:5）",
              "simpEn": "We are pressed on every side.",
              "simpZh": "我们四面受敌。"
            },
            {
              "en": "Would God have to lead us thus, and allow the pressure to be so hard and constant? Well, in the first place, it shows His <span class=\"vocab-trigger\" data-vocab=\"all-sufficient strength\">all-sufficient strength<\/span> and grace much better than if we were <span class=\"vocab-trigger\" data-vocab=\"exempt\">exempt<\/span> from pressure and trial. \"The treasure is in <span class=\"vocab-trigger\" data-vocab=\"earthen vessels\">earthen vessels<\/span>, that the <span class=\"vocab-trigger\" data-vocab=\"excellency of the power\">excellency of the power<\/span> may be of God, and not of us.\"",
              "zh": "神必须这样引领我们，容许压力如此沉重而持续吗？首先，这比我们豁免于压力和试炼更能彰显祂全备的能力与恩典。“我们有这宝贝放在瓦器里，要显明这莫大的能力是出于神，不是出于我们。”",
              "simpEn": "Why does God let pressure be so hard and constant? It shows His all-sufficient strength and grace better than if we had no trials. The treasure is in clay jars to show that the surpassing power belongs to God, not us.",
              "simpZh": "神为什么让压力这么沉重持续？这比没有试炼更能显出祂全备的能力和恩典。宝贝放在瓦器里，要显明这莫大的能力是出于神，不是出于我们。"
            },
            {
              "en": "It makes us more conscious of our dependence upon Him. God is constantly trying to teach us our dependence, and to hold us absolutely in His hand and hanging upon His care. This was the place where Jesus Himself stood and where He wants us to stand, not with <span class=\"vocab-trigger\" data-vocab=\"self-constituted strength\">self-constituted strength<\/span>, but with a hand ever leaning upon His, and a trust that dare not take one step alone. It teaches us trust. There is no way of learning faith except by trial. It is God's school of faith, and it is far better for us to learn to trust God than to enjoy life. The lesson of faith once learned, is an <span class=\"vocab-trigger\" data-vocab=\"everlasting acquisition\">everlasting acquisition<\/span> and an <span class=\"vocab-trigger\" data-vocab=\"eternal fortune\">eternal fortune<\/span> made; and without trust even riches will leave us poor. —<span class=\"vocab-trigger\" data-vocab=\"Days of Heaven upon Earth\">Days of Heaven upon Earth<\/span>.",
              "zh": "这使我们更意识到自己倚靠祂。神不断教导我们倚靠的功课，把我们完全握在祂手中，悬于祂的眷顾之上。这正是耶稣自己所站的立场，也是祂要我们站的立场——不靠自组的力量，而是手永远扶在祂的手上，信心不敢独自迈出一步。这教导我们信靠。除了借着试炼，没有学习信心的途径。这是神的信心学校，学会信靠神远胜过享受生活。信心功课一旦学会，就是永久的收获，存到永远的财富；没有信心，即使富足也使我们贫穷。——《在地如天》",
              "simpEn": "Pressure makes us aware how much we depend on God. He wants us in His hand, leaning on Him alone. Jesus Himself stood in that place of dependence. Without trial, we never learn faith. It is God's school of faith, and learning to trust Him is better than enjoying life. Faith learned is an everlasting treasure; without trust, riches leave us poor.",
              "simpZh": "压力使我们意识到多么倚靠神。祂要我们完全在祂手中，倚靠祂的眷顾。这正是耶稣自己所站的位置。除了试炼，没有学习信心的途径。这是神的信心学校，学会信靠神比享受生活更好。信心功课一旦学会，就是永久的收获，存到永远的财富；没有信心，富足也使我们贫穷。"
            },
            {
              "en": "Why must I weep when others sing? <br>\"To test the deeps of suffering.\" <br>Why must I work while others rest? <br>\"To spend my strength at God's request.\" <br>Why must I lose while others gain? <br>\"To understand defeat's sharp pain.\" <br>Why must this lot of life be mine <br>When that which fairer seems is thine? <br>\"Because God knows what plans for me <br>Shall blossom in eternity.\"",
              "zh": "为何别人歌唱我必须哭泣？「为经历苦难的深处。」为何别人休息我必须作工？「为应神的要求尽我的力。」为何别人得着我必须失去？「为领会失败的剧痛。」为何这命运归我，那似乎更美的命运归你？「因为神知道什么计划要为我绽放在永恒里。」",
              "simpEn": "Why must I weep when others sing? To test the depths of suffering. Why work while others rest? To spend my strength at God's request. Why lose while others gain? To understand defeat's sharp pain. Why this lot in life when yours seems fairer? Because God knows what plans for me will blossom in eternity.",
              "simpZh": "为什么别人唱歌我要哭泣？为了经历苦难的深处。为什么别人休息我要工作？为了按神的要求付出力量。为什么别人得到我要失去？为了领会失败的剧痛。为什么这命运归我，那更美的命运归你？因为神知道什么计划要为我绽放在永恒里。"
            }

        {
          "sectionId": 4,

          "audio": "audio/Streams in the Desert - March 8.m4a",
          "paragraphs": [
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Do as thou hast said\">Do as thou hast said<\/span>, that thy name may be <span class=\"vocab-trigger\" data-vocab=\"magnified\">magnified<\/span> forever (1Chron. 17:23,24).",
              "zh": "耶和华啊，你所说的话，愿你照行，使你的名永远为大。（历代志上17:23-24）",
              "simpEn": "Do as You have said, so that Your name will be great forever.",
              "simpZh": "照祢所说的去行，使祢的名永远为大。"
            },
            {
              "en": "This is a most blessed phase of true prayer. Many a time we ask for things which are not absolutely promised. We are not sure therefore until we have <span class=\"vocab-trigger\" data-vocab=\"persevered\">persevered<\/span> for some time whether our <span class=\"vocab-trigger\" data-vocab=\"petitions\">petitions<\/span> are in the line of God's purpose or no. There are other occasions, and in the life of David this was one, when we are fully persuaded that what we ask is according to God's will. We feel led to take up and <span class=\"vocab-trigger\" data-vocab=\"plead\">plead<\/span> some promise from the page of Scripture, under the special <span class=\"vocab-trigger\" data-vocab=\"impression\">impression<\/span> that it contains a message for us. At such times, in confident faith, we say, \"Do as Thou hast said.\" There is hardly any position more utterly beautiful, strong, or safe, than to put the finger upon some promise of the Divine word, and claim it. There need be no anguish, or struggle, or wrestling; we simply present the check and ask for cash, produce the promise, and claim its <span class=\"vocab-trigger\" data-vocab=\"fulfillment\">fulfillment<\/span>; nor can there be any doubt as to the issue. It would give much interest to prayer, if we were more definite. It is far better to claim a few things specifically than a score vaguely. —F. B. Meyer.",
              "zh": "这是真实祷告中最有福的一面。许多时候，我们祈求的事并非绝对有应许。因此，我们需要坚持一段时间，才能知道我们的祈求是否符合神的旨意。但另有些时候——大卫的生平中这次便是——我们完全确信自己所求的是合乎神旨意的。我们感觉被引导去从圣经中抓住某项应许，并凭特殊的印象相信其中包含着给我们的信息。在这种时刻，我们凭着笃定的信心说：「照祢所说的而行。」几乎没有什么比这更美丽、更刚强、更稳妥的了：将手指按在神道中某一应许上，并认领它。此处无需痛苦、挣扎或摔跤；我们只拿出支票要求兑现，呈上应许，要求实践；其结果无可置疑。倘若我们的祷告更明确，就会更有兴味。具体地认领几件事，远比笼统地求几十件事好得多。——F. B.迈尔",
              "simpEn": "This is a blessed way to pray. Sometimes we ask without a clear promise and must wait to see if it's God's will. But sometimes, like David, we are sure we are in God's will and can claim a promise. Then we simply say, 'Do as You have said.' It's like presenting a check and asking for cash. There's no struggle, just claiming. It's better to claim a few specific promises than many vague ones.",
              "simpZh": "这是祷告中有福的一面。有时我们祈求的事没有明确的应许，需要坚持一段时间才知道是否合神旨意。但有时像大卫一样，我们确信所求的是合乎神旨意的，就抓住圣经某项应许，凭特别的印象相信是给我们的信息。那时我们就说‘照祢所说的而行’，就像拿出支票要求兑现一样，没有挣扎，只需认领。具体认领几件事比笼统求许多更好。"
            },
            {
              "en": "Every promise of Scripture is a writing of God, which may be pleaded before Him with this reasonable request: \"Do as Thou hast said.\" The Creator will not cheat His creature who depends upon His truth; and far more, the Heavenly Father will not break His word to His own child. \"Remember the word unto thy servant, on which thou hast caused me to hope,\" is most <span class=\"vocab-trigger\" data-vocab=\"prevalent\">prevalent<\/span> pleading. It is a double argument: it is Thy Word. Wilt Thou not keep it? Why hast Thou spoken of it, if Thou wilt not make it good. Thou hast caused me to hope in it; wilt Thou disappoint the hope which Thou hast Thyself begotten in me? —C. H. Spurgeon.",
              "zh": "圣经中每个应许都是神亲手写的字据，我们可以凭这合理的请求向祂呈递：「照祢所说的而行。」造物主不会欺诈倚靠祂真理的受造者；更何况，天父更不会对自己的孩子食言。「求祢记念向祢仆人所说的话，叫我有盼望」，这是最有能力的申诉。这是双重的论据：这是祢的话。祢岂不持守吗？祢若不愿成就，何必说呢？祢使我有盼望，祢会令祢自己在我里面所生的盼望失望吗？——C. H.司布真",
              "simpEn": "Every Bible promise is God's written guarantee. We can plead it: 'Do as You have said.' God will not cheat those who trust His truth, nor will the Heavenly Father break His word to His child. Saying, 'Remember the word to Your servant, on which You have caused me to hope,' is a powerful plea. It's a double argument: it's Your word—won't You keep it? Why speak it if You won't fulfill it? You gave me hope; will You disappoint the hope You Yourself created in me?",
              "simpZh": "圣经每个应许都是神亲笔的字据，我们可以凭此向祂求：‘照祢所说的而行。’神不会欺骗倚靠祂真理的人，天父更不会对自己的孩子食言。‘求祢记念向仆人所说的话，叫我有盼望’是最有力的恳求。这是双重理由：这是祢的话，祢岂不持守吗？祢若不愿成就，何必说呢？祢使我生盼望，祢会让祢自己在我里面生的盼望失望吗？"
            },
            {
              "en": "\"Being absolutely certain that whatever promise he is bound by, he is able also to make good\" (Rom. 4:21, Weymouth's Translation). It is the everlasting faithfulness of God that makes a Bible promise \"exceeding great and precious.\" Human promises are often worthless. Many a broken promise has left a broken heart. But since the world was made, God has never broken a single promise made to one of His trusting children. Oh, it is sad for a poor Christian to stand at the door of the promise, in the dark night of affliction, afraid to draw the latch, whereas he should then come boldly for shelter as a child into his father's house. —<span class=\"vocab-trigger\" data-vocab=\"Gurnal\">Gurnal<\/span>.",
              "zh": "「且满心相信，神所应许的祂也必能作成」（罗4:21，韦默思译本）。正是神永远的信实，使圣经的应许「又宝贵又极大」。人的应许常是空话。许多被毁的应许留下破碎的心。但自从造天地以来，神从不对信靠祂的任何一个儿女背弃一句应许。哦，一个可怜的基督徒在患难的黑夜里站在应许的门前，竟怕去拉开门闩，那实在可悲；他本该像孩子进父家一样，坦然进去避难。——古纳尔",
              "simpEn": "Abraham was sure God could do what He promised. It's God's eternal faithfulness that makes Bible promises 'exceedingly great and precious.' Human promises are often worthless and leave broken hearts. But God has never broken a single promise to His trusting children. It's sad when a Christian stands at the door of promise in the dark night of trouble, afraid to open it, when he should boldly enter as a child into his father's house.",
              "simpZh": "亚伯拉罕确信神能成就祂所应许的。正是神永远的信实，使圣经的应许‘又宝贵又极大’。人的应许常常是空话，许多被毁的应许留下破碎的心。但自从世界被造，神从不对信靠祂的儿女背弃一个应许。一个可怜的基督徒在患难黑夜中站在应许的门前，竟怕去拉开门闩，实在可悲；他本该像孩子进父家一样坦然进去。"
            },
            {
              "en": "Every promise is built upon four pillars: God's justice and holiness, which will not suffer Him to deceive; His grace or goodness, which will not suffer Him to forget; His truth, which will not suffer Him to change; and His power, which makes Him able to accomplish. —Selected.",
              "zh": "每一个应许都建于四根柱石上：神的公义与圣洁，使祂不致欺骗；祂的恩惠与良善，使祂不致忘记；祂的真理，使祂不致改变；以及祂的大能，使祂得以成就。——选",
              "simpEn": "Every promise rests on four pillars: God's justice and holiness keep Him from deceiving; His grace and goodness keep Him from forgetting; His truth keeps Him from changing; His power makes Him able to fulfill.",
              "simpZh": "每个应许立在四根柱子上：神的公义和圣洁，使祂不会欺骗；祂的恩典和良善，使祂不会忘记；祂的真理，使祂不会改变；祂的能力，使祂能够成就。"
            }

        {
          "sectionId": 5,
          "heading": "March 9",

            {
              "en": "Look from the top (Song of Solomon 4:8).",
              "zh": "从……顶上往下看。（雅歌4:8）",
              "simpEn": "Look from the top.",
              "simpZh": "从顶上往下看。"
            },
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Crushing weights\">Crushing weights<\/span> give the Christian wings. It seems like a <span class=\"vocab-trigger\" data-vocab=\"contradiction\">contradiction<\/span> in terms, but it is a blessed truth. David out of some bitter experience cried: \"Oh, that I had wings like a dove! Then would I fly away, and be at rest\" (Ps. 55:6). But before he finished this meditation he seems to have realized that his wish for wings was a realizable one. For he says, \"Cast thy <span class=\"vocab-trigger\" data-vocab=\"burden\">burden<\/span> upon Jehovah, and he will sustain thee.\" The word \"burden\" is translated in the Bible margin, \"what he (Jehovah) hath given thee.\" The saints' burdens are God-given; they lead him to \"wait upon Jehovah,\" and when that is done, in the magic of trust the \"burden\" is <span class=\"vocab-trigger\" data-vocab=\"metamorphosed\">metamorphosed<\/span> into a pair of wings, and the weighted one \"<span class=\"vocab-trigger\" data-vocab=\"mounts up with wings as eagles\">mounts up with wings as eagles<\/span>.\" —<span class=\"vocab-trigger\" data-vocab=\"Sunday School Times\">Sunday School Times<\/span>.",
              "zh": "压碎的重担反给基督徒翅膀。这似乎是语词上的矛盾，却是蒙福的真理。大卫经过某些痛苦经历呼喊说：「但愿我有翅膀像鸽子，我就飞去得享安息」（诗55:6）。但他还未结束这默想时，似乎已意识到自己对翅膀的愿望是可实现的。因为他又说：「你要把你的重担卸给耶和华，祂必抚养你。」「重担」一词圣经旁注译作「祂（耶和华）所赐给你的」。圣徒的重担是神所赐的；它们引他到「等候耶和华」的地步，当这样作时，在信赖的魔力中，「重担」就变化成一对翅膀，那负重的便「如鹰展翅上腾」。——《主日学报》",
              "simpEn": "Heavy weights give Christians wings. It sounds like a contradiction, but it's true. David cried out for wings like a dove, then realized that casting his burden on the Lord would give him wings. The burden, which is from God, leads us to wait on Him, and through trust, that burden changes into wings, and we mount up like eagles.",
              "simpZh": "压碎的重担反给基督徒翅膀，听起来矛盾却是真理。大卫喊着想要鸽子般的翅膀，后来明白把重担卸给耶和华，那重担就会变成翅膀。重担是神赐的，引我们等候祂，借着信赖，重担就变成翅膀，让我们如鹰展翅上腾。"
            },
            {
              "en": "One day when walking down the street, <br>On business bent, while thinking hard <br>About the \"hundred cares\" which seemed <br>Like thunder clouds about to break <br>In torrents, Self-pity said to me: <br>\"You poor, poor thing, you have too much <br>To do. Your life is far too hard. <br>This heavy load will crush you soon.\" <br>... <br>Ah, yes, 'twill break and crush my life; <br>I cannot bear this constant strain <br>Of endless, aggravating cares; <br>They are too great for such as I.\" <br>So thus my heart condoled itself, <br>\"Enjoying misery,\" when lo! <br>A \"<span class=\"vocab-trigger\" data-vocab=\"still small voice\">still small voice<\/span>\" distinctly said, <br>\"'Twas sent to lift you—not to crush.\" <br>I saw at once my great mistake. <br>My place was not beneath the load <br>But on the top! God meant it not <br>That I should carry it. He sent <br>It here to carry me. ... <br>Oh, <span class=\"vocab-trigger\" data-vocab=\"paradox of Heaven\">paradox of Heaven<\/span>. The load <br>We think will crush was sent to lift us <br>Up to God! Then, soul of mine, <br>Climb up! for naught can e'er be crushed <br>Save what is underneath the weight. <br>—Miss Mary Butterfield.",
              "zh": "一日走在街上，为事务奔波，正思想着仿佛雷云般即将倾盆而下的「百般忧虑」，自怜对我说：「你这可怜的人，要做的事太多，你的人生太艰辛，这重担很快就将你压碎。」……「是啊，这要压碎我的生命；我无法忍受这无休无止恼人忧虑的持续重负；这些对我太重了。」我的心如此自慰，「享受痛苦」，忽然！一个「微小的声音」清楚地说：「它被差来是要抬起你——不是压碎你。」我立刻看见自己的大错。我不在重担之下，乃在重担之上！神的意思不是要我背负它，祂差它来乃是要背负我。……哦，天国的吊诡。我们以为会压碎的重担，原是被差来将我们抬到神那里！那么，我的灵魂，爬上去吧！因为除了那被压在下面的，永远没有什么是会被压碎的。——玛丽·巴特菲尔德小姐",
              "simpEn": "Walking along burdened with cares like thunderclouds, self-pity told me I was too loaded and would be crushed. Then a still small voice said, 'It was sent to lift you, not to crush you.' I realized my mistake. I wasn't under the load; I was meant to be on top of it. God sent it to carry me. Oh, paradox of heaven: the load we thought would crush us was sent to lift us up to God. Climb up! Only what is underneath the weight gets crushed.",
              "simpZh": "走在街上，满心忧虑如雷云，自怜说我担子太重会被压碎。然后一个微小的声音说：‘它被差来是要抬起你，不是压碎你。’我立刻发现错了。我不是在重担之下，乃是在上面！神不是要我背负它，而是差它来背我。天国的吊诡啊：我们以为会压碎我们的重担，原是被差来把我们抬到神那里。爬上去吧！只有被压在下面的东西才会被压碎。"
            }

          "paragraphs": [
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"The just shall live by faith\">The just shall live by faith<\/span> (Heb. 10:38).",
              "zh": "义人必因信得生。（希伯来书10:38）",
              "simpEn": "The righteous will live by faith.",
              "simpZh": "义人必因信得生。"
            },
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Seemings\">Seemings<\/span> and feelings are often substituted for faith. <span class=\"vocab-trigger\" data-vocab=\"Pleasurable emotions\">Pleasurable emotions<\/span> and deep satisfying experiences are part of the Christian life, but they are not all of it. Trials, conflicts, battles and testings lie along the way, and are not to be counted as misfortunes, but rather as part of our necessary <span class=\"vocab-trigger\" data-vocab=\"discipline\">discipline<\/span>. In all these varying experiences we are to <span class=\"vocab-trigger\" data-vocab=\"reckon on Christ\">reckon on Christ<\/span> as dwelling in the heart, regardless of our feelings, if we are walking obediently before Him. Here is where many get into trouble; they try to walk by feeling rather than faith.",
              "zh": "表象和感觉常被用来代替信心。愉快的情感和深刻满足的经历是基督徒生活的一部分，却不是全部。试炼、冲突、争战和试验沿途排列，不应算为不幸，反当看作我们必要管教的一部分。在这一切变化不定的经历中，我们若在祂面前顺从而行，就当无论感觉如何，仍认定基督住在我们心里。许多人的麻烦就在此；他们试图凭感觉而行，不凭信心。",
              "simpEn": "Feelings and appearances often replace faith. Joyful emotions and deep experiences are part of Christian life, but not all. Trials, conflicts, and tests come, not as misfortunes, but as necessary discipline. In all these, we must count on Christ dwelling in us, regardless of feelings, if we walk obediently. Many get into trouble by walking by feeling instead of faith.",
              "simpZh": "感觉和表象常被当作信心。愉快的情感和深刻的经历是基督徒生活的一部分，但不是全部。试炼、冲突、争战和试验是路上必有的，不是不幸，而是必要的管教。在这一切变化中，我们若顺服而行，无论感觉如何，都要认定基督住在心里。许多人出问题就是因为凭感觉走，不凭信心。"

            {
              "en": "One of the saints tells us that it seemed as though God had withdrawn Himself from her. His mercy seemed clean gone. For six weeks her <span class=\"vocab-trigger\" data-vocab=\"desolation\">desolation<\/span> lasted, and then the Heavenly Lover seemed to say: \"Catherine, thou hast looked for Me without in the world of sense, but all the while I have been within waiting for thee; meet Me in the inner chamber of thy spirit for I am there.\"",
              "zh": "有一位圣徒告诉我们，似乎神从她收回了祂自己。祂的怜悯似乎完全消失了。她的荒凉持续了六周，然后那位天上的爱侣似乎说：「凯瑟琳，你一直在感官的世界外面寻找我，然而我始终在里面等候你；在你灵的密室里与我相遇吧，我就在那里。」",
              "simpEn": "A saint once felt God had withdrawn and His mercy was gone. After six weeks of desolation, the Heavenly Lover seemed to say, 'Catherine, you've looked for Me outside in the world of sense, but all along I've been inside waiting; meet Me in the inner room of your spirit, for I am there.'",
              "simpZh": "一位圣徒曾觉得神离开了，祂的怜悯完全没了。六周的荒凉之后，主似乎说：‘凯瑟琳，你一直在外面感官世界找我，但我一直在里面等你；到你灵的密室里来见我，我就在那里。’"
            },
            {
              "en": "Distinguish between the fact of God's presence, and the emotion of the fact. It is a happy thing when the soul seems desolate and deserted, if our faith can say, \"I see Thee not; I feel Thee not; but Thou art certainly and graciously here, where I am as I am.\" Say it again and again: \"Thou art here: though the bush does not seem to burn with fire, it does burn. I will take the shoes from off my feet, for the place on which I stand is <span class=\"vocab-trigger\" data-vocab=\"holy ground\">holy ground<\/span>.\" —<span class=\"vocab-trigger\" data-vocab=\"London Christian\">London Christian<\/span>.",
              "zh": "要分辨神同在的事实，与对那事实的感觉。当灵魂似乎荒凉被弃时，我们的信心若能说：「我看不见祢，我感觉不到祢，但祢确实恩慈地在这里，在我所在之处，同在如我实存。」那是何等有福的事。一再地说：「祢在这里：虽然荆棘似乎没有烧着，但它确实烧着。我要脱掉鞋子，因为我所站的是圣地。」——《伦敦基督徒报》",
              "simpEn": "Learn to separate the fact of God's presence from the feeling of it. When the soul feels desolate, it's good if faith can say, 'I don't see You or feel You, but You are truly and graciously here with me as I am.' Repeat: 'You are here; the bush doesn't seem to burn with fire, but it burns. I take off my shoes, for this is holy ground.'",
              "simpZh": "要分辨神同在的事实和对事实的感觉。灵魂觉得荒凉被弃时，信心若说：‘我看不见祢，感觉不到祢，但祢确实恩慈地在这里，与我同在。’那是何等好。反复说：‘祢在这里；荆棘好像没烧着，但它确实烧着。我要脱鞋，因为这是圣地。’"
            },
            {
              "en": "Believe God's word and power more than you believe your own feelings and experiences. Your Rock is Christ, and it is not the Rock which <span class=\"vocab-trigger\" data-vocab=\"ebbs and flows\">ebbs and flows<\/span>, but your sea. —Samuel Rutherford. <br>Keep your eye steadily fixed on the infinite grandeur of Christ's <span class=\"vocab-trigger\" data-vocab=\"finished work\">finished work<\/span> and righteousness. Look to Jesus and believe, look to Jesus and live! Nay, more; as you look to him, hoist your sails and <span class=\"vocab-trigger\" data-vocab=\"buffet manfully\">buffet manfully<\/span> the sea of life. Do not remain in the haven of distrust, or sleeping on your shadows in inactive repose, or suffering your <span class=\"vocab-trigger\" data-vocab=\"frames and feelings\">frames and feelings<\/span> to pitch and toss on one another like vessels idly moored in a harbor. ... Hope thou in God. —J. R. Macduff. <br>When I cannot enjoy the faith of assurance, I live by the faith of adherence. —Matthew Henry.",
              "zh": "相信神的话语和能力，胜过相信自己的感觉和经历。你的磐石是基督；涨落不定的不是磐石，而是你的海。——撒母耳·卢瑟福。定睛注视基督已完成之工与义的无限伟大。仰望耶稣而信，仰望耶稣而活！不止如此；当你仰望祂时，扬起帆来，勇敢地与人生之海搏斗。不要停留在不信的港湾中，或在自己影子上沉睡，处于不活动的安逸中，或任由你的心情与感觉像闲泊在港中的船只般彼此颠簸。……当仰望神。——J. R. 麦克达夫。当我不能享受确信的信心时，我就靠依附的信心而活。——马太·亨利",
              "simpEn": "Trust God's Word more than your feelings. Christ is your Rock; it's your sea that ebbs and flows, not the Rock. Fix your eyes on Christ's finished work. Look to Jesus, believe, and live! Hoist your sails and bravely face life's sea. Don't stay in the harbor of distrust or let your emotions toss like idle boats. Hope in God. When you can't feel sure, live by clinging faith.",
              "simpZh": "要相信神的话和能力，胜过相信自己的感觉。基督是你的磐石；涨落不定的是你的海，不是磐石。定睛看基督已完成的工作和义。仰望耶稣，相信，就活！不止如此；扬起帆来，勇敢面对人生之海。不要停在不信的港湾，或在影子上沉睡，让情绪像闲船一样颠簸。仰望神。不能享受确信的信心时，就靠依附的信心而活。"
            }

          "paragraphs": [
            {
              "en": "Now it came to pass after the death of Moses, the servant of the Lord, that the Lord spoke unto Joshua, the son of Nun, Moses' minister, saying, Moses my servant is dead; now, therefore <span class=\"vocab-trigger\" data-vocab=\"arise, go over this Jordan\">arise, go over this Jordan<\/span>, thou and all this people (Joshua 1:1, 2).",
              "zh": "耶和华的仆人摩西死了以后，耶和华晓谕摩西的帮手嫩的儿子约书亚说，我的仆人摩西死了；现在你要起来，和众百姓过这约旦河。（约书亚记1:1-2）",
              "simpEn": "After Moses died, God told Joshua, 'Moses is dead; now rise, cross this Jordan, you and all the people.'",
              "simpZh": "摩西死后，神告诉约书亚：‘摩西死了；现在起来，带领百姓过这约旦河。’"
            },
            {
              "en": "Sorrow came to you yesterday, and emptied your home. Your first <span class=\"vocab-trigger\" data-vocab=\"impulse\">impulse<\/span> now is to give up, and sit down in despair amid the <span class=\"vocab-trigger\" data-vocab=\"wrecks\">wrecks<\/span> of your hopes. But you dare not do it. You are in the line of battle, and the crisis is at hand. To <span class=\"vocab-trigger\" data-vocab=\"falter\">falter<\/span> a moment would be to <span class=\"vocab-trigger\" data-vocab=\"imperil\">imperil<\/span> some holy interest. Other lives would be harmed by your pausing, holy interests would suffer, should your hands be folded. You must not <span class=\"vocab-trigger\" data-vocab=\"linger\">linger<\/span> even to indulge your grief.",
              "zh": "昨天忧伤临到你，使你的家空寂。如今你的第一个冲动就是放弃，在残破的盼望中绝望而坐。但你绝不可如此。你身处战线之上，危机就在眼前。片刻动摇就会危害某种神圣的权益。你的停顿会伤及其他的生命，你若袖手，圣工就受损。你连沉浸于悲伤中停留片时都不可。",
              "simpEn": "Yesterday sorrow emptied your home. Your first urge is to give up and sit in despair among the ruins of your hopes. But you must not. You are in the battle line, and the crisis is near. To hesitate even a moment would endanger holy interests. Others would be hurt if you stop; holy work would suffer. Don't even pause to indulge your grief.",
              "simpZh": "昨天忧伤临到，使你家空荡。你第一个冲动是放弃，在破碎的希望中绝望坐下。但你不能这样。你正在战线，危机在前。片刻动摇就会危及圣工。你的停顿会伤害别人，圣工会受损。连停下来沉浸于悲伤都不可以。"
            },
            {
              "en": "A <span class=\"vocab-trigger\" data-vocab=\"distinguished general\">distinguished general<\/span> related this <span class=\"vocab-trigger\" data-vocab=\"pathetic\">pathetic<\/span> incident of his own experience in time of war. The general's son was a <span class=\"vocab-trigger\" data-vocab=\"lieutenant of battery\">lieutenant of battery<\/span>. An <span class=\"vocab-trigger\" data-vocab=\"assault\">assault<\/span> was in progress. The father was leading his division in a charge; as he pressed on in the field, suddenly his eye was caught by the sight of a dead battery-officer lying just before him. One glance showed him it was his own son. His fatherly impulse was to stop beside the loved form and give <span class=\"vocab-trigger\" data-vocab=\"vent\">vent<\/span> to his grief, but the duty of the moment demanded that he should press on in the charge; so, quickly <span class=\"vocab-trigger\" data-vocab=\"snatching one hot kiss\">snatching one hot kiss<\/span> from the dead lips, he <span class=\"vocab-trigger\" data-vocab=\"hastened\">hastened<\/span> away, leading his command in the assault.",
              "zh": "一位著名的将军讲述了他自己战时一段哀感的经历。将军的儿子是一名炮兵中尉。一场进攻正在进行。父亲率领自己的师冲锋；他在战场上向前推进时，忽然眼睛被躺在前方的一名已死炮兵军官所吸引。一眼望去，他认出那是自己的儿子。作父亲的冲动是要在爱子身边停下，宣泄悲伤，但那一刻的职责要求他必须继续冲锋；于是，他迅速从死去的嘴唇上抢了一个热吻，便匆匆离去，带领部队继续进攻。",
              "simpEn": "A famous general told a sad story from war. His son was a battery lieutenant. During an assault, as the father led his division forward, he saw a dead officer and recognized his son. His fatherly instinct was to stop and grieve, but duty demanded he press on. So he quickly snatched one hot kiss from his dead son's lips and hurried away, leading his troops onward.",
              "simpZh": "一位著名的将军讲了一个悲惨的战时故事。他的儿子是个炮兵中尉。在一次进攻中，父亲率领他的师冲锋时，看见一个死去的军官，认出是自己的儿子。作父亲的本能想停下来悲伤，但职责要求他继续冲锋。于是他迅速从死去儿子的嘴唇上抢了一个热吻，匆匆离去，继续带领部队。"
            },
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Weeping inconsolably\">Weeping inconsolably<\/span> beside a grave can never give back love's <span class=\"vocab-trigger\" data-vocab=\"banished treasure\">banished treasure<\/span>, nor can any blessing come out of such sadness. Sorrow makes deep scars; it writes its record <span class=\"vocab-trigger\" data-vocab=\"ineffaceably\">ineffaceably<\/span> on the heart which suffers. We really never get over our great griefs; we are never altogether the same after we have passed through them as we were before. Yet there is a <span class=\"vocab-trigger\" data-vocab=\"humanizing and fertilizing influence\">humanizing and fertilizing influence<\/span> in sorrow which has been rightly accepted and cheerfully borne. Indeed, they are poor who have never suffered, and have none of sorrow's marks upon them. The joy set before us should shine upon our griefs as the sun shines through the clouds, glorifying them. God has so ordered, that in pressing on in duty we shall find the truest richest comfort for ourselves. Sitting down to <span class=\"vocab-trigger\" data-vocab=\"brood over\">brood over<\/span> our sorrows, the darkness deepens about us and creeps into our heart and our strength changes to weakness. But if we turn away from the gloom, and take up the tasks and duties to which God calls us, the light will come again, and we shall grow stronger. —J. R. Miller.",
              "zh": "在坟边痛哭不已，永不能唤回爱中被逐出的珍宝，这样的悲伤也带不出任何祝福。忧愁刻下深痕；它将记录不可磨灭地写在受苦的心上。我们确实永不能完全摆脱巨大的忧伤；经过之后，我们也无法完全如昔。然而，正确接受并欣然承担的忧伤，却有一种使人温柔且丰饶的影响力。的确，从未受过苦、身上没有忧伤印记的人，是贫乏的。那摆在我们前面的喜乐，应当照射我们的忧伤，如同日光照透云层，使之变为荣耀。神如此命定，当我们在尽责中前行时，就必为自己寻得最真实、最丰富的安慰。坐下来反复默想我们的忧伤，黑暗便在我们周围加深，潜入我们心中，我们的力量就变为软弱。但我们若转离幽暗，担当起神呼召我们去行的任务和本分，亮光就必再现，我们也要更加刚强。——J. R.米勒",
              "simpEn": "Crying endlessly beside a grave cannot bring back the lost treasure. Sorrow leaves deep scars on the heart; we never fully get over great griefs. But sorrow rightly accepted and cheerfully borne has a softening and enriching effect. Those who never suffer are poor. The joy set before us should shine on our griefs like sun through clouds, making them glorious. Pressing on in duty brings the truest comfort. If we sit and brood over sorrow, darkness deepens and we grow weak. But if we turn from gloom and take up God's tasks, light returns and we grow stronger.",
              "simpZh": "在坟边不停地哭，不能唤回失去的宝贝。忧伤在心上刻下深痕，我们无法完全恢复如初。但正确接受并欣然承担的忧伤，有使人柔和并丰盛的影响力。从未受过苦的人是贫乏的。摆在前面的喜乐应当照亮我们的忧伤，像日光透过云层，使之变荣耀。在尽责中前行，才能找到最真实丰富的安慰。坐在那里反复思想忧伤，黑暗就加深，力量变弱。但若转离幽暗，担起神呼召的任务，亮光就会再现，我们也会更刚强。"
            },
            {
              "en": "Thou knowest that through our tears <br>Of hasty, selfish weeping <br>Comes surer sin, and for our petty fears <br>Of loss thou hast in keeping <br>A greater gain than all of which we dreamed; <br>Thou knowest that in grasping <br>The bright possessions which so precious seemed <br>We lose them; but if, clasping <br>Thy faithful hand, we tread with steadfast feet <br>The path of thy appointing, <br>There waits for us a treasury of sweet <br>Delight, royal <span class=\"vocab-trigger\" data-vocab=\"anointing\">anointing<\/span> <br>With oil of gladness and of strength. <br>—Helen Hunt Jackson.",
              "zh": "祢知道，透过我们急躁自私的眼泪，必带来更确实的罪；而我们为损失所生的微小恐惧，祢却为我们存留了比我们所梦想更大的收获；祢知道我们越紧抓那些看似宝贵的亮丽财物，反倒失去它们；但若我们紧握祢信实的手，以稳健的脚踪行在祢所指定的路上，便有一库甜美喜乐等候我们，那是用喜乐油和力量所膏的王室恩膏。——海伦·亨特·杰克逊",
              "simpEn": "You know that through our hasty, selfish tears comes more certain sin, and for our small fears of loss You are keeping a greater gain than we ever dreamed. When we grasp bright possessions we lose them; but if we hold Your faithful hand and walk steadily on Your chosen path, a treasure of sweet delight awaits—royal anointing with oil of gladness and strength.",
              "simpZh": "祢知道，透过我们急躁自私的眼泪，必带来更确实的罪；为我们的微小损失担忧，祢却存留比梦想更大的收获。我们抓紧那些看似宝贵的亮丽东西，反会失去；但若抓住祢信实的手，稳健走在祢指定的路上，一库甜美喜乐等着我们——是用喜乐油和力量所膏的王室恩膏。"

          "paragraphs": [
            {
              "en": "The Lord brought an <span class=\"vocab-trigger\" data-vocab=\"east wind\">east wind<\/span> upon the land all that day, and all that night; and when it was morning, the east wind brought the <span class=\"vocab-trigger\" data-vocab=\"locusts\">locusts<\/span>... Then Pharaoh called for Moses and Aaron in <span class=\"vocab-trigger\" data-vocab=\"haste\">haste<\/span>.... And the Lord turned a mighty strong <span class=\"vocab-trigger\" data-vocab=\"west wind\">west wind<\/span>, which took away the locusts, and cast them into the Red Sea; there remained not one locust in all the <span class=\"vocab-trigger\" data-vocab=\"coasts\">coasts<\/span> of Egypt (Exod. 10:13, 19).",
              "zh": "耶和华使东风刮在地上，那一昼一夜，到早晨，东风把蝗虫刮了来……法老急忙召了摩西、亚伦来……耶和华转了极大的西风，把蝗虫刮起，吹入红海；在埃及的四境连一个也没有留下。（出埃及记10:13,19）",
              "simpEn": "God sent an east wind all day and night, and in the morning it brought locusts. Pharaoh quickly called Moses and Aaron. Then God sent a very strong west wind that carried the locusts into the Red Sea; not one locust was left in Egypt.",

            },
            {
              "en": "See how in the olden times, when the Lord fought for Israel against the cruel Pharaoh, the <span class=\"vocab-trigger\" data-vocab=\"stormy winds\">stormy winds<\/span> <span class=\"vocab-trigger\" data-vocab=\"wrought out\">wrought out<\/span> their <span class=\"vocab-trigger\" data-vocab=\"deliverance\">deliverance<\/span>; and yet again, in that grandest display of power the last blow that God struck at the proud <span class=\"vocab-trigger\" data-vocab=\"defiance\">defiance<\/span> of Egypt. A strange, almost cruel thing it must have seemed to Israel to be <span class=\"vocab-trigger\" data-vocab=\"hemmed in\">hemmed in<\/span> by such a <span class=\"vocab-trigger\" data-vocab=\"host of dangers\">host of dangers<\/span>—in front the wild sea <span class=\"vocab-trigger\" data-vocab=\"defying\">defying<\/span> them, on either hand the rocky heights cutting off all hope of escape, the night of <span class=\"vocab-trigger\" data-vocab=\"hurricane\">hurricane<\/span> gathering over them. It was as if that first deliverance had come only to hand them over to more certain death. Completing the terror there rang out the cry: \"The Egyptians are upon us!\"",
              "zh": "看哪，古时耶和华为以色列人攻击残酷的法老时，正是狂风为他们成就了拯救；并且在那场最伟大权能的展示中，神对埃及骄傲的顶撞所施行的最后一击，也是如此。对以色列人来说，被这重重危险围困，必定显得异常而近乎残忍——前面是狂澜相阻的怒海，两旁是峭壁断绝一切逃生希望，飓风之夜又笼罩头顶。似乎那第一次拯救，不过是把他们交与更确定的死亡。雪上加霜的是，又响起呼喊：「埃及人追上来了！」",
              "simpEn": "In ancient times, when God fought for Israel against Pharaoh, the stormy winds brought their rescue. It seemed strange and almost cruel: they were trapped by dangers—the sea in front, high rocks on both sides, and a hurricane at night. It looked like they were handed over to death. Then came the cry: 'The Egyptians are upon us!'",
              "simpZh": "古时候，神为以色列人与法老争战时，狂风给他们带来了拯救。当时的情况很奇怪也几乎残酷：前面是翻腾的海，两旁是高高的石头山，没有路逃走，夜里又有飓风。好像第一次的拯救只是让他们死得更确定。更可怕的是有人喊：‘埃及人追上来了！’"

            {
              "en": "When it seemed they were trapped for the foe, then came the glorious triumph. Forth swept the stormy wind and beat back the waves, and the <span class=\"vocab-trigger\" data-vocab=\"hosts of Israel\">hosts of Israel<\/span> marched forward, down into the path of the great deep—a way <span class=\"vocab-trigger\" data-vocab=\"arched over\">arched over<\/span> with God's protecting love. On either hand were the <span class=\"vocab-trigger\" data-vocab=\"crystal walls\">crystal walls<\/span> glowing in the light of the glory of the Lord; and high above them swept the thunder of the storm. So on through all that night; and when, at dawn the next day, the last of Israel's host set foot upon the other shore, the work of the stormy wind was done.",
              "zh": "当他们似乎被仇敌围困之际，荣耀的得胜就临到了。狂风扫来，击退波涛，以色列的军队前行，下入深海之中的道路——这是一条以神护佑之爱为拱顶的通道。两旁是水晶般的墙垣，在耶和华的荣光中闪耀；头顶上则掠扫过风暴的雷轰。如此经过全夜；当次日黎明，最后一名以色列战士踏上彼岸时，狂风的工作就完成了。",

            {
              "en": "Then sang Israel unto the Lord the song of the \"<span class=\"vocab-trigger\" data-vocab=\"stormy wind fulfilling his word\">stormy wind fulfilling his word<\/span>.\" \"The enemy said, I will pursue, I will overtake, I will divide the <span class=\"vocab-trigger\" data-vocab=\"spoil\">spoil<\/span>.... Thou didst blow with thy wind, the sea covered them: they sank as lead in the mighty waters.\" One day, by God's great mercy, we, too, shall stand upon the <span class=\"vocab-trigger\" data-vocab=\"sea of glass\">sea of glass<\/span>, having the harps of God. Then we shall sing the song of Moses and the song of the Lamb: \"Just and true are thy ways, thou King of saints.\" We shall know then how the stormy winds have wrought out our deliverance.",
              "zh": "于是以色列向耶和华唱起「狂风成就祂命」的歌。「仇敌说：我要追赶，我要追上，我要分掳物……祢叫风一吹，海就把他们淹没；他们如铅沉在大水之中。」有一天，因着神的大怜悯，我们也要站在玻璃海上，拿着神的琴。那时我们要唱摩西和羔羊的歌：「万世之王啊，祢的道途义哉，诚哉。」我们到那时就明白，狂风是怎样成就了我们的拯救。",
              "simpEn": "Then Israel sang a song about the stormy wind doing God's word: 'The enemy said, I will chase, I will catch, I will divide the goods... You blew with Your wind, and the sea covered them; they sank like lead.' One day, by God's mercy, we will stand on the sea of glass with harps, singing the song of Moses and the Lamb: 'Just and true are Your ways, King of saints.' Then we'll understand how the stormy winds brought our deliverance.",
              "simpZh": "然后以色列人唱歌赞美狂风成就了神的命令：‘敌人说，我要追，我要抓住，我要分东西……你用风吹，海就把他们盖住；他们像铅沉在深水里。’有一天，因着神的怜悯，我们也要站在玻璃海上，拿着琴，唱摩西和羔羊的歌：‘万世之王啊，你的路又公义又真实。’那时我们就知道狂风怎样救了我们。"
            },
            {
              "en": "Now you see only the mystery of this great sorrow; then you shall see how the threatening enemy was swept away in the wild night of fear and grief. Now you look only at the loss; then you shall see how it struck at the evil that had begun to <span class=\"vocab-trigger\" data-vocab=\"rivet its fetters\">rivet its fetters<\/span> upon you. Now you <span class=\"vocab-trigger\" data-vocab=\"shrink\">shrink<\/span> from the <span class=\"vocab-trigger\" data-vocab=\"howling winds\">howling winds<\/span> and <span class=\"vocab-trigger\" data-vocab=\"muttering thunders\">muttering thunders<\/span>; then you shall see how they beat back the waters of destruction, and opened up your way to the <span class=\"vocab-trigger\" data-vocab=\"goodly land of promise\">goodly land of promise<\/span>. —Mark Guy Pearse.",
              "zh": "如今你只看见这大忧伤的奥秘；那时你要看见恐吓的仇敌怎样在恐惧悲伤的狂夜中被扫除。如今你只看见损失；那时你要看见它如何击打了那已开始铐紧你的邪恶。如今你退缩躲开咆哮的狂风和轰轰的雷声；那时你要看见它们如何击退了毁灭的洪水，为你打开了那佳美应许地之路。——马克·盖·皮尔斯",
              "simpEn": "Now you only see the mystery of this great sadness; then you will see how the enemy was swept away in the wild night of fear and grief. Now you only see the loss; then you will see how it struck the evil that was beginning to chain you. Now you run from the howling winds and rumbling thunders; then you will see how they pushed back the waters of destruction and opened your way to the beautiful promised land.",
              "simpZh": "现在你只看见这极大忧伤的奥秘；那时你会看见仇敌怎样在恐惧悲伤的狂夜里被冲走。现在你只看见损失；那时你会看见它怎样击打了那正要绑住你的邪恶。现在你害怕咆哮的大风和轰轰的雷声；那时你会看见它们怎样击退了毁灭的洪水，为你打开了通往那美好应许之地的路。"
