            {
              "en": "It may be a child of God is reading these words who has had some great crushing sorrow, some <span class=\"vocab-trigger\" data-vocab=\"bitter disappointment\">bitter disappointment<\/span>, some heart-breaking blow from a totally unexpected quarter. You are longing for your Master's voice bidding you \"Be of good cheer,\" but only silence and sense of mystery and misery meet you—\"He answered her not a word.\"",
              "zh": "也许有位神的儿女正在阅读这些话，他正经历某种巨大的压碎忧伤、某种痛彻的失望、从完全意外的方向来的某种令人心碎的打击。你正渴望听见你主人的声音对你说「放心」，但遇见的只是沉默、神秘与痛苦的感觉——「耶稣却一言不答。」",
              "simpEn": "Perhaps some child of God reading this has had a crushing sorrow, a bitter disappointment, a heartbreaking blow from an unexpected place. You long for your Master's voice saying 'Be of good cheer,' but you meet only silence, mystery, and misery—'He answered her not a word.'",
              "simpZh": "也许有神的儿女正在读这些，他经历了极大的压碎忧伤、很苦的失望、从想不到的地方来的心碎打击。你渴望听见主的声音说'放心'，但只有沉默、神秘和痛苦——耶稣一句话也不回答。"
            },
            {
              "en": "God's tender heart must often ache listening to all the sad, complaining cries which arise from our weak, impatient hearts, because we do not see that for our own sakes He answers not at all or otherwise than seems best to our tear-blinded, short-sighted eyes. The silences of Jesus are as eloquent as His speech and may be a sign, not of His disapproval, but of His approval and of a deep purpose of blessing for you.",
              "zh": "神温柔的心必定常因聆听我们软弱、焦躁的心里发出的一切忧伤怨言而伤痛，因为我们不明白，祂是为了我们的缘故才不予回答，或以不同于我们那被泪水迷糊、短视之眼看为最好的方式回答。耶稣的静默与祂的话语同样有力，并且可能并非不悦的表示，而是悦纳的记号，并为你存留深厚的赐福旨意。",
              "simpEn": "God's tender heart must often ache listening to our sad, complaining cries from weak, impatient hearts. We don't see that for our own good He answers not at all or differently than what seems best to our tear-blinded, short-sighted eyes. The silences of Jesus are as powerful as His words and may signal not disapproval but approval and a deep purpose of blessing.",
              "simpZh": "神温柔的心一定常因听我们软弱、急燥的心里发出的悲伤怨言而心痛，因为我们不明白，是为了我们好，祂才不回答或回答得和我们被泪水蒙蔽、短浅的眼光以为最好的不同。耶稣的沉默和祂说话一样有力，可能不是不喜悦，而是悦纳，并藏着深深的赐福计划。"
            },
            {
              "en": "\"Why art thou <span class=\"vocab-trigger\" data-vocab=\"cast down\">cast down<\/span>, O ... soul?\" Thou shalt yet praise Him, yes, even for His silence. Listen to an old and beautiful story of how one Christian dreamed that she saw three others at prayer. As they knelt the Master drew near to them. As He approached the first of the three, He bent over her in <span class=\"vocab-trigger\" data-vocab=\"tenderness\">tenderness<\/span> and grace, with smiles full of <span class=\"vocab-trigger\" data-vocab=\"radiant\">radiant<\/span> love and spoke to her in <span class=\"vocab-trigger\" data-vocab=\"accents\">accents<\/span> of purest, sweetest music. Leaving her, He came to the next but only placed His hand upon her bowed head, and gave her one look of loving approval. The third woman He passed almost <span class=\"vocab-trigger\" data-vocab=\"abruptly\">abruptly<\/span> without stopping for a word or glance.",
              "zh": "「我的心哪，你为何忧闷？」你还要赞美祂，是的，甚至要为祂的静默赞美祂。请听一个古老而美丽的故事：一位基督徒梦见她看见三个正在祷告的人。她们跪下时，主走近她们。祂走近第一位，以温柔和恩典俯身，带着满溢光辉之爱的笑容，用最纯净、最甜美的音调对她说话。离开她，祂来到第二位身边，却只把手放在她低着的头上，给予她一个爱中悦纳的眼神。对第三位妇女，祂几乎直接走过，没有停下一步或给予一语一瞥。",
              "simpEn": "'Why are you downcast, O soul?' You will yet praise Him, even for His silence. Here is a beautiful old story. A Christian dreamed she saw three others praying. As they knelt, the Master drew near. To the first, He bent down tenderly with radiant smiles and spoke in the sweetest music. To the second, He simply placed His hand on her bowed head and gave a look of loving approval. The third woman He passed almost abruptly, with no word or glance.",
              "simpZh": "'我的心哪，你为什么低沉？' 你还要赞美祂，甚至为祂的沉默赞美。讲一个美丽的老故事：一个基督徒梦见三个在祷告的人。她们跪下时，主走近。对第一个，祂温柔俯身，满脸光辉慈爱的笑容，用最纯净甜美的声调对她说话。对第二个，祂只把手放在她低着的头上，给了她一个慈爱认可的眼神。第三个妇人，祂几乎直接走过，没有停步，没说一句话，没看一眼。"
            },
            {
              "en": "The woman in her dream said to herself, \"How greatly He must love the first one, to the second He gave His approval, but none of the special demonstrations of love He gave the first; and the third must have grieved Him deeply, for He gave her no word at all and not even a passing look. I wonder what she has done, and why He made so much difference between them?\" As she tried to account for the action of her Lord, He Himself stood by her and said: \"O woman! how wrongly hast thou interpreted Me. The first kneeling woman needs all the weight of My <span class=\"vocab-trigger\" data-vocab=\"tenderness\">tenderness<\/span> and care to keep her feet in My narrow way. She needs My love, thought and help every moment of the day. Without it she would fail and fall. The second has stronger faith and deeper love, and I can count on her to trust Me however things may go and whatever people do. The third, whom I seemed not to notice, and even to neglect, has faith and love of the finest quality, and her I am training by quick and drastic processes for the highest and holiest service.\"",
              "zh": "梦中那女子自言自语：「祂必定极爱第一位，对第二位祂给予悦纳，却没有像对第一位那样特别爱的表示；第三位必定深深伤祂的心，因祂对她全无一语，甚至连一瞥都没有。我奇怪她到底做了什么，祂为何对他们如此区别对待？」她正试图解释主的作为时，主亲自站在她旁边说：「妇人哪，你误解我何等深。那第一个跪着的妇人需要我全副的温柔和眷顾，才能保守她的脚行在我狭窄的路上。她每一刻都需要我的爱、思念和帮助。没有这些，她就会失败跌倒。第二个有更刚强的信心和更深的爱，我可以指望她无论景况如何、无论人怎样行都信靠我。第三个，我似乎未曾留意，甚至像忽略了的，她拥有最精纯的信心与爱心，我正用迅速严厉的过程训练她，为了那最高、最圣洁的事奉。」",
              "simpEn": "In the dream, the woman thought: 'How greatly He loves the first; to the second He gave approval but not the special affection of the first; the third must have grieved Him deeply since He gave no word or look.' As she wondered about this, the Lord stood by her and said: 'O woman, how wrongly you've interpreted Me. The first woman needs all My tenderness and care to keep her on My narrow path. She needs My love and help every moment or she would fall. The second has stronger faith and deeper love; I can trust her to believe Me no matter what happens. The third, whom I seemed to ignore, has the finest quality of faith and love. I am training her by quick and drastic processes for the highest and holiest service.'",
              "simpZh": "梦中妇人想：'祂一定深爱第一个；对第二个给了认可，但没有像对第一个那样的特别表示；第三个一定大大伤了祂的心，因为祂对她一句话、连一眼都没有。' 她正疑惑，主亲自站在旁边说：'妇人，你完全误解我了。第一个跪着的人需要我全部的温柔和看顾，才能保守她走在我窄路上。她每时每刻需要我的爱、思想和帮助，否则就会跌倒。第二个信心更刚强、爱心更深，我可以信任她无论环境如何、别人怎样都相信我。第三个，我好像没注意甚至忽略了的，她拥有最精纯的信心和爱心，我正在用快速严厉的方法训练她，为着最高、最圣洁的事奉。'"
            },
            {
              "en": "\"She knows Me so intimately, and trusts Me so utterly, that she is independent of words or looks or any outward <span class=\"vocab-trigger\" data-vocab=\"intimation\">intimation<\/span> of My approval. She is not dismayed nor discouraged by any circumstances through which I arrange that she shall pass; she trusts Me when sense and reason and every finer instinct of the natural heart would rebel;—because she knows that I am working in her for eternity, and that what I do, though she knows not the explanation now, she will understand hereafter. I am silent in My love because I love beyond the power of words to express, or of human hearts to understand, and also for your sakes that you may learn to love and trust Me in Spirit-taught, <span class=\"vocab-trigger\" data-vocab=\"spontaneous\">spontaneous<\/span> response to My love, without the <span class=\"vocab-trigger\" data-vocab=\"spur\">spur<\/span> of anything outward to call it forth.\" He \"will do marvels\" if you will learn the mystery of His silence, and praise Him, for every time He withdraws His gifts that you may better know and love the Giver.",
              "zh": "「她对我如此亲密，如此完全信任我，以至于不需要话语、眼目或任何外在的悦纳表示。她对任何我安排她经过的环境都不沮丧、不气馁；当感官、理性以及天然心灵每一点精微的本能都要悖逆时，她仍信靠我——因为她知道我正为永恒在她里面作工，我所行的，她如今虽不明其解，将来必能明白。我在爱中静默，因我的爱超过言语所能表达，超过人心所能理解；也是为你们的缘故，使你们可以在圣灵教导下，自发地回应我的爱而学习爱我、信靠我，无需任何外在事物的刺激。」你若学会祂静默的奥秘，并为每次祂收回恩赐好叫你们更认识并爱慕赐恩者而赞美祂，祂就「必行奇事」。",
              "simpEn": "'She knows Me so closely and trusts Me so completely that she doesn't need words or looks or any outward sign of My approval. She is not dismayed by any circumstances I let her go through; she trusts Me when sense and reason and every natural instinct would rebel—because she knows I am working in her for eternity, and what I do now, though unexplained, she will understand later. I am silent in My love because I love beyond words to express or hearts to understand, and also so that you may learn to love and trust Me in Spirit-taught, spontaneous response, without needing something outward to trigger it.' He 'will do marvels' if you will learn the mystery of His silence and praise Him each time He withdraws gifts so you may better know and love the Giver.",
              "simpZh": "'她这么认识我，这么完全信任我，以至于不需要话语、眼神或任何外在的认可表示。她对我安排的任何环境都不惊惶；当感觉、理性、天性一切本能都要反抗时，她仍相信我——因为她知道我在她里面为永恒作工，我所做的虽然现在不明，将来必明白。我在爱中静默，因为我的爱超过言语能说，超过人心能懂；也是为你们好，叫你们在圣灵教导下自发回应我的爱，学习爱我、信靠我，不需要外在的东西来推动。' 如果你学会祂沉默的奥秘，并为祂每次收回恩赐好让你更认识并爱那赐恩者而赞美祂，祂就'必行奇事'。"

            {
              "en": "There are seasons when to <span class=\"vocab-trigger\" data-vocab=\"Be still\">be still<\/span> demands <span class=\"vocab-trigger\" data-vocab=\"immeasurably\">immeasurably<\/span> higher strength than to act. <span class=\"vocab-trigger\" data-vocab=\"Composure\">Composure<\/span> is often the highest result of power. To the <span class=\"vocab-trigger\" data-vocab=\"vilest\">vilest<\/span> and most deadly charges Jesus responded with deep, unbroken silence, such as excited the wonder of the judge and the spectators. To the <span class=\"vocab-trigger\" data-vocab=\"grossest insults\">grossest insults<\/span>, the most violent ill-treatment and mockery that might well bring indignation into the feeblest heart, He responded with voiceless <span class=\"vocab-trigger\" data-vocab=\"complacent calmness\">complacent calmness<\/span>. Those who are unjustly accused, and <span class=\"vocab-trigger\" data-vocab=\"causelessly\">causelessly<\/span> ill-treated know what tremendous strength is necessary to keep silence to God.",
              "zh": "有些时候，保持安静所需的力量远大于行动。沉静常常是能力的最高表现。对于最邪恶、最致命的指控，耶稣报以深沉、不间断的静默，这静默令审判官和旁观者惊奇。对于最粗鄙的凌辱、最暴虐的虐待和足以在软弱心灵中激起义愤的嘲弄，祂以无声、安稳的镇定回应。那些被不公义控告、无端被恶待的人，才知道要在神面前保持静默需要何等巨大的力量。",
              "simpEn": "Sometimes being still demands far greater strength than acting. Composure is often the highest expression of power. To the most wicked and deadly charges, Jesus responded with deep, unbroken silence that amazed the judge and onlookers. To the rudest insults, the harshest mistreatment and mockery that would anger the weakest heart, He replied with calm stillness. Those wrongly accused and mistreated without cause know what tremendous strength is needed to keep silent before God.",
              "simpZh": "有些时候，安静需要的力量比行动大得多。镇定往往是能力的最高表现。对于最恶毒、致命的控告，耶稣用深沉不间断的沉默回应，让审判官和观众惊奇。对于最粗野的侮辱、最暴力的虐待和足以让最软的心都愤怒的嘲弄，祂以无声的安稳平静回答。那些被冤枉、无故被恶待的人才知道，要在神面前保持安静需要多大的力量。"

              "en": "Men may misjudge thy aim, <br>Think they have cause to blame, <br>Say, thou art wrong; <br>Keep on thy quiet way, <br>Christ is the Judge, not they, <br>Fear not, be strong.",
              "zh": "人可能误判你的动机，以为有理由指责，说，你是错的；仍守住你安静的道路吧，基督是审判者，不是他们，不要惧怕，要刚强。",
              "simpEn": "People may misjudge your aim, think they have reason to blame, and say you are wrong. Keep walking your quiet way; Christ is the Judge, not them. Fear not, be strong.",
              "simpZh": "人可能误解你的目的，以为有理由怪你，说你错了。你只管继续安静的走；基督是审判官，不是他们。不要怕，要刚强。"
            },
            {
              "en": "St. Paul said, \"<span class=\"vocab-trigger\" data-vocab=\"None of these things move me\">None of these things move me<\/span>.\" He did not say, none of these things hurt me. It is one thing to be hurt and quite another to be moved. St. Paul had a very tender heart. We do not read of any apostle who cried as St. Paul did. It takes a strong man to cry. Jesus wept, and He was the <span class=\"vocab-trigger\" data-vocab=\"manliest Man\">manliest Man<\/span> that ever lived. So it does not say, none of these things hurt me. But the apostle had determined not to move from what he believed was right. He did not count as we are apt to count; he did not care for ease; he did not care for this mortal life. He cared for only one thing, and that was to be loyal to Christ, to have His smile. To St. Paul, more than to any other man, His work was wages, His smile was Heaven. —Margaret Bottome.",
              "zh": "圣保罗说：「这些事都不摇动我。」他没有说这些事不叫我伤心。受伤是一回事，被摇动是另一回事。圣保罗有一颗极柔软的心。我们未曾读到有哪位使徒像圣保罗那样哭泣。刚强的人才会哭泣。耶稣哭了，而祂是世上最有男子气概的人。所以经上不是说这些事不叫我伤心。但这位使徒已定意不从他认为是正确的立场上移动。他不像我们那样算账；他不关心安逸，也不关心这必死的生命。他只在意一件事，就是忠于基督，得着祂的笑容。对圣保罗来说，超过对任何人，祂的工作就是酬劳，祂的笑容就是天堂。——玛格丽特·波顿",

              "simpZh": "保罗说：'这些事都不摇动我。' 他没说这些事不叫我受伤。受伤和被摇动是不同的。保罗的心很柔软。没读到哪个使徒像保罗那样哭。刚强的人才哭。耶稣哭了，祂是最有男子气概的人。所以不是说这些事不叫我伤心。但保罗决心不从对的事上移动。他不像我们那样计算；不在乎安逸，不在乎这必死的生命。他只在乎忠于基督，得着祂的笑容。对保罗来说，祂的工作就是酬劳，祂的笑容就是天堂。"

          "sectionId": 7,

          "paragraphs": [
            {
              "en": "As soon as the soles of the feet of the priests ... shall rest in the waters ... the waters shall be <span class=\"vocab-trigger\" data-vocab=\"cut off\">cut off<\/span> (Joshua 3:13).",
              "zh": "等到抬普天下主耶和华约柜的祭司把脚站在约旦河水里，约旦河的水……必然断绝。（约书亚记3:13）",
              "simpEn": "As soon as the priests' feet rest in the waters, the waters will be cut off.",
              "simpZh": "祭司的脚一踏进水里，水就断开了。"
            },
            {
              "en": "The people were not to wait in their camps until the way was opened, they were to walk by faith. They were to break camp, pack up their goods, form in line to march, and move down to the very banks before the river would be opened. If they had come down to the edge of the river and then had stopped for the stream to divide before they stepped into it, they would have waited in vain. They must take one step into the water before the river would be <span class=\"vocab-trigger\" data-vocab=\"cut off\">cut off<\/span>.",
              "zh": "百姓不应当在营中等待，直到道路开通；他们当凭信心前行。他们要拔营，收拾财物，列队行军，直走到河边，然后河才敞开。如果他们到了河边却停下来等河水分开才踏进去，那就是徒然等待了。他们必须先踏出一步进入水中，然后河水才会断绝。",
              "simpEn": "The people were not to wait in camp until the way opened; they were to walk by faith. They had to break camp, pack up, form a line, and go right to the riverbank before the water would part. If they had stopped at the edge to wait for the stream to divide, they would have waited in vain. They had to take one step into the water before the river would be cut off.",
              "simpZh": "百姓不应该在营地里等到路开了；他们要靠信心走。他们要拔营，收拾行李，排好队，走到河岸边，然后水才分开。如果他们停在河边等河水分开再踏进去，就白等了。他们必须先踏一步进到水里，河才会断开。"
            },
            {
              "en": "We must learn to take God at His Word, and go straight on in duty, although we see no way in which we can go forward. The reason we are so often <span class=\"vocab-trigger\" data-vocab=\"balked\">balked<\/span> by difficulties is that we expect to see them removed before we try to pass through them. If we would move straight on in faith, the path would be opened for us. We <span class=\"vocab-trigger\" data-vocab=\"Stand still\">stand still<\/span>, waiting for the obstacle to be removed, when we ought to go forward as if there were no <span class=\"vocab-trigger\" data-vocab=\"Obstacles\">obstacles<\/span>. —<span class=\"vocab-trigger\" data-vocab=\"Evening Thoughts\">Evening Thoughts<\/span>.",
              "zh": "我们必须学会照着神的话语而行，在尽责的路上勇往直前，纵然看不见前进的道路。我们常被困难阻挡，原因就在于我们期望困难在我们尝试越过之前就被挪开。如果我们凭信心直往前行，道路就必为我们敞开。我们站着不动，等候障碍被除去，其实我们应当仿佛前方毫无障碍一样地向前走。——《晚间默想》",
              "simpEn": "We must learn to take God at His Word and go right on in duty, even when we see no way forward. We are often blocked by difficulties because we expect them to be removed before we try to pass through. If we would move straight ahead in faith, the path would open. We stand still waiting for the obstacle to disappear, when we should go forward as if there were no obstacles.",
              "simpZh": "我们要学会照着神的话去做，一直向前尽本分，即使看不见前进的路。我们常被困难卡住，是因为想等困难被挪开再走。如果凭信心直接往前走，路就会开。我们站着不动等障碍消失，其实应该像没有障碍一样向前走。"
            },
            {
              "en": "What a lesson Columbus gave to the world of <span class=\"vocab-trigger\" data-vocab=\"perseverance\">perseverance<\/span> in the face of tremendous difficulties! Behind him lay the gray Azores, Behind the gates of Hercules; Before him not the ghost of shores, Before him only shoreless seas. The good Mate said: \"Now we must pray, For lo! the very stars are gone. Brave Admiral, speak, what shall I say?\" Why, say, 'Sail on! sail on! and on!'\" <br>\"My men grow <span class=\"vocab-trigger\" data-vocab=\"mutinous\">mutinous<\/span> day by day; My men grow <span class=\"vocab-trigger\" data-vocab=\"ghastly wan\">ghastly wan<\/span> and weak!\" The stout Mate thought of home; a spray Of salt wave washed his <span class=\"vocab-trigger\" data-vocab=\"swarthy\">swarthy<\/span> cheek. \"What shall I say, brave Admiral, say, If we sight <span class=\"vocab-trigger\" data-vocab=\"naught\">naught<\/span> but seas at dawn?\" \"Why, you shall say at break of day, 'Sail on! sail on! sail on! and on!'\" <br>They sailed. They sailed. Then spake the Mate: \"This mad sea shows its teeth tonight. He curls his lip, he lies in wait, With lifted teeth, as if to bite! Brave Admiral, say but one good word; What shall we do when hope is gone?\" The words leapt like a leaping sword: \"Sail on! sail on! sail on! and on!\" <br>Then, pale and worn, he kept his deck And peered through darkness. Ah! that night Of all dark nights! And then a speck— A light! A light! A light! A light! It grew, a starlit flag unfurled! It grew to be Time's burst of dawn. He gained a world; he gave that world Its grandest lesson: \"On! sail on!\" —Joaquin Miller. <br>Faith that goes forward triumphs.",
              "zh": "哥伦布面对巨大困难时的坚忍，给世界留下了何等大的功课！身后是灰色的亚速尔群岛，海格力斯之门；眼前连岸影也无，只有无边无际的海。善良的大副说：「现在我们必须祷告，看哪，连星星都不见了。勇敢的提督，请说，我该说什么？」就说，「前进！前进！继续前进！」「我的人日渐叛离；我的人变得惨白虚弱！」健壮的大副想到家乡；一丝咸浪溅在他黝黑的脸颊上。「勇敢的提督，若在黎明时什么也看不见，我该说什么？」「你该在破晓时说，'前进！前进！继续前进！'」他们航行，再航行。然后大副说：「今夜疯狂的大海露出了利齿。他卷起嘴唇，埋伏着，举起牙齿似乎要咬！勇敢的提督，只要说一句好话；当盼望消失时我们当做什么？」话如跃出的剑：「前进！前进！继续前进！」然后，苍白疲乏的他守在甲板，在黑暗中凝视。啊！那最黑暗的夜！然后出现一点——亮光！亮光！亮光！亮光！它增大，一面星光照耀的旗帜展开！它增大成为时光破晓的爆发。他发现了一个世界；他给了那世界最伟大的教训：「向前！继续前进！」——华金·米勒。向前的信心必得胜。",
              "simpEn": "What a lesson Columbus gave in perseverance against huge difficulties! Behind him the gray Azores, the gates of Hercules; before him no sign of shore, only endless seas. The Mate said, 'Now we must pray, for the stars are gone. Brave Admiral, what shall I say?' 'Say, Sail on! sail on! and on!' 'My men grow mutinous; they grow pale and weak.' The Mate thought of home as salty spray washed his dark cheek. 'What shall I say if we see nothing at dawn?' 'Say at break of day, Sail on! sail on! and on!' They sailed on. The Mate said, 'This mad sea shows its teeth tonight, curling its lip as if to bite! Brave Admiral, say one good word; what do we do when hope is gone?' The words leaped like a sword: 'Sail on! sail on! and on!' Then, pale and worn, he kept the deck and peered into darkness. Oh, that darkest night! Then a speck—a light! A light! It grew, a starlit flag unfurled; it became the burst of dawn. He gained a world and gave the world its grandest lesson: 'On! sail on!' Faith that goes forward triumphs.",
              "simpZh": "哥伦布在极大困难中坚持，给了世界多好的榜样！背后是灰色的亚速尔，海格力斯之门；眼前没有海岸的影子，只有无边大海。大副说：'现在要祷告，连星星都不见了。勇敢的提督，我该说什么？' 说：'前进！前进！继续前进！' '我的人一天天叛离，变得惨白虚弱。' 大副想家，咸水花打在他黝黑的脸上。'勇敢的提督，要是天亮什么都看不见，我说什么？' '天亮时你就说：前进！前进！继续前进！' 他们继续航行。大副说：'今晚疯海露出牙齿，卷起嘴唇好像要咬！勇敢的提督，说句好话；盼望没有了，我们怎么办？' 话像跃出的剑：'前进！前进！继续前进！' 然后，他苍白疲倦守在甲板上，在黑暗中注视。啊！那最黑的夜！然后一个小点——亮光！亮光！亮光！亮光！它变大，一面星光照耀的旗帜展开！变成黎明的爆发。他发现了一个世界，给了世界最伟大的教训：'向前！继续前进！' 向前走的信心必得胜。"

            {
              "en": "\"At midnight Paul and Silas prayed, and sang praises unto God: and the prisoners heard them\" (Acts 16:25). <br>Oh, Paul, thou wondrous example to the flock, who could thus glory, bearing in the body as thou didst \"the marks of the Lord Jesus\"! Marks from the stoning almost to the death, from thrice beating with rods, from those hundred and ninety-five stripes laid on thee by the Jews, and from stripes received in that Philippian jail, which had they not drawn blood would not have called for washing! Surely the grace which enabled thee to sing praises under such suffering is <span class=\"vocab-trigger\" data-vocab=\"all-sufficient grace\">all-sufficient grace<\/span>. —J. Roach. <br>Oh, let us <span class=\"vocab-trigger\" data-vocab=\"Rejoice\">rejoice<\/span> in the Lord, evermore, <br>When <span class=\"vocab-trigger\" data-vocab=\"darts\">darts<\/span> of the <span class=\"vocab-trigger\" data-vocab=\"tempter\">tempter<\/span> are flying, <br>For Satan still dreads, as he oft did of <span class=\"vocab-trigger\" data-vocab=\"yore\">yore<\/span>, <br>Our singing much more than our sighing.",
              "zh": "「约在半夜，保罗和西拉祷告唱诗赞美神，众囚犯也侧耳而听。」（徒16:25）哦，保罗，你是群羊何等奇妙的榜样，你在身上带着「主耶稣的印记」，还能如此夸耀！那些印记来自几乎致死的石打、三次的棍打、犹太人加给你的一百九十五道鞭痕，还有在腓立比监里所受的鞭伤——若不是打出血来，就不必清洗！那使你在如此苦难中还能唱诗赞美的恩典，诚然是全备的恩典。——J.罗奇。哦，让我们在主里常常喜乐，当试探者的火箭飞来之际，因为撒但素来畏惧我们的歌唱，远胜于畏惧我们的叹息。",
              "simpEn": "At midnight Paul and Silas prayed and sang praises to God, and the prisoners heard them. Paul, what an example! He gloried in bearing the marks of Jesus—marks from stoning, beatings, 195 stripes from the Jews, and the stripes in the Philippian jail that needed washing because they drew blood. The grace that enabled him to sing under such suffering is all-sufficient grace. Let us rejoice in the Lord always, when the tempter's darts fly, because Satan fears our singing more than our sighing.",
              "simpZh": "保罗和西拉半夜祷告唱诗赞美神，囚犯都听见了。保罗真是群羊的榜样！他身上带着耶稣的印记——被石头打几乎死、三次棍打、犹太人给的一百九十五鞭，还有在腓立比监里被打出血需要清洗的鞭伤。使他在这种苦难中能唱诗赞美的恩典是够用的全备恩典。让我们在主里常常喜乐，当试探者的飞箭射来，因为撒但一直害怕我们的歌唱，远超过害怕我们的叹息。"
            }

          "paragraphs": [
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Fret not thyself\">Fret not thyself<\/span> (Psalm 37:1).",
              "zh": "不要为作恶的心怀不平。（诗篇37:1）",
              "simpEn": "Don't fret yourself.",
              "simpZh": "不要自己焦躁。"
            },
            {
              "en": "Do not get into a <span class=\"vocab-trigger\" data-vocab=\"perilous heat\">perilous heat<\/span> about things. If ever heat were justified, it was surely justified in the circumstances outlined in the Psalm. Evil-doers were moving about clothed in purple and fine linen, and <span class=\"vocab-trigger\" data-vocab=\"faring sumptuously\">faring sumptuously<\/span> every day. \"Workers of iniquity\" were climbing into the supreme places of power, and were <span class=\"vocab-trigger\" data-vocab=\"tyrannizing\">tyrannizing<\/span> their less fortunate brethren. Sinful men and women were stalking through the land in the pride of life and <span class=\"vocab-trigger\" data-vocab=\"basking\">basking<\/span> in the light and comfort of great prosperity, and good men were becoming heated and fretful. \"<span class=\"vocab-trigger\" data-vocab=\"Fret not thyself\">Fret not thyself<\/span>.\" Do not get unduly heated! Keep cool! Even in a good cause, fretfulness is not a wise help-meet. <span class=\"vocab-trigger\" data-vocab=\"fretting\">Fretting<\/span> only heats the <span class=\"vocab-trigger\" data-vocab=\"bearings\">bearings<\/span>; it does not generate the steam. It is no help to a train for the axles to get hot; their heat is only a <span class=\"vocab-trigger\" data-vocab=\"hindrance\">hindrance<\/span>. When the axles get heated, it is because of unnecessary <span class=\"vocab-trigger\" data-vocab=\"friction\">friction<\/span>; dry surfaces are grinding together, which ought to be kept in <span class=\"vocab-trigger\" data-vocab=\"smooth\">smooth<\/span> cooperation by a delicate cushion of oil.",
              "zh": "不要为事情发危险的烈怒。若烈怒有理由的话，那在诗篇所描述的情形中诚然有理。恶人身穿紫袍细麻布，天天奢华宴乐。「作孽之人」攀上高位，欺压他们不幸的弟兄。有罪的男女在世上昂首阔步，活在生命的骄傲中，并在发达的光辉与舒适里沐浴，而义人却变得激愤焦躁。「不要心怀不平。」不要过分发热！保持冷静！即使在正当的事上，焦躁也不是聪明的帮助。焦躁只会烧热轴承，并不产生蒸气。车轴发热对火车毫无帮助；其热度只是阻碍。车轴发热是因不必要的摩擦；干涩的表面互相磨擦，而这些表面本该借着精巧的油垫保持在润滑的配合中。",
              "simpEn": "Don't get dangerously heated about things. Even when it seems justified—the wicked prosper in luxury and oppress others, while good people get upset—God says, 'Don't fret.' Keep cool! Even in a good cause, fretting is not helpful. Fretting only heats the bearings; it doesn't make steam. When train axles get hot, it's from unnecessary friction—dry parts grinding together that should be lubricated by oil.",
              "simpZh": "不要为事情发危险的怒火。就算似乎有理由——恶人穿着华服、天天奢华宴乐、欺压别人，好人却变得焦躁——神说：‘不要心怀不平。’保持冷静！就算为好事，焦躁也没用。焦躁只会让轴承发热，不会产生蒸汽。火车轴发热来自不必要的摩擦——干涩的零件互相磨擦，本该用油来润滑的。"
            },
            {
              "en": "And is it not a suggestive fact that this word \"<span class=\"vocab-trigger\" data-vocab=\"fret\">fret<\/span>\" is closely akin to the word \"<span class=\"vocab-trigger\" data-vocab=\"friction\">friction<\/span>,\" and is an indication of absence of the <span class=\"vocab-trigger\" data-vocab=\"anointing oil\">anointing oil<\/span> of the grace of God? In fretfulness, a little bit of grit gets into the <span class=\"vocab-trigger\" data-vocab=\"bearings\">bearings<\/span>—some slight disappointment, some <span class=\"vocab-trigger\" data-vocab=\"ingratitude\">ingratitude<\/span>, some <span class=\"vocab-trigger\" data-vocab=\"discourtesy\">discourtesy<\/span>—and the <span class=\"vocab-trigger\" data-vocab=\"smooth\">smooth<\/span> working of the life is checked. <span class=\"vocab-trigger\" data-vocab=\"friction\">Friction<\/span> begets heat, and with the heat most dangerous conditions are created. Do not let thy bearing get hot. Let the oil of the Lord keep thee cool, lest by reason of an unholy heat thou be reckoned among the evil-doers. —The Silver Lining.",
              "zh": "这岂不是一个颇具启发性的事实吗？「焦躁」（fret）这个词与「摩擦」（friction）极为相近，指明了神恩典膏油的缺失。在焦躁中，一小粒砂砾进了轴承——些微的失望、一些忘恩负义、一些无礼——生命平顺的运转就被阻碍。摩擦产生热量，而热造成了极危险的状况。不要让你的轴承发热。让主的油保守你冷静，免得因不圣洁的狂热而被列在作孽的人当中。——《银边》",
              "simpEn": "Isn't it interesting that 'fret' is close to 'friction', showing a lack of God's anointing oil? In fretfulness, a little grit gets into life's bearings—a slight disappointment, ingratitude, discourtesy—and the smooth running stops. Friction causes heat, and heat creates dangerous conditions. Don't let your bearings get hot. Let the oil of the Lord keep you cool, or an unholy heat might make you like the evildoers.",
              "simpZh": "‘焦躁’（fret）和‘摩擦’（friction）很像，这不是有意思吗？说明缺少神恩典的膏油。焦躁时，一小粒沙石掉进轴承——一点失望、忘恩负义、无礼——生活的顺畅运转就停了。摩擦生热，热造成危险状况。别让你的轴承发热。让主的油保守你冷静，否则不圣洁的热会让你和作恶的人一样。"
            },
            {
              "en": "Dear restless heart, <span class=\"vocab-trigger\" data-vocab=\"Be still\">be still<\/span>; don't <span class=\"vocab-trigger\" data-vocab=\"fret\">fret<\/span> and worry so; <br>God has a thousand ways His love and help to show; <br>Just trust, and trust, and trust, until His will you know. <br>Dear restless heart, <span class=\"vocab-trigger\" data-vocab=\"Be still\">be still<\/span>, for peace is God's own smile, <br>His love can every wrong and sorrow <span class=\"vocab-trigger\" data-vocab=\"reconcile\">reconcile<\/span>; <br>Just love, and love, and love, and calmly wait awhile. <br>Dear restless heart, be brave; don't moan and sorrow so, <br>He hath a meaning kind in chilly winds that blow; <br>Just hope, and hope, and hope, until you braver grow. <br>Dear restless heart, <span class=\"vocab-trigger\" data-vocab=\"repose\">repose<\/span> upon His breast this hour, <br>His grace is strength and life, His love is bloom and flower; <br>Just rest, and rest, and rest, within His tender power. <br>Dear restless heart, <span class=\"vocab-trigger\" data-vocab=\"Be still\">be still<\/span>! Don't struggle to be free; <br>God's life is in your life, from Him you may not flee; <br>Just pray, and pray, and pray, till you have faith to see. <br>—Edith Willis Linn.",
              "zh": "亲爱的不宁之心，安静吧；不要如此焦躁忧虑；神有千万种方式显明祂的爱与帮助；只要信，再信，继续信，直到明白祂的旨意。亲爱的不宁之心，安静吧，因为平安是神自己的微笑，祂的爱能调和一切冤屈与忧伤；只要爱，再爱，继续爱，并安静等候片时。亲爱的不宁之心，要勇敢；不要如此呻吟忧伤，寒风吹拂之中有祂仁慈的寓意；只要望，再望，继续望，直到你变得更勇敢。亲爱的不宁之心，此刻安卧在祂胸上吧，祂的恩典就是力量与生命，祂的爱就是绽放与花朵；只要安息，再安息，继续安息在祂温柔的大能中。亲爱的不宁之心，安静吧！不要挣扎想得自由；神的生命就在你的生命中，你无法逃离祂；只要祷告，再祷告，继续祷告，直到你有信心看见。",
              "simpEn": "Dear restless heart, be still; don't fret and worry. God has a thousand ways to show His love and help. Just trust, and trust, and trust until you know His will. Be still, for peace is God's smile; His love can reconcile every wrong and sorrow. Just love, and love, and love, and calmly wait. Be brave; don't moan; cold winds have a kind meaning. Just hope, and hope, and hope until you grow braver. Repose on His breast this hour; His grace is strength, His love is bloom. Just rest, and rest, and rest in His tender power. Be still! Don't struggle to be free; God's life is in you. Just pray, and pray, and pray till you have faith to see.",
              "simpZh": "亲爱的烦躁的心，安静吧；别这么焦躁忧虑。神有一千种方式显明祂的爱和帮助。只要信，信，信，直到知道祂的旨意。安静吧，平安是神的微笑，祂的爱能调和一切冤屈和忧伤。只要爱，爱，爱，并安静等候。勇敢吧；别这么呻吟；寒风中有祂仁慈的意思。只要望，望，望，直到你变得更勇敢。此刻安卧在祂胸上吧，祂的恩典是力量生命，祂的爱是花朵。只要安息，安息，安息在祂温柔的大能中。安静吧！别挣扎想得自由；神的生命在你生命中。只要祷告，祷告，祷告，直到有信心看见。"
            }

        {
          "sectionId": 5,
          "heading": "February 16",
          "audio": "audio/Streams in the Desert - February 16.m4a",
          "paragraphs": [
            {
              "en": "Though I have <span class=\"vocab-trigger\" data-vocab=\"afflicted\">afflicted<\/span> thee, I will afflict thee no more (Nah.1:12).",
              "zh": "我虽然使你受苦，却不再使你受苦。（那鸿书1:12）",
              "simpEn": "Though I have brought you suffering, I will do so no more.",
              "simpZh": "我虽然让你受苦，就不再让你受苦了。"
            },
            {
              "en": "There is a limit to <span class=\"vocab-trigger\" data-vocab=\"affliction\">affliction<\/span>. God sends it and removes it. Do you sigh and say, \"When will the end be?\" Let us quietly wait and patiently endure the will of the Lord till He cometh. Our Father takes away the rod when His design in using it is fully served. If the <span class=\"vocab-trigger\" data-vocab=\"affliction\">affliction<\/span> is sent for testing us, that our graces may glorify God, it will end when the Lord has made us bear witness to His praise. We would not wish the <span class=\"vocab-trigger\" data-vocab=\"affliction\">affliction<\/span> to depart until God has gotten out of us all the honor which we can possibly yield Him. There may be today \"a great calm.\" Who knows how soon those raging <span class=\"vocab-trigger\" data-vocab=\"billows\">billows<\/span> will give place to a sea of glass, and the sea birds sit on the gentle waves? After long <span class=\"vocab-trigger\" data-vocab=\"tribulation\">tribulation<\/span>, the <span class=\"vocab-trigger\" data-vocab=\"flail\">flail<\/span> is hung up, and the wheat <span class=\"vocab-trigger\" data-vocab=\"rests\">rests<\/span> in the <span class=\"vocab-trigger\" data-vocab=\"garner\">garner<\/span>. We may, before many hours are past, be just as happy as now we are sorrowful.",
              "zh": "苦难是有限度的。神降下它，也除去它。你是否叹息说：「何时才到尽头？」让我们安静等候，忍耐顺服主的旨意，直到祂来临。当管教之杖的目的完全达成，我们的父就将它拿开。若苦难是为试验我们，叫我们的美德荣耀神，那么当主使我们为祂的赞美作了见证时，苦难就必结束。我们不希望苦难离开，直到神从我们身上得着了一切我们所能呈献给祂的荣耀。今天或许就有「大平静」。谁知道那翻腾的巨浪何时就变成玻璃海，海鸟停在温柔涟漪之上？在长久的患难之后，连枷被挂起，麦子安息在仓里。可能不过几个小时之后，我们就和现今忧愁一样地快乐。",
              "simpEn": "There is a limit to suffering. God sends and removes it. Are you sighing, 'When will it end?' Wait quietly and endure God's will until He comes. The Father removes the rod when its purpose is served. If suffering tests us so our graces glorify God, it ends when we have witnessed to His praise. We wouldn't want it to leave until God gets all the honor we can give. Today there may be a great calm. Who knows how soon the raging waves will become a glassy sea with seabirds resting? After long tribulation, the flail is hung up and the wheat rests in the barn. We may, in a few hours, be as happy as we are now sad.",
              "simpZh": "苦难有限度。神降下也拿去。你在叹息‘何时到头’吗？安静等候，忍耐顺服主吧。目的达到后，父就把杖拿开。若苦难为试验我们、让美德荣耀神，当我们为祂作了见证就结束。我们不希望苦难在神从我们得到一切荣耀前就离开。今天也许就有大平静。谁知道翻腾巨浪多快就变成玻璃海，海鸟停在其上？长久的患难后，连枷挂起，麦子在仓里安息。也许几个小时后就与现在忧愁一样快乐。"
            },
            {
              "en": "It is not hard for the Lord to turn night into day. He that sends the clouds can as easily clear the skies. Let us be of good cheer. It is better farther on. Let us sing Hallelujah by anticipation. —C. H. Spurgeon. <br>The great <span class=\"vocab-trigger\" data-vocab=\"Husbandman\">Husbandman<\/span> is not always threshing. Trial is only for a season. The showers soon pass. Weeping may <span class=\"vocab-trigger\" data-vocab=\"tarry\">tarry<\/span> only for the few hours of the short summer night; it must be gone at daybreak. Our light <span class=\"vocab-trigger\" data-vocab=\"affliction\">affliction<\/span> is but for a moment. Trial is for a purpose, \"If needs be.\" The very fact of trial proves that there is something in us very precious to our Lord; else He would not spend so much pains and time on us. Christ would not test us if He did not see the precious ore of faith mingled in the rocky <span class=\"vocab-trigger\" data-vocab=\"matrix\">matrix<\/span> of our nature; and it is to bring this out into purity and beauty that He forces us through the <span class=\"vocab-trigger\" data-vocab=\"fiery ordeal\">fiery ordeal<\/span>.",
              "zh": "主把黑夜转为白昼并不困难。那差来密云的，也能同样轻易地使天空清朗。让我们放心，前途更加美好。让我们预先唱哈利路亚。——司布真。那位大农夫并不总是打谷。试炼不过片时。阵雨很快过去。哭泣可能只停留在短夏夜的几小时间；破晓时必消失。我们这至暂至轻的苦楚，不过是瞬间。试炼有目的，乃「若有需要」。试炼的事实本身就证明，我们里面有对我们主极为宝贵的东西；否则祂不会在我们身上花费如此多的心血和时间。基督若不看见我们性情岩石般的母体中混杂着宝贵的信心矿砂，就不会试验我们；祂正是为了要把这信心提炼得纯净美丽，才逼我们经过火炼。",
              "simpEn": "It's easy for the Lord to turn night into day. He who sends clouds can clear the skies. Let's be cheerful; it's better ahead. Let's sing Hallelujah in advance. —Spurgeon. The great Farmer is not always threshing. Trials last only a season. Showers soon pass. Weeping stays only a few hours of the summer night; it must go at dawn. Our light trouble is only for a moment. Trial has a purpose, 'if needed.' The fact of trial proves something precious in us; otherwise God wouldn't spend so much time on us. Christ wouldn't test us if He didn't see the precious ore of faith in our rocky nature; He puts us through the fiery ordeal to bring it out pure and beautiful.",
              "simpZh": "主把夜变昼很容易。差云来的也能轻易使天晴。开心点，前面更好。预先唱哈利路亚吧。大农夫不是一直打谷。试炼只一时。阵雨快过。哭泣只在夏夜几小时；天亮必消失。我们这暂时的轻苦只一刻。试炼有目的，‘若需要’。试炼本身就证明我们里面有主看为宝贵的东西；否则祂不会花这么多心血。基督若不看见我们石性里混着宝贵的信心矿砂，就不会试验我们；祂逼我们经火炼，正是要把这信心炼得纯净美丽。"
            },
            {
              "en": "Be patient, O sufferer! The result will more than <span class=\"vocab-trigger\" data-vocab=\"compensate\">compensate<\/span> for all our trials, when we see how they wrought out the far more exceeding and eternal weight of glory. To have one word of God's <span class=\"vocab-trigger\" data-vocab=\"commendation\">commendation<\/span>; to be honored before the holy angels; to be glorified in Christ, so as to be better able to flash His glory on Himself—ah! that will more than repay for all. —Tried by Fire. <br>As the weights of the clock, or the <span class=\"vocab-trigger\" data-vocab=\"ballast\">ballast<\/span> in the vessel, are necessary for their right ordering, so is trouble in the soul-life. The sweetest scents are only obtained by tremendous pressure; the fairest flowers grow amid Alpine snow-solitudes; the fairest gems have suffered <span class=\"vocab-trigger\" data-vocab=\"longest\">longest<\/span> from the <span class=\"vocab-trigger\" data-vocab=\"lapidary's wheel\">lapidary's wheel<\/span>; the noblest statues have borne most blows of the chisel. All, however, are under law. Nothing happens that has not been appointed with <span class=\"vocab-trigger\" data-vocab=\"consummate care\">consummate care<\/span> and foresight.",
              "zh": "受苦的人哪，存心忍耐！结果必将远远补偿我们一切的试炼，当我们看见它们如何成就了那极重无比永远的荣耀时。得到神一句称赞的话；在圣天使面前得尊荣；在基督里得荣耀，以至更能将祂的荣光反射给祂自己——啊！这就足以偿还一切。——《火炼》正如时钟的重锤或船上的压舱物，对它们的正常运作是必须的，照样，忧愁在灵魂生命中也是必须的。最甜美的香料只有借着极大压力才能获得；最美的花生在阿尔卑斯山的雪寂之中；最美的宝石在磨石轮下受苦最久；最高贵的雕像经受了最多的凿击。然而，一切都在定律之下。没有任何事发生不是以极致的谨慎和预知所安排的。",
              "simpEn": "Be patient, sufferer! The result will more than repay all our trials when we see how they produced the far greater eternal weight of glory. To have one word of God's praise; to be honored before holy angels; to be glorified in Christ and better reflect His glory—that will more than repay. As clock weights or ship ballast are needed for proper order, so is trouble in the soul. The sweetest perfumes come from great pressure; the fairest flowers grow in Alpine snow; the finest gems suffer longest on the wheel; the noblest statues bear the most chisel blows. Nothing happens without consummate care and foresight.",
              "simpZh": "受苦的人，忍耐！结果远远补偿一切试炼，当我们看见它们成就了那极重无比永远的荣耀时。得到神一句称赞；在圣天使面前得尊荣；在基督里得荣耀，更能反映祂的荣光——这就大大偿还了。如同钟表的重锤或船的压舱物对正常运作是必须的，忧愁在灵魂里也是必须的。最甜的香料来自极大压力；最美的花生在阿尔卑斯雪寂中；最美的宝石在磨石上受苦最久；最高贵的雕像承受最多的凿击。一切都有定律。没有一件事不是以极致的谨慎和预知安排的。"
            }

        {
          "sectionId": 6,
          "heading": "February 17",
          "audio": "audio/Streams in the Desert - February 17.m4a",
          "paragraphs": [
            {
              "en": "The land which I do give them, even the children of Israel (Joshua 1:2).",
              "zh": "我赐给以色列人的地。（约书亚记1:2）",
              "simpEn": "The land which I am giving them, the children of Israel.",
              "simpZh": "我所赐给以色列人的地。"
            },
            {
              "en": "God here speaks in the immediate present. It is not something He is going to do, but something He does do, this moment. So faith ever speaks. So God ever gives. So He is meeting you today, in the present moment. This is the test of faith. So long as you are waiting for a thing, hoping for it, looking for it, you are not believing. It may be hope, it may be earnest desire, but it is not faith; for \"faith is the <span class=\"vocab-trigger\" data-vocab=\"substance\">substance<\/span> of things hoped for, the <span class=\"vocab-trigger\" data-vocab=\"evidence\">evidence<\/span> of things not seen.\" The command in regard to believing prayer is the present tense. \"When ye pray, <span class=\"vocab-trigger\" data-vocab=\"believe\">believe<\/span> that ye receive the things that ye desire, and ye shall have them.\" Have we come to that moment? Have we met God in His everlasting NOW? —<span class=\"vocab-trigger\" data-vocab=\"Joshua, by Simpson\">Joshua, by Simpson<\/span>.",
              "zh": "神在此以直接的现在式说话。这不是祂将要作的事，而是祂此刻正在作的事。信心也是如此说话。神也是如此赐予。所以祂今天、就在此刻遇见你。这是信心的考验。只要你还在等候、盼望、寻找一件事，你就还不是在相信。那可能是盼望，可能是恳切的渴望，但不是信心；因为「信就是所望之事的实底，是未见之事的确据」。关于信心祷告的命令是现在时态。「你们祷告的时候，凡你们所求的，只要信是得着的，就必得着。」我们到了那时刻吗？我们已在神永远的「现在」中遇见祂了吗？——宣信《约书亚记》",
              "simpEn": "God speaks in the immediate present: 'I do give.' Not 'I will give,' but 'I am giving.' Faith always speaks in the present. God is meeting you right now. The test of faith is this: as long as you're waiting and hoping, you're not yet believing. Hope is not faith; faith is the substance of things hoped for, the evidence of things not seen. The command for believing prayer is in the present tense: 'When you pray, believe that you have received, and you will have.' Have we met God in His eternal NOW?",
              "simpZh": "神以现在的口气说：‘我现在赐给。’不是‘将要赐给’，是‘正赐给’。信心总用现在式说话。神就在此刻遇见你。信心的考验是：只要你在等、在盼望、在寻找，就不是在相信。盼望不是信心；信心是所望之事的实底，是未见之事的确据。信心祷告的命令是现在式：‘祷告时，信是得着，就必得着。’我们到了那时刻吗？我们已在神永远的‘现在’中遇见祂了吗？"
            },
            {
              "en": "True faith counts on God, and believes before it sees. Naturally, we want some <span class=\"vocab-trigger\" data-vocab=\"evidence\">evidence<\/span> that our <span class=\"vocab-trigger\" data-vocab=\"petition\">petition<\/span> is granted before we <span class=\"vocab-trigger\" data-vocab=\"believe\">believe<\/span>; but when we walk by faith we need no other <span class=\"vocab-trigger\" data-vocab=\"evidence\">evidence<\/span> than God's Word. He has spoken, and according to our faith it shall be done unto us. We shall see because we have believed, and this faith sustains us in the most trying places, when everything around us seems to contradict God's Word.",
              "zh": "真实的信心倚靠神，在看见之前就相信。天然来说，我们总想先看见祈求蒙允的凭据才相信；但当我们凭信心而行时，除了神的话以外不需要别的凭据。祂已说了，就必照我们的信心给我们成就。我们因信才得看见，而这信心在最艰难的处境中也扶持我们，纵然四围的一切似乎都与神的话相矛盾。",
              "simpEn": "True faith trusts God and believes before seeing. Naturally we want evidence first, but walking by faith needs no evidence except God's Word. He has spoken, and according to our faith it will be done. We will see because we believed. This faith holds us up in the hardest places when everything around seems to contradict God's Word.",
              "simpZh": "真信心倚靠神，在看见之前就信。人自然地想要一些凭据才信；但凭信心行只要神的话就够了。祂说了，就照我们的信心成就。我们因信才看见。这信心在最试炼的地方扶持我们，即使四周一切似乎都反对神的话。"
            },
            {
              "en": "The Psalmist says, \"I had fainted, unless I had believed to see the goodness of the Lord in the land of the living\" (Ps. 27:13). He did not see as yet the Lord's answer to his prayers, but he believed to see and this kept him from <span class=\"vocab-trigger\" data-vocab=\"fainting\">fainting<\/span>. If we have the faith that believes to see, it will keep us from growing discouraged. We shall \"laugh at impossibilities,\" we shall watch with delight to see how God is going to open up a path through the Red Sea when there is no human way out of our difficulty. It is just in such places of severe testing that our faith grows and strengthens. Have you been waiting upon God, dear troubled one, during long nights and weary days, and have feared that you were forgotten? Nay, lift up your head, and begin to praise Him even now for the <span class=\"vocab-trigger\" data-vocab=\"deliverance\">deliverance<\/span> which is on its way to you. —Life of Praise.",
              "zh": "诗篇作者说：「我若不信在活人之地得见耶和华的恩惠，就早已丧胆了」（诗27:13）。他当时尚未看见主对他祷告的答复，但他相信必得看见，这使他免于丧胆。我们若有那信而必见的信心，就不至灰心。我们要「笑看不可能」，要欢喜观看神如何在毫无人路脱困时，在红海中开出一条道路。正是在这种严峻试炼之处，我们的信心增长并坚强。亲爱的受苦者，你曾在漫漫长夜和疲倦的日间等候神，并担心你已被遗忘了吗？不，抬起你的头，现在就要为那正朝你而来的拯救赞美祂。——《赞美的生命》",
              "simpEn": "The Psalmist says, 'I would have fainted unless I believed I would see the Lord's goodness in the land of the living.' He hadn't yet seen the answer, but believed to see, which kept him from fainting. If we have faith that believes to see, we won't be discouraged. We'll 'laugh at impossibilities' and watch with delight as God opens a path through the Red Sea when there's no human way out. In such severe tests, our faith grows. Have you waited on God through long nights and weary days, fearing you're forgotten? No—lift up your head and praise Him now for the deliverance that's on its way.",
              "simpZh": "诗人说：‘我若不信在活人之地得见耶和华的恩惠，就早已丧胆了。’他还没看见回应，但信必看见，这就不丧胆。我们若有信而必见的信心，就不会灰心。我们会‘笑看不可能’，欢喜看神在没有出路时从红海开路。正是在这严峻试炼中，信心增长。你曾在长夜和疲倦的日子等候神，害怕被遗忘吗？不，抬起头，现在就为那正在路上的拯救赞美祂。"
            }

          "sectionId": 7,

          "paragraphs": [
            {
              "en": "Have faith that whatever you ask for in prayer is already granted you, and you will find that it will be (Mark 11:24).",
              "zh": "凡你们祷告祈求的，信是得着的，就必得着。（马可福音11:24）",
              "simpEn": "Believe that whatever you ask for in prayer is already given to you, and it will be.",
              "simpZh": "相信你祷告所求的已经得到了，就必得到。"
            },
            {
              "en": "When my little son was about ten years of age, his grandmother promised him a stamp album for Christmas. Christmas came, but no stamp album, and no word from grandmother. The matter, however, was not mentioned; but when his playmates came to see his Christmas presents, I was astonished, after he had named over this and that as gifts received, to hear him add, \"And a stamp album from grandmother.\" I had heard it several times, when I called him to me, and said, \"But George, you did not get an album from your grandmother. Why do you say so?\" There was a wondering look on his face, as if he thought it strange that I should ask such a question, and he replied, \"Well, mamma, grandma said, so it is the same as.\" I could not say a word to check his faith.",
              "zh": "当我小儿子大约十岁时，他祖母应许在圣诞节送他一本集邮册。圣诞节到了，却没有集邮册，也没有祖母的只字片语。然而这事并未被提起；但当他的玩伴来看他的圣诞礼物时，我听他把这件那件礼物数过之后，竟加上一句「还有一本祖母送的集邮册」。我听了数次之后，就把他叫过来，说：「可是乔治，你没有收到祖母的集邮册啊。你为什么这样说呢？」他脸上露出诧异的表情，好像觉得我问这个问题很奇怪，他回答说：「妈妈，奶奶说过了，那就等于已经给了。」我竟无言以对，无法拦阻他的信心。",
              "simpEn": "When my son was about ten, his grandmother promised him a stamp album for Christmas. Christmas came, but no album and no word from her. Yet when his friends asked about his gifts, he listed them and added, 'And a stamp album from grandmother.' I asked him, 'But you didn't get an album. Why do you say that?' He looked surprised and said, 'Mama, grandma said, so it's the same as having it.' I couldn't say anything to shake his faith.",
              "simpZh": "我的小儿子约十岁时，祖母应许送他集邮册作圣诞礼物。圣诞到了，没有册子，也没有祖母的消息。但当他的朋友来看礼物时，他数了这件那件之后说：‘还有一本祖母送的集邮册。’我问他：‘你没收到啊，为什么这样说？’他惊奇地说：‘妈妈，奶奶说了，那就等于已经得到了。’我无法说什么来打击他的信心。"
            },
            {
              "en": "A month went by, and nothing was heard from the album. Finally, one day, I said, to test his faith, and really wondering in my heart why the album had not been sent: \"Well, Georgie, I think grandma has forgotten her promise.\" \"Oh, no mamma,\" he quickly and firmly said, \"she hasn't.\" I watched the dear, trusting face, which, for a while, looked very <span class=\"vocab-trigger\" data-vocab=\"sober\">sober<\/span>, as if debating the possibilities I had suggested. Finally a bright light passed over it and he said, \"Mamma, do you think it would do any good if I should write to her thanking her for the album?\" \"I do not know,\" I said, \"but you might try it.\" A rich spiritual truth began to dawn upon me. In a few minutes a letter was prepared and committed to the mail, and he went off whistling his confidence in his grandma.",
              "zh": "一个月过去了，仍没有集邮册的消息。终于有一天，我为了试探他的信心，心中也真纳闷为什么册子还没寄来，就说：「乔治，我想祖母已经忘记她的应许了。」「哦，没有，妈妈，」他迅速而坚定地回答，「她没有忘。」我看着那亲爱的、充满信任的面孔，他一时显得很严肃，仿佛正在思量我刚才提出的可能性。终于，一道亮光闪过他的脸庞，他说：「妈妈，如果我写信谢谢祖母送我集邮册，你觉得会有用吗？」「我不知道，」我说，「但你可以试试。」一个丰富的属灵真理开始向我显明。几分钟内信已写好，投进了邮筒，而他吹着口哨离开了，满心相信他的祖母。",
              "simpEn": "A month passed with no album. Testing his faith, I said, 'Georgie, I think grandma forgot her promise.' 'Oh no, Mama,' he said firmly, 'she hasn't.' His trusting face looked serious for a moment, then brightened. He said, 'Mama, do you think it would help if I wrote and thanked her for the album?' I said he could try. A spiritual truth dawned on me. He quickly wrote a letter and went off whistling his confidence in grandma.",
              "simpZh": "过了一个月，没有册子。我试探他：‘乔治，奶奶可能忘记她的应许了。’他坚定地说：‘没有，妈妈，她没有。’他的脸一时很严肃，然后亮起来：‘妈妈，如果我写信谢谢奶奶送我集邮册，会有用吗？’我说可以试试。一个属灵真理开始向我显明。他马上写了信，吹着口哨离开了，对奶奶充满信心。"
            },
            {
              "en": "In just a short time a letter came, saying: \"My dear Georgie: I have not forgotten my promise to you, of an album. I tried to get such a book as you desired, but could not get the sort you wanted; so I sent on to New York. It did not get there till after Christmas, and it was still not right so I sent for another, and as it has not come as yet, I send you three dollars to get one in Chicago. Your loving grandma.\" As he read the letter, his face was the face of a <span class=\"vocab-trigger\" data-vocab=\"victor\">victor<\/span>. \"Now, mamma, didn't I tell you?\" came from the depths of a heart that never doubted, that \"against hope, believed in hope\" that the stamp album would come. While he was trusting, grandma was working, and in due season faith became sight.",
              "zh": "不久，一封信来了，上面写着：「亲爱的乔治：我没有忘记要送你集邮册的应许。我试图买到你喜欢的样式，却找不到你要的那种；所以我写信到纽约订购。等到圣诞后才收到，仍不完全对，所以我又订了另一本，因至今还未收到，我先寄三元钱给你，让你在芝加哥买一本。爱你的奶奶。」他读信时，脸上露出得胜者的神情。「妈妈，我说了没错吧？」这话出自一颗从未怀疑的心，它「在无可指望中，因信仍有指望」地相信集邮册必到。在他信靠的同时，祖母正在作工，到了时候，信心就变成了眼见。",
              "simpEn": "Soon a letter arrived: 'Dear Georgie, I haven't forgotten my promise. I tried to get the album you wanted, but couldn't find it; I ordered from New York, but it arrived after Christmas and wasn't right, so I ordered another. Since it hasn't come yet, I'm sending three dollars for you to buy one in Chicago. Love, Grandma.' Reading it, his face looked like a victor's. 'Now, Mama, didn't I tell you?' he said. While he trusted, grandma was working, and in time faith became sight.",
              "simpZh": "不久信来了：‘亲爱的乔治：我没忘记应许。我试着找你想要的那种，找不到；我从纽约订，圣诞后才到，仍不对，又订了一本。因还没到，先寄三元让你在芝加哥买一本。爱你的奶奶。’他读信时脸上是得胜者的表情：‘妈妈，我说得对吧？’在他相信的同时，奶奶在做工，到了时候，信心变成眼见。"
            },
            {
              "en": "It is so human to want sight when we step out on the promises of God, but our Savior said to Thomas, and to the long roll of doubters who have ever since followed him: \"<span class=\"vocab-trigger\" data-vocab=\"Blessed are they who have not seen, and yet have believed\">Blessed are they who have not seen, and yet have believed<\/span>.\" —Mrs. Rounds.",
              "zh": "我们迈步在神的应许上时，何等容易想先要眼见，但我们的救主对多马，以及对历代以来跟随他的那一长串疑惑者说：「那没有看见就信的有福了。」——劳恩德斯夫人",

        {
          "sectionId": 8,
          "heading": "February 19",
          "audio": "audio/Streams in the Desert - February 19.m4a",
          "paragraphs": [
            {
              "en": "And every branch that beareth fruit he <span class=\"vocab-trigger\" data-vocab=\"purgeth\">purgeth<\/span> it, that it may bring forth more fruit (John 15:2).",
              "zh": "凡结果子的，祂就修理干净，使枝子结果子更多。（约翰福音15:2）",
              "simpEn": "Every branch that bears fruit He prunes so that it will produce even more fruit.",
              "simpZh": "凡结果子的枝子，祂就修剪干净，让它结更多果子。"
            },
            {
              "en": "A child of God was <span class=\"vocab-trigger\" data-vocab=\"dazed\">dazed<\/span> by the variety of afflictions which seemed to make her their target. Walking past a vineyard in the rich autumnal glow she noticed the <span class=\"vocab-trigger\" data-vocab=\"untrimmed\">untrimmed<\/span> appearance and the <span class=\"vocab-trigger\" data-vocab=\"luxuriant wealth\">luxuriant wealth<\/span> of leaves on the vines, that the ground was given over to a tangle of weeds and grass, and that the whole place looked utterly uncared for; and as she pondered, the Heavenly Gardener whispered so precious a message that she would <span class=\"vocab-trigger\" data-vocab=\"fain\">fain<\/span> pass it on: \"My dear child, are you wondering at the sequence of trials in your life? Behold that vineyard and learn of it. The gardener ceases to <span class=\"vocab-trigger\" data-vocab=\"prune\">prune<\/span>, to trim, to <span class=\"vocab-trigger\" data-vocab=\"harrow\">harrow<\/span>, or to pluck the ripe fruit only when he expects nothing more from the vine during that season. It is left to itself, because the season of fruit is past and further effort for the present would yield no profit. Comparative <span class=\"vocab-trigger\" data-vocab=\"uselessness\">uselessness<\/span> is the condition of freedom from suffering. Do you then wish me to cease pruning your life? Shall I leave you alone?\" And the comforted heart cried, \"No!\" —Homera <span class=\"vocab-trigger\" data-vocab=\"Homer\">Homer<\/span>-Dixon.",
              "zh": "一个神的儿女因纷至沓来的各种苦难感到迷惘，仿佛这些苦难都把她当作靶子。在一个秋色浓郁的日子，她经过一片葡萄园，注意到葡萄树未经修剪的外貌、繁茂过盛的叶子，土地长满了杂草，整个园子显得完全无人照料；她正思想时，那位天上的园丁轻声说了一番极宝贵的话，她极愿将这信息传递下去：「我亲爱的孩子，你是否在诧异生活中一连串的试炼？看那葡萄园，从中学习。园丁只有在那个季节不再期待葡萄树有什么出产时，才会停止修剪、整理、耙地或摘采熟果。它被撇下不管，因为结果的季节已过，现阶段进一步的努力不会带来收成。相对的『无用』乃是不再受苦的条件。那么你希望我停止修剪你的生命吗？要我撇下你不管吗？」得安慰的心喊着说：「不！」——霍默拉·霍默-迪克森",
              "simpEn": "A believer, puzzled by many afflictions, walked past a vineyard in autumn. She noticed the vines were untrimmed with too many leaves, the ground full of weeds, totally uncared for. As she pondered, the Heavenly Gardener whispered: 'My child, do you wonder at your many trials? Look at that vineyard. The gardener stops pruning, trimming, harrowing, and picking fruit only when he expects nothing more from the vine that season. It's left alone because fruit season is past and more effort would yield nothing. Being relatively useless is the condition for freedom from suffering. Do you wish me to stop pruning your life? Shall I leave you alone?' The comforted heart cried, 'No!'",
              "simpZh": "一位信徒因各种苦难困扰，秋天路过一片葡萄园。她看到葡萄树没有修剪，叶子过多，地上满是杂草，整个园子没人管。她思考时，天上的园丁轻声说：‘我的孩子，你在想为什么有这么多试炼吗？看那葡萄园。园丁只在那个季节不再期待葡萄树结果时，才停止修剪、整理、耙地和摘果。它被丢下不管，因为果季过去了，再努力也没收成。相对的没用是不再受苦的条件。你希望我停止修剪你的生命吗？要我把你丢下不管吗？’得安慰的心喊着：‘不！’"
            },
            {
              "en": "It is the branch that bears the fruit, <br>That feels the knife, <br>To <span class=\"vocab-trigger\" data-vocab=\"prune\">prune<\/span> it for a larger growth, <br>A fuller life. <br>Though every budding twig be <span class=\"vocab-trigger\" data-vocab=\"lopped\">lopped<\/span>, <br>And every grace <br>Of swaying <span class=\"vocab-trigger\" data-vocab=\"tendril\">tendril<\/span>, springing leaf, <br>Be lost a space. <br>O thou whose life of joy seems <span class=\"vocab-trigger\" data-vocab=\"reft\">reft<\/span>, <br>Of beauty <span class=\"vocab-trigger\" data-vocab=\"shorn\">shorn<\/span>; <br>Whose aspirations lie in <span class=\"vocab-trigger\" data-vocab=\"dust\">dust<\/span>, <br>All bruised and torn, <br><span class=\"vocab-trigger\" data-vocab=\"Rejoice\">Rejoice<\/span>, tho' each desire, each dream, <br>Each hope of thine <br>Shall fall and fade; it is the hand <br>Of Love Divine <br>That holds the knife, that cuts and breaks <br>With tenderest touch, <br>That thou, whose life has borne some fruit <br>Mayst now bear much. <br>—Annie Johnson Flint.",
              "zh": "正是那结果子的枝子，感受到刀子的锋利，为要修剪它，使它长得更大，生命更丰盛。虽然每一根萌芽的嫩枝被砍掉，每一种摇曳卷须、初生叶片的风姿，暂时失去。哦，你这喜乐似乎被夺、美丽被剥尽的人；你的志望躺在尘中，全被打碎撕裂，要喜乐，虽然你的每一渴望、每一梦想、每一盼望都将落去枯萎；这是神圣之爱的手握着那刀，以最温柔的触摸削砍折断，好叫你——那生命已经结了些果子的人——如今可以结出更多。",
              "simpEn": "It's the fruit-bearing branch that feels the knife, pruned for greater growth and fuller life. Though every budding twig is cut and every graceful tendril and leaf is lost for a time. You whose joy seems taken, beauty stripped, hopes crushed—rejoice. Though every desire, dream, and hope falls and fades, it's the hand of Divine Love that holds the knife, cutting and breaking with the tenderest touch, so that you who have borne some fruit may now bear much more.",
              "simpZh": "是那结果子的枝子感受到刀，为要修剪它，让它长得更大，生命更丰满。虽然每一嫩枝被砍掉，每一卷须、新叶的美丽暂时失去。你这些喜乐好像被夺、美丽被剥尽、志望落在灰尘中被打碎的人，要喜乐。虽然每一渴望、梦想、盼望落去枯萎，那是神圣爱的手握着刀，以最温柔的触摸削砍折断，好叫你——已经结了一些果子的人——现在结得更多。"
            }
          ],

              "zh": "我们可能每日将一切忧虑卸给祂，并在此过程中享受深深的平安。我们可能让心中的意念和想象，按这字最深的意义被洁净。我们可能在万事中看见神的旨意，并且不是以叹息，乃是以歌唱来接受。",
              "simpEn": "You can throw all your cares on God every day and have deep peace doing it. Your inner thoughts and imaginations can be made pure in the deepest sense. You can see God's will in everything and accept it not with sighing but with singing.",

              "simpEn": "By taking complete shelter in God's power, you can become strong all the way through. Where you used to be weakest, the things that once broke your promises to be patient, pure, or humble can now become a chance—through Christ who loves you and works in you—to make sin powerless over you, as you agree with His will and sense His presence and power.",
              "simpZh": "你可以完全躲在神的能力里，变得从头到脚都强壮。在你从前最软弱的地方，那些曾经让你无法忍耐、不纯洁、不谦卑的事，现在可以变成一个机会——借着那位爱你、在你里面动工的主，让你与祂的旨意一致，感受到祂的同在和能力，让罪不能再辖制你。"

            {

              "zh": "我们很少听过比这更好的信心的定义，那是我们一次聚会中，一位亲爱的黑人老妇人在回答一个年轻人「如何向主支取所需帮助」的问题时给出的。她以她独特的方式，用手指着他说，并带着极大的强调：「你必须相信祂已经作成了，那就作成了。」我们大多数人的极大危险是，我们求祂作事之后，并不相信事情已经成就，反倒继续帮祂，并且找别人帮祂，还等着要看祂到底如何作成。",

              "simpZh": "有一个对信心的最好定义，是我们聚会中一位黑人老姐妹说的。年轻人问她怎样从主得到帮助，她用手指着他说：‘你就得相信祂已经做成了，那就做成了。’我们大部分人的问题是，求了神之后不相信已经成了，还继续帮祂，又找别人帮祂，等着看祂怎么做。"

              "zh": "信心将它的「阿们」加在神的「是」上，然后收手，让神来完成祂的工。它的言语是：「当将你的事交托耶和华，并倚靠祂，祂就必成全。」——《在地如天》",
              "simpEn": "Faith adds its 'Amen' to God's 'Yes,' then takes its hands off and lets God finish the work. It says, 'Commit your way to the Lord, trust also in Him, and He will do it.'",
              "simpZh": "信心在神的‘是’后面加上‘阿们’，然后把手收回来，让神完成工作。它说：‘将你的事交托耶和华，倚靠祂，祂就必成全。’"
            },
            {
              "en": "I simply take Him at His word, <br>I praise Him that my prayer is heard, <br>And claim my answer from the Lord; <br>I take, He undertakes. <br>An active faith can give thanks for a promise, though it be not as yet <span class=\"vocab-trigger\" data-vocab=\"performed\">performed<\/span>; knowing that God's bonds are as good as ready money. —Matthew Henry.",
              "zh": "我只是照祂的话接受，我赞美祂，因我的祷告已蒙垂听，并向主支取我的答复；我接受，祂成就。一个活泼的信心能为应许感谢，虽然应许尚未实现；因为知道神的支票就等于现金。——马太·亨利",
              "simpEn": "I simply take Him at His word, I praise Him that my prayer is heard, and claim my answer from the Lord; I take, He undertakes. Active faith can thank God for a promise even before it's fulfilled, knowing that God's promises are as good as cash. —Matthew Henry",
              "simpZh": "我就是照祂的话接受，我赞美祂因为我的祷告被听见了，并向主要我的答复；我接受，祂成就。活的信心能为还没实现的应许感谢，因为知道神的应许就像现金一样可靠。"
            },
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"passive\">Passive<\/span> faith accepts the word as true— <br>But never moves. <br>Active faith begins the work to do, <br>And thereby proves. <br><span class=\"vocab-trigger\" data-vocab=\"passive\">Passive<\/span> faith says, \"I <span class=\"vocab-trigger\" data-vocab=\"believe\">believe<\/span> it! every word of God is true. <br>Well I know He hath not spoken what He cannot, will not, do. <br>He hath bidden me, 'Go forward!' but a closed-up way I see, <br>When the waters are divided, soon in Canaan's land I'll be.\" <br>Active faith says, \"I <span class=\"vocab-trigger\" data-vocab=\"believe\">believe<\/span> it! and the promise now I take, <br>Knowing well, as I receive it, God, each promise, real will make. <br>So I step into the waters, finding there an open way; <br>Onward press, the land possessing; nothing can my progress stay.\" <br><span class=\"vocab-trigger\" data-vocab=\"passive\">Passive<\/span> faith but praises in the light, <br>When sun doth shine. <br>Active faith will praise in darkest night— <br>Which faith is thine?",
              "zh": "被动的信心接受话语为真——却一步不动。主动的信心开始去行，从而证实。被动信心说：「我相信！神的每一句话都是真的。我知道祂不会说不能、不愿行的事。祂吩咐我『往前去！』我却看见封闭的路，等水一分开，我就到迦南地。」主动信心说：「我相信！我现在就取用应许，深知当我接受时，神就使每一应许成真。所以我踏进水中，发现有敞开的路；向前进去，得地为业；没有什么能阻挡我前进。」被动信心只在光明中赞美，当太阳照耀之时。主动信心在最暗的夜里赞美——你的信心是哪一种？",
              "simpEn": "Passive faith accepts the word as true but never moves. Active faith begins the work and proves it true. Passive faith says, 'I believe, but I see a closed way; when the waters divide, I'll enter Canaan.' Active faith says, 'I take the promise now and step into the waters, finding an open way; I press forward to possess the land.' Passive faith praises only in the light, when the sun shines. Active faith praises in the darkest night. Which faith is yours?",

            {
              "en": "And there came a lion (1Sam.17:34).",
              "zh": "有狮子来了。（撒母耳记上17:34）",
              "simpEn": "And a lion came.",
              "simpZh": "来了一只狮子。"
            },
            {
              "en": "It is a source of inspiration & strength to come in touch with the youthful David, trusting God. Through faith in God he conquered a lion & a bear, & afterwards overthrew the mighty Goliath. When that lion came to <span class=\"vocab-trigger\" data-vocab=\"despoil\">despoil<\/span> that flock, it came as a wondrous opportunity to David. If he had failed or <span class=\"vocab-trigger\" data-vocab=\"falter\">falter<\/span>ed he would have missed God's opportunity for him & probably would never have come to be God's chosen king of Israel. \"And there came a lion.\"",
              "zh": "与那倚靠神的年轻大卫接触，是令人鼓舞且得力的。借着对神的信心，他胜过狮子和熊，后来又打败了巨人歌利亚。当那只狮子来掠夺羊群时，对大卫而言是一个奇妙的机会。如果他失败或动摇，就会错失神给他的机会，很可能永远不会成为神所拣选的以色列王。「有狮子来了。」",
              "simpEn": "Young David trusting God inspires us. By faith he conquered a lion and a bear, and later defeated Goliath. When the lion came to attack the sheep, it was a wonderful opportunity for David. If he had failed or hesitated, he would have missed God's opportunity and probably never become Israel's king. 'And a lion came.'",
              "simpZh": "年轻大卫倚靠神，激励我们。他凭着信心胜过狮子和熊，后来又打败歌利亚。当狮子来偷羊时，对大卫是一个奇妙的机会。如果他失败或退缩，就会错过神给他的机会，可能永远不会成为以色列的王。‘来了一只狮子。’"
            },
            {
              "en": "One would not think that a lion was a special blessing from God; one would think that only an occasion of alarm. The lion was God's opportunity in disguise. Every difficulty that presents itself to us, if we receive it in the right way, is God's opportunity. Every temptation that comes is God's opportunity. When the \"lion\" comes, recognize it as God's opportunity no matter how rough the <span class=\"vocab-trigger\" data-vocab=\"exterior\">exterior<\/span>. The very <span class=\"vocab-trigger\" data-vocab=\"tabernacle\">tabernacle<\/span> of God was covered with <span class=\"vocab-trigger\" data-vocab=\"badgers' skins\">badgers' skins<\/span> & goats' hair; one would not think there would be any glory there. The <span class=\"vocab-trigger\" data-vocab=\"Shekinah\">Shekinah<\/span> of God was manifest under that kind of covering. May God open our eyes to see Him, whether in temptations, trials, dangers, or misfortunes. —C.H.P.",
              "zh": "没人会认为狮子是神的特殊祝福；人只会觉得那是惊恐之事。那狮子是神化了装的机会。每一件摆在我们面前的困难，如果我们以正确的态度接受，都是神的机会。每一次试探来临都是神的机会。当「狮子」来时，无论外观多么粗糙，要认出这是神的机会。神的帐幕本身是用海狗皮和山羊毛遮盖的；没人会以为其中有荣耀。神的舍吉纳荣耀就在那样的遮盖下彰显。愿神开启我们的眼目，不论在试探、试炼、危险或不幸中，都能看见祂。——C.H.P.",
              "simpEn": "Nobody thinks a lion is a special blessing from God; it looks like just a cause for alarm. The lion was God's opportunity in disguise. Every difficulty we face, if received the right way, is God's opportunity. When the 'lion' comes, recognize it as God's opportunity, no matter how rough it looks. God's tabernacle was covered with badger skins and goat hair; you wouldn't think glory could be there, but God's Shekinah glory appeared under that covering. May God open our eyes to see Him in temptations, trials, dangers, or misfortunes.",
              "simpZh": "没人会觉得狮子是神特别的祝福；看起来只是吓人的事。狮子是神化妆的机会。每个摆在我们面前的困难，如果我们用对的态度接受，都是神的机会。当‘狮子’来时，不管外表多粗糙，要认出这是神的机会。神的帐幕是用海狗皮和山羊毛盖的；人不会想到那里有荣耀，但神的舍吉纳荣耀就在那样的遮盖下显现。愿神开我们的眼睛，让我们无论在试探、试炼、危险或不幸中，都看见祂。"
            }

            {

            {

              "zh": "约翰没有行神迹，但耶稣说凡妇人所生的，没有一个兴起来大过他的。约翰的主要任务是为那光作见证，而这也可以是你我的任务。约翰甘愿只作一个声音，只要人能想到基督就好。",

            },
            {

              "zh": "要甘愿只作一个声音，被听见却不被看见；一面镜子，其镜面不被注意，因它反映出太阳耀眼的荣光；一阵微风，只在黎明前吹起，说「天亮了！天亮了！」然后便消散。",
              "simpEn": "Be willing to be only a voice—heard but not seen. Be a mirror whose surface is lost because it reflects the dazzling glory of the sun. Be a breeze that rises just before dawn, says 'The dawn! the dawn!' and then fades away.",
              "simpZh": "甘愿只做一个声音——被听见而不是被看见。做一面镜子，镜面不被注意，因为它反射太阳耀眼的光芒。做一阵微风，在黎明前吹起，说‘天亮了！天亮了！’然后消散。"
            },
            {
              "en": "Do the commonest and smallest things as beneath His eye. If you must live with <span class=\"vocab-trigger\" data-vocab=\"uncongenial\">uncongenial<\/span> people, set to the conquest by love. If you have made a great mistake in your life, do not let it <span class=\"vocab-trigger\" data-vocab=\"becloud\">becloud<\/span> all of it; but locking the secret in your breast, compel it to yield strength and sweetness.",
              "zh": "做最普通最微小的事，也要如同行在祂眼前。如果你必须与性情不合的人同住，就当用爱来征服。如果你在人生中犯了大错，不要让它将一切笼罩阴云；反倒要把这秘密锁在心里，迫使它生出力量和甘甜。",
              "simpEn": "Do the most ordinary and smallest things as if under God's eye. If you must live with difficult people, conquer them with love. If you've made a big mistake, don't let it cloud your whole life; instead, lock the secret in your heart and force it to produce strength and sweetness.",
              "simpZh": "做最普通最小的事，也要像在神的眼前做。如果你必须和难相处的人同住，用爱去征服。如果你人生中犯过大错，不要让它遮盖你整个人生；反倒把秘密锁在心里，迫使它生出力量和甘甜。"
            },
            {
              "en": "We are doing more good than we know, sowing seed, starting streamlets, giving men true thoughts of Christ, to which they will refer one day as the first things that started them thinking of Him; and, of my part, I shall be satisfied if no great <span class=\"vocab-trigger\" data-vocab=\"mausoleum\">mausoleum<\/span> is raised over my grave, but that simple souls shall gather there when I am gone, and say, \"He was a good man; he wrought no miracles, but he spake words about Christ which led me to know Him for myself.\" —George Matheson.",
              "zh": "我们正在做的善事远超过我们所知——撒种，引泉，传递基督真实的思想，有一天人会追想，说那正是他们开始思想祂的起头。就我而言，若我的坟上没有宏伟的陵墓，却只有一些单纯的人在我去后聚在那里，说：「他是个好人；他没有行过神迹，但他讲述基督的话领我认识了祂。」我就心满意足了。——乔治·马西森",
              "simpEn": "We do more good than we know—sowing seeds, starting streams, giving people true thoughts of Christ. One day they'll recall those as the first things that made them think of Him. For me, I'll be satisfied if no grand tomb is built for me, but simple souls gather at my grave and say, 'He was a good man; he did no miracles, but he spoke words about Christ that led me to know Him for myself.'",
              "simpZh": "我们行的善远超过我们所知道的——撒种，开泉水，给人关于基督真实的思想。有一天他们会回想起这些，说这是他们开始思想基督的第一件事。对我来说，如果我的坟上没有宏伟的陵墓，只有一些单纯的人在我死后聚在那里说：‘他是个好人；他没有行过神迹，但他讲基督的话让我自己认识了祂。’我就心满意足了。"
            },
            {
              "en": "THY HIDDEN ONES (PSALM 83:3) <br>Thick green leaves from the soft brown earth, <br>Happy springtime hath called them forth; <br>First <span class=\"vocab-trigger\" data-vocab=\"faint\">faint<\/span> promise of summer bloom <br>Breathes from the fragrant, sweet perfume, <br>Under the leaves. <br>Lift them! what marvelous beauty lies <br>Hidden beneath, from our thoughtless eyes! <br>Mayflowers, rosy or purest white, <br>Lift their cups to the sudden light, <br>Under the leaves. <br>Are there no lives whose holy deeds— <br>Seen by no eye save His who reads <br>Motive and action—in silence grow <br>Into rare beauty, and bud and blow <br>Under the leaves? <br>Fair white flowers of faith and trust, <br>Springing from spirits bruised and crushed; <br>Blossoms of love, rose-tinted and bright, <br>Touched and painted with Heaven's own light <br>Under the leaves. <br>Full fresh clusters of duty borne, <br>Fairest of all in that shadow grown; <br>Wondrous the fragrance that sweet and rare <br>Come from the flower-cups hidden there <br>Under the leaves. <br>Though unseen by our vision dim, <br>Bud and blossom are known to Him; <br>Wait we <span class=\"vocab-trigger\" data-vocab=\"content\">content<\/span> for His heavenly ray— <br>Wait till our Master Himself one day <br><span class=\"vocab-trigger\" data-vocab=\"Lifteth the leaves\">Lifteth the leaves<\/span>. <br>\"God calls many of His most valued workers from the unknown <span class=\"vocab-trigger\" data-vocab=\"multitude\">multitude<\/span>\" (Luke 14:23).",
              "zh": "你隐藏的人（诗篇83:3）浓绿的叶子从柔软棕土而出，快乐的春天唤它们生长；夏季初绽的隐约应许，从芬芳甜美的香气中散发，在叶子之下。掀开叶子！何等奇妙的美藏在其下，我们粗心的眼未曾看见！五月花，粉红或至纯白，向着骤来的亮光举起杯盏，在叶子之下。是否有一些生命，其圣洁的作为——除了那洞察动机与行为的主外无人得见——在寂静中长成稀世之美，含苞绽放，在叶子之下？洁白美丽信心与信靠的花朵，从受伤压伤的心灵发出；爱之花朵，玫瑰色且明亮，被天上的光触摸描画，在叶子之下。累累鲜簇的尽责果实，在那荫下长成最美的；芬芳奇妙，又甜又罕，从隐藏的花杯中溢出，在叶子之下。虽然我们模糊的眼目未能看见，但花苞与花朵祂都认识；我们满足等候祂的天上光芒——等候有一日我们的主亲自将叶子掀开。「神呼召许多祂最珍视的工人，来自无人知晓的群众」（路14:23）。",
              "simpEn": "Your hidden ones (Psalm 83:3). Thick green leaves from the soft earth, called out by happy spring. The faint promise of summer bloom breathes sweet perfume, under the leaves. Lift them! What marvelous beauty is hidden beneath from our careless eyes. Mayflowers lift their cups to the light, under the leaves. Are there lives whose holy deeds grow in silence into rare beauty, seen only by the One who reads motives, under the leaves? Fair white flowers of faith and trust spring from bruised spirits; blossoms of love, touched with heaven's light, under the leaves. Full clusters of duty grow fairest in the shadow; sweet and rare fragrance comes from the hidden flower-cups, under the leaves. Though unseen by our dim vision, bud and blossom are known to Him. We wait content for His heavenly ray—wait till our Master one day lifts the leaves. 'God calls many of His most valued workers from the unknown multitude' (Luke 14:23).",
              "simpZh": "你隐藏的人（诗83:3）。厚绿的叶子从软土里出来，被春天快乐地唤出；夏天开花的隐约应许，从香气里散发出来，在叶子底下。掀开叶子！那些美丽奇妙的东西藏在下面，我们粗心看不到！五月花，粉红或纯白，向着突然的光举起小杯，在叶子底下。有没有一些生命，他们的圣洁作为——除了那看透动机和行为的主，无人看见——在安静中长成稀有的美，发芽开花，在叶子底下？洁白美丽的信心花朵，从受伤压伤的心发出；爱之花，玫瑰色亮丽，被天上的光触摸描绘，在叶子底下。累累的新鲜尽责果实，在那阴影里长得最美；那又甜又少有的芬芳，从藏着的花杯里飘出来，在叶子底下。虽然我们模糊的眼看不清，但花苞和花朵祂都认识。我们满足地等候祂天上来光——等候有一天我们的主亲自掀开叶子。‘神从无人知道的群众中，呼召许多祂最看重的工人’（路14:23）。"
            }

          "sectionId": 6,

          "audio": "audio/Streams in the Desert - February 25.m4a",
          "paragraphs": [
            {
              "en": "Every place that the sole of your foot shall <span class=\"vocab-trigger\" data-vocab=\"tread\">tread<\/span> upon, that have I given unto you (Joshua 1:3).",
              "zh": "凡你们脚掌所踏之地，我都照着我所应许摩西的话赐给你们了。（约书亚记1:3）",
              "simpEn": "Every place you set your foot, I have given you.",
              "simpZh": "你们脚踩到的每一个地方，我都给你们了。"
            },
            {
              "en": "Beside the literal ground, unoccupied for Christ, there is the unclaimed, <span class=\"vocab-trigger\" data-vocab=\"untrodden\">untrodden<\/span> territory of Divine promises. What did God say to Joshua? \"Every place that the sole of your foot shall <span class=\"vocab-trigger\" data-vocab=\"tread\">tread<\/span> upon, that have I given unto you.\" And then He draws the outlines of the <span class=\"vocab-trigger\" data-vocab=\"land of promise\">Land of Promise<\/span>—all theirs on one condition: that they shall march through the length and breadth of it, and measure it off with their own feet. They never did that to more than one-third of the property, and consequently they never had more than one-third; they had just what they measured off, and no more.",
              "zh": "除了字面上未为基督占据的土地之外，还有神圣应许中那未认领、未踏足的区域。神对约书亚说了什么？「凡你们脚掌所踏之地，我都赐给你们了。」然后祂勾画出应许地的轮廓——全都是他们的，只有一个条件：他们要纵横走遍，用自己的脚丈量。他们对这产业所做的从未超过三分之一，因此他们也只拥有不超过三分之一；他们只有他们用脚量过的，再没有更多。",
              "simpEn": "Besides literal land unoccupied for Christ, there is unclaimed territory of God's promises. God told Joshua, 'Every place your foot treads, I have given you.' He outlined the Promised Land—all theirs on one condition: that they walk its length and breadth and measure it with their feet. They only did that for about one-third, so they only possessed one-third. They had exactly what they measured, and no more.",
              "simpZh": "除了字面上没被基督得着的土地，还有神的应许里那无人认领、无人踏足的区域。神对约书亚说：‘你们脚掌所踏之地，我都赐给你们了。’然后祂画出应许地的界线——全是他们的，但有一个条件：他们要纵横走遍，用自己的脚去丈量。他们只量了大约三分之一，所以只得了三分之一；他们得的就只是他们量过的，多也没有。"
            },
            {
              "en": "In 2Peter, we read of the \"<span class=\"vocab-trigger\" data-vocab=\"land of promise\">land of promise<\/span>\" that is opened up to us, and it is God's will that we should, as it were, measure off that territory by the feet of obedient faith and believing thus claiming and <span class=\"vocab-trigger\" data-vocab=\"appropriating\">appropriating<\/span> it for our own. How many of us have ever taken possession of the promises of God in the name of Christ?",
              "zh": "在彼得后书中，我们读到那向我们敞开的「应许地」，而神的旨意是要我们借着顺服之信心的脚来丈量那片领土，如此相信、认领并据为己有。我们中间有多少人曾奉基督的名真正占有过神的应许呢？",
              "simpEn": "In 2 Peter, we read about the 'land of promise' opened to us, and it's God's will that we measure that territory with the feet of obedient faith, claiming and taking it for our own. How many of us have ever taken possession of God's promises in Christ's name?",
              "simpZh": "在彼得后书，我们读到那向我们敞开的‘应许地’，神的意思是要我们用顺服信心的脚去丈量那片地，认领它、拿过来成为自己的。我们有多少人曾奉基督的名真正占有过神的应许呢？"
            },
            {
              "en": "Here is a magnificent territory for faith to lay hold on and march through the length and breadth of, and faith has never done it yet. Let us enter into all our inheritance. Let us lift up our eyes to the north and to the south, to the east and to the west and hear Him say, \"All the land that thou seest will I give to thee.\" —A.T. Pierson.",
              "zh": "这里有一片宽广的区域，可让信心去抓取并纵横走遍，而信心至今尚未如此行。让我们进入我们全部的产业。让我们向北方、向南方、向东、向西举目，并听祂说：「凡你所看见的一切地，我都要赐给你。」——A.T.皮尔逊",
              "simpEn": "Here is a magnificent territory for faith to take hold of and walk through, but faith hasn't done it yet. Let's enter into all our inheritance. Let's lift our eyes to the north, south, east, and west and hear Him say, 'All the land you see I will give to you.' —A.T. Pierson",
              "simpZh": "这里有一大片荣耀的土地，让信心去抓住并走遍，但信心还没这样做。让我们进入全部产业。让我们向南北东西举目，听祂说：‘你所看见的一切地，我都要赐给你。’"
            },
            {
              "en": "Wherever Judah should set his foot that should be his; wherever Benjamin should set his foot that should be his. Each should get his inheritance by setting his foot upon it. Now, think you not when either had set his foot upon a given territory, he did not instantly and instinctively feel, \"This is mine\"? An old colored man, who had a marvelous experience in grace, was asked: \"Daniel, why is it that you have so much peace and joy in religion?\" \"O Massa!\" he replied, \"I just fall flat on the exceeding great and precious promises, and I have all that is in them. Glory! Glory!\" He who falls flat on the promises feels that all the riches embraced in them are his. —Faith Papers.",
              "zh": "犹大无论将脚掌踏在何处，那地就是他的；便雅悯无论将脚掌踏在何处，那地就是他的。各人都要借着踏脚其上，来得自己的产业。你想，当某人踏足在一方给定的领土上时，他岂不立刻本能地感到「这是我的」吗？一位在恩典中有奇妙经历的老黑人被问道：「但以理，为什么你的信仰中满有平安和喜乐？」他回答说：「哦，主人！我只是直直跌在那极大极宝贵的应许上，我就得着了其中所有的一切。荣耀！荣耀！」那直直跌在应许上的人，就觉得其中包含的一切丰盛都是他的。——《信心文摘》",
              "simpEn": "Wherever Judah set his foot was his; wherever Benjamin set his foot was his. Each got his inheritance by stepping on it. Don't you think when someone set his foot on a territory, he instantly felt, 'This is mine'? An old black man with a wonderful experience of grace was asked, 'Daniel, why do you have so much peace and joy?' He replied, 'Oh Master! I just fall flat on the great and precious promises, and I have all that is in them. Glory! Glory!' He who falls flat on the promises feels that all the riches in them are his.",
              "simpZh": "犹大脚踩在哪里，哪里就是他的；便雅悯脚踩在哪里，哪里就是他的。每个人都是借着踩上去来得自己的产业。你想，当一个人把脚踏在一片地上时，他岂不立刻本能地感到‘这是我的’吗？一个经历丰富恩典的老黑人被问：‘但以理，你怎么有这么多平安和喜乐？’他回答：‘哦主人！我就是整个人跌倒在那极大极宝贵的应许上，我就得了其中所有的一切。荣耀！荣耀！’跌倒在那应许上的人，就觉得里面一切的丰盛都是他的。"

            {
              "en": "My grace is sufficient for thee (2Cor.12:9).",
              "zh": "我的恩典够你用的。（哥林多后书12:9）",
              "simpEn": "My grace is enough for you.",
              "simpZh": "我的恩典够你用的。"
            },
            {
              "en": "The other evening I was riding home after a heavy day's work. I felt very wearied, and sore depressed, when swiftly, and suddenly as a lightning flash, that text came to me, \"My grace is sufficient for thee.\" I reached home and looked it up in the original, and at last it came to me in this way, \"MY grace is sufficient for thee\"; and I said, \"I should think it is, Lord,\" and burst out laughing. I never fully understood what the <span class=\"vocab-trigger\" data-vocab=\"holy laughter\">holy laughter<\/span> of Abraham was until then. It seemed to make <span class=\"vocab-trigger\" data-vocab=\"unbelief\">unbelief<\/span> so absurd.",
              "zh": "前几日傍晚，我在一天繁重工作后骑马回家，感觉非常疲乏，极其沮丧，忽然，如同电光一闪，那节经文临到我：「我的恩典够你用的。」我回到家查考原文，最后它临到我时成了这样：「我的恩典是够你用的」；我说：「主啊，我也认为是这样，」便大笑起来。直到那时，我才完全明白亚伯拉罕的圣笑是什么意思。它似乎使不信显得如此荒谬。",
              "simpEn": "One evening after a heavy day's work, I felt very tired and depressed. Suddenly, like a lightning flash, the text came to me: 'My grace is sufficient for thee.' I looked it up in the original, and it came this way: 'MY grace is sufficient for thee.' I said, 'I should think it is, Lord,' and burst out laughing. I never understood Abraham's holy laughter until then. It made unbelief seem so ridiculous.",
              "simpZh": "一天劳累后，傍晚骑马回家，我又累又沮丧，突然像闪电一样，这句经文来了：‘我的恩典够你用的。’我回家查原文，最后它成了这样：‘我的恩典是够你用的。’我说：‘主啊，我也觉得是，’就大笑起来。直到那时，我才懂亚伯拉罕的圣笑。不信显得多荒谬啊。"
            },
            {
              "en": "It was as though some little fish, being very thirsty, was troubled about drinking the river dry, and Father Thames said, \"Drink away, little fish, my stream is sufficient for thee.\" Or, it seemed after the seven years of plenty, a mouse feared it might die of famine; and Joseph might say, \"Cheer up, little mouse, my <span class=\"vocab-trigger\" data-vocab=\"granaries\">granaries<\/span> are sufficient for thee.\" Again, I imagined a man away up yonder, in a lofty mountain, saying to himself, \"I breathe so many cubic feet of air every year, I fear I shall exhaust the oxygen in the atmosphere,\" but the earth might say, \"Breathe away, O man, and fill the lungs ever, my atmosphere is sufficient for thee.\" Oh, brethren, be great believers! Little faith will bring your souls to Heaven, but great faith will bring Heaven to your souls. —C.H. Spurgeon.",
              "zh": "就像一条小鱼非常口渴，竟担心会把河水喝干，泰晤士河老爹说：「尽情喝吧，小鱼，我的水流够你用的。」又好像七个丰年之后，一只老鼠害怕自己会饿死；约瑟或许会说：「放心，小老鼠，我的粮仓够你用的。」再者，我想象一个人站在高山上，对自己说：「我每年呼吸这么多立方英尺的空气，我担心大气层的氧气会被我用光，」但大地可以说：「尽情呼吸吧，人啊，永填你的肺腑，我的大气够你用的。」哦，弟兄们，作大有信心的人吧！微小的信心能将你的灵魂带入天堂，但大的信心能将天堂带入你的灵魂。——C.H.司布真",
              "simpEn": "It's like a tiny fish worrying it might drink the river dry, and Father Thames saying, 'Drink away, little fish, my stream is enough for you.' Or after the seven years of plenty, a mouse fearing famine, and Joseph saying, 'Cheer up, little mouse, my granaries are enough for you.' Or a man on a mountain worrying he'll breathe up all the oxygen, and the earth saying, 'Breathe away, my atmosphere is enough for you.' Oh, be great believers! Little faith will bring your soul to heaven, but great faith will bring heaven to your soul. —Spurgeon",
              "simpZh": "就像一条小鱼担心把河水喝干，泰晤士河说：‘喝吧，小鱼，我的水够你用的。’又如七个丰年后，一只老鼠怕饿死，约瑟说：‘放心，小老鼠，我的粮仓够你用的。’又像一个高山上的男人担心把氧气吸光，大地可以说：‘呼吸吧，人啊，我的大气够你用的。’哦，作有大信心的人吧！小信心能把你的灵魂带进天堂，大信心能把天堂带进你的灵魂。——司布真"
            },
            {
              "en": "His grace is great enough to meet the great things— <br>The crashing waves that overwhelm the soul, <br>The roaring winds that leave us stunned and breathless, <br>The sudden storms beyond our life's control. <br>His grace is great enough to meet the small things— <br>The little pin-prick troubles that annoy, <br>The insect worries, buzzing and <span class=\"vocab-trigger\" data-vocab=\"persistent\">persistent<\/span>, <br>The squeaking wheels that grate upon our joy. <br>—Annie Johnson Flint. <br>There is always a large balance to our credit in the bank of Heaven waiting for our exercise of faith in drawing it. Draw heavily upon His resources.",
              "zh": "祂的恩典够大，足以应付大事——淹没灵魂的撞击巨浪，使我们昏厥喘不过气的咆哮狂风，突然来临、无法控制的暴风。祂的恩典够大，足以应付小事——那些恼人的针刺般小麻烦，嗡嗡持续不断的小虫般的忧虑，磨蹭我们喜乐的吱吱作响的轮子。——安妮·约翰逊·弗林特。在我们天家银行里，总有一大笔存款等着我们用信心去支取。尽情地支取祂的丰盛吧。",
              "simpEn": "His grace is big enough for the big things—crashing waves that overwhelm the soul, roaring winds that leave us stunned, sudden storms beyond our control. His grace is big enough for the small things—the tiny pin-prick troubles that annoy, the buzzing, persistent insect worries, the squeaking wheels that grate on our joy. —Annie Johnson Flint. There's always a large balance in the bank of Heaven waiting for us to draw by faith. Draw heavily on His resources.",
              "simpZh": "祂的恩典够大到能应付大事——淹没灵魂的巨浪，让人昏眩的大风，突然无法控制的风暴。祂的恩典也够大到能应付小事——那些针扎似的小烦恼，嗡嗡不停的小虫般的忧虑，磨蹭我们喜乐的吱嘎作响的轮子。天家银行里总有一大笔存款等着我们用信心去支取。尽情地支取祂的丰富吧。"

              "en": "And Jacob was <span class=\"vocab-trigger\" data-vocab=\"left alone\">left alone<\/span>; and there <span class=\"vocab-trigger\" data-vocab=\"wrestled a man with him\">wrestled a man with him<\/span> until the breaking of the day (Gen.32:24).",
