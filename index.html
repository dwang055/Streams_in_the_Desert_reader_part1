        {
          "sectionId": 6,
          "heading": "January 13",
          "audio": "audio/Streams in the Desert - January 13.m4a",
          "paragraphs": [
            {
              "en": "In all these things we are <span class=\"vocab-trigger\" data-vocab=\"more than conquerors\">more than conquerors<\/span> through him that loved us. (Romans 8:37).",
              "zh": "然而，靠着爱我们的主，在这一切的事上已经得胜有余了。（罗马书8:37）",
              "simpEn": "In all these things we are completely victorious through Him who loved us.",
              "simpZh": "靠着爱我们的那一位，我们在这一切事上完全得胜。"
            },
            {
              "en": "This is more than victory. This is a triumph so complete that we have not only escaped defeat and destruction, but we have destroyed our enemies and won a <span class=\"vocab-trigger\" data-vocab=\"spoil\">spoil<\/span> so rich and valuable that we can thank God that the battle ever came. How can we be \"<span class=\"vocab-trigger\" data-vocab=\"more than conquerors\">more than conquerors<\/span>\"? We can get out of the conflict a spiritual discipline that will greatly strengthen our faith and establish our spiritual character. Temptation is necessary to settle and confirm us in the spiritual life. It is like the fire which burns in the colors of <span class=\"vocab-trigger\" data-vocab=\"mineral painting\">mineral painting<\/span>, or like winds that cause the mighty cedars of the mountain to strike more deeply into the soil. Our spiritual conflicts are among our choicest blessings, and our great <span class=\"vocab-trigger\" data-vocab=\"adversary\">adversary<\/span> is used to train us for his ultimate defeat.",
              "zh": "这不止是得胜，乃是彻底的大捷。我们不仅免了失败与毁灭，还歼灭了仇敌，夺得如此丰富宝贵的掳物，以致我们能感谢神让那场争战临到。我们怎能「得胜有余」呢？我们可以从冲突中获得属灵的操练，大大增强信心，坚立属灵品格。试探是必要的，为使我们在灵命中稳固、坚定。就像火能将矿物颜料烧入釉彩，又如风使大山上的香柏树扎根更深。属灵的争战是我们最上好的祝福，那大仇敌被神用来训练我们，好预备他最终的溃败。",
              "simpEn": "This is more than winning. It's such a complete victory that we not only avoid defeat but also crush our enemies and gain something so valuable that we can thank God the fight happened. How can we be 'more than conquerors'? We gain spiritual training from the battle that strengthens faith and builds our character. Temptation is needed to make us stable in the spiritual life, like fire that sets colors in mineral paints or wind that makes cedar trees grow deeper roots. Our spiritual fights are among our best blessings, and our enemy is used to train us for his final defeat.",
              "simpZh": "这不只是打赢，是彻底的胜利。我们不但没输没被毁，还打败了敌人，得到了非常宝贵的东西，以至于我们可以感谢神让这场仗发生。怎么能'得胜有余'呢？从争战中我们得到属灵操练，信心更坚固，品格被建立。试探是必要的，能让灵命稳固，就像火烧进矿物颜料里定色，又像风让高山香柏树扎根更深。属灵的争战是最大的祝福，仇敌被用来训练我们，预备他最后的失败。"
            },
            {
              "en": "The ancient <span class=\"vocab-trigger\" data-vocab=\"Phrygians\">Phrygians<\/span> had a legend that every time they conquered an enemy the <span class=\"vocab-trigger\" data-vocab=\"victor\">victor<\/span> absorbed the physical strength of his victim and added so much more to his own strength and valor. So temptation victoriously met doubles our spiritual strength and equipment. It is possible thus not only to defeat our enemy, but to <span class=\"vocab-trigger\" data-vocab=\"capture him and make him fight in our ranks\">capture him and make him fight in our ranks<\/span>. The prophet Isaiah speaks of flying on the shoulders of the Philistines (Isa.11:14). These Philistines were their deadly foes, but the figure suggested that they would be enabled not only to conquer the Philistines, but to use them to carry the victors on their shoulders for further triumphs. Just as the wise sailor can use a head wind to carry him forward by <span class=\"vocab-trigger\" data-vocab=\"tacking\">tacking<\/span> and taking advantage of its <span class=\"vocab-trigger\" data-vocab=\"impelling force\">impelling force<\/span>; so it is possible for us in our spiritual life through the victorious grace of God to turn to account the things that seem most unfriendly and unfavorable, and to be able to say continually, \"The things that were against me have happened to the <span class=\"vocab-trigger\" data-vocab=\"furtherance\">furtherance<\/span> of the Gospel.\"",
              "zh": "古弗吕家人有个传说，他们每征服一个敌人，胜利者就吸收对方的力量，大大加添自己的力气与勇猛。照样，成功地战胜试探，就能加倍我们属灵的力量与装备。因此不仅可能击败仇敌，还可能将他俘获，使其在我们的阵营中作战。先知以赛亚提到「骑在非利士人的肩头上」（赛11:14）。非利士人原为死敌，但这喻象指出他们不但能征服非利士人，还能利用他们，让这些俘虏用肩头抬着得胜者，去夺取更多胜利。正如聪明的水手能利用逆风，借着抢风调向的推动力前行；照样，我们借着神得胜的恩典，也能在属灵生命中利用那些看起来最不友善、最不利的事物，并能不断地说：「那反对我的事反倒促成了福音的广传。」",
              "simpEn": "The ancient Phrygians believed that when they beat an enemy, the winner took the loser's strength and added it to his own. In the same way, when we overcome temptation, it makes us spiritually stronger and better equipped. We can not only defeat the enemy but capture him and make him fight for us. Isaiah talks about riding on the shoulders of the Philistines—their fierce enemies—meaning they would use them to carry the victors to more success. Like a wise sailor uses a wind blowing against him by tacking, we can use hard things through God's grace to push forward and say, 'What was against me has actually helped the Gospel spread.'",
              "simpZh": "古弗吕家人传说，每次打败敌人，胜利者就吸收对方的力量，变得更壮更勇。同样，胜过试探会让我们灵里加倍有力。我们不只打败仇敌，还能捉住他，让他在我们军队里打仗。先知以赛亚说骑在非利士人肩头上——他们是死对头——意思是能让他们抬着得胜者去赢更多。就像聪明水手利用逆风，借着转帆借力前行；我们靠神的恩典也能把不利的事变成助力，常说：'反对我的事反倒帮助了福音。'"
            },
            {
              "en": "A noted scientist observing that \"early voyagers fancied that the <span class=\"vocab-trigger\" data-vocab=\"coral-building animals\">coral-building animals<\/span> instinctively built up the great circles of the <span class=\"vocab-trigger\" data-vocab=\"Atoll Islands\">Atoll Islands<\/span> to afford themselves protection in the inner parts,\" has disproved this fancy by showing that the insect builders can only live and thrive fronting the open ocean, and in a highly aerated foam of its <span class=\"vocab-trigger\" data-vocab=\"resistless billows\">resistless billows<\/span>. So it has been commonly thought that protected ease is the most favorable condition of life, whereas all the noblest and strongest lives prove on the contrary that the endurance of hardship is the making of the men, and the factor that distinguishes between existence and <span class=\"vocab-trigger\" data-vocab=\"vigorous vitality\">vigorous vitality<\/span>. Hardship makes character.",
              "zh": "一位知名科学家指出，「早期航海者幻想珊瑚虫本能地建造环礁岛的大圆圈，是为在内部保护自己」，他推翻了这一幻想，证明这类微小建造者只能面向开阔海洋，在波涛汹涌、充满泡沫的环境中才能生存繁衍。通常人们以为受保护的安逸是生命最有利的环境；但一切最崇高最坚强的生命反证出，忍受艰难是塑造人物的要素，也是区别单纯生存与蓬勃生命力的关键。艰难塑造品格。",
              "simpEn": "A scientist noted that early sailors thought coral animals built ring-shaped islands to protect themselves inside. He proved this wrong: the tiny builders can only live and grow facing the open ocean, in the rough, foaming waves. People often think an easy, protected life is best, but the strongest and noblest lives show that hardship is what makes men great. Hardship builds character.",
              "simpZh": "一位科学家说，早期水手以为珊瑚虫建环礁岛是为了在里面保护自己。他证明这想法错了：这些小生物只能面对开阔海洋，在汹涌泡沫浪涛中生存。人们常以为受保护的安逸生活最好，但最崇高强壮的生命证明，艰难困苦才塑造人，是区分仅仅存活和充满活力的关键。艰难塑造品格。"
            },
            {
              "en": "\"Now thanks be unto God Who always leads us forth to triumph with the <span class=\"vocab-trigger\" data-vocab=\"anointed\">Anointed<\/span> One, and Who diffuses by us the <span class=\"vocab-trigger\" data-vocab=\"fragrance of the knowledge\">fragrance of the knowledge<\/span> of Him in every place\" (2Cor.2:14, literal translation).",
              "zh": "「感谢神，祂常率领我们在基督里夸胜，并借着我们在各处显扬那因认识祂而有的香气。」（林后2:14，直译）",
              "simpEn": "Thanks be to God who always leads us in victory with Christ, and through us spreads everywhere the sweet smell of knowing Him.",
              "simpZh": "感谢神，祂常带我们和基督一起得胜，又借着我们在各处散发出认识祂的香气。"

        {
          "sectionId": 7,
          "heading": "January 14",
          "audio": "audio/Streams in the Desert - January 14.m4a",
          "paragraphs": [
            {
              "en": "He <span class=\"vocab-trigger\" data-vocab=\"putteth forth\">putteth forth<\/span> his own sheep (John 10:4).",
              "zh": "祂把祂的羊放出来。（约翰福音10:4）",
              "simpEn": "He leads His own sheep out.",
              "simpZh": "祂把自己的羊带出来。"
            },
            {
              "en": "Oh, this is bitter work for Him and us—bitter for us to go, but equally bitter for Him to cause us pain; yet it must be done. It would not be <span class=\"vocab-trigger\" data-vocab=\"conducive to our true welfare\">conducive to our true welfare<\/span> to stay always in one happy and comfortable lot. He therefore puts us forth. The fold is deserted, that the sheep may wander over the <span class=\"vocab-trigger\" data-vocab=\"bracing mountain slope\">bracing mountain slope<\/span>. The laborers must be <span class=\"vocab-trigger\" data-vocab=\"thrust out\">thrust out<\/span> into the harvest else the golden grain would <span class=\"vocab-trigger\" data-vocab=\"spoil\">spoil<\/span>.",
              "zh": "哦，这对祂和我们都是苦事——我们要离去固然苦，祂使我们受痛同样苦；然而这非做不可。若永远留在同一安逸舒适的处境，并不利于我们真实的福祉。所以祂把我们放出来。羊圈被离弃，为要让羊群漫游于令人振奋的山坡。工人必须被赶到庄稼田中，否则金黄的谷粒就要坏了。",
              "simpEn": "This is hard for both Jesus and us—painful for us to leave, and also painful for Him to cause us pain, but it must happen. It wouldn't be good for us to stay forever in one happy, comfortable place. So He pushes us out. The sheep pen is left behind so the sheep can wander on the fresh mountain slopes. The workers must be sent out into the harvest, or the golden grain will spoil.",
              "simpZh": "这对耶稣和我们都是苦事——我们离开很苦，祂让我们痛也苦，但必须这么做。永远留在一个开心舒服的地方对我们没好处。所以祂把我们推出去。羊圈被丢在后面，让羊去清新山坡上走。工人必须被赶到庄稼地里，不然金黄的谷子就坏了。"
            },
            {
              "en": "Take heart! it could not be better to stay when He determines otherwise; and if the loving hand of our Lord puts us forth, it must be well. On, in His name, to <span class=\"vocab-trigger\" data-vocab=\"green pastures\">green pastures<\/span> and <span class=\"vocab-trigger\" data-vocab=\"still waters\">still waters<\/span> and mountain heights! He goeth before thee. Whatever awaits us is encountered first by Him. Faith's eye can always <span class=\"vocab-trigger\" data-vocab=\"discern\">discern<\/span> His majestic presence in front; and when that cannot be seen, it is dangerous to move forward. Bind this comfort to your heart that the Savior has tried for Himself all the experiences through which He asks you to pass; and He would not ask you to pass through them unless He was sure that they were not too difficult for your feet or too trying for your strength.",
              "zh": "放心！当祂定意不让我们停留时，停留绝无益；如果主慈爱的手把我们放出来，那必定是好的。奉祂的名前行，往青草地、静水边和高山峻岭去！祂在你前面走。无论何事先迎向我们，祂已先面对。信心的眼目总能辨识祂在前头的威荣同在；若不能看见，则贸然前行就危险了。当把这安慰系在心头：救主亲身尝过了祂要你经过的一切经历；若非确知这些事对你的脚不致太难、对你的力不致太重，祂绝不会要你经过。",
              "simpEn": "Be encouraged! If He decides we must move, staying is not better. If the Lord's loving hand pushes us out, it's for good. Go forward in His name to green fields, quiet waters, and high hills! He goes ahead of you. Whatever we face, He meets first. Faith can always see His strong presence in front; when we can't see it, moving ahead is dangerous. Hold this comfort: the Savior has tried everything He asks you to go through, and He wouldn't ask you if it were too hard for your feet or too much for your strength.",
              "simpZh": "放心！如果祂决定我们不能留，留下并不更好；主慈爱的手推我们出去，那一定是好的。奉祂名向前，去青草地、安静水边和高山！祂走在你前面。无论遇到什么，祂先遇见。信心总能看到祂在前面伟大的同在；看不见时，往前走就危险。牢记这个安慰：救主亲身经历过祂要你走的一切，如果那些路对你的脚太难、对你的力量太重，祂不会让你走。"
            },
            {
              "en": "This is the Blessed Life—not anxious to see far in front nor careful about the next step, not eager to choose the path, nor weighted with the heavy responsibilities of the future, but quietly following behind the Shepherd, one step at a time. <br>Dark is the sky! and <span class=\"vocab-trigger\" data-vocab=\"veiled\">veiled<\/span> the unknown <span class=\"vocab-trigger\" data-vocab=\"morrow\">morrow<\/span>! <br>Dark is life's way, for night is not yet o'er; <br>The longed-for glimpse I may not meanwhile borrow; <br>But, this I know, HE GOETH ON BEFORE. <br>Dangers are nigh! and fears my mind are shaking; <br>Heart seems to dread what life may hold in store; <br>But I am His—He knows the way I'm taking, <br>More blessed still—HE GOETH ON BEFORE. <br>Doubts cast their <span class=\"vocab-trigger\" data-vocab=\"weird\">weird<\/span>, unwelcome shadows o'er me, <br>Doubts that life's best—life's choicest things are o'er; <br>What but His Word can strengthen, can restore me, <br>And this blest fact; that still HE GOES BEFORE. <br>HE GOES BEFORE! Be this my <span class=\"vocab-trigger\" data-vocab=\"consolation\">consolation<\/span>! <br>He goes before! On this my heart would dwell! <br>He goes before! This guarantees salvation! <br>HE GOES BEFORE! And therefore all is well. <br>—J. Danson Smith.",
              "zh": "这就是有福的生活——不必忧虑前方远景，也不为下一步过分操心，不急于自行选路，也不为将来的重担所压，乃是安静地在牧者身后，一步一步跟随。天色黑暗！未知的明日也遮蔽！生命的道路暗昧，黑夜尚未过去；此刻我无法借用那渴望的一瞥；但我知道，祂在我前头行。险境临近！恐惧摇动我心；心中似乎畏惧生命所藏之事；但我是属祂的——祂知道我所行的路，更加有福的是——祂在我前头行。疑惧投下怪异不受欢迎的阴影，疑惧以为生命最美善的都已过去；惟有祂的话能坚固、恢复我，并这有福的事实：祂仍然在前头行。祂在前头行！愿这成为我的安慰！祂在前头行！我心要安居于此！祂在前头行！这保证了救恩！祂在前头行！因此一切安好。——J. 丹森·史密斯",
              "simpEn": "This is the happy life: not worrying about the far future or the next step, not in a hurry to choose the path, not carrying the heavy load of tomorrow, but quietly following the Shepherd step by step. Dark sky! The unknown tomorrow is hidden. Life's way is dark; night isn't over yet. I can't see what I long to see, but this I know: He goes before me. Dangers are close; fears shake my mind; my heart dreads what life may hold. But I am His—He knows my road. Even better—He goes before. Doubts cast strange shadows over me, whispering that the best of life is over. What else but His Word can strengthen me and this blessed truth: He still goes before. He goes before! Let this be my comfort! He goes before! My heart rests on this. He goes before! This guarantees my salvation! He goes before! So all is well.",
              "simpZh": "这就是有福的生活：不担心遥远的将来，不为下一步过分操心，不急着选路，不背着明天沉重的担子，只是安安静静跟在牧者后面，一步一步走。天很黑！未知的明天被遮盖。生命路暗，黑夜还没过去。我渴望看见的眼下还看不见；但我知道：祂在我前面走。危险近了，恐惧摇动我，心里害怕生活会带来什么。但我是祂的——祂知道我的路。更好的事是：祂在前面走。怀疑投下奇怪阴影，说生命中最好的已经过去。除了祂的话和这有福的事实——祂仍在前面走，还有什么能坚固我？祂在前面走！让这成为我的安慰！祂在前面走！我的心安息于此。祂在前面走！这保证我得救！祂在前面走！所以一切都好。"
            },
            {
              "en": "The <span class=\"vocab-trigger\" data-vocab=\"Oriental shepherd\">Oriental shepherd<\/span> was always ahead of his sheep. He was down in front. Any attack upon them had to take him into account. Now God is down in front. He is in the tomorrow. It is tomorrow that fills men with dread. God is there already. All the tomorrows of our life have to pass Him before they can get to us.—F. B. M. <br>God is in every tomorrow, <br>Therefore I live for today, <br>Certain of finding at sunrise, <br>Guidance and strength for the way; <br>Power for each moment of weakness, <br>Hope for each moment of pain, <br>Comfort for every sorrow, <br>Sunshine and joy after rain.",
              "zh": "东方的牧人总是在羊群前头。他在前面。任何攻击羊群的事，都得先经过他。如今神也在前面。祂在明天里。让人充满恐惧的正是明天。神已经在那里了。我们生命所有的明天，在临到我们之前，都必须先经过祂。——F. B. M. 神在每一个明天里，因此我活今天，确知日出时必找到前路的引导与力量；每一软弱的时刻有能力，每一痛苦的时刻有盼望，每一忧伤有安慰，雨后有阳光与喜乐。",
              "simpEn": "The shepherd in the East always walked ahead of the sheep. He was out front. Any attack on the sheep had to deal with him first. Now God is out in front. He is already in tomorrow. Tomorrow scares us, but God is already there. All our tomorrows must pass by Him before they reach us. So I live for today, sure that at sunrise I'll find guidance and strength; power when I am weak, hope when I hurt, comfort for every sadness, and sunshine and joy after the rain.",
              "simpZh": "东方牧羊人总是走在羊群前面。他在前头。任何攻击羊群的事都得先经过他。神也在前头。祂已经在明天里了。让人害怕的是明天，但神已经在那里了。我们所有的明天在到达之前，都得先经过祂。所以我为今天活，确知日出时必有引导和力量；软弱时有能力，痛苦时有盼望，每份忧伤都有安慰，雨后有阳光和喜乐。"
            }
          ],

    {
      "id": 3,
      "title": "January 15–21",
      "sections": [
        {
          "sectionId": 1,
          "heading": "January 15",
          "audio": "audio/Streams in the Desert - January 15.m4a",
          "paragraphs": [
            {
              "en": "And the Lord <span class=\"vocab-trigger\" data-vocab=\"appeared unto Isaac\">appeared unto Isaac<\/span> the same night (Gen.26:24).",
              "zh": "当夜耶和华向以撒显现。（创世记26:24）",
              "simpEn": "The Lord showed Himself to Isaac that very night.",
              "simpZh": "那天晚上，耶和华向以撒显现了。"
            },
            {
              "en": "\"Appeared the same night\"—the night on which he went to <span class=\"vocab-trigger\" data-vocab=\"Beersheba\">Beersheba<\/span>. Do you think this <span class=\"vocab-trigger\" data-vocab=\"revelation\">revelation<\/span> was an accident? Do you think the time of it was an accident? Do you think it could have happened on any other night as well as this? If so, you are <span class=\"vocab-trigger\" data-vocab=\"grievously mistaken\">grievously mistaken<\/span>. Why did it come to Isaac in the night on which he reached <span class=\"vocab-trigger\" data-vocab=\"Beersheba\">Beersheba<\/span>? Because that was the night on which he reached rest. In his old locality, he had been <span class=\"vocab-trigger\" data-vocab=\"tormented\">tormented<\/span>. There had been a whole series of <span class=\"vocab-trigger\" data-vocab=\"petty quarrels\">petty quarrels<\/span> about the possession of <span class=\"vocab-trigger\" data-vocab=\"paltry wells\">paltry wells<\/span>. There are no worries like little worries, particularly if there is an <span class=\"vocab-trigger\" data-vocab=\"accumulation\">accumulation<\/span> of them. Isaac felt this. Even after the strife was past, the place retained a <span class=\"vocab-trigger\" data-vocab=\"disagreeable association\">disagreeable association<\/span>. He determined to leave. He sought change of scene. He pitched his tent away from the place of former strife. That very night the <span class=\"vocab-trigger\" data-vocab=\"revelation\">revelation<\/span> came. God spoke when there was no <span class=\"vocab-trigger\" data-vocab=\"inward storm\">inward storm<\/span>. He could not speak when the mind was <span class=\"vocab-trigger\" data-vocab=\"fretted\">fretted<\/span>; His voice demands the silence of the soul. Only in the <span class=\"vocab-trigger\" data-vocab=\"hush of the spirit\">hush of the spirit<\/span> could Isaac hear the garments of his God sweep by. His still night was his <span class=\"vocab-trigger\" data-vocab=\"starry night\">starry night<\/span>.",
              "zh": "“当夜显现”——就是他前往别是巴的那夜。你以为这次显现是偶然的吗？你以为那时间是偶然的吗？你以为这事可以发生在任何别的夜晚吗？若这样想，你就大错了。为什么在以撒到达别是巴的那一夜向他显现？因为那是他得享安息的一夜。在他从前的地方，他备受折磨。为争夺几口不值钱的水井，发生了一连串琐碎的争吵。没有什么烦恼比小烦恼更折磨人，特别是它们堆积起来的时候。以撒感受到了。即使争斗过去，那地方仍然留有令人不快的联想。他决意离开，寻找新的环境。他把帐棚支搭在远离从前争斗之处。就在那一夜，启示临到了。内心没有风暴时，神就说话。心思烦乱时，祂无法说话；祂的声音需要灵魂的寂静。只有在灵里静默时，以撒才能听见神的衣袍拂过。他的宁静之夜成了他星光灿烂之夜。",
              "simpEn": "The Lord appeared to Isaac the same night he went to Beersheba. Was that just chance? No. It happened that night because he finally found rest. In his old place, he had been bothered by many small fights over unimportant wells. Little worries piled up and made him miserable. The place felt bad to him even after the fights stopped. So he decided to move. He set up his tent far from the old trouble, and that very night God spoke to him. God speaks when there is no storm inside us. When our mind is upset, He can't speak; He needs a quiet soul. Only in silence could Isaac hear God's presence. His quiet night became a starry night.",
              "simpZh": "耶和华在以撒到别是巴的那天晚上向他显现。这难道是偶然吗？不是的。那天晚上显现是因为他终于得到了安息。以前他住的地方让他很烦恼，因为一些不值钱的水井，发生了很多小争吵。小小的烦恼越积越多，让他很痛苦。即使争吵停了，那个地方还是让他感到不舒服。所以他决定离开，把帐篷支搭在远离争端的地方。就在那一夜，神说话了。神在我们心里没有风暴时说话；当我们心思烦乱时，祂没法说话，祂需要安静的灵。只有在寂静中，以撒才能听见神经过的声音。他安静的夜晚变成了满布星星的夜晚。"
            },
            {
              "en": "My soul, hast thou pondered these words, \"<span class=\"vocab-trigger\" data-vocab=\"Be still\">Be still<\/span>, and know\"? In the hour of <span class=\"vocab-trigger\" data-vocab=\"perturbation\">perturbation<\/span>, thou canst not hear the answer to thy prayers. How often has the answer seemed to come long after! The heart got no response in the moment of its crying—in its thunder, its earthquake, and its fire. But when the crying ceased, when the stillness fell, when thy hand <span class=\"vocab-trigger\" data-vocab=\"desisted\">desisted<\/span> from knocking on the iron gate, when the interest of other lives broke the tragedy of thine own, then appeared the long-delayed reply. Thou must rest, O soul, if thou wouldst have thy heart's desire. Still the beating of thy pulse of personal care. Hide thy <span class=\"vocab-trigger\" data-vocab=\"tempest\">tempest<\/span> of individual trouble behind the altar of a common <span class=\"vocab-trigger\" data-vocab=\"tribulation\">tribulation<\/span> and, that same night the Lord shall appear to thee. The rainbow shall <span class=\"vocab-trigger\" data-vocab=\"span\">span<\/span> the place of the <span class=\"vocab-trigger\" data-vocab=\"subsiding flood\">subsiding flood<\/span>, and in thy stillness thou shalt hear the everlasting music.",
              "zh": "我的灵哪，你可曾默想这句话：“你们要休息，要知道”？在心神不宁的时刻，你无法听见祷告的答复。多少次回应似乎是在很久之后才来到！心灵在呼喊时——在雷轰、地震和烈火中——没有得到答复。但当呼喊停止，寂静降临，当你的手不再敲打铁门，当别人生命的故事打破了你自己的悲剧，那久延的回复就出现了。灵魂哪，你若想得着心中所愿，就必须安息。止息你那为个人事务牵挂的脉搏。将你个人烦恼的风暴隐藏在共同患难的祭坛背后，当夜，耶和华就必向你显现。虹霓将横跨渐退的洪水之上，在你的静默中，你必听见那永恒的音乐。",
              "simpEn": "Have you thought about the words 'Be still, and know'? When your heart is disturbed, you can't hear God's answer. Often the answer seems to come much later. When you cried out—like in thunder, earthquake, and fire—you got no response. But when the crying stopped, when you became quiet, when you stopped beating on the iron gate, when other people's lives distracted you from your own tragedy, then the delayed answer came. You must rest, soul, if you want your heart's desire. Calm your anxious pulse. Hide your personal storm behind the altar of shared suffering, and that same night the Lord will appear to you. The rainbow will stretch over the flood as it goes down, and in your stillness you will hear eternal music.",
              "simpZh": "你有没有想过‘你们要休息，要知道’这句话？心里烦乱时，你听不到神的回应。很多时候，回应好像很久以后才来。你曾经在呼喊中——像雷声、地震、烈火一样——没有得到回应。但当呼喊停止，当安静下来，当你的手不再敲打铁门，当别人的生活让你不再只想着自己的悲剧时，那延迟的答复就来了。灵魂哪，如果你想得到心中所愿，必须安息。让你那焦虑的脉搏平静下来。把你个人的风暴藏在和别人一起受苦的祭坛后面，那夜耶和华就会向你显现。彩虹会架在退去的洪水上，在安静中你会听见永恒的音乐。"
            },
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"tread\">Tread<\/span> in solitude thy pathway, <br>Quiet heart and <span class=\"vocab-trigger\" data-vocab=\"undismayed\">undismayed<\/span>. <br>Thou shalt know things strange, mysterious, <br>Which to thee no voice has said. <br>While the crowd of <span class=\"vocab-trigger\" data-vocab=\"petty hustlers\">petty hustlers<\/span> <br>Grasps at vain and paltry things, <br>Thou wilt see a great world rising <br>Where soft <span class=\"vocab-trigger\" data-vocab=\"mystic music\">mystic music<\/span> rings. <br>Leave the dusty road to others, <br><span class=\"vocab-trigger\" data-vocab=\"Spotless\">Spotless<\/span> keep thy soul and bright, <br>As the <span class=\"vocab-trigger\" data-vocab=\"radiant\">radiant<\/span> ocean's surface <br>When the sun is taking flight.",
              "zh": "在孤寂中踏上你的道路，心要安静，不要惧怕。你必知道那无人声曾告诉你、陌生而又奥秘的事。当那群追逐琐碎功利之人，抓取虚空微末之物时，你将看见一个伟大的世界升起，那里有柔和的奥秘音乐回荡。把尘土飞扬的道路留给别人，保守你的灵魂一尘不染、光明闪耀，如同太阳飞逝时那光芒四射的海面。",
              "simpEn": "Walk your path in solitude, with a quiet and unafraid heart. You will learn strange and mysterious things that no voice has told you. While the crowd of little chasers grabs at empty and worthless things, you will see a great world rising where soft, mysterious music plays. Leave the dusty road to others; keep your soul clean and bright, like the shining ocean surface when the sun is setting.",
              "simpZh": "独自走你的路，心里安静不害怕。你会知道那些从没人告诉你、奇异又奥秘的事。当那些追逐小东西的人群在抓取空虚无聊的东西时，你会看见一个伟大的世界升起来，那里有柔和的奥秘音乐响起。把灰蒙蒙的路留给别人；让你的灵魂保持一尘不染，闪闪发亮，就像太阳落下时那光亮的海洋表面。"

          "paragraphs": [
            {
              "en": "And there arose a great storm (Mark 4:37).",
              "zh": "忽然起了大风暴。（马可福音4:37）",
              "simpEn": "A great storm rose up.",
              "simpZh": "起了大风暴。"
            },
            {
              "en": "Some of the storms of life come suddenly: a great sorrow, a <span class=\"vocab-trigger\" data-vocab=\"bitter disappointment\">bitter disappointment<\/span>, a <span class=\"vocab-trigger\" data-vocab=\"crushing defeat\">crushing defeat<\/span>. Some come slowly. They appear upon the <span class=\"vocab-trigger\" data-vocab=\"ragged edges of the horizon\">ragged edges of the horizon<\/span> no larger than a man's hand, but trouble that seems so <span class=\"vocab-trigger\" data-vocab=\"insignificant\">insignificant<\/span> spreads until it covers the sky and <span class=\"vocab-trigger\" data-vocab=\"overwhelms\">overwhelms<\/span> us.",
              "zh": "人生有些风暴骤然临到：极大的忧伤、痛彻的失望、毁灭性的打击。有些则来得缓慢，它们出现在地平线的毛边处，不过人手般大小，但那看似微小的患难渐渐蔓延，直到铺满天空，将我们淹没。",
              "simpEn": "Some storms in life come suddenly: a big sadness, a harsh letdown, a defeat that crushes you. Others come slowly, starting small like a tiny cloud on the horizon, but the trouble grows until it covers the whole sky and overwhelms us.",
              "simpZh": "生活中有些风暴突然来临：巨大的悲伤，痛苦的失望，毁灭性的失败。有些来得慢，从天边一小点开始，那看起来很微小的麻烦慢慢扩大，直到铺满整个天空，把我们吞没。"
            },
            {
              "en": "Yet it is in the storm that God equips us for service. When God wants an <span class=\"vocab-trigger\" data-vocab=\"oak\">oak<\/span> He plants it on the <span class=\"vocab-trigger\" data-vocab=\"moor\">moor<\/span> where the storms will shake it and the rains will beat down upon it, and it is in the midnight battle with elements that the <span class=\"vocab-trigger\" data-vocab=\"oak\">oak<\/span> wins its <span class=\"vocab-trigger\" data-vocab=\"rugged fibre\">rugged fibre<\/span> and becomes the king of the forest.",
              "zh": "然而，正是在风暴中，神装备我们以服事。当神要一棵橡树时，祂把它栽在荒野上，任凭风暴摇撼、雨水击打；正是在夜半与自然力的搏斗中，橡树才炼就其粗韧的纤维，成为森林之王。",
              "simpEn": "But it is in the storm that God prepares us for service. When God wants an oak tree, He plants it on the wild moor where storms shake it and rain beats on it. Through the midnight battle with wind and rain, the oak gets its tough strength and becomes the king of the forest.",
              "simpZh": "然而神是在风暴中装备我们。当神要一棵橡树时，祂把它种在荒野上，让风暴摇晃它，让雨水击打它。在半夜与风雨的搏斗中，橡树长出粗壮的纤维，成了森林之王。"
            },
            {
              "en": "When God wants to make a man He puts him into some storm. The history of mankind is always rough and <span class=\"vocab-trigger\" data-vocab=\"rugged\">rugged<\/span>. No man is made until he has been out into the <span class=\"vocab-trigger\" data-vocab=\"surge of the storm\">surge of the storm<\/span> and found the <span class=\"vocab-trigger\" data-vocab=\"sublime fulfillment\">sublime fulfillment<\/span> of the prayer \"O God, take me, break me, make me.\"",
              "zh": "当神要造就一个人时，祂把他置于风暴之中。人类的历史总是崎岖粗粝的。一个人若不进入风暴的巨浪，并经历「神啊，拿去我，破碎我，重塑我」这祷告的庄严成就，就尚未成为真正的人。",
              "simpEn": "When God wants to shape a man, He puts him into a storm. Human history is always rough. No one becomes a real man until he has faced the wild storm and experienced the deep answer to the prayer: 'O God, take me, break me, make me.'",
              "simpZh": "当神要塑造一个人时，祂把他放进风暴里。人类的历史总是崎岖不平的。一个人不经历风暴的大浪，经历‘神啊，拿去我，破碎我，重塑我’这祷告的深刻成就，就不能成为真正的人。"
            },
            {
              "en": "A Frenchman has painted a picture of <span class=\"vocab-trigger\" data-vocab=\"universal genius\">universal genius<\/span>. There stand orators, philosophers and martyrs, all who have achieved <span class=\"vocab-trigger\" data-vocab=\"pre-eminence\">pre-eminence<\/span> in any phase of life; the remarkable fact about the picture is this: Every man who is pre-eminent for his ability was first pre-eminent for suffering. In the foreground stands that figure of the man who was denied the promised land, Moses. Beside him is another, feeling his way—blind <span class=\"vocab-trigger\" data-vocab=\"Homer\">Homer<\/span>. Milton is there, blind and heart-broken. Now comes the form of one who towers above them all. What is His characteristic? His Face is <span class=\"vocab-trigger\" data-vocab=\"marred\">marred<\/span> more than any man's. The artist might have written under that great picture, \"The Storm.\"",
              "zh": "一位法国人曾画了一幅《举世天才》的画。画中有演说家、哲士、殉道者，囊括了在各样生命领域出类拔萃之人；此画令人惊奇之处是：每位能力出众之人，都先是受苦卓越之人。前景是那位不得进入应许之地的摩西。他身旁是摸索前行的盲者荷马。弥尔顿也在那里，眼盲心碎。然后出现了一位凌驾众人之上的身影。祂的特征是什么？祂的面貌比任何人都更受毁伤。画家大可以在这幅巨画下题上：「风暴」。",
              "simpEn": "A French painter made a picture of 'universal genius' showing great speakers, thinkers, and martyrs—all who reached the top in life. The striking thing is that each one first reached the top in suffering. Moses, who never entered the promised land, stands in front. Beside him is blind Homer. Milton is there, blind and heartbroken. Then comes the One who stands above them all. His face is scarred more than any man's. The artist could have written 'The Storm' under that picture.",
              "simpZh": "一位法国画家画了一幅‘世界天才’的画，里面有演说家、哲学家、殉道者，都是在各方面出类拔萃的人。这幅画令人惊讶的是：每个能力出众的人，都先经历过极大的苦难。摩西站在前面，他没能进入应许之地。旁边是瞎眼的荷马。弥尔顿也在那里，失明又心碎。然后出现了一个超过所有人的身影。祂的特征是什么？祂的脸比任何人受的伤都多。画家可以在那幅画下面写上‘风暴’。"

            {
              "en": "The beauties of nature come after the storm. The <span class=\"vocab-trigger\" data-vocab=\"rugged\">rugged<\/span> beauty of the mountain is born in a storm, and the heroes of life are the storm-swept and <span class=\"vocab-trigger\" data-vocab=\"battle-scarred\">battle-scarred<\/span>. <br>You have been in the storms and swept by the <span class=\"vocab-trigger\" data-vocab=\"blasts\">blasts<\/span>. Have they left you broken, weary, beaten in the valley, or have they lifted you to the sunlit summits of a richer, deeper, more <span class=\"vocab-trigger\" data-vocab=\"abiding\">abiding<\/span> manhood and womanhood? Have they left you with more sympathy with the storm-swept and the <span class=\"vocab-trigger\" data-vocab=\"battle-scarred\">battle-scarred<\/span>?",
              "zh": "大自然的美丽出于风暴之后。山岭粗犷之美生于风暴之中；生命的英雄都是被风暴扫荡、带着战痕的。你曾经历过风暴，被烈风吹刮。它们留下了你在山谷中破碎、疲惫、被击倒，还是将你提升到了阳光灿烂的峰顶，拥有了更丰富、更深厚、更持久的品性？它们是否让你对那被风暴吹扫、带着战痕的人多了一份同情？",
              "simpEn": "Nature's beauty comes after storms. The rough beauty of mountains is born in storms. Life's heroes are storm-swept and scarred from battle. You've been in storms, blown by strong winds. Did they leave you broken and beaten down in the valley, or did they lift you to sunny peaks with a richer, deeper, more lasting character? Did they give you more sympathy for others who are storm-swept and scarred?",
              "simpZh": "大自然的美在风暴后出现。山岭粗犷的美是在风暴中诞生的。生命中的英雄都是被风暴吹扫、带着战斗伤疤的。你经历过风暴，被狂风吹过。它们是让你在山谷里破碎、疲惫、被打败，还是把你提升到阳光普照的山顶，有了更丰富、更深、更持久的人格？它们有没有让你对同样被风暴吹扫、带着伤疤的人更有同情心？"

            {
              "en": "The wind that blows can never kill <br>The tree God plants; <br>It bloweth east, it bloweth west, <br>The tender leaves have little rest, <br>But any wind that blows is best. <br>The tree that God plants <br>Strikes deeper root, grows higher still, <br>Spreads greater <span class=\"vocab-trigger\" data-vocab=\"boughs\">boughs<\/span>, for God's good will <br>Meets all its wants. <br>There is no storm hath power to <span class=\"vocab-trigger\" data-vocab=\"blast\">blast<\/span> <br>The tree God knows; <br>No thunderbolt, nor beating rain, <br>Nor lightning flash, nor <span class=\"vocab-trigger\" data-vocab=\"hurricane\">hurricane<\/span>; <br>When they are spent, it doth remain, <br>The tree God knows, <br>Through every <span class=\"vocab-trigger\" data-vocab=\"tempest\">tempest<\/span> standeth fast, <br>And from its first day to its last <br>Still fairer grows.",
              "zh": "风吹不息，却永不能杀死神所栽的树；它吹向东，吹向西，嫩叶几无安息，但任何吹来的风，都是最好的。神所栽的树，扎根更深，长得更高，枝条更广，因神的美善满足它一切所需。没有风暴能摧残神所认识的树；没有雷霆、暴雨、闪电、飓风；当它们耗尽之后，那树依然屹立。神所认识的树，历经一切狂风，仍坚稳不动，从始到终，越长越美。",

              "simpZh": "风永远不能杀死神种的树；风向东吹，向西吹，嫩叶没什么安宁，但任何风都是最好的。神种的树，根扎得更深，长得更高，枝条更宽，因为神的美意满足它一切需要。没有风暴能毁掉神认识的树——雷霆、暴雨、闪电、飓风都不行。风暴过后，树还在。它经过一切狂风仍然坚定，从第一天到最后，越长越美。"

        {

          "paragraphs": [
            {
              "en": "O Daniel, <span class=\"vocab-trigger\" data-vocab=\"servant of the living God\">servant of the living God<\/span>, is thy God whom thou servest continually, able to deliver thee? (Dan.6:20)",
              "zh": "永生神的仆人但以理啊，你所常事奉的神，能救你吗？（但以理书6:20）",
              "simpEn": "Daniel, servant of the living God, can your God, whom you serve always, save you?",
              "simpZh": "但以理，永生神的仆人，你不断事奉的神能救你吗？"
            },
            {
              "en": "How many times we find this expression in the Scriptures, and yet it is just this very thing that we are so <span class=\"vocab-trigger\" data-vocab=\"prone to lose sight of\">prone to lose sight of<\/span>. We know it is written \"the living God\"; but in our daily life there is scarcely anything we practically so much lose sight of as the fact that God is the living God; that He is now whatever He was three or four thousand years since; that He has the same <span class=\"vocab-trigger\" data-vocab=\"sovereign power\">sovereign power<\/span>, the same saving love towards those who love and serve Him as ever He had, and that He will do for them now what He did for others two, three, four thousand years ago, simply because He is the living God, the <span class=\"vocab-trigger\" data-vocab=\"unchanging One\">unchanging One<\/span>. Oh, how therefore we should <span class=\"vocab-trigger\" data-vocab=\"confide in Him\">confide in Him<\/span>, and in our darkest moments never lose sight of the fact that He is still and ever will be the living God!",
              "zh": "在圣经中我们多少次见到这个说法，然而这恰恰是我们最容易忽略的事。我们知道经上写着「永生神」；但在日常生活中，我们实际最容易忽略的事实就是：神是永生神；祂今日仍是三、四千年前所是的那一位；祂对爱祂事奉祂之人拥有同样的主权能力，同样的拯救大爱，祂今日要为属祂的人行的事，正如祂两、三、四千年前为别人所行的一样，只因祂是永生神，是永不改变的那一位。哦，因此我们应当何等信靠祂，在最黑暗的时刻，永远不要忽略祂现今仍是、且永远是永生神这一事实！",
              "simpEn": "We often read the phrase 'the living God' in the Bible, yet this is what we easily forget. We know it's written, but in daily life we forget that God is alive, the same as He was thousands of years ago. He has the same kingly power and saving love for those who serve Him, and He will do for us now what He did for others long ago, just because He is the living, unchanging God. So we should trust Him deeply and never forget, even in dark times, that He is and always will be the living God.",
              "simpZh": "我们在圣经里常看到‘永生神’这个词，但我们最容易忘记的就是这件事。我们知道经上这样写，但日常生活中我们常忘记神是活的，和几千年前一样。祂对事奉祂的人有同样的主权和大爱，祂今天也会为我们做很久以前为别人做的事，只因祂是活的神，不改变的神。所以我们应当深深信靠祂，在最黑暗时也不要忘记祂是、且永远是活的神。"
            },
            {
              "en": "Be assured, if you walk with Him and look to Him and expect help from Him, He will never fail you. An older brother who has known the Lord for forty-four years, who writes this, says to you for your encouragement that He has never failed him. In the greatest difficulties, in the heaviest trials, in the deepest poverty and necessities, He has never failed me; but because I was enabled by His grace to trust Him He has always appeared for my help. I delight in speaking well of His Name. —George Mueller.",
              "zh": "你可以确信，你若与祂同行，仰望祂，期待从祂得帮助，祂永不会使你失望。一位认识主四十四年、写下这话的年长弟兄，为鼓励你而说：祂从未使他失望。在最巨大的困难中，在极重的试炼中，在极深的贫困与缺乏中，祂从未使我失败；乃因祂的恩典使我能够信靠祂，祂就总为我的帮助显现。我乐于述说祂名的美善。——乔治·穆勒",
              "simpEn": "Be sure: if you walk with God, look to Him, and expect help, He will never fail you. An older Christian who has known the Lord for 44 years writes this to encourage you: God has never failed him. In the biggest troubles, hardest trials, and deepest poverty, He has never let me down. Because His grace helped me trust Him, He always showed up to help. I love to speak well of His name.",
              "simpZh": "你可以确定：如果你与神同行，仰望祂，期待祂的帮助，祂绝不会让你失望。一位认识主四十四年的老弟兄写这话鼓励你：神从来没有让他失望。在最困难、最重的试炼、最深的贫穷和缺乏中，祂从没让我失败；因祂的恩典帮助我信靠祂，祂总是出现来帮助。我乐于称赞祂的名。"

            {
              "en": "Luther was once found at a moment of peril and fear, when he had need to grasp unseen strength, sitting in an <span class=\"vocab-trigger\" data-vocab=\"abstracted mood\">abstracted mood<\/span> tracing on the table with his finger the words, \"<span class=\"vocab-trigger\" data-vocab=\"Vivit! vivit!\">Vivit! vivit!<\/span>\" (\"He lives! He lives!\") It is our hope for ourselves, and for His truth, and for mankind. Men come and go; leaders, teachers, thinkers speak and work for a season, and then fall silent and <span class=\"vocab-trigger\" data-vocab=\"impotent\">impotent<\/span>. He abides. They die, but He lives. They are lights kindled, and, therefore, sooner or later <span class=\"vocab-trigger\" data-vocab=\"quenched\">quenched<\/span>; but He is the true light from which they draw all their brightness, and He shines for evermore. —Alexander Maclaren.",
              "zh": "有人曾见路德在一个危险恐惧的时刻，急需抓住那看不见的力量，他恍惚出神地坐着，用手指在桌上反复描划着：“Vivit! vivit!”（“祂活着！祂活着！”）这是我们为自己、为祂的真理、为人类的盼望。人来人去；领袖、教师、思想家说话作工片时，随后便静默、无能了。祂却常存。他们死了，祂却活着。他们是被点燃的灯烛，因此迟早必要熄灭；但祂是真光，他们所有的光辉都是从祂汲取，而祂永远照耀。——亚历山大·麦克拉伦",
              "simpEn": "Luther, in a moment of danger and fear when he needed unseen strength, was found sitting quietly, tracing on the table with his finger: 'Vivit! vivit!'—'He lives! He lives!' This is our hope for ourselves, for God's truth, and for all people. Leaders and thinkers come and go, speak and work for a while, then fall silent and powerless. He stays. They die, but He lives. They are lit candles that sooner or later go out; but He is the true light they get their brightness from, and He shines forever.",
              "simpZh": "路德有一次在危险害怕、需要看不见的力量时，被人发现安静地坐着，用手指在桌上反复写：‘Vivit! vivit!’——‘祂活着！祂活着！’这是我们对自己、对神的真理、对人类的盼望。领袖、教师、思想家来来去去，工作片时就沉寂无力了。祂却常存。他们死了，祂却活着。他们是点燃的蜡烛，迟早熄灭；但祂是真光，他们所有的光亮都从祂而来，祂永远照耀。"
            },
            {
              "en": "\"One day I came to know Dr. John Douglas Adam,\" writes C. G. Trumbull. \"I learned from him that what he counted his greatest spiritual asset was his <span class=\"vocab-trigger\" data-vocab=\"unvarying consciousness\">unvarying consciousness<\/span> of the actual presence of Jesus. Nothing bore him up so, he said, as the <span class=\"vocab-trigger\" data-vocab=\"realization\">realization<\/span> that Jesus was always with him in actual presence; and that this was so independent of his own feelings, independent of his <span class=\"vocab-trigger\" data-vocab=\"deserts\">deserts<\/span>, and independent of his own notions as to how Jesus would manifest His presence. Moreover, he said that Christ was the home of his thoughts. Whenever his mind was free from other matters it would turn to Christ; and he would talk aloud to Christ when he was alone—on the street, anywhere—as easily and naturally as to a human friend. So real to him was Jesus' actual presence.",
              "zh": "C. G. 特朗布尔写道：「有一天我认识了约翰·道格拉斯·亚当博士。我从他那里学到，他认为自己最大属灵资产，就是时刻不渝地意识到耶稣真实的同在。他说，没有什么比深切体认到耶稣常与他真实同在更能扶持他；而这与他的感觉无关，与他的功绩无关，也与他对于耶稣会如何彰显同在的看法无关。而且，他说基督是他思想的归宿。每当他的心思从其他事务中释放出来，就会转向基督；他独处时——在街上，或任何地方——都会出声与基督谈话，就像跟人间朋友交谈一样轻松自然。耶稣真实的同在对他而言，就是如此真切。」",
              "simpEn": "C. G. Trumbull wrote: 'I once met Dr. John Douglas Adam. He said his greatest spiritual treasure was the constant awareness that Jesus was actually present with him. Nothing lifted him up more than knowing Jesus was always there, and this didn't depend on his feelings, his goodness, or how he thought Jesus should show up. He also said Christ was the home of his thoughts. When his mind was free, it turned to Christ. When alone, he would talk out loud to Jesus on the street as naturally as to a human friend. Jesus' presence was that real to him.'",
              "simpZh": "特朗布尔写道：‘我认识了约翰·道格拉斯·亚当博士，他说他最大的属灵财富就是常常意识到耶稣真实的同在。最让他受扶持的，就是知道耶稣总是真实地与他同在，这跟他的感觉、他的功德、以及他认为耶稣该怎样显现都没有关系。他还说，基督是他思想的归宿。他的心一空闲下来就转向基督；他独处时，会在街上或任何地方出声对耶稣说话，就像对朋友说话一样自然。耶稣的同在对他就是这样真实。’"

            {
              "en": "Now thanks be unto God, which always <span class=\"vocab-trigger\" data-vocab=\"causeth us to triumph\">causeth us to triumph<\/span> in Christ (2Cor.2:14).",
              "zh": "感谢神！祂常率领我们在基督里夸胜。（哥林多后书2:14）",
              "simpEn": "Thanks be to God who always leads us to victory in Christ.",
              "simpZh": "感谢神，祂总带领我们在基督里得胜。"
            },
            {
              "en": "God gets His greatest victories out of apparent defeats. Very often the enemy seems to triumph for a little, and God lets it be so; but then He comes in and <span class=\"vocab-trigger\" data-vocab=\"upsets\">upsets<\/span> all the work of the enemy, <span class=\"vocab-trigger\" data-vocab=\"overthrows\">overthrows<\/span> the apparent victory, and as the Bible says, \"turns the way of the wicked upside down.\" Thus He gives a great deal larger victory than we would have known if He had not allowed the enemy, seemingly, to triumph in the first place.",
              "zh": "神从明显的失败中，赢取最大的胜利。仇敌似乎暂且得胜，神也容让如此；但随后祂介入，倾覆仇敌的一切作为，推翻那表面的胜利，正如圣经所说，「使恶人的道路颠倒」。如此，祂赐下的胜利，远比祂若不容让仇敌一开始看似得胜时，我们所知道的更大。",
              "simpEn": "God gains His greatest victories from what looks like defeat. Often the enemy seems to win for a while, and God allows it. But then He steps in and ruins the enemy's work, overturning the seeming victory. The Bible says He 'turns the way of the wicked upside down.' So He gives a much bigger victory than we would have known if He hadn't let the enemy seem to win at first.",
              "simpZh": "神从看似失败的事上，得到最大的胜利。仇敌好像暂时赢了，神也允许；但随后祂介入，推翻仇敌的工作，击败表面的胜利，正如圣经说‘使恶人的道路颠倒’。这样，祂赐下比如果不让仇敌起初看似得胜时更大的胜利。"
            },
            {
              "en": "The story of the three Hebrew children being cast into the <span class=\"vocab-trigger\" data-vocab=\"fiery furnace\">fiery furnace<\/span> is a familiar one. Here was an apparent victory for the enemy. It looked as if the servants of the living God were going to have a terrible defeat. We have all been in places where it seemed as though we were defeated, and the enemy rejoiced. We can imagine what a complete defeat this looked to be. They fell down into the flames, and their enemies watched them to see them burn up in that awful fire, but were greatly astonished to see them walking around in the fire enjoying themselves. <span class=\"vocab-trigger\" data-vocab=\"Nebuchadnezzar\">Nebuchadnezzar<\/span> told them to \"come forth out of the midst of the fire.\" Not even a hair was <span class=\"vocab-trigger\" data-vocab=\"singed\">singed<\/span>, nor was the smell of fire on their garments, \"because there is no other god that can deliver after this sort.\"",
              "zh": "三个希伯来少年被扔进烈火的窑中的故事，是我们熟悉的。那看似仇敌得胜了。看起来永生神的仆人将要惨败。我们都有过身处看似失败、仇敌欢乐的时刻。我们可以想象，那番情景看起来是何等彻底的失败。他们倒在火焰中，仇敌围观，要看他们在可怕的烈火中烧死，却极其惊愕地看见他们在火中行走，怡然自得。尼布甲尼撒吩咐他们「从火中出来」。连一根头发都没有烧焦，衣服也没有火燎的气味，「因为没有别神能这样施行拯救。」",
              "simpEn": "The story of the three Hebrew young men thrown into the blazing furnace is well known. It looked like a victory for the enemy, as if God's servants would be terribly defeated. We've all been in spots where we seemed beaten and the enemy was glad. Imagine how total a defeat it looked. They fell into the flames while enemies watched, expecting them to burn, but were shocked to see them walking around in the fire, enjoying themselves. Nebuchadnezzar called them out. Not a hair was burned, no smell of fire on their clothes, 'because there is no other god who can save like this.'",
              "simpZh": "三个希伯来少年被扔进火窑的故事很熟悉。当时看起来仇敌赢了，好像永生神的仆人就要惨败。我们都有过似乎被打败、仇敌开心的经历。可以想象那看起来是多么彻底的失败。他们倒在火焰中，仇敌看着他们，以为他们会在可怕的火里烧死，却大惊看见他们在火中走来走去，很自在。尼布甲尼撒叫他们从火中出来，头发没烧焦，衣服没火燎味，‘因为没有别的神能这样拯救。’"
            },
            {
              "en": "This apparent defeat resulted in a <span class=\"vocab-trigger\" data-vocab=\"marvelous victory\">marvelous victory<\/span>. Suppose that these three men had lost their faith and courage, and had complained, saying, \"Why did not God keep us out of the furnace!\" They would have been burned, and God would not have been glorified. If there is a great trial in your life today, do not own it as a defeat, but continue, by faith, to claim the victory through Him who is able to make you <span class=\"vocab-trigger\" data-vocab=\"more than conqueror\">more than conqueror<\/span>, and a glorious victory will soon be apparent. Let us learn that in all the hard places God brings us into, He is making opportunities for us to exercise such faith in Him as will bring about blessed results and greatly glorify His name.",
              "zh": "这表面上的失败，却导致了奇妙的胜利。试想，如果这三个人失去信心和勇气，抱怨说：「神为什么不让我们免进火窑！」他们就会被烧死，神也不能得荣耀。今天，若你生命中有一场大试炼，不要承认那是失败，却要凭信心继续宣告靠那能使你得胜有余的主得胜，荣耀的胜利不久就会显明。我们要学知，在神带我们进入的一切艰难处境中，祂都在为我们创造机会，操练那种必带来有福结果并大大荣耀祂名的信心。",
              "simpEn": "This seeming defeat brought a wonderful victory. If those three had lost faith and complained, 'Why didn't God keep us out of the furnace?' they would have burned and God would not have been honored. If you are in a big trial today, don't call it a defeat. Instead, by faith keep claiming victory through Christ who can make you more than a conqueror, and a glorious win will show up. Let's learn that in every hard place God puts us, He is giving us a chance to trust Him in a way that brings blessed results and honors His name greatly.",
              "simpZh": "这看似失败的事却带来了奇妙的胜利。如果那三个人失去信心抱怨说：‘神为什么不让我们免进火窑？’他们就会被烧死，神也不能得荣耀。今天如果你在极大的试炼中，不要称它为失败，要凭信心继续宣告靠着那能使你得胜有余的主得胜，荣耀的胜利很快会显现。我们要学会，在神带我们进入的每一个艰难中，祂都在给我们机会操练信心，那会带来有福的结果，大大荣耀祂的名。"

            {
              "en": "Defeat may serve as well as victory <br>To shake the soul and let the glory out. <br>When the great <span class=\"vocab-trigger\" data-vocab=\"oak\">oak<\/span> is straining in the wind, <br>The <span class=\"vocab-trigger\" data-vocab=\"boughs\">boughs<\/span> drink in new beauty, and the trunk <br>Sends down a deeper root on the <span class=\"vocab-trigger\" data-vocab=\"windward side\">windward side<\/span>. <br>Only the soul that knows the mighty grief <br>Can know the mighty <span class=\"vocab-trigger\" data-vocab=\"rapture\">rapture<\/span>. Sorrows come <br>To stretch out spaces in the heart for joy.",
              "zh": "失败与胜利一样有益，都能摇撼灵魂，让荣耀溢出。当大橡树在风中拉紧，枝条饮入新的美丽，树干在迎风面扎下更深的根。只有经历过大悲痛的灵魂，才能体尝大喜乐。忧伤来到，是为在心中扩展空间，以容纳喜乐。",
              "simpEn": "Defeat can work just as well as victory to shake the soul and let glory out. When a great oak strains in the wind, the branches absorb new beauty, and the trunk sends a deeper root on the side facing the wind. Only the soul that knows deep grief can know deep joy. Sorrows come to make bigger spaces in the heart for joy.",
              "simpZh": "失败和胜利都能摇动灵魂，让荣耀出来。当大橡树在风中拉紧，枝条吸收新的美丽，树干在迎风的那面扎下更深的根。只有经历过极大悲伤的灵魂，才能知道极大的喜乐。忧伤来临，是要在心中扩展空间，容纳喜乐。"

            {
              "en": "\"Go to the ant.\" <span class=\"vocab-trigger\" data-vocab=\"Tamerlane\">Tamerlane<\/span> used to relate to his friends an <span class=\"vocab-trigger\" data-vocab=\"anecdote\">anecdote<\/span> of his early life. \"I once,\" he said, \"was forced to take shelter from my enemies in a ruined building, where I sat alone many hours. Desiring to <span class=\"vocab-trigger\" data-vocab=\"divert my mind\">divert my mind<\/span> from my hopeless condition, I <span class=\"vocab-trigger\" data-vocab=\"fixed\">fixed<\/span> my eyes on an ant that was carrying a grain of corn larger than itself up a high wall. I numbered the efforts it made to accomplish this object. The grain fell sixty-nine times to the ground; but the insect <span class=\"vocab-trigger\" data-vocab=\"persevered\">persevered<\/span>, and the seventieth time it reached the top. This sight gave me courage at the moment and I never forgot the lesson.\" —The King's Business.",

              "simpZh": "‘去看蚂蚁。’帖木儿讲过他早年的故事：‘有一次我躲避敌人，藏在一个破房子里，一个人坐了很久。为了让自己不再想无望的处境，我盯着一只蚂蚁，它扛着比它还大的谷粒爬高墙。我数了它的努力。谷粒掉下来六十九次；但蚂蚁坚持，第七十次它爬到了顶。这景象当时给了我勇气，我永远没忘记那一课。’"

              "zh": "那种以过往祷告未蒙应允为由而灰心无力的祷告，已不再是信心的祷告。对于信心的祷告而言，祷告未蒙应允的事实，恰恰证明答复的时刻更加近了。从始至终，我们主的教导与榜样都告诉我们，不能坚持、不能迫切地一再重提、更新、并从每次已过的祈求中积蓄力量的祷告，不是那终必得胜的祷告。",

            {

            {

            {
              "en": "A hero is not fed on sweets, <br>Daily his own heart he eats; <br>Chambers of the great are jails, <br>And head winds right for royal sails. <br>—Emerson. <br><span class=\"vocab-trigger\" data-vocab=\"Tribulation\">Tribulation<\/span> is the way to triumph. The valley-way opens into the highway. <span class=\"vocab-trigger\" data-vocab=\"tribulation\">Tribulation<\/span>'s <span class=\"vocab-trigger\" data-vocab=\"imprint\">imprint<\/span> is on all great things. Crowns are cast in <span class=\"vocab-trigger\" data-vocab=\"crucibles\">crucibles<\/span>. Chains of character that wind about the feet of God are forged in earthly flames. No man is greatest <span class=\"vocab-trigger\" data-vocab=\"victor\">victor<\/span> till he has <span class=\"vocab-trigger\" data-vocab=\"trodden the winepress of woe\">trodden the winepress of woe<\/span>. With seams of <span class=\"vocab-trigger\" data-vocab=\"anguish\">anguish<\/span> deep in His brow, the \"Man of Sorrows\" said, \"In the world ye shall have <span class=\"vocab-trigger\" data-vocab=\"tribulation\">tribulation<\/span>\"—but after this sob comes the psalm of promise, \"Be of good cheer, I have overcome the world.\" The footprints are traceable everywhere. <span class=\"vocab-trigger\" data-vocab=\"Bloodmarks\">Bloodmarks<\/span> stain the steps that lead to thrones. Scars are the price of <span class=\"vocab-trigger\" data-vocab=\"scepters\">scepters<\/span>. Our crowns will be wrested from the giants we conquer. Grief has always been the lot of greatness. It is an open secret.",

              "en": "Every great book has been written with the author's blood. \"These are they that have come out of great <span class=\"vocab-trigger\" data-vocab=\"tribulation\">tribulation<\/span>.\" Who was the <span class=\"vocab-trigger\" data-vocab=\"peerless poet\">peerless poet<\/span> of the Greeks? <span class=\"vocab-trigger\" data-vocab=\"Homer\">Homer<\/span>. But that <span class=\"vocab-trigger\" data-vocab=\"illustrious singer\">illustrious singer<\/span> was blind. Who wrote the fadeless dream of \"Pilgrim's Progress\"? A prince in royal purple upon a couch of ease? Nay! The trailing splendor of that vision <span class=\"vocab-trigger\" data-vocab=\"gilded\">gilded<\/span> the dingy walls of old Bedford jail while John Bunyan, a princely prisoner, a <span class=\"vocab-trigger\" data-vocab=\"glorious genius\">glorious genius<\/span>, made a faithful transcript of the scene.",
              "zh": "每一部伟大的书都是用作者的血写成的。「这些人是从大患难中出来的。」谁是希腊无与伦比的诗人？荷马。但那位辉煌的歌者却是瞎子。谁写了《天路历程》那不褪色的梦境？是身披王袍、躺卧安逸榻上的王子吗？不！那异象的迤逦光华，照亮了贝德福德监狱的灰暗墙壁，而那位尊贵的囚徒、荣耀的天才约翰·班扬，如实地摹画了那天上的景象。",
              "simpEn": "Every great book is written with the author's blood. 'These are the ones who have come out of great tribulation.' Who was the matchless poet of the Greeks? Homer. But that famous singer was blind. Who wrote the unfading dream of 'Pilgrim's Progress'? A prince in royal robes on a comfortable couch? No! The trailing beauty of that vision covered the dark walls of Bedford jail while John Bunyan, a noble prisoner, a shining genius, faithfully wrote down the scene.",
              "simpZh": "每一本伟大的书都是用作者的血写成的。‘这些是从大患难中出来的人。’谁是希腊无可比拟的诗人？荷马。但这位伟大的歌者是瞎眼的。谁写了《天路历程》那不褪色的梦？是一位穿王袍躺在舒适榻上的王子吗？不！那异象的光华照亮了贝德福德监狱的暗墙，而尊贵的囚徒、荣耀的天才约翰·班扬忠实地记下了那景象。"

          "audio": "audio/Streams in the Desert - January 22.m4a",
          "paragraphs": [
            {
              "en": "Into a <span class=\"vocab-trigger\" data-vocab=\"desert place apart\">desert place apart<\/span> (Matt.14:13).",
              "zh": "「他就独自退到野地里去。」（马太福音14:13）",
              "simpEn": "Into a lonely, remote place.",
              "simpZh": "到一个偏僻、孤单的地方去。"
            },
            {
              "en": "\"There is <span class=\"vocab-trigger\" data-vocab=\"no music in a rest\">no music in a rest<\/span>, but there is the <span class=\"vocab-trigger\" data-vocab=\"making of music\">making of music<\/span> in it.\" In our whole life-melody the music is broken off here and there by \"<span class=\"vocab-trigger\" data-vocab=\"rests\">rests<\/span>,\" and we foolishly think we have come to the end of the tune. God sends a time of <span class=\"vocab-trigger\" data-vocab=\"forced leisure\">forced leisure<\/span>, sickness, disappointed plans, <span class=\"vocab-trigger\" data-vocab=\"frustrated efforts\">frustrated efforts<\/span>, and makes a sudden pause in the <span class=\"vocab-trigger\" data-vocab=\"choral hymn\">choral hymn<\/span> of our lives; and we <span class=\"vocab-trigger\" data-vocab=\"lament\">lament<\/span> that our voices must be silent, and our part missing in the music which ever goes up to the ear of the Creator. How does the musician read the \"rest\"? See him <span class=\"vocab-trigger\" data-vocab=\"beat the time\">beat the time<\/span> with <span class=\"vocab-trigger\" data-vocab=\"unvarying count\">unvarying count<\/span> and catch up the next note true and steady, as if no breaking place had come between.",
              "zh": "「休止符里没有音乐，但其中却有音乐的形成。」在我们一生的旋律里，音乐不时被「休止符」打断，我们却愚蠢地以为曲子已经终了。神降下一段被迫的闲暇、疾病、失意的计划、受挫的努力，在我们生命的合唱赞美诗中突然停顿；我们哀叹自己的声音必须静默，在升到造物主耳中的音乐里缺少了自己那部分。但音乐家如何解读「休止符」呢？看他以不变的拍数打着节拍，准确稳定地接上下一音符，仿佛中间从未有过间断。",
              "simpEn": "A rest in music has no sound, but music is made in it. In our life-song, rests break the melody, and we foolishly think the song is over. God sends times of forced rest—illness, failed plans, blocked efforts—that pause our life's choir. We feel sad that our voice is silent and our part missing from the song rising to God. But the musician reads the rest differently: he keeps the beat steady and picks up the next note perfectly, as if no break happened.",
              "simpZh": "休止符没有声音，但音乐是在里面被制作的。在我们人生的旋律里，休止符打断音乐，我们却傻傻以为曲子完了。神降下被迫的休息——生病、计划失败、努力受挫——让我们生命的合唱暂停。我们难过，觉得声音静了，在献给神的歌里少了我们的部分。但音乐家读休止符不一样：他稳定打拍子，准确地接上下一音，好像中间没有断过。"
            },
            {
              "en": "Not without design does God write the music of our lives. Be it ours to learn the tune, and not be dismayed at the \"<span class=\"vocab-trigger\" data-vocab=\"rests\">rests<\/span>.\" They are not to be <span class=\"vocab-trigger\" data-vocab=\"slurred over\">slurred over<\/span>, not to be <span class=\"vocab-trigger\" data-vocab=\"omitted\">omitted<\/span>, not to destroy the melody, not to change the <span class=\"vocab-trigger\" data-vocab=\"keynote\">keynote<\/span>. If we look up, God Himself will <span class=\"vocab-trigger\" data-vocab=\"beat the time\">beat the time<\/span> for us. With the eye on Him, we shall strike the next note full and clear. If we sadly say to ourselves, \"There is no music in a 'rest,'\" let us not forget \"there is the <span class=\"vocab-trigger\" data-vocab=\"making of music\">making of music<\/span> in it.\" The <span class=\"vocab-trigger\" data-vocab=\"making of music\">making of music<\/span> is often a slow and painful process in this life. How patiently God works to teach us! How long He waits for us to learn the lesson! —<span class=\"vocab-trigger\" data-vocab=\"Ruskin\">Ruskin<\/span>.",
              "zh": "上帝谱写我们生命的音乐并非漫无目的。我们要学习那旋律，不要因「休止符」而气馁。它们不可被含糊掠过，不可被省略，不可破坏曲调，也不可改变主调。我们若向上仰望，神要亲自为我们打拍子。注目于祂，我们就能饱满清亮地奏出下一个音符。如果我们悲伤地对自己说「休止符里没有音乐」，让我们别忘了「其中有音乐的形成」。此生在音乐的形成常是缓慢而痛苦的过程。神是何等耐心地教导我们！祂又是何等长久地等候我们学会功课！——罗斯金",
              "simpEn": "God writes our life's music with purpose. We should learn the song and not be afraid of rests. They must not be skipped, omitted, or change the melody or keynote. Look up, and God will keep time for you. With eyes on Him, we'll play the next note strong and clear. If we sadly say, 'There's no music in a rest,' remember music is being made in it. That making is often slow and painful. How patiently God teaches us! How long He waits for us to learn!",
              "simpZh": "神谱写我们生命音乐是有目的的。我们要学这首曲子，不要被休止符吓倒。它们不能被含糊带过，不能被省略，不能破坏旋律，也不能改变主音。向上看，神会为你打拍子。眼睛看祂，我们就能清晰饱满地弹出下一个音。如果我们伤心地说‘休止符里没有音乐’，记得音乐正是在其中被制作的。这种制作常是缓慢痛苦的。神多么耐心教我们！祂等我们学会等了多久！"
            },
            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Called aside\">Called aside<\/span>— <br>From the glad working of thy busy life, <br>From the world's <span class=\"vocab-trigger\" data-vocab=\"ceaseless stir\">ceaseless stir<\/span> of care and strife, <br>Into the shade and stillness by thy Heavenly Guide <br>For a brief space thou hast been <span class=\"vocab-trigger\" data-vocab=\"Called aside\">called aside<\/span>. <br><span class=\"vocab-trigger\" data-vocab=\"Called aside\">Called aside<\/span>— <br>Perhaps into a desert garden dim; <br>And yet not alone, when thou hast been with Him, <br>And heard His voice in sweetest <span class=\"vocab-trigger\" data-vocab=\"accents\">accents<\/span> say: <br>\"Child, wilt thou not with Me this still hour stay?\" <br><span class=\"vocab-trigger\" data-vocab=\"Called aside\">Called aside<\/span>— <br>In hidden paths with Christ thy Lord to <span class=\"vocab-trigger\" data-vocab=\"tread\">tread<\/span>, <br>Deeper to drink at the sweet <span class=\"vocab-trigger\" data-vocab=\"Fountainhead\">Fountainhead<\/span>, <br>Closer in fellowship with Him to roam, <br>Nearer, <span class=\"vocab-trigger\" data-vocab=\"perchance\">perchance<\/span>, to feel thy Heavenly Home. <br><span class=\"vocab-trigger\" data-vocab=\"Called aside\">Called aside<\/span>— <br>Oh, knowledge deeper grows with Him alone; <br>In secret oft His deeper love is shown, <br>And learnt in many an hour of dark distress <br>Some rare, sweet lesson of His <span class=\"vocab-trigger\" data-vocab=\"tenderness\">tenderness<\/span>. <br><span class=\"vocab-trigger\" data-vocab=\"Called aside\">Called aside<\/span>— <br>We thank thee for the stillness and the shade; <br>We thank Thee for the hidden paths Thy love hath made, <br>And, so that we have wept and watched with Thee, <br>We thank Thee for our dark <span class=\"vocab-trigger\" data-vocab=\"Gethsemane\">Gethsemane<\/span>. <br><span class=\"vocab-trigger\" data-vocab=\"Called aside\">Called aside<\/span>— <br>Oh, <span class=\"vocab-trigger\" data-vocab=\"restful thought\">restful thought<\/span>—He doeth all things well; <br>Oh, blessed sense, with Christ alone to dwell; <br>So in the shadow of Thy cross to hide, <br>We thank Thee, Lord, to have been <span class=\"vocab-trigger\" data-vocab=\"Called aside\">called aside<\/span>.",
              "zh": "蒙召退到一旁——离开你忙碌生活中欢然的工作，离开世上无止息的忧虑与纷争，被你的天上向导带进阴影与宁静中；有一阵短短的时间，你被召退到一旁。蒙召退到一旁——或许进入幽暗的荒漠园子；然而并非孤单，当你与祂同在，听见祂用最甜美的音调说：「孩子，你岂不愿与我共度这安静时光？」蒙召退到一旁——与主基督同行在隐秘的路途上，更深畅饮那甜美的泉源，与祂更亲密地同行，或许就近感受到天家的温暖。蒙召退到一旁——哦，惟独与祂同在时知识才更加深厚；在隐密处祂更深的大爱常被显明，并在许多黑暗困苦的时刻学得祂温柔中那稀有甘甜的功课。蒙召退到一旁——我们为这寂静与阴影感谢祢；我们为祢爱所辟的隐秘路途感谢祢；并且，因我们曾与祢一同哭泣、一同警醒，我们为那幽暗的客西马尼感谢祢。蒙召退到一旁——哦，何等安息的思想——祂凡事都做得美好；哦，有福的感觉，单单与基督同住；这样藏在祢十架的荫下，主啊，我们感谢祢将我们召退到一旁。",
              "simpEn": "Called aside from your busy life and the world's nonstop rush into quiet with God. Maybe into a dim desert garden, but not alone—with Jesus, hearing Him gently say, 'Child, stay this quiet hour with Me.' Walking hidden paths with Christ, drinking deeper from the sweet Source, closer to Him, nearer to heaven. In secret we learn deeper knowledge, His deeper love, and in dark distress we learn lessons of His gentleness. We thank God for quiet, for hidden paths, and even for our dark Gethsemane times of sorrow. Restful thought: He does all things well. Blessed to live with Christ alone, hiding in His cross. Thank You, Lord, for calling us aside.",
              "simpZh": "从忙碌的生活和世界不断的纷扰中被叫到一旁，进入与神同在的安静。也许是进到一个幽暗的荒漠园子，但不孤单——与耶稣一起，听祂温柔地说：‘孩子，这安静时刻和我一起吧。’与基督走隐藏的路，更深喝那甜美泉源，更亲近祂，更靠近天家。在隐秘处我们学更深的知识，祂更深的爱，在黑暗痛苦中学到祂温柔的功课。感谢神赐下安静和阴影，为祂预备的隐藏道路感谢，甚至为我们黑暗的客西马尼感谢。安息的思想：祂一切都做得好。单独与基督同在有福，藏在祂十架荫下。主，感谢祢叫我们退到一旁。"

            {
              "en": "Why <span class=\"vocab-trigger\" data-vocab=\"standest thou afar off\">standest thou afar off<\/span>, O Lord? (Psalm 10:1).",
              "zh": "耶和华啊，你为什么站在远处？（诗篇10:1）",

            {
              "en": "God is \"a very <span class=\"vocab-trigger\" data-vocab=\"present help\">present help<\/span> in trouble.\" But He permits trouble to pursue us, as though He were <span class=\"vocab-trigger\" data-vocab=\"indifferent\">indifferent<\/span> to its <span class=\"vocab-trigger\" data-vocab=\"overwhelming pressure\">overwhelming pressure<\/span>, that we may be brought to the end of ourselves, and led to discover the <span class=\"vocab-trigger\" data-vocab=\"treasure of darkness\">treasure of darkness<\/span>, the <span class=\"vocab-trigger\" data-vocab=\"unmeasurable gains of tribulation\">unmeasurable gains of tribulation<\/span>. We may be sure that He who permits the suffering is with us in it. It may be that we shall see Him only when the trial is passing; but we must dare to <span class=\"vocab-trigger\" data-vocab=\"believe\">believe<\/span> that He never leaves the <span class=\"vocab-trigger\" data-vocab=\"crucible\">crucible<\/span>. Our eyes are <span class=\"vocab-trigger\" data-vocab=\"holden\">holden<\/span>; and we cannot behold Him whom our soul loveth. It is dark—the bandages blind us so that we cannot see the form of our High Priest; but He is there, deeply touched. Let us not rely on feeling, but on faith in His <span class=\"vocab-trigger\" data-vocab=\"unswerving fidelity\">unswerving fidelity<\/span>; and though we see Him not let us talk to Him. Directly we begin to speak to Jesus, as being literally present though His presence is <span class=\"vocab-trigger\" data-vocab=\"veiled\">veiled<\/span>, there comes an answering voice which shows that He is in the shadow, keeping watch upon His own.",
              "zh": "神是「在患难中随时的帮助」。但祂容许患难追赶我们，好像祂对那压倒性的压力漠不关心，为要把我们带到自己的尽头，并引领我们发掘黑暗中的宝藏，以及患难那不可量度的益处。我们可以确信，那位容许苦难的神，就在其中与我们同在。或许要到试炼正过去时我们才能看见祂；但我们须敢相信，祂从不离开熔炉。我们的眼睛被蒙蔽，不能看见我们灵魂所爱的那一位。天色昏黑——绷带使我们眼盲，以致看不见我们大祭司的形象；但祂在那里，深深动容。不要倚靠感觉，而要信靠祂毫不动摇的信实；虽看不见祂，仍要向祂说话。我们一旦开口对耶稣说话，深信虽然祂的同在是隐藏的，祂仍真实在场，就必有回应之声，表明祂正在阴影中看顾属祂的人。",
              "simpEn": "God is a very present help in trouble, yet He lets trouble chase us as if He doesn't care about its pressure, to bring us to our limit and show us the treasure in darkness and huge gains of hardship. He who allows suffering is with us in it. We may see Him only as the trial passes, but trust that He never leaves the melting pot. Our eyes are covered; we can't see the One we love. It's dark, but He is there, deeply moved. Don't trust feelings, but rely on His unfailing faithfulness. Even without seeing, talk to Him. The moment you speak to Jesus as truly present though hidden, an answer comes showing He is in the shadow, watching over you.",
              "simpZh": "神是患难中随时的帮助，却让患难追我们，好像不理我们的压力，要把我们逼到尽头，发现黑暗中的宝藏和患难的大益处。允许苦难的那一位就在其中与我们同在。也许试炼过去才看见祂，但要信祂从不离开熔炉。我们眼睛被蒙，看不见所爱的主。天暗，但祂在那里，深深难过。不要靠感觉，要相信祂不变的信实。虽然看不见，仍对祂说话。一开口对耶稣说话，相信祂虽隐藏却真实同在，就会有回答，显明祂在阴影中看守你。"

              "en": "God knows just when to withhold from us any visible sign of encouragement, and when to grant us such a sign. How good it is that we may trust Him anyway! When all visible evidences that He is remembering us are withheld, that is best; He wants us to realize that His Word, His promise of remembrance, is more <span class=\"vocab-trigger\" data-vocab=\"substantial\">substantial<\/span> and dependable than any <span class=\"vocab-trigger\" data-vocab=\"evidence\">evidence<\/span> of our senses. When He sends the visible <span class=\"vocab-trigger\" data-vocab=\"evidence\">evidence<\/span>, that is well also; we appreciate it all the more after we have trusted Him without it. Those who are readiest to trust God without other <span class=\"vocab-trigger\" data-vocab=\"evidence\">evidence<\/span> than His Word always receive the greatest number of visible evidences of His love. —C.G. Trumbull.",
              "zh": "神深知何时不赐给我们任何看得见的鼓励记号，又何时赐下这样的记号。何等美善，我们无论如何都可以信靠祂！当一切祂记念我们的可见凭据都被收去时，那是最好的；祂要我们明白，祂的话语，祂记念的应许，比任何感官的证据都更实在、更可靠。当祂赐下可见的凭据时，那也很好；我们既在未见凭据时信靠了祂，就更珍惜它了。那些最乐意单凭主话而不靠其他证据信靠神的人，总是领受到最多祂爱的可见凭据。——特朗布尔",
              "simpEn": "God knows when to hold back a visible sign of encouragement, and when to give it. We can trust Him either way. When all visible proof that He remembers us is gone, that's best; He wants us to know His Word and promise are more solid and reliable than our senses. When He gives visible proof, we treasure it even more after trusting without it. Those ready to trust God with only His Word always receive the most visible proofs of His love.",
              "simpZh": "神知道何时不给看得见的鼓励记号，何时给。我们总可以信靠祂。当所有看得见祂记念我们的证据都收回时，那是最好；祂要我们明白祂的话和应许比感觉更实在可靠。当祂给看得见的证据，也很好；在没证据时信靠了，就更珍惜。那些只凭神的话就乐意信靠的人，总会领受最多祂爱的可见证据。"
            },
            {
              "en": "Believing Him; if storm-clouds gather darkly 'round, <br>And even if the heaven seem <span class=\"vocab-trigger\" data-vocab=\"brass\">brass<\/span>, without a sound? <br>He hears each prayer and even notes the sparrow's fall. <br>And praising Him; when sorrow, grief, and pain are near, <br>And even when we lose the thing that seems most dear? <br>Our loss is gain. Praise Him; in Him we have our All. <br>Our hand in His; e'en though the path seems long and <span class=\"vocab-trigger\" data-vocab=\"drear\">drear<\/span> <br>We scarcely see a step ahead, and almost fear? <br>He guides aright. He has it thus to keep us near. <br>And satisfied; when every path is blocked and bare, <br>And worldly things are gone and dead which were so fair? <br><span class=\"vocab-trigger\" data-vocab=\"believe\">Believe<\/span> and rest and trust in Him, He comes to stay. <br>Delays are not refusals; many a prayer is <span class=\"vocab-trigger\" data-vocab=\"registered\">registered<\/span>, and underneath it the words: \"My time is not yet come.\" God has a set time as well as a set purpose, and He who orders the bounds of our habitation orders also the time of our <span class=\"vocab-trigger\" data-vocab=\"deliverance\">deliverance<\/span>.",
              "zh": "相信祂；纵使乌云密布，天色如铜，寂静无声？祂仍听每一个祷告，就连麻雀掉下祂也留意。赞美祂；当忧伤、悲痛、痛苦临近，甚至当我们失去最亲爱之物？我们的损失乃是得益。赞美祂；在祂里面我们得着万有。手交在祂手中；即使路途漫长阴郁，几乎看不见前面一步，心中几乎惧怕？祂必正确引领，祂如此行，是要保守我们与祂相近。得着满足；当每条路都被堵住，赤露敞开，属世美好之物都消失死去？相信、安息、信靠祂，祂正来与我们同住。迟延并非拒绝；许多祷告已被登记在册，下面写着：「我的时候还没有到。」神有既定的时间，也有既定的旨意；那划定我们居住疆界的，也划定我们得释放的时间。",
              "simpEn": "Believe Him; even if dark clouds gather and heaven seems like silent brass, He hears every prayer and sees the sparrow fall. Praise Him when sorrow, grief, and pain come, and even when we lose what's most dear? Our loss is gain. Praise Him; in Him we have everything. Our hand in His; though the path is long and dreary and we can barely see the next step, He guides rightly to keep us close. Be satisfied when every path is blocked and worldly things are gone. Believe, rest, trust; He comes to stay. Delays are not denials; many prayers are recorded with the note 'My time has not yet come.' God has a set time and purpose, and He who sets our dwelling also sets the time of our rescue.",
              "simpZh": "相信祂；即使乌云密布，天像铜一样无声，祂仍听祷告，看顾麻雀。赞美祂；当忧伤痛苦来到，甚至失去最亲爱的东西？损失其实是益处。赞美祂；在祂里面我们拥有一切。手放在祂手中；虽然路漫长阴郁，几乎看不见下一步，祂正确引导，让我们靠近祂。当所有路被堵住，属世东西都没了，仍然满足。相信、安息、信靠，祂正来同住。延迟不是拒绝；许多祷告已被记录，下面写着‘我的时候还没到’。神有定好的时间和旨意，划定我们疆界的也划定拯救的时间。"
            }

            {
              "en": "<span class=\"vocab-trigger\" data-vocab=\"Thy rod and thy staff\">Thy rod and thy staff<\/span> they comfort me (Psalm 23:4).",

            {
              "en": "At my father's house in the country there is a little <span class=\"vocab-trigger\" data-vocab=\"closet\">closet<\/span> in the chimney corner where are kept the <span class=\"vocab-trigger\" data-vocab=\"canes\">canes<\/span> and walking-sticks of several generations of our family. In my visits to the old house, when my father and I are going out for a walk, we often go to the cane <span class=\"vocab-trigger\" data-vocab=\"closet\">closet<\/span> and pick out our sticks to suit the <span class=\"vocab-trigger\" data-vocab=\"fancy of the occasion\">fancy of the occasion<\/span>. In this I have frequently been reminded that the Word of God is a staff.",
              "zh": "在乡间我父亲的老宅里，烟囱角落有个小橱柜，里面存放着我们家几代人用过的手杖和拐杖。每次我回老家，父亲和我出去散步时，常到那手杖柜前，按着当时的喜好挑选合用的一根。这常让我想起，神的话就是一根杖。",
              "simpEn": "At my father's country house, a small closet by the chimney holds walking sticks from several generations. When visiting, my father and I would pick out a stick suitable for the walk. This often reminded me that God's Word is a staff.",
              "simpZh": "在父亲乡下房子的烟囱角，有一个小柜子，放着几代人用过的手杖。我回老家时，父亲和我散步前常去挑一根合适的手杖。这常让我想起神的话就像一根杖。"

            {
              "en": "During the war, when the season of <span class=\"vocab-trigger\" data-vocab=\"discouragement\">discouragement<\/span> and <span class=\"vocab-trigger\" data-vocab=\"impending danger\">impending danger<\/span> was upon us, the verse, \"He shall not be afraid of <span class=\"vocab-trigger\" data-vocab=\"evil tidings\">evil tidings<\/span>; his heart is <span class=\"vocab-trigger\" data-vocab=\"fixed\">fixed<\/span>, trusting in the Lord,\" was a staff to walk with many dark days. When death took away our child and left us almost heartbroken, I found another staff in the promise that \"weeping may endure for a night, but joy cometh in the morning.\" When in <span class=\"vocab-trigger\" data-vocab=\"impaired health\">impaired health<\/span>, I was <span class=\"vocab-trigger\" data-vocab=\"exiled\">exiled<\/span> for a year, not knowing whether I should be permitted to return to my home and work again, I took with me this staff which never failed, \"He <span class=\"vocab-trigger\" data-vocab=\"knoweth\">knoweth<\/span> the thoughts that he thinketh toward me, thoughts of peace and not of evil.\"",
              "zh": "战争期间，当灰心和迫近的危险笼罩我们时，这节经文——「他必不怕凶恶的信息，他心坚定，倚靠耶和华」——就成了我走过许多黑暗日子的杖。死亡夺去我们的孩子，几乎让我们心碎时，我在另一个应许中找到了杖：「一宿虽然有哭泣，早晨便必欢呼。」当健康受损，我被迫离家长达一年，不知能否再回家和工作时，我带着这根从不失灵的杖：「我知道我向你们所怀的意念，是赐平安的意念，不是降灾祸的意念。」",
              "simpEn": "During the war, when discouragement and danger threatened, the verse 'He will not fear bad news; his heart is steadfast, trusting in the Lord' was a staff for dark days. When our child died and we were heartbroken, I found a staff in the promise 'Weeping may last for a night, but joy comes in the morning.' When I was in poor health and exiled for a year, not knowing if I could return home, I carried this unfailing staff: 'He knows the plans He has for me, plans for peace and not for evil.'",
              "simpZh": "战争时期，灰心和危险临近，经文‘他必不怕凶信，心坚定倚靠耶和华’成了我黑暗日子的杖。孩子去世，我们心碎时，应许‘一宿有哭泣，早晨必欢呼’成了杖。健康受损，被放逐一年，不知能否回家时，我带着这根从没失灵的杖：‘我知道我向你们所怀的意念是平安的意念，不是降灾祸的。’"
            },
            {
              "en": "In times of special danger or doubt when human judgment has seemed to be set at <span class=\"vocab-trigger\" data-vocab=\"naught\">naught<\/span>, I have found it easy to go forward with this staff, \"In <span class=\"vocab-trigger\" data-vocab=\"quietness and confidence\">quietness and confidence<\/span> shall be your strength.\" And in emergencies, when there has seemed to be no adequate time for <span class=\"vocab-trigger\" data-vocab=\"deliberation\">deliberation<\/span> or for action, I have never found that this staff has failed me, \"He that believeth shall not make <span class=\"vocab-trigger\" data-vocab=\"haste\">haste<\/span>.\" —Benjamin Vaughan Abbott",
              "zh": "在特殊的危险或疑虑时刻，当人的判断似乎全归无效时，我发现靠着这根杖前行甚为容易：「你们得力在乎平静安稳。」在紧急关头，当似乎没有足够时间思考或行动时，我发现这根杖从未使我失望：「信靠的人必不着急。」——本杰明·沃恩·阿博特",
              "simpEn": "In times of danger or doubt when human judgment seemed worthless, I walked with the staff: 'In quietness and trust is your strength.' In emergencies with no time to think or act, this staff never failed: 'The one who believes will not hurry.'",
              "simpZh": "在危险或怀疑时，人的判断似乎无用，我就靠这根杖：‘平静安稳是你们的力量。’在紧急没时间思考行动时，这根杖从不让我失望：‘相信的人必不着急。’"
            },
            {
              "en": "\"I had never known,\" said Martin Luther's wife, \"what such and such things meant in such and such psalms, such complaints and workings of spirit; I had never understood the practice of Christian duties, had not God brought me under some <span class=\"vocab-trigger\" data-vocab=\"affliction\">affliction<\/span>.\" It is very true that God's rod is as the schoolmaster's <span class=\"vocab-trigger\" data-vocab=\"pointer\">pointer<\/span> to the child, pointing out the letter, that he may the better take notice of it; thus He pointeth out to us many good lessons which we should never otherwise have learned. God always sends His staff with His rod. \"Thy shoes shall be <span class=\"vocab-trigger\" data-vocab=\"iron and brass\">iron and brass<\/span>; and as thy days, so shall thy strength be\" (Deut 33:25). Each of us may be sure that if God sends us on stony paths He will provide us with strong shoes, and He will not send us out on any journey for which He does not <span class=\"vocab-trigger\" data-vocab=\"equip\">equip<\/span> us well. —Maclaren.",
              "zh": "马丁路德的妻子曾说：「若非神使我经历一些苦难，我就永远无法明白某些诗篇中那些话的意思，以及那些心灵的叹息与挣扎；也永不会懂得基督徒本分的操练。」诚然，神的杖就如老师指给孩子看的教鞭，点出字母，使他更易认读；照样，神向我们指出许多我们本无从学到的良善功课。神总在赐下杖的同时也赐下竿。「你的鞋是铜的、铁的；你的日子如何，你的力量也必如何」（申33:25）。我们各人都可确信，神若差我们行在石头路上，祂必赐给我们坚固的鞋子；祂绝不差我们踏上任何旅程却不充分装备我们。——麦克拉伦",

              "simpZh": "马丁路德妻子说，直到神带她进入苦难，她才明白某些诗篇和基督徒的本分。神的杖像老师的教鞭，点出我们原本学不到的功课。神赐杖时也赐竿。‘你的鞋是铜的、铁的；你的日子如何，力量也如何。’若神让我们走石头路，祂必给坚固的鞋，充分装备我们。"

        {
          "sectionId": 5,
